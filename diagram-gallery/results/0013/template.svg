    <path d="M0,0 L10,5 L0,10 Z" fill="#2b5164"/>
  </marker>
  <marker id="arrow_green" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 Z" fill="#39856f"/>
  </marker>
  <marker id="arrow_purple" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 Z" fill="#6b408d"/>
  </marker>
  <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#e2f4fc"/>
    <stop offset="100%" stop-color="#dceef8"/>
  </linearGradient>
  <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">

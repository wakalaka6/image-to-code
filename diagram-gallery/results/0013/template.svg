<!-- input prompt and equation text -->
<text x="393" y="194" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">Input Prompt</text>
<text x="385" y="217" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111">
  <tspan x="385" dy="0">“A ball rolls down</tspan><tspan x="385" dy="25">a rocky ramp”</tspan>
</text>

<text x="386" y="356" font-family="Times New Roman, serif" font-size="15" font-style="italic" fill="#111">
  <tspan x="406" dy="0">f = ∫</tspan><tspan font-size="10" dy="-7">t</tspan><tspan font-size="15" dy="7"> ∂v</tspan>
  <tspan x="406" dy="24">∂u / ∂t = 1/2 C|u|</tspan>
  <tspan x="406" dy="24">E = √(n² + h²)</tspan>
</text>
<text x="386" y="431" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111">
  <tspan x="386" dy="0">Physics Laws</tspan><tspan x="386" dy="24">&amp; Constraints</tspan>
</text>


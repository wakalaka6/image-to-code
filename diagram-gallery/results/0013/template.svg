<rect x="50" y="80" width="1308" height="610" rx="22" fill="#f8fbff" opacity="0.92" filter="url(#shadow)"/>
<text x="704" y="124" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" fill="#111624">World Model Pipeline</text>


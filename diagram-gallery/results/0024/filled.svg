<text x="714" y="176"><tspan fill="#444">cur = </tspan><tspan fill="#08923b" font-weight="700">sqlite3</tspan><tspan fill="#000">.</tspan><tspan fill="#1e73d8" font-weight="700">connect</tspan><tspan fill="#444">(DB).</tspan><tspan fill="#1e73d8" font-weight="700">cursor</tspan><tspan fill="#444">()</tspan></text>
<text x="714" y="205"><tspan fill="#c5162e" font-weight="700">min</tspan><tspan fill="#444"> = </tspan><tspan fill="#1e73d8" font-weight="700">input</tspan><tspan fill="#444">('Min?'); </tspan><tspan fill="#c5162e" font-weight="700">max</tspan><tspan fill="#444"> = </tspan><tspan fill="#1e73d8" font-weight="700">input</tspan><tspan fill="#444">('Max?')</tspan></text>
<text x="714" y="235" fill="#444">...</text>
<text x="714" y="264"><tspan fill="#c5162e" font-weight="700">Q</tspan><tspan fill="#444"> = </tspan><tspan fill="#08923b" font-weight="700">"SELECT COUNT</tspan><tspan fill="#444">(*) </tspan><tspan fill="#08923b" font-weight="700">FROM</tspan><tspan fill="#444"> items \</tspan></text>
<text x="830" y="295"><tspan fill="#08923b" font-weight="700">WHERE</tspan><tspan fill="#444"> price &lt;= </tspan><tspan fill="#c5162e" font-weight="700">{max}</tspan><tspan fill="#444"> \</tspan></text>
<text x="830" y="326"><tspan fill="#08923b" font-weight="700">AND</tspan><tspan fill="#444"> price &gt;= </tspan><tspan fill="#c5162e" font-weight="700">{min}</tspan><tspan fill="#444">"</tspan></text>
<text x="714" y="354"><tspan fill="#444">cur.</tspan><tspan fill="#1e73d8" font-weight="700">execute</tspan><tspan fill="#444">(</tspan><tspan fill="#c5162e" font-weight="700">Q</tspan><tspan fill="#444">)</tspan></text>
</g>

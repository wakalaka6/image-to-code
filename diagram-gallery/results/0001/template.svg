    <text x="1680" y="442" font-size="32" font-weight="normal" font-style="italic" text-anchor="start" font-family="Times New Roman, Times, serif">Make the {word</text>
    <text x="1680" y="482" font-size="32" font-weight="normal" font-style="italic" text-anchor="start" font-family="Times New Roman, Times, serif">choice} of the</text>

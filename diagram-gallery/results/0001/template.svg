    <text x="722" y="567" font-size="46" font-weight="normal" font-style="normal" text-anchor="middle" font-family="Times New Roman, Times, serif">Intrinsic</text>
    <text x="722" y="620" font-size="46" font-weight="normal" font-style="normal" text-anchor="middle" font-family="Times New Roman, Times, serif">Shortcut</text>

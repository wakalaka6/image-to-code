      <rect x="9" y="42" width="11" height="20" rx="4" fill="#fff" stroke="#000" stroke-width="4"/>
      <rect x="80" y="42" width="11" height="20" rx="4" fill="#fff" stroke="#000" stroke-width="4"/>
      <circle cx="38" cy="48" r="5" fill="#000"/>
      <circle cx="62" cy="48" r="5" fill="#000"/>
      <path d="M36 62 Q50 72 64 62" fill="none" stroke="#000" stroke-width="4"/>
    </symbol>
    <symbol id="mag" viewBox="0 0 100 100">
      <circle cx="40" cy="40" r="25" fill="#fff" stroke="#000" stroke-width="6"/>
      <line x1="58" y1="58" x2="85" y2="85" stroke="#000" stroke-width="10" stroke-linecap="round"/>
    </symbol>
    <symbol id="ans" viewBox="0 0 100 100">

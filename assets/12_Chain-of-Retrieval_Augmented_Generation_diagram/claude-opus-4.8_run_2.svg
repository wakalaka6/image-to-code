<svg xmlns="http://www.w3.org/2000/svg" width="2076" height="1148" viewBox="0 0 2076 1148" font-family="Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#1F6E8C"/>
    </marker>
    <marker id="ahc" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">

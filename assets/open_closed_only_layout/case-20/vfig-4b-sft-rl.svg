<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 850" style="font-family: 'Times New Roman', serif; background-color: white;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
    <!-- Green Arrowhead -->
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#92D050" />
    </marker>
    <!-- Red Arrowhead -->
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF0000" />
    </marker>
  </defs>

  <!-- ================= TOP SECTION: INPUTS ================= -->
  
  <!-- Container 1: Command Sequence -->
  <rect x="10" y="30" width="380" height="340" rx="20" fill="none" stroke="#666666" stroke-width="4" stroke-dasharray="15,10" />
  <text x="190" y="340" font-size="36" fill="#385723" text-anchor="middle">Command Sequence</text>
  
  <text x="30" y="55" font-size="24" fill="#C0392B" font-family="monospace">{"</text>
  <text x="45" y="75" font-size="24" fill="#C0392B" font-family="monospace">"steps": [</text>
  <text x="55" y="95" font-size="24" fill="#C0392B" font-family="monospace">{</text>
  <text x="85" y="115" font-size="24" fill="#C0392B" font-family="monospace">"sketch": {</text>
  <text x="95" y="135" font-size="24" fill="#C0392B" font-family="monospace">"circles": [</text>
  <text x="105" y="150" font-size="24" fill="#C0392B" font-family="monospace">{"center": [0, 0], "radius": 60},</text>
  <text x="105" y="170" font-size="24" fill="#C0392B" font-family="monospace">{"center": [0, 0], "radius": 25}</text>
  <text x="95" y="190" font-size="24" fill="#C0392B" font-family="monospace">],</text>
  <text x="85" y="210" font-size="24" fill="#C0392B" font-family="monospace">},</text>
  <text x="85" y="230" font-size="24" fill="#C0392B" font-family="monospace">"extrusion": {</text>
  <text x="95" y="250" font-size="24" fill="#C0392B" font-family="monospace">"direction": [0, 0, 1],</text>
  <text x="95" y="270" font-size="24" fill="#C0392B" font-family="monospace">"origin": [0, 0, 0],</text>
  <text x="95" y="290" font-size="24" fill="#C0392B" font-family="monospace">"depth": 15,</text>
  <text x="95" y="310" font-size="24" fill="#C0392B" font-family="monospace">"operation": "NewBody"</text>
  <text x="85" y="330" font-size="24" fill="#C0392B" font-family="monospace">},</text>
  <text x="55" y="350" font-size="24" fill="#C0392B" font-family="monospace">},...]}</text>

  <!-- Container 2: Text Description -->
  <rect x="380" y="30" width="380" height="340" rx="20" fill="none" stroke="#666666" stroke-width="4" stroke-dasharray="15,10" />
  <text x="670" y="340" font-size="36" fill="#385723" text-anchor="middle">Text Description</text>
  
  <text x="400" y="55" font-size="24" fill="#C0392B" font-family="monospace">Text_Description = "...."</text>
  <text x="400" y="75" font-size="24" fill="#92D050" font-family="monospace">This circular flange is a metal component</text>
  <text x="400" y="95" font-size="24" fill="#92D050" font-family="monospace">featuring a flat base plate with a</text>
  <text x="400" y="115" font-size="24" fill="#92D050" font-family="monospace">diameter of 120 mm and thickness of 15 mm.</text>
  <text x="400" y="135" font-size="24" fill="#92D050" font-family="monospace">The design includes a central bore</text>
  <text x="400" y="155" font-size="24" fill="#92D050" font-family="monospace">measuring 50 mm in diameter surrounded by</text>
  <text x="400" y="175" font-size="24" fill="#92D050" font-family="monospace">a raised concentric ring with an outer</text>
  <text x="400" y="195" font-size="24" fill="#92D050" font-family="monospace">diameter of 70 mm and height of 8 mm that</text>
  <text x="400" y="215" font-size="24" fill="#92D050" font-family="monospace">shares the same inner diameter as the</text>
  <text x="400" y="235" font-size="24" fill="#92D050" font-family="monospace">central bore. Six equidistant mounting</text>
  <text x="400" y="255" font-size="24" fill="#92D050" font-family="monospace">holes measuring 12 mm in diameter are</text>
  <text x="400" y="275" font-size="24" fill="#92D050" font-family="monospace">arranged in a circular pattern with a</text>
  <text x="400" y="295" font-size="24" fill="#92D050" font-family="monospace">diameter of 90 mm around the periphery.</text>
  <text x="400" y="315" font-size="24" fill="#92D050" font-family="monospace">....."</text>

  <!-- Container 3: System Prompt -->
  <rect x="720" y="30" width="860" height="340" rx="20" fill="none" stroke="#666666" stroke-width="4" stroke-dasharray="15,10" />
  <text x="1550" y="155" font-size="36" fill="#385723" text-anchor="end">System prompt</text>
  
  <text x="750" y="65" font-size="24" fill="#C0392B" font-family="monospace">System_prompt = "...."</text>
  <text x="750" y="85" font-size="24" fill="#92D050" font-family="monospace">Please convert the following CAD command sequence into CAD-Query code, with the final model represented as 'r':</text>
  <text x="750" y="105" font-size="24" fill="#92D050" font-family="monospace">....."</text>
  <text x="750" y="145" font-size="24" fill="#666666" font-family="monospace"># The CoT system prompt can be found in the appendix.</text>

  <!-- Container 4: CadQuery Code -->
  <rect x="720" y="190" width="860" height="240" rx="20" fill="none" stroke="#666666" stroke-width="4" stroke-dasharray="15,10" />
  <text x="1550" y="340" font-size="36" fill="#385723" text-anchor="end">CadQuery Code</text>
  
  <text x="750" y="215" font-size="24" fill="#C0392B" font-family="monospace">import cadquery as cq</text>
  <text x="750" y="250" font-size="24" fill="#C0392B" font-family="monospace">flange = (cq.Workplane("XY")</text>
  <text x="820" y="270" font-size="24" fill="#92D050" font-family="monospace">.circle(60).circle(25).extrude(15)</text>
  <text x="820" y="290" font-size="24" fill="#92D050" font-family="monospace">.faces(">Z").workplane().polarArray(45, 0, 360,6).circle(6).cutThruAll()</text>
  <text x="820" y="310" font-size="24" fill="#92D050" font-family="monospace">.faces(">Z").workplane().add(cq.Workplane("XY").circle(35).circle(25).workplane(offset=15).extrude(8)))</text>
  <text x="750" y="330" font-size="24" fill="#C0392B" font-family="monospace">result = flange</text>

  <!-- ================= MIDDLE SECTION: PIPELINE ================= -->
  
  <!-- Container A: Text2CAD Dataset -->
  <rect x="10" y="370" width="450" height="460" rx="30" fill="#F0F4FC" stroke="#999999" stroke-width="2" />
  <text x="25" y="670" font-size="32" fill="black">Text2CAD</text>
  <text x="30" y="700" font-size="32" fill="black">Dataset</text>
  <rect x="25" y="530" width="100" height="150" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="30" y="590" font-size="36" fill="white">&lt;AF&gt;11</text>

  <!-- Arrows from Dataset -->
  <path d="M125 595 L180 595" stroke="black" stroke-width="4" fill="none"/>
  <path d="M180 430 L180 760 L220 760" stroke="black" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M180 595 L220 595" stroke="black" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Container B: Command Sequence -->
  <rect x="200" y="380" width="100" height="300" rx="10" fill="none" stroke="#385723" stroke-width="4" stroke-dasharray="15,10" />
  <text x="250" y="500" font-size="24" fill="black" text-anchor="middle">Command</text>
  <text x="250" y="530" font-size="24" fill="black" text-anchor="middle">Sequence</text>
  <rect x="215" y="380" width="80" height="130" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="220" y="440" font-size="36" fill="white">&lt;AF&gt;08</text>
  <rect x="215" y="540" width="80" height="130" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="220" y="600" font-size="36" fill="white">&lt;AF&gt;04</text>
  <text x="250" y="650" font-size="24" fill="black" text-anchor="middle">Text</text>
  <text x="250" y="680" font-size="24" fill="black" text-anchor="middle">Description</text>
  <rect x="215" y="710" width="80" height="130" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="220" y="770" font-size="36" fill="white">&lt;AF&gt;06</text>

  <!-- Container C: LLMs -->
  <text x="380" y="400" font-size="32" fill="black" text-anchor="middle">LLMs</text>
  <rect x="350" y="410" width="100" height="80" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="355" y="450" font-size="32" fill="white">&lt;AF&gt;12</text>
  <path d="M350 490 L350 540 L370 540" stroke="black" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Container D: CadQuery -->
  <rect x="350" y="540" width="100" height="130" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="355" y="580" font-size="36" fill="white">&lt;AF&gt;03</text>
  <text x="350" y="640" font-size="32" fill="black" text-anchor="middle">CadQuery</text>
  <path d="M350 670 L350 700" stroke="#FF0000" stroke-width="4" marker-end="url(#arrowhead-red)"/>
  <text x="330" y="680" font-size="60" fill="#FF0000" font-weight="bold">×</text>
  <rect x="350" y="710" width="100" height="130" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="355" y="770" font-size="36" fill="white">&lt;AF&gt;01</text>
  <text x="350" y="830" font-size="32" fill="black" text-anchor="middle">Discard</text>

  <!-- ================= MIDDLE SECTION: OUTPUTS ================= -->
  
  <!-- Container E: Generated Models -->
  <rect x="450" y="370" width="950" height="460" rx="30" fill="#F5F9F0" stroke="#999999" stroke-width="2" />
  <text x="800" y="410" font-size="36" fill="#385723" text-anchor="middle">Generated Models</text>
  
  <!-- Green Dashed Group -->
  <rect x="520" y="400" width="600" height="250" rx="20" fill="none" stroke="#92D050" stroke-width="4" stroke-dasharray="20,15" />
  <rect x="680" y="380" width="220" height="60" rx="15" fill="#E6F5E0" stroke="#92D050" stroke-width="4" stroke-dasharray="10,5" />
  <text x="790" y="415" font-size="36" fill="#385723" text-anchor="middle">Generated Models</text>
  
  <!-- 3D Models (Simplified) -->
  <g transform="translate(550, 450)">
    <path d="M0,100 L0,150 A100,20 0 0,0 200,150 L200,100" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <ellipse cx="100" cy="100" rx="100" ry="20" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <path d="M100,100 L100,150 A100,20 0 0,0 200,150 L200,100" fill="#D2B48C" stroke="#8B7D5C" stroke-width="2"/>
    <path d="M0,100 L0,150 A100,20 0 0,0 200,150 L200,100" fill="#D2B48C" stroke="#8B7D5C" stroke-width="2"/>
  </g>
  <g transform="translate(720, 450)">
    <path d="M0,100 L0,150 A120,25 0 0,0 240,150 L240,100" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <ellipse cx="120" cy="100" rx="120" ry="25" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <path d="M120,100 L120,150 A120,25 0 0,0 240,150 L240,100" fill="#D2B48C" stroke="#8B7D5C" stroke-width="2"/>
    <path d="M0,100 L0,150 A120,25 0 0,0 240,150 L240,100" fill="#D2B48C" stroke="#8B7D5C" stroke-width="2"/>
    <circle cx="60" cy="110" r="10" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <circle cx="180" cy="110" r="10" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
  </g>
  <g transform="translate(900, 450)">
    <path d="M0,100 L0,150 A140,30 0 0,0 280,150 L280,100" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <ellipse cx="140" cy="100" rx="140" ry="30" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <path d="M140,100 L140,150 A140,30 0 0,0 280,150 L280,100" fill="#D2B48C" stroke="#8B7D5C" stroke-width="2"/>
    <path d="M0,100 L0,150 A140,30 0 0,0 280,150 L280,100" fill="#D2B48C" stroke="#8B7D5C" stroke-width="2"/>
    <circle cx="60" cy="115" r="12" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
    <circle cx="180" cy="115" r="12" fill="#C2B280" stroke="#8B7D5C" stroke-width="2"/>
  </g>

  <!-- Green Arrow from <AF>07 -->
  <rect x="465" y="465" width="60" height="50" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="470" y="490" font-size="16" fill="white">&lt;AF&gt;07</text>
  <path d="M465 500 L490 500 L490 520 L520 520" stroke="#92D050" stroke-width="4" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- Dashed Group 2 -->
  <rect x="520" y="630" width="600" height="200" rx="20" fill="none" stroke="#666666" stroke-width="4" stroke-dasharray="20,15" />
  <rect x="700" y="790" width="220" height="60" rx="15" fill="#E6F5E0" stroke="#666666" stroke-width="4" stroke-dasharray="10,5" />
  <text x="810" y="825" font-size="36" fill="#385723" text-anchor="middle">3D Point Models</text>
  
  <!-- 3D Point Models -->
  <g transform="translate(550, 650)">
    <path d="M0,100 L0,150 A100,20 0 0,0 200,150 L200,100" fill="#444" stroke="#222" stroke-width="2"/>
    <ellipse cx="100" cy="100" rx="100" ry="20" fill="#444" stroke="#222" stroke-width="2"/>
    <path d="M100,100 L100,150 A100,20 0 0,0 200,150 L200,100" fill="#666" stroke="#222" stroke-width="2"/>
    <path d="M0,100 L0,150 A100,20 0 0,0 200,150 L200,100" fill="#666" stroke="#222" stroke-width="2"/>
  </g>
  <g transform="translate(720, 650)">
    <path d="M0,100 L0,150 A120,25 0 0,0 240,150 L240,100" fill="#444" stroke="#222" stroke-width="2"/>
    <ellipse cx="120" cy="100" rx="120" ry="25" fill="#444" stroke="#222" stroke-width="2"/>
    <path d="M120,100 L120,150 A120,25 0 0,0 240,150 L240,100" fill="#666" stroke="#222" stroke-width="2"/>
    <path d="M0,100 L0,150 A120,25 0 0,0 240,150 L240,100" fill="#666" stroke="#222" stroke-width="2"/>
    <circle cx="60" cy="110" r="10" fill="#444" stroke="#222" stroke-width="2"/>
    <circle cx="180" cy="110" r="10" fill="#444" stroke="#222" stroke-width="2"/>
  </g>
  <g transform="translate(900, 650)">
    <path d="M0,100 L0,150 A140,30 0 0,0 280,150 L280,100" fill="#444" stroke="#222" stroke-width="2"/>
    <ellipse cx="140" cy="100" rx="140" ry="30" fill="#444" stroke="#222" stroke-width="2"/>
    <path d="M140,100 L140,150 A140,30 0 0,0 280,150 L280,100" fill="#666" stroke="#222" stroke-width="2"/>
    <path d="M0,100 L0,150 A140,30 0 0,0 280,150 L280,100" fill="#666" stroke="#222" stroke-width="2"/>
    <circle cx="60" cy="115" r="12" fill="#444" stroke="#222" stroke-width="2"/>
    <circle cx="180" cy="115" r="12" fill="#444" stroke="#222" stroke-width="2"/>
  </g>

  <!-- Red Dashed Box -->
  <rect x="910" y="660" width="180" height="180" rx="15" fill="none" stroke="#FF0000" stroke-width="4" stroke-dasharray="20,15" />
  <text x="1000" y="800" font-size="32" fill="black" text-anchor="middle">Select by CD</text>

  <!-- Ground Truth Models -->
  <g transform="translate(1150, 450)">
    <path d="M0,100 L0,150 A140,30 0 0,0 280,150 L280,100" fill="#607080" stroke="#405060" stroke-width="2"/>
    <ellipse cx="140" cy="100" rx="140" ry="30" fill="#607080" stroke="#405060" stroke-width="2"/>
    <path d="M140,100 L140,150 A140,30 0 0,0 280,150 L280,100" fill="#708090" stroke="#405060" stroke-width="2"/>
    <path d="M0,100 L0,150 A140,30 0 0,0 280,150 L280,100" fill="#708090" stroke="#405060" stroke-width="2"/>
    <circle cx="60" cy="115" r="12" fill="#607080" stroke="#405060" stroke-width="2"/>
    <circle cx="180" cy="115" r="12" fill="#607080" stroke="#405060" stroke-width="2"/>
  </g>
  <text x="1170" y="580" font-size="32" fill="black">Ground–Truth Models</text>
  <text x="1250" y="620" font-size="32" fill="black">Sample</text>
  <path d="M1240 580 L1240 640" stroke="black" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Chamfer Distance Arrow -->
  <path d="M1150 720 L1150 700 L1180 700 L1180 680 L1190 700 L1150 700" fill="#FFC0CB" stroke="#FF0000" stroke-width="1"/>
  <text x="1100" y="660" font-size="32" fill="black">Chamfer</text>
  <text x="1100" y="690" font-size="32" fill="black">Distance</text>

  <!-- Python Code Selection -->
  <path d="M1150 760 L1150 780 L1380 780 L1380 760" fill="#FFC0CB" stroke="#FF0000" stroke-width="1"/>
  <text x="1200" y="800" font-size="32" fill="black">Python code</text>
  <text x="1200" y="830" font-size="32" fill="black">selection</text>

  <!-- ================= RIGHT SECTION: DATASET ================= -->
  
  <rect x="1350" y="370" width="350" height="460" rx="30" fill="#FDF5F0" stroke="#999999" stroke-width="2" />
  <text x="1500" y="680" font-size="32" fill="black" text-anchor="middle">Our Dataset</text>
  
  <rect x="1380" y="400" width="100" height="150" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="1385" y="450" font-size="36" fill="white">&lt;AF&gt;10</text>
  <text x="1430" y="520" font-size="32" fill="black" text-anchor="middle">Model</text>
  
  <rect x="1380" y="540" width="100" height="150" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="1385" y="600" font-size="36" fill="white">&lt;AF&gt;09</text>
  <text x="1430" y="660" font-size="24" fill="black" text-anchor="middle">Text</text>
  <text x="1430" y="690" font-size="24" fill="black" text-anchor="middle">Description</text>
  
  <rect x="1380" y="720" width="100" height="150" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="1385" y="780" font-size="36" fill="white">&lt;AF&gt;02</text>
  <text x="1430" y="850" font-size="32" fill="black" text-anchor="middle">CadQuery</text>

  <!-- Output Arrow -->
  <path d="M1430 540 L1480 540 L1480 600 L1530 600 L1530 610 L1550 610" fill="none" stroke="black" stroke-width="4" marker-end="url(#arrowhead)"/>
  <rect x="1550" y="540" width="100" height="150" fill="#757575" stroke="black" stroke-width="3"/>
  <text x="1555" y="610" font-size="36" fill="white">&lt;AF&gt;05</text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8.0 -8.0 1606.0 761.0" style="font-family: 'Times New Roman', Times, serif;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4472C4" />
    </marker>
    
    <!-- CD Icon Gradient -->
    <linearGradient id="cdGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eeeeee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#999999;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1400" height="520" fill="white" />

  <!-- ================= LEFT SECTION ================= -->

  <!-- 1. TOP SECTION: Language Model -->
  <rect x="5" y="20" width="870" height="80" rx="15" fill="#E2EFDA" />
  <text x="25" y="75" font-size="60" fill="black">Language Model <tspan font-style="italic" font-size="60">f<tspan dy="5" font-size="45">ϕ</tspan></tspan></text>

  <!-- 2. UPPER MIDDLE: Token Vectors -->
  <!-- Hq Group -->
  <text x="10" y="150" font-size="60" font-style="italic" font-weight="bold">H<tspan dy="10" font-size="45">q</tspan></text>
  <rect x="65" y="115" width="100" height="100" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="4" />
  <rect x="190" y="115" width="100" height="100" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="4" />
  
  <!-- Hv* Group -->
  <text x="475" y="150" font-size="60" font-style="italic" font-weight="bold">H<tspan dy="-15" font-size="45">*</tspan><tspan dy="25" dx="-10" font-size="45">v</tspan></text>
  <rect x="535" y="115" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
  <rect x="660" y="115" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
  <rect x="785" y="115" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />

  <!-- Arrows to Language Model -->
  <line x1="225" y1="115" x2="225" y2="90" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="690" y1="115" x2="690" y2="90" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- 3. MIDDLE SECTION: Processing Blocks -->
  
  <!-- Tokenizer -->
  <rect x="25" y="185" width="390" height="110" rx="20" fill="#E7E6E6" />
  <text x="220" y="240" font-size="55" text-anchor="middle" fill="black">Tokenizer</text>
  <line x1="225" y1="185" x2="225" y2="155" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- CDPruner (Main) -->
  <rect x="500" y="185" width="370" height="110" rx="20" fill="#FFCDCD" stroke="black" stroke-width="2" />
  <text x="685" y="240" font-size="60" font-weight="bold" text-anchor="middle" fill="black">CDPruner</text>
  <!-- Arrow from CDPruner to Hv* -->
  <line x1="690" y1="185" x2="690" y2="155" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- 4. LOWER MIDDLE: Input Tokens Hv -->
  <text x="25" y="310" font-size="60" font-style="italic" font-weight="bold">H<tspan dy="10" font-size="45">v</tspan></text>
  <g transform="translate(500, 270)">
    <rect x="0" y="0" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
    <rect x="110" y="0" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
    <rect x="220" y="0" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
    <rect x="330" y="0" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
    <rect x="440" y="0" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
    <rect x="550" y="0" width="100" height="100" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="4" />
  </g>
  <!-- Arrow from Tokens to CDPruner -->
  <line x1="690" y1="270" x2="690" y2="235" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- 5. BOTTOM SECTION: Encoders & Legend -->
  
  <!-- Projector -->
  <rect x="500" y="340" width="370" height="100" rx="15" fill="#FCE4D6" />
  <text x="685" y="400" font-size="55" text-anchor="middle" fill="black">Projector <tspan font-style="italic">g</tspan></text>
  <line x1="690" y1="340" x2="690" y2="310" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Vision Encoder -->
  <rect x="500" y="410" width="370" height="100" rx="15" fill="#D9E1F2" />
  <text x="685" y="460" font-size="60" text-anchor="middle" fill="black">Vision Encoder <tspan font-style="italic">f<tspan dy="5" font-size="45">v</tspan></tspan></text>
  
  <!-- Input Image -->
  <text x="560" y="520" font-size="60" font-weight="bold">Input Image <tspan font-style="italic" font-size="60">X<tspan dy="10" font-size="45">v</tspan></tspan></text>
  <line x1="690" y1="500" x2="690" y2="470" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Language Instruction -->
  <text x="25" y="310" font-size="60" font-style="italic" font-weight="bold">X<tspan dy="10" font-size="45">q</tspan></text>
  <text x="180" y="310" font-size="60" font-weight="bold">Language Instruction</text>
  <line x1="225" y1="290" x2="225" y2="235" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Connection Line: Hq to CDPruner -->
  <!-- Path: Right of 2nd grey box -> Right -> Down -> Right into CDPruner -->
  <path d="M 360 135 L 435 135 L 435 215 L 495 215" fill="none" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- LEGEND BOX -->
  <rect x="8" y="345" width="425" height="400" fill="none" stroke="#1F3864" stroke-width="3" />
  
  <!-- Row 1: Visual Tokens -->
  <g transform="translate(15, 355)">
    <rect x="0" y="0" width="70" height="70" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="4"/>
    <rect x="45" y="0" width="70" height="70" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="4"/>
    <rect x="90" y="0" width="70" height="70" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="4"/>
    <text x="160" y="45" font-size="45" font-family="Times New Roman">Visual Tokens</text>
  </g>

  <!-- Row 2: Text Tokens -->
  <g transform="translate(15, 405)">
    <rect x="0" y="0" width="70" height="70" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="4"/>
    <rect x="45" y="0" width="70" height="70" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="4"/>
    <rect x="90" y="0" width="70" height="70" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="4"/>
    <text x="160" y="45" font-size="45" font-family="Times New Roman">Text Tokens</text>
  </g>

  <!-- Row 3: Feature Similarity -->
  <g transform="translate(15, 455)">
    <rect x="0" y="0" width="70" height="70" fill="#C55A11" stroke="black" stroke-width="2"/>
    <rect x="70" y="0" width="70" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="140" y="0" width="70" height="70" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <text x="160" y="45" font-size="45" font-family="Times New Roman">Feature Similarity</text>
  </g>

  <!-- Row 4: Query Relevance -->
  <g transform="translate(15, 505)">
    <rect x="0" y="0" width="70" height="70" fill="#767171" stroke="black" stroke-width="2"/>
    <rect x="70" y="0" width="70" height="70" fill="#CCCCCC" stroke="black" stroke-width="2"/>
    <rect x="140" y="0" width="70" height="70" fill="#E0E0E0" stroke="black" stroke-width="2"/>
    <text x="160" y="45" font-size="45" font-family="Times New Roman">Query Relevance</text>
  </g>

  <!-- ================= RIGHT SECTION: DETAIL PANEL ================= -->
  
  <!-- Dashed Container -->
  <path d="M 875 185 L 930 40 L 940 40 Q 945 30 955 30 L 1390 30 Q 1400 30 1400 40 L 1400 510 Q 1400 520 1390 520 L 955 520 Q 945 520 940 510 L 930 510 L 875 235" 
        fill="none" stroke="black" stroke-width="3" stroke-dasharray="15,10" />

  <!-- Panel Background -->
  <rect x="930" y="20" width="500" height="500" rx="30" fill="#FCE4E4" />
  
  <!-- Vertical Label -->
  <text x="1380" y="250" transform="rotate(90, 1380, 250)" font-size="60" font-weight="bold" text-anchor="middle" fill="black">CDPruner</text>
  <!-- CD Icon -->
  <g transform="translate(1380, 100)">
    <circle r="40" fill="url(#cdGradient)" stroke="#999" stroke-width="2"/>
    <circle r="10" fill="#333" />
    <path d="M -30 0 A 30 30 0 0 1 30 0" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M -30 0 A 30 30 0 0 0 30 0" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- Matrix L (Bottom) -->
  <text x="950" y="410" font-size="60" font-style="italic" font-weight="bold">L</text>
  <g transform="translate(990, 260)">
    <!-- 6x6 Grid -->
    <!-- Row 1 -->
    <rect x="0" y="0" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
    <rect x="100" y="0" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="200" y="0" width="100" height="70" fill="#F49C66" stroke="black" stroke-width="2"/>
    <rect x="300" y="0" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="400" y="0" width="100" height="70" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <rect x="500" y="0" width="100" height="70" fill="#C55A11" stroke="black" stroke-width="2"/>
    <!-- Row 2 -->
    <rect x="0" y="70" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="100" y="70" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
    <rect x="200" y="70" width="100" height="70" fill="#C55A11" stroke="black" stroke-width="2"/>
    <rect x="300" y="70" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="400" y="70" width="100" height="70" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <rect x="500" y="70" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <!-- Row 3 -->
    <rect x="0" y="140" width="100" height="70" fill="#F49C66" stroke="black" stroke-width="2"/>
    <rect x="100" y="140" width="100" height="70" fill="#C55A11" stroke="black" stroke-width="2"/>
    <rect x="200" y="140" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
    <rect x="300" y="140" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="400" y="140" width="100" height="70" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <rect x="500" y="140" width="100" height="70" fill="#F49C66" stroke="black" stroke-width="2"/>
    <!-- Row 4 -->
    <rect x="0" y="210" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="100" y="210" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="200" y="210" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="300" y="210" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
    <rect x="400" y="210" width="100" height="70" fill="#F49C66" stroke="black" stroke-width="2"/>
    <rect x="500" y="210" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <!-- Row 5 -->
    <rect x="0" y="280" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="100" y="280" width="100" height="70" fill="#F49C66" stroke="black" stroke-width="2"/>
    <rect x="200" y="280" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="300" y="280" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="400" y="280" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
    <rect x="500" y="280" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <!-- Row 6 -->
    <rect x="0" y="350" width="100" height="70" fill="#C55A11" stroke="black" stroke-width="2"/>
    <rect x="100" y="350" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="200" y="350" width="100" height="70" fill="#FCE4D6" stroke="black" stroke-width="2"/>
    <rect x="300" y="350" width="100" height="70" fill="#F4B084" stroke="black" stroke-width="2"/>
    <rect x="400" y="350" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
    <rect x="500" y="350" width="100" height="70" fill="#833C0C" stroke="black" stroke-width="2"/>
  </g>

  <!-- Vector r (Middle) -->
  <text x="950" y="230" font-size="60" font-style="italic" font-weight="bold">r</text>
  <g transform="translate(990, 190)">
    <rect x="0" y="0" width="100" height="90" fill="#D9D9D9" stroke="black" stroke-width="2"/>
    <rect x="100" y="0" width="100" height="90" fill="#CCCCCC" stroke="black" stroke-width="2"/>
    <rect x="200" y="0" width="100" height="90" fill="#595959" stroke="black" stroke-width="2"/>
    <rect x="300" y="0" width="100" height="90" fill="#808080" stroke="black" stroke-width="2"/>
    <rect x="400" y="0" width="100" height="90" fill="#CCCCCC" stroke="black" stroke-width="2"/>
    <rect x="500" y="0" width="100" height="90" fill="#E7E6E6" stroke="black" stroke-width="2"/>
  </g>
  <!-- Blue X Mark 1 -->
  <g transform="translate(1145, 250)">
     <path d="M -15 -15 L 15 15 M 15 -15 L -15 15" stroke="#4472C4" stroke-width="12" stroke-linecap="square" />
  </g>

  <!-- DPP Block -->
  <rect x="990" y="120" width="340" height="110" rx="20" fill="#FF838A" stroke="black" stroke-width="2" />
  <text x="1160" y="170" font-size="60" text-anchor="middle" fill="black">DPP</text>
  <!-- Arrow from DPP to r -->
  <line x1="1145" y1="190" x2="1145" y2="170" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Vector S* (Top) -->
  <text x="950" y="100" font-size="60" font-style="italic" font-weight="bold">S<tspan dy="-15" font-size="45">*</tspan></text>
  <g transform="translate(990, 60)">
    <rect x="0" y="0" width="100" height="90" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <text x="50" y="60" font-size="50" font-weight="bold" text-anchor="middle">1</text>
    
    <rect x="100" y="0" width="100" height="90" fill="#D9D9D9" stroke="black" stroke-width="2"/>
    <text x="150" y="60" font-size="50" font-weight="bold" text-anchor="middle">×</text>
    
    <rect x="200" y="0" width="100" height="90" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <text x="250" y="60" font-size="50" font-weight="bold" text-anchor="middle">3</text>
    
    <rect x="300" y="0" width="100" height="90" fill="#F8CBAD" stroke="black" stroke-width="2"/>
    <text x="350" y="60" font-size="50" font-weight="bold" text-anchor="middle">4</text>
    
    <rect x="400" y="0" width="100" height="90" fill="#D9D9D9" stroke="black" stroke-width="2"/>
    <text x="450" y="60" font-size="50" font-weight="bold" text-anchor="middle">×</text>
    
    <rect x="500" y="0" width="100" height="90" fill="#D9D9D9" stroke="black" stroke-width="2"/>
    <text x="550" y="60" font-size="50" font-weight="bold" text-anchor="middle">×</text>
  </g>
  <!-- Arrow from S* to DPP -->
  <line x1="1145" y1="190" x2="1145" y2="100" stroke="#4472C4" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Vector Query Relevance (Far Right) -->
  <g transform="translate(1320, 260)">
    <rect x="0" y="0" width="100" height="70" fill="#D9D9D9" stroke="black" stroke-width="2"/>
    <rect x="0" y="70" width="100" height="70" fill="#CCCCCC" stroke="black" stroke-width="2"/>
    <rect x="0" y="140" width="100" height="70" fill="#767171" stroke="black" stroke-width="2"/>
    <rect x="0" y="210" width="100" height="70" fill="#808080" stroke="black" stroke-width="2"/>
    <rect x="0" y="280" width="100" height="70" fill="#CCCCCC" stroke="black" stroke-width="2"/>
    <rect x="0" y="350" width="100" height="70" fill="#E7E6E6" stroke="black" stroke-width="2"/>
  </g>
  <!-- Blue X Mark 2 -->
  <g transform="translate(1320, 395)">
     <path d="M -15 -15 L 15 15 M 15 -15 L -15 15" stroke="#4472C4" stroke-width="12" stroke-linecap="square" />
  </g>

</svg>
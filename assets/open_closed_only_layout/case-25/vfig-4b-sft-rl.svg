<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" style="background-color: white;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
    
    <!-- Gradients for Heatmaps -->
    <radialGradient id="heatGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00008b;stop-opacity:1" />
    </radialGradient>
    
    <!-- Gradients for Disparity -->
    <linearGradient id="disparityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00008b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <style>
    text { font-family: "Times New Roman", Times, serif; fill: black; }
    .label-main { font-size: 48px; }
    .label-sub { font-size: 36px; }
    .label-math { font-size: 52px; font-style: italic; }
    .box-text { font-size: 48px; text-anchor: middle; }
    .box-text-sm { font-size: 40px; text-anchor: middle; }
    .arrow-line { stroke: black; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
    .bar { stroke: none; }
  </style>

  <!-- ==================== TOP ROW ==================== -->
  
  <!-- 1. Captured Event Frames -->
  <g transform="translate(20, 40)">
    <!-- Back Frames -->
    <rect x="0" y="0" width="300" height="250" fill="url(#heatGrad)" opacity="0.6" />
    <rect x="20" y="20" width="300" height="250" fill="url(#heatGrad)" opacity="0.8" />
    <!-- Front Frame -->
    <rect x="20" y="40" width="300" height="250" fill="url(#heatGrad)" />
    <!-- Image Content (Simplified) -->
    <rect x="20" y="40" width="300" height="250" fill="black" />
    <circle cx="170" cy="165" r="60" fill="white" opacity="0.8" />
    <circle cx="100" cy="140" r="50" fill="white" opacity="0.8" />
    <path d="M170,165 L250,165" stroke="white" stroke-width="2" opacity="0.5" />
    <path d="M100,140 L180,140" stroke="white" stroke-width="2" opacity="0.5" />
    <text x="170" y="280" class="label-main" text-anchor="middle">Captured Event Frames</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="330" y1="180" x2="370" y2="180" class="arrow-line" />

  <!-- 2. Feature Extraction (Top) -->
  <g transform="translate(380, 80)">
    <rect x="0" y="0" width="100" height="200" fill="#B0C4DE" class="bar" />
    <rect x="150" y="50" width="60" height="150" fill="#B0C4DE" class="bar" />
    <rect x="250" y="0" width="100" height="200" fill="#B0C4DE" class="bar" />
    <text x="170" y="250" class="label-main" text-anchor="middle">Feature Extraction</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="530" y1="170" x2="700" y2="170" class="arrow-line" />

  <!-- 3. Left Features -->
  <g transform="translate(750, 40)">
    <!-- F_L2 -->
    <g transform="translate(100, 0)">
      <polygon points="0,0 100,0 140,40 40,40" fill="#DAA520" stroke="black" stroke-width="3"/>
      <rect x="0" y="0" width="100" height="100" fill="#F0E68C" stroke="black" stroke-width="3"/>
    </g>
    <!-- F_L1 -->
    <g transform="translate(60, 40)">
      <polygon points="0,0 100,0 140,40 40,40" fill="#DAA520" stroke="black" stroke-width="3"/>
      <rect x="0" y="0" width="100" height="100" fill="#F0E68C" stroke="black" stroke-width="3"/>
    </g>
    <!-- F_L0 -->
    <g transform="translate(10, 80)">
      <polygon points="0,0 100,0 140,40 40,40" fill="#DAA520" stroke="black" stroke-width="3"/>
      <rect x="0" y="0" width="100" height="100" fill="#F0E68C" stroke="black" stroke-width="3"/>
    </g>
    <text x="70" y="220" class="label-main" text-anchor="middle">Left Features</text>
    
    <!-- Math Labels -->
    <text x="160" y="40" class="label-math" text-anchor="middle">F<tspan dy="10" font-size="32">L2</tspan></text>
    <text x="110" y="80" class="label-math" text-anchor="middle">F<tspan dy="10" font-size="32">L1</tspan></text>
    <text x="60" y="120" class="label-math" text-anchor="middle">F<tspan dy="10" font-size="32">L0</tspan></text>
  </g>

  <!-- ==================== MIDDLE ROW ==================== -->

  <!-- 4. Energy Map -->
  <g transform="translate(20, 350)">
    <!-- Back Frames -->
    <rect x="0" y="0" width="300" height="250" fill="url(#heatGrad)" opacity="0.6" />
    <rect x="20" y="20" width="300" height="250" fill="url(#heatGrad)" opacity="0.8" />
    <!-- Front Frame -->
    <rect x="20" y="40" width="300" height="250" fill="url(#heatGrad)" />
    <!-- Image Content -->
    <rect x="20" y="40" width="300" height="250" fill="black" />
    <circle cx="170" cy="165" r="60" fill="white" opacity="0.8" />
    <circle cx="100" cy="140" r="50" fill="white" opacity="0.8" />
    <path d="M170,165 L250,165" stroke="white" stroke-width="2" opacity="0.5" />
    <path d="M100,140 L180,140" stroke="white" stroke-width="2" opacity="0.5" />
    <text x="170" y="280" class="label-main" text-anchor="middle">Energy Map</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="330" y1="460" x2="370" y2="460" class="arrow-line" />

  <!-- 5. Feature Extraction (Middle) -->
  <g transform="translate(380, 360)">
    <rect x="0" y="0" width="100" height="200" fill="#C1E1B5" class="bar" />
    <rect x="150" y="50" width="60" height="150" fill="#C1E1B5" class="bar" />
    <rect x="250" y="0" width="100" height="200" fill="#C1E1B5" class="bar" />
    <text x="170" y="250" class="label-main" text-anchor="middle">Feature Extraction</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="530" y1="460" x2="570" y2="460" class="arrow-line" />

  <!-- 6. Energy-guided Confidence Estimation -->
  <rect x="570" y="360" width="240" height="240" rx="50" ry="50" fill="#A9D18E" />
  <text x="690" y="420" class="box-text">Energy-</text>
  <text x="690" y="470" class="box-text">guided</text>
  <text x="690" y="520" class="box-text">Confidence</text>
  <text x="690" y="570" class="box-text">Estimation</text>

  <!-- Arrow 5 -->
  <line x1="780" y1="460" x2="830" y2="460" class="arrow-line" />

  <!-- 7. Confidence Maps -->
  <g transform="translate(840, 340)">
    <!-- Back Frames -->
    <rect x="0" y="0" width="220" height="220" fill="url(#heatGrad)" opacity="0.6" />
    <rect x="20" y="20" width="220" height="220" fill="url(#heatGrad)" opacity="0.8" />
    <!-- Front Frame -->
    <rect x="40" y="40" width="220" height="220" fill="url(#heatGrad)" />
    <!-- Image Content -->
    <rect x="40" y="40" width="220" height="220" fill="black" />
    <circle cx="150" cy="150" r="60" fill="white" opacity="0.8" />
    <circle cx="80" cy="120" r="50" fill="white" opacity="0.8" />
    <path d="M150,150 L220,150" stroke="white" stroke-width="2" opacity="0.5" />
    <path d="M80,120 L160,120" stroke="white" stroke-width="2" opacity="0.5" />
    <text x="150" y="280" class="label-main" text-anchor="middle">Confidence Maps</text>
  </g>

  <!-- ==================== BOTTOM ROW ==================== -->

  <!-- 8. Reference Frames -->
  <g transform="translate(20, 630)">
    <!-- Back Frames -->
    <rect x="0" y="0" width="300" height="250" fill="black" opacity="0.6" />
    <rect x="20" y="20" width="300" height="250" fill="black" opacity="0.8" />
    <!-- Front Frame -->
    <rect x="20" y="40" width="300" height="250" fill="black" />
    <!-- Image Content (Noise) -->
    <rect x="20" y="40" width="300" height="250" fill="black" />
    <rect x="20" y="40" width="300" height="250" fill="white" opacity="0.2" />
    <text x="170" y="280" class="label-main" text-anchor="middle">Reference Frames</text>
  </g>

  <!-- Arrow 6 -->
  <line x1="330" y1="750" x2="370" y2="750" class="arrow-line" />

  <!-- 9. Feature Extraction (Bottom) -->
  <g transform="translate(380, 640)">
    <rect x="0" y="0" width="100" height="200" fill="#B0C4DE" class="bar" />
    <rect x="150" y="50" width="60" height="150" fill="#B0C4DE" class="bar" />
    <rect x="250" y="0" width="100" height="200" fill="#B0C4DE" class="bar" />
    <text x="170" y="250" class="label-main" text-anchor="middle">Feature Extraction</text>
  </g>

  <!-- Arrow 7 -->
  <line x1="530" y1="750" x2="700" y2="750" class="arrow-line" />

  <!-- 10. Right Features -->
  <g transform="translate(750, 630)">
    <!-- F_R2 -->
    <g transform="translate(100, 0)">
      <polygon points="0,0 100,0 140,40 40,40" fill="#DAA520" stroke="black" stroke-width="3"/>
      <rect x="0" y="0" width="100" height="100" fill="#F0E68C" stroke="black" stroke-width="3"/>
    </g>
    <!-- F_R1 -->
    <g transform="translate(60, 40)">
      <polygon points="0,0 100,0 140,40 40,40" fill="#DAA520" stroke="black" stroke-width="3"/>
      <rect x="0" y="0" width="100" height="100" fill="#F0E68C" stroke="black" stroke-width="3"/>
    </g>
    <!-- F_R0 -->
    <g transform="translate(10, 80)">
      <polygon points="0,0 100,0 140,40 40,40" fill="#DAA520" stroke="black" stroke-width="3"/>
      <rect x="0" y="0" width="100" height="100" fill="#F0E68C" stroke="black" stroke-width="3"/>
    </g>
    <text x="70" y="220" class="label-main" text-anchor="middle">Right Features</text>
    
    <!-- Math Labels -->
    <text x="160" y="40" class="label-math" text-anchor="middle">F<tspan dy="10" font-size="32">R2</tspan></text>
    <text x="110" y="80" class="label-math" text-anchor="middle">F<tspan dy="10" font-size="32">R1</tspan></text>
    <text x="60" y="120" class="label-math" text-anchor="middle">F<tspan dy="10" font-size="32">R0</tspan></text>
  </g>

  <!-- ==================== RIGHT COLUMN ==================== -->

  <!-- 11. Cost Volume -->
  <g transform="translate(1380, 70)">
    <!-- 3D Cube -->
    <polygon points="0,0 300,0 350,50 50,50" fill="#F4B183" stroke="black" stroke-width="3"/>
    <polygon points="300,0 350,50 350,150 300,100" fill="#F4B183" stroke="black" stroke-width="3"/>
    <rect x="0" y="0" width="300" height="150" fill="#F4B183" stroke="black" stroke-width="3"/>
    <text x="150" y="100" class="box-text">Cost</text>
    <text x="150" y="150" class="box-text">Volume</text>
  </g>

  <!-- Arrow 8 -->
  <line x1="1450" y1="270" x2="1450" y2="340" class="arrow-line" />

  <!-- 12. Confidence Propagation Volume Construction -->
  <rect x="1120" y="360" width="220" height="240" rx="50" ry="50" fill="#F4B183" />
  <text x="1230" y="420" class="box-text">Confidence</text>
  <text x="1230" y="470" class="box-text">Propagation</text>
  <text x="1230" y="520" class="box-text">Volume</text>
  <text x="1230" y="570" class="box-text">Construction</text>

  <!-- Arrow 9 -->
  <line x1="1100" y1="460" x2="1120" y2="460" class="arrow-line" />

  <!-- 13. Cost Aggregation -->
  <rect x="1380" y="360" width="350" height="240" rx="50" ry="50" fill="#8DA0C6" />
  <text x="1455" y="450" class="box-text">Cost</text>
  <text x="1455" y="510" class="box-text">Aggregation</text>

  <!-- Arrow 10 -->
  <line x1="1450" y1="570" x2="1450" y2="640" class="arrow-line" />

  <!-- 14. Disparity -->
  <g transform="translate(1350, 650)">
    <rect x="0" y="0" width="400" height="200" fill="url(#disparityGrad)" />
    <!-- Disparity Content (Simplified) -->
    <rect x="0" y="0" width="400" height="200" fill="black" />
    <circle cx="100" cy="100" r="60" fill="white" opacity="0.8" />
    <circle cx="180" cy="120" r="50" fill="white" opacity="0.8" />
    <path d="M100,100 L200,100" stroke="white" stroke-width="2" opacity="0.5" />
    <path d="M180,120 L250,120" stroke="white" stroke-width="2" opacity="0.5" />
    <text x="200" y="230" class="label-main" text-anchor="middle">Disparity</text>
  </g>

  <!-- ==================== COMPLEX CONNECTIONS ==================== -->

  <!-- Left Features to Confidence Propagation -->
  <!-- Path: Left Features Bottom -> Down -> Left -> Up -> Right -->
  <path d="M820,280 L820,330 L680,330 L680,360" class="arrow-line" fill="none" />
  
  <!-- Confidence Propagation to Cost Volume -->
  <!-- Path: Right -> Up -> Left -->
  <path d="M1230,360 L1230,370 L1230,160 L1250,160 L1350,160 L1350,150" class="arrow-line" fill="none" />

  <!-- Cost Volume to Cost Aggregation -->
  <!-- Path: Left -> Down -> Left -> Up -->
  <path d="M1330,150 L1330,140 L1330,460 L1310,460 L1310,470" class="arrow-line" fill="none" />

  <!-- Cost Aggregation to Disparity -->
  <!-- Path: Left -> Down -> Left -> Up -->
  <path d="M1455,600 L1455,610 L1455,640 L1430,640 L1430,650" class="arrow-line" fill="none" />

  <!-- Right Features to Confidence Propagation -->
  <!-- Path: Right -> Down -> Left -> Up -->
  <path d="M950,750 L1200,750 L1200,560 L1230,560" class="arrow-line" fill="none" />

</svg>
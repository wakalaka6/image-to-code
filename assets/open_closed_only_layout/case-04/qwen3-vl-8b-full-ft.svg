<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8.0 -8.0 1866.0 836.0" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6F0FA" />
      <stop offset="100%" stop-color="#F0F0F5" />
    </linearGradient>
    
    <linearGradient id="step1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0E8F8" />
      <stop offset="100%" stop-color="#E8F4FC" />
    </linearGradient>
    
    <linearGradient id="step2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D5F5E3" />
      <stop offset="100%" stop-color="#E8F8F5" />
    </linearGradient>
    
    <linearGradient id="step3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8DAEF" />
      <stop offset="100%" stop-color="#F5F0FF" />
    </linearGradient>
    
    <linearGradient id="tag1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DA6FF" />
      <stop offset="100%" stop-color="#2B8BE0" />
    </linearGradient>
    
    <linearGradient id="tag2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58D696" />
      <stop offset="100%" stop-color="#2E8C78" />
    </linearGradient>
    
    <linearGradient id="tag3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B5DD3" />
      <stop offset="100%" stop-color="#783F97" />
    </linearGradient>

    <linearGradient id="videoFrameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0" />
      <stop offset="100%" stop-color="#BDBDBD" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="#1F5A88" />
    </marker>
    <marker id="arrowTeal" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="#1A525A" />
    </marker>
    <marker id="arrowPurple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="#5B3A8E" />
    </marker>
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="#A04000" />
    </marker>
    <marker id="arrowSmall" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="#1A525A" />
    </marker>

    <!-- Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Reusable Code Frame -->
    <symbol id="codeFrame" viewBox="0 0 100 100">
      <rect x="0" y="0" width="100" height="100" fill="#888888" stroke="black" stroke-width="1"/>
      <text x="50" y="55" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;00</text>
    </symbol>
    
    <!-- Video Frame Placeholder -->
    <symbol id="videoFrame" viewBox="0 0 300 200">
      <rect x="0" y="0" width="300" height="200" fill="#8B7355" /> <!-- Ground -->
      <path d="M0,0 L300,0 L300,200 L0,200 Z" fill="url(#videoFrameGrad)" opacity="0.2"/>
      <!-- Rocks -->
      <path d="M0,50 L50,80 L100,60 L150,90 L250,120 L300,100 L300,200 L0,200 Z" fill="#5D4037" />
      <path d="M0,50 L50,80 L0,100 Z" fill="#4E342E" />
      <path d="M200,150 L300,180 L300,200 L200,200 Z" fill="#3E2723" />
      <!-- Apple/Rugby Ball -->
      <circle cx="150" cy="120" r="35" fill="#C62828" />
      <path d="M130,110 Q150,100 170,110 Q150,130 130,120" fill="#E57373" opacity="0.6"/>
    </symbol>
  </defs>

  <!-- 1. Background -->
  <rect width="1600" height="750" fill="url(#bgGrad)" />
  
  <!-- Network Pattern (Abstract) -->
  <g opacity="0.15" stroke="#000" stroke-width="1" fill="none">
    <circle cx="1400" cy="100" r="20" fill="#000"/>
    <circle cx="1500" cy="300" r="20" fill="#000"/>
    <circle cx="1300" cy="50" r="20" fill="#000"/>
    <circle cx="100" cy="500" r="20" fill="#000"/>
    <circle cx="200" cy="800" r="20" fill="#000"/>
    <path d="M1400,100 L1500,300 M1500,300 L1300,50 M1300,50 L100,500 M100,500 L200,800 M1400,100 L200,800 M1500,300 L100,500" />
    <path d="M1200,100 L1400,100 M1300,200 L1500,300 M800,600 L100,500" />
  </g>

  <!-- 2. Main Title -->
  <text x="800" y="70" text-anchor="middle" font-size="64" font-weight="900" fill="#0B1E33" letter-spacing="1">WORLD MODEL: FROM STATIC 3D TO DYNAMIC VIDEO FLOW</text>

  <!-- 3. Main Pipeline Container -->
  <rect x="50" y="100" width="1500" height="620" rx="40" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="2" filter="url(#shadow)" />

  <!-- 4. Row 1: Step 1 -->
  <g transform="translate(0, 100)">
    <!-- Label Box -->
    <rect x="70" y="70" width="320" height="200" rx="20" fill="url(#step1Grad)" filter="url(#shadow)" />
    <!-- Tag -->
    <rect x="150" y="85" width="200" height="60" rx="10" fill="url(#tag1Grad)" filter="url(#shadow)" />
    <text x="250" y="125" text-anchor="middle" fill="white" font-size="40" font-weight="bold">STEP 1</text>
    <!-- Text -->
    <text x="230" y="160" text-anchor="middle" fill="black" font-size="40" font-weight="bold">
      <tspan x="230" dy="0">COARSE 3D</tspan>
      <tspan x="230" dy="45">SANDBOX</tspan>
      <tspan x="230" dy="45">GENERATION</tspan>
    </text>

    <!-- Input Prompt -->
    <text x="520" y="150" text-anchor="middle" fill="black" font-size="36" font-weight="bold">Input Prompt</text>
    <text x="520" y="190" text-anchor="middle" fill="black" font-size="34" font-family="serif">“A ball rolls down</text>
    <text x="520" y="220" text-anchor="middle" fill="black" font-size="34" font-family="serif" text-decoration="underline">a rocky ramp”</text>

    <!-- Arrow 1 -->
    <line x1="620" y1="160" x2="700" y2="160" stroke="#1F5A88" stroke-width="6" marker-end="url(#arrowBlue)" />

    <!-- Process Box 1 -->
    <rect x="700" y="85" width="340" height="190" rx="20" fill="#F0F8FF" stroke="#2B8BE0" stroke-width="5" filter="url(#glowBlue)" />
    <use href="#codeFrame" x="740" y="105" width="180" height="130" />
    <text x="740" y="155" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;06</text>
    
    <use href="#codeFrame" x="850" y="115" width="90" height="90" />
    <text x="850" y="155" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;04</text>
    
    <use href="#codeFrame" x="910" y="105" width="160" height="130" />
    <text x="910" y="155" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;03</text>

    <text x="870" y="195" text-anchor="middle" fill="black" font-size="36" font-weight="bold">
      <tspan x="870" dy="0">Coarse 3D Scene</tspan>
      <tspan x="870" dy="40">Generation Model</tspan>
    </text>

    <!-- Arrow 2 -->
    <line x1="1040" y1="160" x2="1120" y2="160" stroke="#1F5A88" stroke-width="6" marker-end="url(#arrowBlue)" />

    <!-- Output Box 1 -->
    <rect x="1120" y="85" width="420" height="190" rx="20" fill="#F0F8FF" stroke="#2B8BE0" stroke-width="5" filter="url(#glowBlue)" />
    <use href="#codeFrame" x="1170" y="105" width="250" height="150" />
    <text x="1170" y="160" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;07</text>
    
    <use href="#codeFrame" x="1300" y="105" width="250" height="150" />
    <text x="1300" y="160" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;11</text>

    <text x="1330" y="215" text-anchor="middle" fill="black" font-size="36" font-weight="bold">Coarse 3D Representation</text>
  </g>

  <!-- 5. Connector 1 (Row 1 to 2) -->
  <path d="M1330,290 L1330,310 Q1330,320 1320,320 L840,320 Q830,320 830,330 L830,350" fill="none" stroke="#1F5A88" stroke-width="6" marker-end="url(#arrowBlue)" />

  <!-- 6. Row 2: Step 2 -->
  <g transform="translate(0, 320)">
    <!-- Label Box -->
    <rect x="70" y="20" width="320" height="220" rx="20" fill="url(#step2Grad)" filter="url(#shadow)" />
    <!-- Tag -->
    <rect x="150" y="35" width="200" height="60" rx="10" fill="url(#tag2Grad)" filter="url(#shadow)" />
    <text x="250" y="75" text-anchor="middle" fill="white" font-size="40" font-weight="bold">STEP 2</text>
    <!-- Text -->
    <text x="230" y="130" text-anchor="middle" fill="black" font-size="40" font-weight="bold">
      <tspan x="230" dy="0">VLM-BASED</tspan>
      <tspan x="230" dy="50">PHYSICAL MOTION</tspan>
      <tspan x="230" dy="50">PREDICTION</tspan>
    </text>

    <!-- Physics Content -->
    <g transform="translate(500, 40)">
      <!-- Equations -->
      <text x="0" y="40" font-family="Times New Roman, serif" font-style="italic" font-size="32" fill="black">
        <tspan x="0" dy="0">f = ∫</tspan><tspan dy="-10" font-size="20">e</tspan><tspan dy="20" dx="-10" font-size="20">-∞</tspan>
        <tspan dy="-10" dx="10"> </tspan>
        <tspan dx="5" dy="-10">∂V</tspan>
        <tspan dx="-20" dy="30">∂t</tspan>
      </text>
      <line x1="100" y1="10" x2="130" y2="10" stroke="black" stroke-width="1"/>
      
      <text x="0" y="90" font-family="Times New Roman, serif" font-style="italic" font-size="32" fill="black">
         <tspan x="0" dy="0">∂u</tspan><tspan dx="-20" dy="20">∂t</tspan>
         <tspan dx="10" dy="-10"> </tspan>
         <tspan dx="5" dy="-10">1</tspan>
         <tspan dx="-10" dy="25">2</tspan>
         <tspan dx="5" dy="-10">C</tspan><tspan dy="5" font-size="20">n</tspan><tspan dy="-5" font-size="20">i</tspan><tspan>(C)</tspan>
      </text>
      <line x1="10" y1="70" x2="35" y2="70" stroke="black" stroke-width="1"/>
      <line x1="60" y1="70" x2="80" y2="70" stroke="black" stroke-width="1"/>
      
      <text x="0" y="130" font-family="Times New Roman, serif" font-style="italic" font-size="32" fill="black">
        <tspan x="0" dy="0">E = √</tspan><tspan>n</tspan><tspan dy="-10" font-size="20">2</tspan><tspan dy="10"> + h</tspan><tspan dy="-10" font-size="20">2</tspan>
      </text>
      <line x1="45" y1="115" x2="100" y2="115" stroke="black" stroke-width="1"/>

      <text x="50" y="160" text-anchor="middle" fill="black" font-size="34" font-weight="bold">
        <tspan x="50" dy="0">Physics Laws</tspan>
        <tspan x="50" dy="40">&amp; Constraints</tspan>
      </text>
    </g>

    <!-- Arrow 1 -->
    <line x1="570" y1="130" x2="640" y2="130" stroke="#1A525A" stroke-width="6" marker-end="url(#arrowTeal)" />

    <!-- Process Box 2 -->
    <rect x="640" y="50" width="380" height="170" rx="20" fill="#E8F8F5" stroke="#58D696" stroke-width="5" filter="url(#glowTeal)" />
    <use href="#codeFrame" x="680" y="80" width="180" height="130" />
    <text x="680" y="135" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;02</text>
    
    <text x="830" y="120" text-anchor="middle" fill="#1A525A" font-size="60" font-weight="bold">VLM</text>
    <text x="930" y="100" text-anchor="middle" fill="black" font-size="36" font-weight="bold">
      <tspan x="930" dy="0">Physical</tspan>
      <tspan x="930" dy="40">Language</tspan>
      <tspan x="930" dy="40">Model</tspan>
    </text>

    <!-- Arrow 2 -->
    <line x1="1020" y1="130" x2="1060" y2="130" stroke="#1A525A" stroke-width="6" marker-end="url(#arrowTeal)" />

    <!-- Output Box 2 -->
    <rect x="1050" y="20" width="500" height="220" rx="20" fill="#E8F8F5" stroke="#58D696" stroke-width="5" filter="url(#glowTeal)" />
    <text x="1300" y="70" text-anchor="middle" fill="black" font-size="40" font-weight="bold">Physical Motion Prediction</text>
    
    <g transform="translate(1060, 90)">
      <use href="#codeFrame" x="0" y="0" width="180" height="130" />
      <text x="0" y="110" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;08</text>
      <text x="90" y="160" text-anchor="middle" font-size="32" font-weight="bold" fill="black">t=0</text>
      
      <line x1="190" y1="65" x2="220" y2="65" stroke="#1A525A" stroke-width="4" marker-end="url(#arrowSmall)" />
      
      <use href="#codeFrame" x="230" y="0" width="180" height="130" />
      <text x="230" y="110" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;01</text>
      <text x="320" y="160" text-anchor="middle" font-size="32" font-weight="bold" fill="black">t=1</text>
      
      <line x1="420" y1="65" x2="450" y2="65" stroke="#1A525A" stroke-width="4" marker-end="url(#arrowSmall)" />
      
      <use href="#codeFrame" x="460" y="0" width="180" height="130" />
      <text x="460" y="110" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;09</text>
      <text x="550" y="160" text-anchor="middle" font-size="32" font-weight="bold" fill="black">t=2</text>
      
      <line x1="650" y1="65" x2="680" y2="65" stroke="#1A525A" stroke-width="4" marker-end="url(#arrowSmall)" />
      
      <use href="#codeFrame" x="690" y="0" width="180" height="130" />
      <text x="690" y="110" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;05</text>
      <text x="780" y="160" text-anchor="middle" font-size="32" font-weight="bold" fill="black">t=3</text>
      
      <text x="780" y="100" text-anchor="middle" font-size="40" font-weight="bold" fill="black">. . .</text>
    </g>
    <text x="1300" y="210" text-anchor="middle" fill="black" font-size="36" font-weight="bold">4D Sequence (Time-Varying 3D)</text>
  </g>

  <!-- 7. Connector 2 (Row 2 to 3) -->
  <path d="M870,460 L870,480 Q870,490 880,490 L820,490 Q810,490 810,500 L810,530" fill="none" stroke="#1F5A88" stroke-width="6" marker-end="url(#arrowBlue)" />

  <!-- 8. Row 3: Step 3 -->
  <g transform="translate(0, 500)">
    <!-- Label Box -->
    <rect x="70" y="20" width="320" height="250" rx="20" fill="url(#step3Grad)" filter="url(#shadow)" />
    <!-- Tag -->
    <rect x="150" y="60" width="200" height="60" rx="10" fill="url(#tag3Grad)" filter="url(#shadow)" />
    <text x="250" y="100" text-anchor="middle" fill="white" font-size="40" font-weight="bold">STEP 3</text>
    <!-- Text -->
    <text x="230" y="180" text-anchor="middle" fill="black" font-size="40" font-weight="bold">
      <tspan x="230" dy="0">VIDEO DIFFUSION</tspan>
      <tspan x="230" dy="50">&amp; SYNTHESIS</tspan>
    </text>

    <!-- Arrow 1 -->
    <line x1="390" y1="145" x2="630" y2="145" stroke="#5B3A8E" stroke-width="6" marker-end="url(#arrowPurple)" />

    <!-- Process Box 3 -->
    <rect x="630" y="20" width="340" height="210" rx="20" fill="#F3E5F5" stroke="#9B5DD3" stroke-width="5" filter="url(#glowPurple)" />
    <use href="#codeFrame" x="660" y="70" width="180" height="130" />
    <text x="660" y="125" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="monospace">&lt;AF&gt;10</text>
    
    <text x="830" y="120" text-anchor="middle" fill="black" font-size="44" font-weight="bold">
      <tspan x="830" dy="0">Video</tspan>
      <tspan x="830" dy="50">Diffusion</tspan>
    </text>
    
    <text x="790" y="240" text-anchor="middle" fill="black" font-size="38" font-weight="bold">Conditioned on 4D Data</text>

    <!-- Arrow 2 -->
    <line x1="970" y1="145" x2="1050" y2="145" stroke="#5B3A8E" stroke-width="6" marker-end="url(#arrowPurple)" />

    <!-- Output Box 3 -->
    <rect x="1050" y="20" width="490" height="230" rx="20" fill="#F3E5F5" stroke="#E67E22" stroke-width="5" filter="url(#glowPurple)" />
    
    <!-- Video Strip -->
    <g transform="translate(1070, 40)">
      <use href="#videoFrame" x="0" y="0" width="150" height="170" />
      <use href="#videoFrame" x="150" y="0" width="150" height="170" />
      <use href="#videoFrame" x="300" y="0" width="150" height="170" />
      <use href="#videoFrame" x="450" y="0" width="150" height="170" />
    </g>
    
    <text x="1295" y="220" text-anchor="middle" fill="black" font-size="42" font-weight="bold">GENERATED HIGH-QUALITY VIDEO</text>
  </g>

  <!-- 9. Footer -->
  <text x="800" y="740" text-anchor="middle" font-size="40" font-weight="bold" font-style="italic" fill="black" font-family="serif">Leveraging physical prediction and diffusion for realistic video creation.</text>

</svg>
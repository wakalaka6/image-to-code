<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" style="font-family: 'Times New Roman', Times, serif; background-color: white;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A0A0A0" />
    </marker>
    <!-- Font Styles -->
    <style>
      .title { font-size: 50px; font-weight: bold; }
      .label { font-size: 32px; font-weight: bold; }
      .math { font-size: 48px; font-style: italic; }
      .math-sub { font-size: 32px; font-style: normal; }
      .llm-text { font-size: 48px; fill: white; font-weight: bold; }
      .prompt-text { font-size: 60px; font-style: italic; fill: black; }
      .bar-text { font-size: 36px; font-style: italic; }
      .bar-text-red { fill: #FF6B6B; }
      .bar-text-blue { fill: #00AEEF; }
      .bar-text-black { fill: black; }
      .box-text { font-size: 48px; fill: white; font-weight: bold; }
      .detection-text { font-size: 40px; fill: black; text-anchor: middle; }
      .caption { font-size: 36px; fill: black; }
      .caption-red { fill: #FF6B6B; }
    </style>
  </defs>

  <!-- ==================== TOP SECTION: TRAINING STAGE ==================== -->
  <rect x="0" y="20" width="1600" height="500" fill="#D5E8D4" />
  <text x="20" y="80" class="title">Training Stage</text>

  <!-- Input Prompt Box -->
  <rect x="10" y="100" width="350" height="380" fill="#A9A9A9" />
  <text x="25" y="190" class="prompt-text">
    <tspan x="25" dy="0">Input prompt x :</tspan>
    <tspan x="25" dy="80">How long should</tspan>
    <tspan x="25" dy="80">you wait before</tspan>
    <tspan x="15" dy="80">filing a missing</tspan>
    <tspan x="20" dy="80">person report?</tspan>
  </text>

  <!-- Arrow 1 -->
  <line x1="370" y1="180" x2="430" y2="180" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- LLM 1 -->
  <text x="480" y="120" class="label">LLM</text>
  <rect x="450" y="130" width="100" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="450" y="195" class="llm-text">&lt;AF&gt;04</text>

  <!-- Arrow 2 -->
  <line x1="560" y1="180" x2="620" y2="180" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- Factuality Section -->
  <text x="720" y="60" class="label" fill="#00CC00">Factuality</text>
  <text x="1100" y="60" class="label" fill="#CC0000">Hallucinations</text>

  <!-- Top Row: Factuality (Green) -->
  <g transform="translate(650, 80)">
    <!-- Dashed Container -->
    <rect x="0" y="0" width="650" height="220" fill="none" stroke="black" stroke-width="4" stroke-dasharray="15,10" />
    
    <!-- Left Document (Green) -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="280" height="200" fill="white" stroke="black" stroke-width="4" />
      <!-- Document Shape -->
      <path d="M0,0 L280,0 Q280,100 140,100 Q0,100 0,200 Z" fill="white" stroke="black" stroke-width="4" />
      <!-- Lines -->
      <rect x="20" y="20" width="80" height="20" fill="#757575" />
      <rect x="120" y="20" width="140" height="20" fill="#757575" />
      <rect x="200" y="20" width="60" height="20" fill="#757575" />
      <rect x="20" y="50" width="140" height="20" fill="#757575" />
      <rect x="180" y="50" width="80" height="20" fill="#757575" />
      <rect x="20" y="80" width="140" height="20" fill="#757575" />
      <rect x="200" y="80" width="60" height="20" fill="#757575" />
      <rect x="20" y="110" width="140" height="20" fill="#757575" />
      <rect x="180" y="110" width="80" height="20" fill="#757575" />
      <rect x="20" y="140" width="140" height="20" fill="#757575" />
      <!-- Green Highlights -->
      <rect x="0" y="100" width="140" height="30" fill="#75C545" />
      <rect x="180" y="100" width="100" height="30" fill="#75C545" />
      <rect x="200" y="170" width="140" height="20" fill="#75C545" />
    </g>

    <!-- Operator -->
    <text x="350" y="130" font-size="120" fill="black" font-weight="bold">&gt;</text>

    <!-- Right Document (Red) -->
    <g transform="translate(450, 20)">
      <rect x="0" y="0" width="280" height="200" fill="white" stroke="black" stroke-width="4" />
      <path d="M0,0 L280,0 Q280,100 140,100 Q0,100 0,200 Z" fill="white" stroke="black" stroke-width="4" />
      <!-- Lines -->
      <rect x="20" y="20" width="80" height="20" fill="#757575" />
      <rect x="120" y="20" width="140" height="20" fill="#757575" />
      <rect x="200" y="20" width="60" height="20" fill="#757575" />
      <rect x="20" y="50" width="140" height="20" fill="#757575" />
      <rect x="180" y="50" width="80" height="20" fill="#757575" />
      <rect x="20" y="80" width="140" height="20" fill="#757575" />
      <rect x="200" y="80" width="60" height="20" fill="#757575" />
      <rect x="20" y="110" width="140" height="20" fill="#757575" />
      <rect x="180" y="110" width="80" height="20" fill="#757575" />
      <rect x="20" y="140" width="140" height="20" fill="#757575" />
      <!-- Red Highlights -->
      <rect x="0" y="100" width="140" height="30" fill="#FF0000" />
      <rect x="180" y="100" width="100" height="30" fill="#FF0000" />
      <rect x="200" y="170" width="140" height="20" fill="#FF0000" />
    </g>
  </g>

  <!-- Arrow 3 -->
  <line x1="1350" y1="180" x2="1410" y2="180" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- Truthful LLM -->
  <text x="1450" y="105" class="label">Truthful LLM</text>
  <rect x="1420" y="120" width="260" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="1420" y="190" class="box-text">&lt;AF&gt;02</text>

  <!-- Bottom Row: Hallucinations (Red) -->
  <g transform="translate(650, 300)">
    <!-- Dashed Container -->
    <rect x="0" y="0" width="650" height="220" fill="none" stroke="black" stroke-width="4" stroke-dasharray="15,10" />
    
    <!-- Left Document (Green) -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="280" height="200" fill="white" stroke="black" stroke-width="4" />
      <path d="M0,0 L280,0 Q280,100 140,100 Q0,100 0,200 Z" fill="white" stroke="black" stroke-width="4" />
      <!-- Lines -->
      <rect x="20" y="20" width="80" height="20" fill="#757575" />
      <rect x="120" y="20" width="140" height="20" fill="#757575" />
      <rect x="200" y="20" width="60" height="20" fill="#757575" />
      <rect x="20" y="50" width="140" height="20" fill="#757575" />
      <rect x="180" y="50" width="80" height="20" fill="#757575" />
      <rect x="20" y="80" width="140" height="20" fill="#757575" />
      <rect x="200" y="80" width="60" height="20" fill="#757575" />
      <rect x="20" y="110" width="140" height="20" fill="#757575" />
      <rect x="180" y="110" width="80" height="20" fill="#757575" />
      <rect x="20" y="140" width="140" height="20" fill="#757575" />
      <!-- Green Highlights -->
      <rect x="0" y="100" width="140" height="30" fill="#75C545" />
      <rect x="180" y="100" width="100" height="30" fill="#75C545" />
      <rect x="200" y="170" width="140" height="20" fill="#75C545" />
    </g>

    <!-- Operator -->
    <text x="350" y="130" font-size="120" fill="black" font-weight="bold">&lt;</text>

    <!-- Right Document (Red) -->
    <g transform="translate(450, 20)">
      <rect x="0" y="0" width="280" height="200" fill="white" stroke="black" stroke-width="4" />
      <path d="M0,0 L280,0 Q280,100 140,100 Q0,100 0,200 Z" fill="white" stroke="black" stroke-width="4" />
      <!-- Lines -->
      <rect x="20" y="20" width="80" height="20" fill="#757575" />
      <rect x="120" y="20" width="140" height="20" fill="#757575" />
      <rect x="200" y="20" width="60" height="20" fill="#757575" />
      <rect x="20" y="50" width="140" height="20" fill="#757575" />
      <rect x="180" y="50" width="80" height="20" fill="#757575" />
      <rect x="20" y="80" width="140" height="20" fill="#757575" />
      <rect x="200" y="80" width="60" height="20" fill="#757575" />
      <rect x="20" y="110" width="140" height="20" fill="#757575" />
      <rect x="180" y="110" width="80" height="20" fill="#757575" />
      <rect x="20" y="140" width="140" height="20" fill="#757575" />
      <!-- Red Highlights -->
      <rect x="0" y="100" width="140" height="30" fill="#FF0000" />
      <rect x="180" y="100" width="100" height="30" fill="#FF0000" />
      <rect x="200" y="170" width="140" height="20" fill="#FF0000" />
    </g>
  </g>

  <!-- Arrow 4 -->
  <line x1="1350" y1="380" x2="1410" y2="380" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- Evil LLM -->
  <text x="1450" y="330" class="label">Evil LLM</text>
  <rect x="1420" y="340" width="260" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="1420" y="410" class="box-text">&lt;AF&gt;03</text>

  <!-- LLM 2 -->
  <text x="480" y="310" class="label">LLM</text>
  <rect x="450" y="320" width="100" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="450" y="385" class="llm-text">&lt;AF&gt;07</text>

  <!-- Arrow 5 -->
  <line x1="560" y1="380" x2="620" y2="380" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />


  <!-- ==================== BOTTOM SECTION: INFERENCE STAGE ==================== -->
  <rect x="0" y="520" width="1600" height="480" fill="#FCE5CD" />
  <text x="15" y="560" class="title">Inference Stage</text>

  <!-- Input Prompt Box -->
  <rect x="10" y="575" width="350" height="380" fill="#A9A9A9" />
  <text x="15" y="670" class="prompt-text">
    <tspan x="15" dy="0">Input prompt x :</tspan>
    <tspan x="15" dy="80">Where was</tspan>
    <tspan x="15" dy="80">NeurIPS 2024 held?</tspan>
    <tspan x="15" dy="80">Response:</tspan>
    <tspan x="15" dy="80">NeurIPS 2024 was</tspan>
    <tspan x="15" dy="80">held at ...</tspan>
  </text>

  <!-- Arrow 1 -->
  <line x1="370" y1="620" x2="430" y2="620" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- LLM 3 -->
  <text x="480" y="560" class="label">LLM</text>
  <rect x="450" y="570" width="100" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="450" y="635" class="llm-text">&lt;AF&gt;06</text>

  <!-- Arrow 2 -->
  <line x1="560" y1="620" x2="620" y2="620" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- LLM 4 -->
  <text x="480" y="715" class="label">Evil LLM</text>
  <rect x="450" y="725" width="100" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="450" y="790" class="llm-text">&lt;AF&gt;05</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="780" x2="620" y2="780" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- LLM 5 -->
  <text x="480" y="880" class="label">Truthful LLM</text>
  <rect x="450" y="890" width="100" height="180" fill="#757575" stroke="black" stroke-width="3" />
  <text x="450" y="955" class="llm-text">&lt;AF&gt;08</text>

  <!-- Arrow 4 -->
  <line x1="560" y1="940" x2="620" y2="940" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- ==================== BAR CHARTS ==================== -->
  
  <!-- Top Chart (Truthful) -->
  <g transform="translate(650, 550)">
    <text x="100" y="0" class="math">log p<tspan dy="10" font-size="32">θ</tspan><tspan dy="-10">(y<tspan dy="5" font-size="24">t</tspan> | x, y<tspan dy="5" font-size="24">&lt;t</tspan>)</tspan></text>
    <g transform="translate(0, 20)">
      <!-- Bars -->
      <rect x="50" y="100" width="30" height="50" fill="#FF6B6B" />
      <rect x="100" y="0" width="30" height="150" fill="#FF6B6B" />
      <rect x="150" y="80" width="30" height="70" fill="#00AEEF" />
      <rect x="200" y="100" width="30" height="50" fill="#FF6B6B" />
      <!-- Labels -->
      <text x="75" y="170" class="bar-text bar-text-red" transform="rotate(-45, 75, 170)">China</text>
      <text x="125" y="170" class="bar-text bar-text-red" transform="rotate(-45, 125, 170)">India</text>
      <text x="175" y="170" class="bar-text bar-text-blue" transform="rotate(-45, 175, 170)">Canada</text>
      <text x="225" y="170" class="bar-text bar-text-red" transform="rotate(-45, 225, 170)">Japan</text>
    </g>
  </g>

  <!-- Middle Chart (Evil) -->
  <g transform="translate(650, 700)">
    <text x="100" y="0" class="math">log p<tspan dy="10" font-size="32">θ−</tspan><tspan dy="-10">(y<tspan dy="5" font-size="24">t</tspan> | x, y<tspan dy="5" font-size="24">&lt;t</tspan>)</tspan></text>
    <g transform="translate(0, 20)">
      <rect x="50" y="100" width="30" height="50" fill="#FF6B6B" />
      <rect x="100" y="0" width="30" height="150" fill="#FF6B6B" />
      <rect x="150" y="120" width="30" height="30" fill="#00AEEF" />
      <rect x="200" y="100" width="30" height="50" fill="#FF6B6B" />
      <text x="75" y="170" class="bar-text bar-text-red" transform="rotate(-45, 75, 170)">China</text>
      <text x="125" y="170" class="bar-text bar-text-red" transform="rotate(-45, 125, 170)">India</text>
      <text x="175" y="170" class="bar-text bar-text-blue" transform="rotate(-45, 175, 170)">Canada</text>
      <text x="225" y="170" class="bar-text bar-text-red" transform="rotate(-45, 225, 170)">Japan</text>
    </g>
  </g>

  <!-- Bottom Chart (Truthful) -->
  <g transform="translate(650, 850)">
    <text x="100" y="0" class="math">log p<tspan dy="10" font-size="32">θ+</tspan><tspan dy="-10">(y<tspan dy="5" font-size="24">t</tspan> | x, y<tspan dy="5" font-size="24">&lt;t</tspan>)</tspan></text>
    <g transform="translate(0, 20)">
      <rect x="50" y="100" width="30" height="50" fill="#FF6B6B" />
      <rect x="100" y="100" width="30" height="50" fill="#FF6B6B" />
      <rect x="150" y="0" width="30" height="150" fill="#00AEEF" />
      <rect x="200" y="100" width="30" height="50" fill="#FF6B6B" />
      <text x="75" y="170" class="bar-text bar-text-red" transform="rotate(-45, 75, 170)">China</text>
      <text x="125" y="170" class="bar-text bar-text-red" transform="rotate(-45, 125, 170)">India</text>
      <text x="175" y="170" class="bar-text bar-text-blue" transform="rotate(-45, 175, 170)">Canada</text>
      <text x="225" y="170" class="bar-text bar-text-red" transform="rotate(-45, 225, 170)">Japan</text>
    </g>
  </g>

  <!-- ==================== MATH EQUATION ==================== -->
  <g transform="translate(820, 650)">
    <text x="0" y="0" class="math" font-size="50">log p<tspan dy="10" font-size="32">θ</tspan><tspan dy="-10">(y<tspan dy="5" font-size="24">t</tspan> | x, y<tspan dy="5" font-size="24">&lt;t</tspan>)</tspan></text>
    <text x="100" y="0" class="math" font-size="50">− α log p<tspan dy="10" font-size="32">θ−</tspan><tspan dy="-10">(y<tspan dy="5" font-size="24">t</tspan> | x, y<tspan dy="5" font-size="24">&lt;t</tspan>)</tspan></text>
    <text x="250" y="0" class="math" font-size="50">+ γ log p<tspan dy="10" font-size="32">θ+</tspan><tspan dy="-10">(y<tspan dy="5" font-size="24">t</tspan> | x, y<tspan dy="5" font-size="24">&lt;t</tspan>)</tspan></text>
  </g>

  <!-- ==================== MCD SECTION ==================== -->
  <g transform="translate(820, 600)">
    <text x="0" y="100" class="label">MCD</text>
    <line x1="0" y1="110" x2="0" y2="200" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />
    
    <!-- MCD Chart -->
    <g transform="translate(100, 150)">
      <rect x="0" y="100" width="30" height="50" fill="#FF6B6B" />
      <rect x="50" y="100" width="30" height="50" fill="#FF6B6B" />
      <rect x="100" y="0" width="30" height="150" fill="#00AEEF" />
      <rect x="150" y="100" width="30" height="50" fill="#FF6B6B" />
      <text x="25" y="170" class="bar-text bar-text-red" transform="rotate(-45, 25, 170)">China</text>
      <text x="75" y="170" class="bar-text bar-text-red" transform="rotate(-45, 75, 170)">India</text>
      <text x="125" y="170" class="bar-text bar-text-blue" transform="rotate(-45, 125, 170)">Canada</text>
      <text x="175" y="170" class="bar-text bar-text-red" transform="rotate(-45, 175, 170)">Japan</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="1120" y1="780" x2="1200" y2="780" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- ==================== DETECTION ==================== -->
  <g transform="translate(1220, 700)">
    <polygon points="100,0 200,100 100,200 -100,100" fill="#80EFFF" stroke="black" stroke-width="4" />
    <text x="0" y="110" class="detection-text">Detection</text>
  </g>

  <!-- Arrow -->
  <line x1="1350" y1="780" x2="1430" y2="780" stroke="#A0A0A0" stroke-width="15" marker-end="url(#arrowhead)" />

  <!-- Output -->
  <rect x="1440" y="700" width="80" height="80" fill="#757575" stroke="black" stroke-width="3" />
  <text x="1440" y="735" class="box-text">&lt;AF&gt;01</text>
  <text x="1480" y="780" class="label" fill="#00AEEF" font-size="50">Canada</text>

  <!-- ==================== CAPTION ==================== -->
  <text x="1300" y="890" class="caption">hallucinatory object</text>
  <text x="1300" y="930" class="caption">“<tspan fill="#FF6B6B">India</tspan>” eliminated</text>

</svg>
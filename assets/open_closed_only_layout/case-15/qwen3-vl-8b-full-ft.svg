<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8.0 12.0 1616.0 1016.0" style="font-family: 'Times New Roman', Times, serif;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a" />
    </marker>
    
    <!-- Graph Node Group -->
    <g id="graph-structure">
      <!-- Edges -->
      <line x1="150" y1="50" x2="150" y2="150" stroke="#1a1a1a" stroke-width="2" />
      <line x1="150" y1="150" x2="80" y2="200" stroke="#1a1a1a" stroke-width="2" />
      <line x1="150" y1="150" x2="220" y2="200" stroke="#1a1a1a" stroke-width="2" />
      <line x1="220" y1="200" x2="220" y2="80" stroke="#1a1a1a" stroke-width="2" />
      <!-- Nodes -->
      <circle cx="150" cy="50" r="30" fill="#8cbbfd" />
      <circle cx="150" cy="150" r="30" fill="#8cbbfd" />
      <circle cx="80" cy="200" r="30" fill="#8cbbfd" />
      <circle cx="220" cy="200" r="30" fill="#8cbbfd" />
      <circle cx="220" cy="80" r="30" fill="#8cbbfd" />
    </g>

    <!-- Vector Stack (5 cells) -->
    <g id="vector-stack">
      <rect x="0" y="0" width="120" height="40" stroke="#000033" stroke-width="3" />
      <rect x="0" y="40" width="120" height="40" stroke="#000033" stroke-width="3" />
      <rect x="0" y="80" width="120" height="40" stroke="#000033" stroke-width="3" />
      <rect x="0" y="120" width="120" height="40" stroke="#000033" stroke-width="3" />
      <rect x="0" y="160" width="120" height="40" stroke="#000033" stroke-width="3" />
    </g>
  </defs>

  <!-- ================= SECTION A: GIBMS ================= -->
  <!-- Background -->
  <rect x="80" y="20" width="1500" height="340" fill="#d0f0f0" />
  
  <!-- Label (a) -->
  <text x="10" y="70" font-size="60" fill="#1a1a1a">(a)</text>
  <!-- Title GIBMS -->
  <text x="140" y="70" font-size="60" font-weight="bold" fill="#1a1a1a">GIBMS</text>

  <!-- Input Graph G -->
  <g transform="translate(100, 120)">
    <use href="#graph-structure" />
    <text x="150" y="270" font-size="60" font-style="italic" text-anchor="middle" fill="#1a1a1a">G</text>
  </g>

  <!-- Arrow to Encoder -->
  <line x1="300" y1="200" x2="370" y2="200" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Encoder Box -->
  <rect x="370" y="130" width="150" height="220" fill="#eeeeee" stroke="#5c222e" stroke-width="4" />
  <text x="445" y="240" font-size="45" text-anchor="middle" fill="#1a1a1a" transform="rotate(-90, 445, 240)">Encoder</text>

  <!-- Arrow to H -->
  <line x1="455" y1="200" x2="520" y2="200" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- H Vector -->
  <text x="480" y="170" font-size="70" font-weight="bold" fill="#1a1a1a">H</text>
  <g transform="translate(520, 135)">
    <use href="#vector-stack" fill="#b3f6ff" />
  </g>

  <!-- Arrow to MLP -->
  <line x1="580" y1="200" x2="650" y2="200" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- MLP Box -->
  <rect x="650" y="130" width="150" height="220" fill="#eeeeee" stroke="#5c222e" stroke-width="4" />
  <text x="725" y="240" font-size="45" text-anchor="middle" fill="#1a1a1a" transform="rotate(-90, 725, 240)">MLP</text>

  <!-- Arrow to Prob Graph -->
  <line x1="725" y1="200" x2="790" y2="200" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Probabilistic Graph -->
  <g transform="translate(800, 120)">
    <!-- Edges -->
    <line x1="150" y1="50" x2="150" y2="150" stroke="#1a1a1a" stroke-width="2" />
    <line x1="150" y1="150" x2="80" y2="200" stroke="#1a1a1a" stroke-width="2" />
    <line x1="150" y1="150" x2="220" y2="200" stroke="#1a1a1a" stroke-width="2" />
    <line x1="220" y1="200" x2="220" y2="80" stroke="#1a1a1a" stroke-width="2" />
    <!-- Nodes with Text -->
    <circle cx="150" cy="50" r="30" fill="#8cbbfd" />
    <text x="150" y="58" font-size="28" text-anchor="middle" fill="#000">0.1</text>
    
    <circle cx="150" cy="150" r="30" fill="#8cbbfd" />
    <text x="150" y="158" font-size="32" text-anchor="middle" fill="#000">0.9</text>
    
    <circle cx="80" cy="200" r="30" fill="#8cbbfd" />
    <text x="80" y="208" font-size="28" text-anchor="middle" fill="#000">0.7</text>
    
    <circle cx="220" cy="200" r="30" fill="#8cbbfd" />
    <text x="220" y="208" font-size="28" text-anchor="middle" fill="#000">0.6</text>
    
    <circle cx="220" cy="80" r="30" fill="#8cbbfd" />
    <text x="220" y="88" font-size="28" text-anchor="middle" fill="#000">0.3</text>
  </g>

  <!-- Sample Split -->
  <line x1="980" y1="200" x2="1030" y2="200" stroke="#1a1a1a" stroke-width="3" />
  <text x="1090" y="210" font-size="45" text-anchor="middle" fill="#1a1a1a">Sample</text>
  <line x1="1030" y1="200" x2="1040" y2="200" stroke="#1a1a1a" stroke-width="3" />
  
  <!-- Vertical Split Lines -->
  <path d="M 1040 200 L 1040 115 L 1090 115" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 1040 200 L 1040 285 L 1090 285" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Top Branch -->
  <text x="1040" y="70" font-size="60" font-style="italic" fill="#1a1a1a">G<tspan dy="10" font-size="40">IB</tspan></text>
  <g transform="translate(1090, 40)">
    <use href="#vector-stack" fill="#dced9e" />
  </g>
  <!-- Top Pool -->
  <text x="1190" y="110" font-size="45" fill="#1a1a1a">Pool</text>
  <line x1="1150" y1="115" x2="1240" y2="115" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="1240" y="95" width="130" height="70" fill="#dced9e" stroke="#5c222e" stroke-width="3" />

  <!-- Bottom Branch -->
  <text x="1040" y="340" font-size="60" font-style="italic" fill="#1a1a1a">G<tspan dy="10" font-size="40">IB</tspan></text>
  <g transform="translate(1090, 220)">
    <use href="#vector-stack" fill="#dced9e" />
  </g>
  <!-- Bottom Pool -->
  <text x="1170" y="280" font-size="45" fill="#1a1a1a">Pool</text>
  <line x1="1150" y1="285" x2="1240" y2="285" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="1240" y="265" width="130" height="70" fill="#dced9e" stroke="#5c222e" stroke-width="3" />

  <!-- Mutual Information Top -->
  <path d="M 550 135 L 550 90 L 790 90" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 1090 90 L 940 90" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <text x="815" y="100" font-size="60" text-anchor="middle" fill="#1a1a1a">
    <tspan font-style="italic">I</tspan> (<tspan font-style="italic">G</tspan>; <tspan font-style="italic">G</tspan><tspan dy="10" font-size="40">IB</tspan>)
  </text>

  <!-- Mutual Information Bottom -->
  <path d="M 550 255 L 550 300 L 790 300" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 1090 300 L 940 300" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <text x="815" y="310" font-size="60" text-anchor="middle" fill="#1a1a1a">
    <tspan font-style="italic">I</tspan> (<tspan font-style="italic">G</tspan>; <tspan font-style="italic">G</tspan><tspan dy="10" font-size="40">IB</tspan>)
  </text>

  <!-- Final Output A -->
  <line x1="1310" y1="115" x2="1240" y2="285" stroke="#1a1a1a" stroke-width="3" />
  <line x1="1310" y1="285" x2="1240" y2="115" stroke="#1a1a1a" stroke-width="3" />
  <line x1="1310" y1="115" x2="1370" y2="190" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1310" y1="285" x2="1370" y2="200" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  
  <text x="1420" y="200" font-size="60" fill="#1a1a1a">
    −<tspan font-style="italic">I</tspan> (<tspan font-weight="bold">Y</tspan>; <tspan font-style="italic">G</tspan><tspan dy="10" font-size="40">IB</tspan>)
  </text>

  <!-- ================= SECTION B: SLG ================= -->
  <!-- Background White -->
  <rect x="0" y="370" width="1600" height="650" fill="#ffffff" />
  
  <!-- Label (b) -->
  <text x="10" y="400" font-size="60" fill="#1a1a1a">(b)</text>
  <!-- Title SLG -->
  <text x="130" y="400" font-size="60" font-weight="bold" fill="#1a1a1a">SLG</text>

  <!-- Input Graph G -->
  <g transform="translate(100, 420)">
    <use href="#graph-structure" />
    <text x="150" y="270" font-size="60" font-style="italic" text-anchor="middle" fill="#1a1a1a">G</text>
  </g>

  <!-- Split Arrows -->
  <path d="M 320 500 L 380 500 L 400 450 L 390 440" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M 320 500 L 380 500 L 400 580 L 390 590" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- === Top Path (GIBMS) === -->
  <!-- Box -->
  <rect x="390" y="370" width="150" height="220" fill="#d0f0f0" />
  <text x="465" y="480" font-size="45" text-anchor="middle" fill="#1a1a1a" transform="rotate(-90, 465, 480)">GIBMS</text>
  <line x1="475" y1="450" x2="560" y2="450" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Encoder Box -->
  <rect x="560" y="370" width="150" height="220" fill="#eeeeee" stroke="#6b4c1e" stroke-width="4" />
  <text x="610" y="480" font-size="45" text-anchor="middle" fill="#1a1a1a" transform="rotate(-90, 610, 480)">Encoder</text>
  <line x1="635" y1="450" x2="720" y2="450" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- H^p Vector -->
  <text x="670" y="410" font-size="60" font-weight="bold" fill="#1a1a1a">H<tspan dy="-20" font-size="40" font-style="italic">p</tspan></text>
  <g transform="translate(720, 375)">
    <use href="#vector-stack" fill="#fef8e0" />
  </g>

  <!-- Softmax Top -->
  <line x1="780" y1="450" x2="860" y2="450" stroke="#1a1a1a" stroke-width="3" />
  <text x="920" y="455" font-size="50" text-anchor="middle" fill="#1a1a1a">softmax</text>
  <text x="1020" y="455" font-size="50" text-anchor="middle" fill="#1a1a1a">(</text>
  
  <!-- Fraction -->
  <text x="1050" y="435" font-size="60" font-weight="bold" fill="#1a1a1a">H<tspan dy="-20" font-size="40" font-style="italic">p</tspan><tspan dy="20"> · </tspan><tspan font-weight="bold">Q</tspan></text>
  <line x1="1010" y1="445" x2="1100" y2="445" stroke="#1a1a1a" stroke-width="3" />
  <text x="1055" y="480" font-size="45" font-style="italic" fill="#1a1a1a">T<tspan dy="10" font-size="30">p</tspan></text>
  
  <text x="1120" y="455" font-size="50" text-anchor="middle" fill="#1a1a1a">)</text>
  <line x1="1140" y1="450" x2="1210" y2="450" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- s^p -->
  <text x="1170" y="410" font-size="60" font-style="italic" fill="#1a1a1a">s<tspan dy="-20" font-size="40">p</tspan></text>

  <!-- === Bottom Path (Tokenizer) === -->
  <!-- Box -->
  <rect x="390" y="530" width="150" height="220" fill="#f5f5f5" stroke="#6b4c1e" stroke-width="4" />
  <text x="465" y="640" font-size="45" text-anchor="middle" fill="#1a1a1a" transform="rotate(-90, 465, 640)">Tokenizer</text>
  <line x1="475" y1="600" x2="560" y2="600" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Embedding Box -->
  <rect x="560" y="530" width="150" height="220" fill="#eeeeee" stroke="#6b4c1e" stroke-width="4" />
  <text x="610" y="640" font-size="45" text-anchor="middle" fill="#1a1a1a" transform="rotate(-90, 610, 640)">Embedding</text>
  <line x1="635" y1="600" x2="720" y2="600" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- H^y Vector -->
  <text x="670" y="570" font-size="60" font-weight="bold" fill="#1a1a1a">H<tspan dy="-20" font-size="40" font-style="italic">y</tspan></text>
  <g transform="translate(720, 535)">
    <use href="#vector-stack" fill="#fef8e0" />
  </g>

  <!-- Softmax Bottom -->
  <line x1="780" y1="600" x2="860" y2="600" stroke="#1a1a1a" stroke-width="3" />
  <text x="920" y="605" font-size="50" text-anchor="middle" fill="#1a1a1a">softmax</text>
  <text x="1020" y="605" font-size="50" text-anchor="middle" fill="#1a1a1a">(</text>
  
  <!-- Fraction -->
  <text x="1050" y="585" font-size="60" font-weight="bold" fill="#1a1a1a">H<tspan dy="-20" font-size="40" font-style="italic">y</tspan><tspan dy="20"> · </tspan><tspan font-weight="bold">Q</tspan></text>
  <line x1="1010" y1="595" x2="1100" y2="595" stroke="#1a1a1a" stroke-width="3" />
  <text x="1055" y="630" font-size="45" font-style="italic" fill="#1a1a1a">T<tspan dy="10" font-size="30">y</tspan></text>
  
  <text x="1120" y="605" font-size="50" text-anchor="middle" fill="#1a1a1a">)</text>
  <line x1="1140" y1="600" x2="1210" y2="600" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- s^y -->
  <text x="1170" y="580" font-size="60" font-style="italic" fill="#1a1a1a">s<tspan dy="-20" font-size="40">y</tspan></text>

  <!-- === Matrix Multiplication Area === -->
  <!-- Q Vector -->
  <text x="880" y="540" font-size="60" font-weight="bold" fill="#1a1a1a">Q</text>
  <g transform="translate(920, 495)">
    <rect x="0" y="0" width="90" height="110" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="90" y="0" width="90" height="110" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="180" y="0" width="90" height="110" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="270" y="0" width="90" height="110" fill="#ff9fbb" stroke="#000033" stroke-width="3" />
  </g>

  <!-- === Result Matrices === -->
  <!-- Top Matrix s^p -->
  <g transform="translate(1210, 375)">
    <rect x="0" y="0" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="0" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="0" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="0" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />
    
    <rect x="0" y="55" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="55" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="55" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="55" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />

    <rect x="0" y="110" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="110" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="110" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="110" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />

    <rect x="0" y="165" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="165" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="165" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="165" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />
  </g>

  <!-- Bottom Matrix s^y -->
  <g transform="translate(1210, 535)">
    <rect x="0" y="0" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="0" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="0" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="0" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />
    
    <rect x="0" y="55" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="55" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="55" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="55" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />

    <rect x="0" y="110" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="110" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="110" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="110" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />

    <rect x="0" y="165" width="80" height="55" fill="#8cbbfd" stroke="#000033" stroke-width="3" />
    <rect x="80" y="165" width="80" height="55" fill="#95dca0" stroke="#000033" stroke-width="3" />
    <rect x="160" y="165" width="80" height="55" fill="#ffcc66" stroke="#000033" stroke-width="3" />
    <rect x="240" y="165" width="80" height="55" fill="#ff9fbb" stroke="#000033" stroke-width="3" />
  </g>

  <!-- Loss Function -->
  <line x1="1370" y1="450" x2="1430" y2="520" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1370" y1="600" x2="1430" y2="530" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)" />
  
  <text x="1440" y="530" font-size="60" fill="#1a1a1a">
    <tspan font-family="cursive">L</tspan><tspan dy="10" font-size="40">soft</tspan><tspan dy="-10" font-size="60">(</tspan><tspan font-style="italic">s</tspan><tspan dy="-20" font-size="40" font-style="italic">y</tspan><tspan dy="20">, </tspan><tspan font-style="italic">s</tspan><tspan dy="-20" font-size="40" font-style="italic">p</tspan><tspan dy="20">)</tspan>
  </text>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1736" height="980" viewBox="0 0 1736 980">
  <!-- backgrounds -->
  <rect x="0" y="0" width="1736" height="510" fill="#e9eaea"/>
  <rect x="0" y="510" width="870" height="470" fill="#f7e2d4"/>
  <rect x="870" y="510" width="866" height="470" fill="#dbe0f0"/>

  <!-- ============ Panel (a) ============ -->
  <text x="22" y="48" font-family="Georgia, serif" font-size="34" fill="#000">(a) Overall MINI Architecture</text>

  <!-- Query function box -->
  <rect x="498" y="85" width="290" height="42" rx="6" fill="#eaf3e3" stroke="#8ab06a" stroke-width="2"/>
  <text x="643" y="113" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">Query function q(·)</text>

  <!-- input image stack -->
  <g>
    <rect x="350" y="195" width="155" height="155" fill="#7fa8c9" stroke="#fff" stroke-width="3"/>
    <rect x="335" y="210" width="155" height="155" fill="#88a98f" stroke="#fff" stroke-width="3"/>
    <rect x="318" y="225" width="155" height="155" fill="#9a7d5a" stroke="#fff" stroke-width="3"/>
  </g>
  <text x="430" y="412" font-family="Georgia, serif" font-size="26" fill="#000" text-anchor="middle">input x</text>

  <!-- output image stack -->
  <g>
    <rect x="1300" y="195" width="155" height="155" fill="#7fa8c9" stroke="#fff" stroke-width="3"/>
    <rect x="1285" y="210" width="155" height="155" fill="#88a98f" stroke="#fff" stroke-width="3"/>
    <rect x="1268" y="225" width="155" height="155" fill="#9a7d5a" stroke="#fff" stroke-width="3"/>
  </g>
  <text x="1370" y="412" font-family="Georgia, serif" font-size="26" fill="#000" text-anchor="middle">output y</text>

  <!-- backbone dashed box -->
  <rect x="668" y="190" width="400" height="245" rx="25" fill="none" stroke="#2d4ba0" stroke-width="3" stroke-dasharray="10,7"/>
  <text x="868" y="462" font-family="Georgia, serif" font-size="26" fill="#000" text-anchor="middle">Any backbone</text>
  <text x="868" y="490" font-family="Georgia, serif" font-size="26" fill="#000" text-anchor="middle">with MINI-Conv</text>

  <!-- hourglass trapezoids -->
  <polygon points="692,232 800,290 800,338 692,395" fill="none" stroke="#2d4ba0" stroke-width="2.5"/>
  <polygon points="1044,232 936,290 936,338 1044,395" fill="none" stroke="#2d4ba0" stroke-width="2.5"/>

  <!-- bar charts left (decreasing) -->
  <g>
    <!-- bar1 -->
    <rect x="700" y="245" width="22" height="55" fill="#f5c842"/>
    <rect x="700" y="300" width="22" height="30" fill="#f0a060"/>
    <rect x="700" y="330" width="22" height="50" fill="#3d6bb5"/>
    <!-- bar2 -->
    <rect x="730" y="260" width="22" height="45" fill="#f5c842"/>
    <rect x="730" y="305" width="22" height="25" fill="#f0a060"/>
    <rect x="730" y="330" width="22" height="40" fill="#3d6bb5"/>
    <!-- bar3 -->
    <rect x="760" y="272" width="22" height="35" fill="#f5c842"/>
    <rect x="760" y="307" width="22" height="20" fill="#f0a060"/>
    <rect x="760" y="327" width="22" height="35" fill="#3d6bb5"/>
    <!-- bar4 -->
    <rect x="790" y="282" width="22" height="25" fill="#f5c842"/>
    <rect x="790" y="307" width="22" height="15" fill="#f0a060"/>
    <rect x="790" y="322" width="22" height="30" fill="#3d6bb5"/>
  </g>
  <!-- bar charts right (increasing) -->
  <g>
    <rect x="924" y="282" width="22" height="25" fill="#f5c842"/>
    <rect x="924" y="307" width="22" height="15" fill="#f0a060"/>
    <rect x="924" y="322" width="22" height="30" fill="#3d6bb5"/>

    <rect x="954" y="272" width="22" height="35" fill="#f5c842"/>
    <rect x="954" y="307" width="22" height="20" fill="#f0a060"/>
    <rect x="954" y="327" width="22" height="35" fill="#3d6bb5"/>

    <rect x="984" y="260" width="22" height="45" fill="#f5c842"/>
    <rect x="984" y="305" width="22" height="25" fill="#f0a060"/>
    <rect x="984" y="330" width="22" height="40" fill="#3d6bb5"/>

    <rect x="1014" y="245" width="22" height="55" fill="#f5c842"/>
    <rect x="1014" y="300" width="22" height="30" fill="#f0a060"/>
    <rect x="1014" y="330" width="22" height="50" fill="#3d6bb5"/>
  </g>

  <!-- arrowheads marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#000"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3.5 L0,7 z" fill="#7ab648"/>
    </marker>
  </defs>

  <!-- arrows panel a -->
  <!-- input image up to query -->
  <path d="M405,103 L498,103" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <line x1="405" y1="103" x2="405" y2="225" stroke="#000" stroke-width="3"/>
  <!-- query down to backbone -->
  <path d="M788,106 L865,106 L865,188" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <!-- input to backbone -->
  <path d="M510,302 L666,302" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <!-- backbone to output -->
  <path d="M1070,302 L1266,302" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- ============ Panel (b) ============ -->
  <text x="22" y="560" font-family="Georgia, serif" font-size="34" fill="#000">(b) MINI-Conv</text>

  <text x="318" y="592" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">bias embeddings</text>

  <!-- bias embeddings stack (cyan dashed) -->
  <g>
    <rect x="333" y="615" width="60" height="60" fill="#e7a544"/>
    <rect x="326" y="622" width="60" height="60" fill="#e07d4a"/>
    <rect x="319" y="629" width="60" height="60" fill="#8ec07a"/>
    <rect x="312" y="636" width="60" height="60" fill="#a7d18d"/>
  </g>
  <rect x="306" y="608" width="92" height="95" fill="none" stroke="#29b6e6" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- weight embeddings stack (blue dashed) -->
  <g>
    <rect x="345" y="695" width="64" height="64" fill="#e7a544"/>
    <rect x="337" y="703" width="64" height="64" fill="#e07d4a"/>
    <rect x="329" y="711" width="64" height="64" fill="#d44a4a"/>
    <rect x="321" y="719" width="64" height="64" fill="#8ec07a"/>
    <rect x="313" y="727" width="64" height="64" fill="#a7d18d"/>
  </g>
  <rect x="306" y="690" width="100" height="105" fill="none" stroke="#2d4ba0" stroke-width="3" stroke-dasharray="8,5"/>
  <text x="318" y="822" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">weight embeddings</text>

  <!-- q(x) input -->
  <text x="55" y="745" font-family="Georgia, serif" font-size="28" fill="#000" text-anchor="middle">q(x)</text>
  <line x1="92" y1="738" x2="180" y2="738" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="640" x2="180" y2="738" stroke="#000" stroke-width="3"/>
  <path d="M180,640 L304,640" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M180,738 L304,738" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- blue vertical bar near bias -->
  <rect x="460" y="610" width="28" height="65" fill="#3d6bb5"/>
  <!-- blue vertical bar near weight -->
  <rect x="455" y="695" width="34" height="95" fill="#3d6bb5"/>

  <!-- arrows bias -> bar -->
  <path d="M398,640 L458,640" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M406,742 L453,742" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- bias bar -> top to addition -->
  <path d="M488,642 L720,642" stroke="#000" stroke-width="3" fill="none"/>
  <line x1="720" y1="642" x2="720" y2="722" stroke="#000" stroke-width="3"/>

  <!-- weight bar -> R -->
  <path d="M489,742 L548,742" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- R circle (reshape) -->
  <circle cx="575" cy="742" r="22" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="575" y="751" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">Ⓡ</text>
  <path d="M597,742 L630,742" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- * circle (convolution) -->
  <circle cx="658" cy="742" r="22" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="658" y="751" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">✻</text>
  <path d="M680,742 L713,742" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- ⊕ circle (addition) -->
  <circle cx="735" cy="742" r="22" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="735" y="751" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">⊕</text>
  <path d="M757,742 L820,742" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="845" y="750" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#000" text-anchor="middle">h'</text>

  <!-- h hidden state -->
  <text x="95" y="900" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#000" text-anchor="middle">h</text>
  <text x="95" y="935" font-family="Georgia, serif" font-size="22" fill="#000" text-anchor="middle">hidden state</text>
  <line x1="120" y1="892" x2="658" y2="892" stroke="#000" stroke-width="3"/>
  <path d="M658,892 L658,766" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- legend -->
  <text x="430" y="925" font-family="Georgia, serif" font-size="24" fill="#000">Ⓡ: reshape    ✻: convolution</text>
  <text x="430" y="965" font-family="Georgia, serif" font-size="24" fill="#000">⊕: Element-wise addition</text>

  <!-- ============ Panel (c) ============ -->
  <text x="892" y="560" font-family="Georgia, serif" font-size="34" fill="#000">(c) Query function q(·)</text>

  <!-- x input -->
  <text x="905" y="800" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#000" text-anchor="middle">x</text>
  <path d="M925,792 L975,792" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- patching box -->
  <rect x="978" y="758" width="135" height="70" rx="6" fill="#3d6bb5"/>
  <text x="1045" y="800" font-family="Georgia, serif" font-size="24" fill="#fff" text-anchor="middle">patching</text>

  <!-- patching to switch -->
  <path d="M1113,792 L1185,792" stroke="#000" stroke-width="3" fill="none"/>

  <!-- Degradation Classification MLP (orange dashed) -->
  <rect x="945" y="595" width="180" height="100" rx="8" fill="none" stroke="#e8a33d" stroke-width="3" stroke-dasharray="8,5"/>
  <text x="1035" y="630" font-family="Georgia, serif" font-size="22" fill="#000" text-anchor="middle">Degradation</text>
  <text x="1035" y="656" font-family="Georgia, serif" font-size="22" fill="#000" text-anchor="middle">Classification</text>
  <text x="1035" y="682" font-family="Georgia, serif" font-size="22" fill="#000" text-anchor="middle">MLP</text>

  <!-- patching to degradation (up) -->
  <path d="M1045,758 L1045,697" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- green control arrow from degradation to switch -->
  <path d="M1125,645 L1215,645 L1215,720" stroke="#7ab648" stroke-width="3" fill="none" marker-end="url(#arrowG)"/>

  <!-- switch (green dashed box) -->
  <rect x="1185" y="710" width="80" height="160" fill="none" stroke="#7ab648" stroke-width="3" stroke-dasharray="8,5"/>
  <text x="1225" y="900" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">switch</text>
  <!-- switch contacts -->
  <circle cx="1230" cy="745" r="7" fill="#000"/>
  <circle cx="1230" cy="835" r="7" fill="#000"/>
  <line x1="1188" y1="790" x2="1230" y2="745" stroke="#000" stroke-width="3"/>

  <!-- switch to Global MLP -->
  <path d="M1230,745 L1320,745" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <!-- switch to Local MLP -->
  <path d="M1230,835 L1320,835" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Global MLP box -->
  <rect x="1322" y="708" width="140" height="72" rx="10" fill="#fff" stroke="#7a4b1e" stroke-width="3"/>
  <text x="1392" y="738" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">Global</text>
  <text x="1392" y="765" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">MLP</text>

  <!-- Local MLP box -->
  <rect x="1322" y="800" width="140" height="72" rx="10" fill="#fff" stroke="#7a4b1e" stroke-width="3"/>
  <text x="1392" y="830" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">Local</text>
  <text x="1392" y="857" font-family="Georgia, serif" font-size="24" fill="#000" text-anchor="middle">MLP</text>

  <!-- MLPs to softmax -->
  <path d="M1462,744 L1500,744 L1500,790" stroke="#000" stroke-width="3" fill="none"/>
  <path d="M1462,836 L1500,836 L1500,790" stroke="#000" stroke-width="3" fill="none"/>
  <path d="M1500,790 L1535,790" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- softmax & argmax box -->
  <rect x="1537" y="752" width="120" height="80" rx="8" fill="#3d6bb5"/>
  <text x="1597" y="788" font-family="Georgia, serif" font-size="22" fill="#fff" text-anchor="middle">softmax</text>
  <text x="1597" y="812" font-family="Georgia, serif" font-size="22" fill="#fff" text-anchor="middle">&amp; argmax</text>

  <!-- output q(x) -->
  <path d="M1657,792 L1690,792" stroke="#000" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="1710" y="800" font-family="Georgia, serif" font-size="26" fill="#000" text-anchor="middle">q(x)</text>
</svg>
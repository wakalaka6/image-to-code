<svg width="1200" height="510" viewBox="0 0 1200 510" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for markers and styles -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#333"/>
    </marker>
    <style>
      .label-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #333; }
      .bold-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .title-text { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .math-text { font-family: 'Times New Roman', Times, serif; font-size: 17px; font-style: italic; fill: #000; }
      .pill-text-white { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #fff; font-weight: 500; }
      .pill-text-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #1c2833; font-weight: 500; }
    </style>
  </defs>

  <!-- White background for the entire canvas -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- ==================== LEFT COLUMN: LEGEND & INPUT ==================== -->
  
  <!-- Legend Box -->
  <rect x="15" y="70" width="120" height="140" rx="5" stroke="#999" stroke-dasharray="4,4" fill="none" stroke-width="1.5"/>
  
  <!-- Legend Items -->
  <rect x="25" y="80" width="20" height="20" rx="3" fill="#7ba4e0"/>
  <text x="55" y="95" class="label-text">hard label</text>
  
  <rect x="25" y="110" width="20" height="20" rx="3" fill="#9e9e9e"/>
  <text x="55" y="125" class="label-text">mask label</text>
  
  <rect x="25" y="140" width="20" height="20" rx="3" fill="#fcd04b"/>
  <text x="55" y="155" class="label-text">target</text>
  
  <rect x="25" y="170" width="20" height="20" rx="3" fill="#9ad991"/>
  <text x="55" y="185" class="label-text">non-target</text>

  <!-- Input Cat Image Box -->
  <g id="input-image">
    <rect x="15" y="245" width="105" height="105" rx="8" fill="#2c3e50"/>
    <!-- Stylized Vector Cat -->
    <ellipse cx="67" cy="320" rx="30" ry="25" fill="#ecf0f1"/>
    <circle cx="67" cy="290" r="22" fill="#ecf0f1"/>
    <!-- Ears -->
    <polygon points="48,275 40,250 58,270" fill="#bdc3c7"/>
    <polygon points="86,275 94,250 76,270" fill="#bdc3c7"/>
    <polygon points="49,272 44,255 55,269" fill="#f192a4"/>
    <polygon points="85,272 90,255 79,269" fill="#f192a4"/>
    <!-- Eyes -->
    <circle cx="59" cy="288" r="4" fill="#27ae60"/>
    <circle cx="59" cy="288" r="2" fill="black"/>
    <circle cx="75" cy="288" r="4" fill="#27ae60"/>
    <circle cx="75" cy="288" r="2" fill="black"/>
    <!-- Nose & Mouth -->
    <polygon points="65,294 69,294 67,297" fill="#f192a4"/>
    <path d="M 64 299 Q 67 302 67 299 Q 67 302 70 299" stroke="#7f8c8d" stroke-width="1" fill="none"/>
    <!-- Whiskers -->
    <line x1="50" y1="295" x2="35" y2="293" stroke="#bdc3c7" stroke-width="1.5"/>
    <line x1="50" y1="298" x2="33" y2="300" stroke="#bdc3c7" stroke-width="1.5"/>
    <line x1="84" y1="295" x2="99" y2="293" stroke="#bdc3c7" stroke-width="1.5"/>
    <line x1="84" y1="298" x2="101" y2="300" stroke="#bdc3c7" stroke-width="1.5"/>
    
    <text x="67" y="370" class="title-text" text-anchor="middle">cat</text>
  </g>

  <!-- Arrows from Cat to Teacher/Student -->
  <path d="M 120 297 L 140 297 L 140 225 L 150 225" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 297 L 140 297 L 140 375 L 150 375" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>


  <!-- ==================== SECOND COLUMN: MODELS ==================== -->

  <!-- Ground Truth -->
  <rect x="155" y="50" width="160" height="55" rx="10" stroke="#999" fill="none" stroke-width="1.5"/>
  <text x="235" y="83" class="title-text" text-anchor="middle">Ground Truth</text>

  <!-- Teacher Model -->
  <g id="teacher-model">
    <rect x="155" y="175" width="160" height="95" rx="15" stroke="#999" fill="none" stroke-width="1.5"/>
    <!-- 3D CNN Layers (Blue) -->
    <!-- Layer 1 -->
    <polygon points="170,205 178,205 186,197 178,197" fill="#7ba4e0"/>
    <polygon points="178,205 178,250 186,242 186,197" fill="#41719c"/>
    <rect x="170" y="205" width="8" height="45" fill="#5b9bd5"/>
    <!-- Layer 2 -->
    <polygon points="185,202 193,202 201,194 193,194" fill="#7ba4e0"/>
    <polygon points="193,202 193,243 201,235 201,194" fill="#41719c"/>
    <rect x="185" y="202" width="8" height="41" fill="#5b9bd5"/>
    <!-- Layer 3 -->
    <polygon points="200,199 208,199 216,191 208,191" fill="#7ba4e0"/>
    <polygon points="208,199 208,236 216,228 216,191" fill="#41719c"/>
    <rect x="200" y="199" width="8" height="37" fill="#5b9bd5"/>
    <!-- Layer 4 -->
    <polygon points="215,196 223,196 231,188 223,188" fill="#7ba4e0"/>
    <polygon points="223,196 223,229 231,221 231,188" fill="#41719c"/>
    <rect x="215" y="196" width="8" height="33" fill="#5b9bd5"/>
    <!-- Layer 5 -->
    <polygon points="230,193 238,193 246,185 238,185" fill="#7ba4e0"/>
    <polygon points="238,193 238,222 246,214 246,185" fill="#41719c"/>
    <rect x="230" y="193" width="8" height="29" fill="#5b9bd5"/>
    <!-- Layer 6 -->
    <polygon points="245,190 253,190 261,182 253,182" fill="#7ba4e0"/>
    <polygon points="253,190 253,215 261,207 261,182" fill="#41719c"/>
    <rect x="245" y="190" width="8" height="25" fill="#5b9bd5"/>
    <!-- Layer 7 -->
    <polygon points="260,187 268,187 276,179 268,179" fill="#7ba4e0"/>
    <polygon points="268,187 268,208 276,200 276,179" fill="#41719c"/>
    <rect x="260" y="187" width="8" height="21" fill="#5b9bd5"/>

    <text x="245" y="255" class="title-text" text-anchor="middle">Teacher</text>
  </g>

  <!-- Student Model -->
  <g id="student-model">
    <rect x="155" y="325" width="160" height="95" rx="15" stroke="#999" fill="none" stroke-width="1.5"/>
    <!-- 3D CNN Layers (Orange) -->
    <!-- Layer 1 -->
    <polygon points="170,355 178,355 186,347 178,347" fill="#f19e65"/>
    <polygon points="178,355 178,400 186,392 186,347" fill="#c65911"/>
    <rect x="170" y="355" width="8" height="45" fill="#ed7d31"/>
    <!-- Layer 2 -->
    <polygon points="185,352 193,352 201,344 193,344" fill="#f19e65"/>
    <polygon points="193,352 193,393 201,385 201,344" fill="#c65911"/>
    <rect x="185" y="352" width="8" height="41" fill="#ed7d31"/>
    <!-- Layer 3 -->
    <polygon points="200,349 208,349 216,341 208,341" fill="#f19e65"/>
    <polygon points="208,349 208,386 216,378 216,341" fill="#c65911"/>
    <rect x="200" y="349" width="8" height="37" fill="#ed7d31"/>
    <!-- Layer 4 -->
    <polygon points="215,346 223,346 231,338 223,338" fill="#f19e65"/>
    <polygon points="223,346 223,379 231,371 231,338" fill="#c65911"/>
    <rect x="215" y="346" width="8" height="33" fill="#ed7d31"/>
    <!-- Layer 5 -->
    <polygon points="230,343 238,343 246,335 238,335" fill="#f19e65"/>
    <polygon points="238,343 238,372 246,364 246,335" fill="#c65911"/>
    <rect x="230" y="343" width="8" height="29" fill="#ed7d31"/>

    <text x="245" y="405" class="title-text" text-anchor="middle">Student</text>
  </g>


  <!-- ==================== THIRD COLUMN: LABELS (DASHED BOX) ==================== -->

  <rect x="330" y="15" width="60" height="420" rx="5" stroke="#999" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>

  <!-- Top Bar (Ground Truth Labels) -->
  <g>
    <rect x="340" y="30" width="15" height="20" rx="2" fill="#7ba4e0"/>
    <rect x="340" y="52" width="15" height="20" rx="2" fill="#9e9e9e"/>
    <rect x="340" y="74" width="15" height="20" rx="2" fill="#9e9e9e"/>
    <rect x="340" y="96" width="15" height="20" rx="2" fill="#9e9e9e"/>
    <rect x="340" y="118" width="15" height="20" rx="2" fill="#9e9e9e"/>
    <text x="368" y="45" class="math-text">1</text>
  </g>

  <!-- Middle Bar (Teacher Probabilities) -->
  <g>
    <rect x="340" y="165" width="15" height="20" rx="2" fill="#fcd04b"/>
    <rect x="340" y="187" width="15" height="20" rx="2" fill="#9ad991"/>
    <rect x="340" y="209" width="15" height="20" rx="2" fill="#9ad991"/>
    <rect x="340" y="231" width="15" height="20" rx="2" fill="#9ad991"/>
    <rect x="340" y="253" width="15" height="20" rx="2" fill="#9ad991"/>
    <text x="362" y="180" class="math-text">p<tspan font-size="11" dy="4">t</tspan><tspan font-size="11" dx="1" dy="-8">T</tspan></text>
  </g>

  <!-- Bottom Bar (Student Probabilities) -->
  <g>
    <rect x="340" y="310" width="15" height="20" rx="2" fill="#fcd04b"/>
    <rect x="340" y="332" width="15" height="20" rx="2" fill="#9ad991"/>
    <rect x="340" y="354" width="15" height="20" rx="2" fill="#9ad991"/>
    <rect x="340" y="376" width="15" height="20" rx="2" fill="#9ad991"/>
    <rect x="340" y="398" width="15" height="20" rx="2" fill="#9ad991"/>
    <text x="362" y="325" class="math-text">p<tspan font-size="11" dy="4">t</tspan><tspan font-size="11" dx="1" dy="-8">S</tspan></text>
  </g>

  <!-- Arrows to Labels -->
  <path d="M 315 77 L 330 77" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 315 222 L 330 222" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 315 372 L 330 372" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>


  <!-- ==================== FOURTH COLUMN: DECOUPLED INPUTS ==================== -->

  <!-- Top Decoupled (TASK inputs) -->
  <g>
    <rect x="405" y="25" width="65" height="100" rx="5" stroke="#999" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <rect x="415" y="45" width="18" height="18" rx="2" fill="#7ba4e0"/>
    <rect x="442" y="45" width="18" height="18" rx="2" fill="#fcd04b"/>
    <text x="424" y="85" class="math-text" text-anchor="middle">1</text>
    <text x="451" y="85" class="math-text" text-anchor="middle">p<tspan font-size="11" dy="4">t</tspan><tspan font-size="11" dx="1" dy="-8">S</tspan></text>
    <path d="M 390 77 L 405 77" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Middle Decoupled (TCKD inputs) -->
  <g>
    <rect x="405" y="170" width="65" height="100" rx="5" stroke="#999" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <rect x="415" y="190" width="18" height="18" rx="2" fill="#fcd04b"/>
    <rect x="442" y="190" width="18" height="18" rx="2" fill="#fcd04b"/>
    <text x="424" y="235" class="math-text" text-anchor="middle">p<tspan font-size="11" dy="4">t</tspan><tspan font-size="11" dx="1" dy="-8">T</tspan></text>
    <text x="451" y="235" class="math-text" text-anchor="middle">p<tspan font-size="11" dy="4">t</tspan><tspan font-size="11" dx="1" dy="-8">S</tspan></text>
    <path d="M 390 222 L 405 222" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Bottom Decoupled (NCKD inputs / Decoupling) -->
  <g>
    <text x="437" y="305" class="bold-text" text-anchor="middle">Decoupling</text>
    <rect x="405" y="315" width="65" height="110" rx="5" stroke="#999" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    
    <!-- Bar 1 -->
    <rect x="415" y="325" width="15" height="50" rx="2" fill="#9ad991"/>
    <rect x="415" y="377" width="15" height="40" rx="2" fill="#9e9e9e"/>
    
    <!-- Bar 2 -->
    <rect x="442" y="325" width="15" height="50" rx="2" fill="#9ad991"/>
    <rect x="442" y="377" width="15" height="40" rx="2" fill="#9e9e9e"/>
    
    <path d="M 390 372 L 405 372" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Dynamic Top-k Mask Pill -->
  <g>
    <rect x="350" y="445" width="170" height="30" rx="15" fill="#e8daef" stroke="#d7bde2" stroke-width="1"/>
    <text x="435" y="465" class="bold-text" fill="#6c3483" text-anchor="middle" font-size="13">Dynamic Top-k Mask</text>
    <!-- Double-headed vertical arrow -->
    <path d="M 437.5 428 L 437.5 442 M 434.5 433 L 437.5 428 L 440.5 433 M 434.5 437 L 437.5 442 L 440.5 437" stroke="#c39bd3" stroke-width="1.5" fill="none"/>
  </g>


  <!-- ==================== FIFTH COLUMN: LOSSES ==================== -->

  <!-- TASK -->
  <g>
    <rect x="485" y="25" width="140" height="100" rx="5" stroke="#7ba4e0" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <text x="555" y="45" class="bold-text" text-anchor="middle">TASK</text>
    <rect x="495" y="55" width="120" height="55" rx="15" stroke="#7ba4e0" stroke-width="1.5" fill="none"/>
    <text x="555" y="77" class="label-text" text-anchor="middle">Task</text>
    <text x="555" y="97" class="label-text" text-anchor="middle">CE Loss</text>
    <path d="M 470 75 L 485 75" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- TCKD -->
  <g>
    <rect x="485" y="170" width="140" height="100" rx="5" stroke="#fcd04b" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <text x="555" y="190" class="bold-text" text-anchor="middle">TCKD</text>
    <rect x="495" y="205" width="120" height="55" rx="15" stroke="#fcd04b" stroke-width="1.5" fill="none"/>
    <text x="555" y="227" class="label-text" text-anchor="middle">Target Class</text>
    <text x="555" y="247" class="label-text" text-anchor="middle">KL Loss</text>
    <path d="M 470 220 L 485 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- NCKD -->
  <g>
    <rect x="485" y="315" width="140" height="100" rx="5" stroke="#9ad991" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <text x="555" y="335" class="bold-text" text-anchor="middle">NCKD</text>
    <rect x="495" y="350" width="120" height="55" rx="15" stroke="#9ad991" stroke-width="1.5" fill="none"/>
    <text x="555" y="372" class="label-text" text-anchor="middle">Non-target</text>
    <text x="555" y="392" class="label-text" text-anchor="middle">Class KL Loss</text>
    <path d="M 470 370 L 485 370" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>


  <!-- ==================== SIXTH COLUMN: GRADIENTS ==================== -->

  <!-- TOG -->
  <g>
    <rect x="645" y="25" width="140" height="100" rx="5" stroke="#7ba4e0" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <text x="715" y="45" class="bold-text" text-anchor="middle">TOG</text>
    <rect x="655" y="55" width="120" height="55" rx="15" fill="#7ba4e0"/>
    <text x="715" y="77" class="pill-text-white" text-anchor="middle">Task-oriented</text>
    <text x="715" y="97" class="pill-text-white" text-anchor="middle">Gradient</text>
    <path d="M 625 75 L 645 75" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- TCG -->
  <g>
    <rect x="645" y="170" width="140" height="100" rx="5" stroke="#fcd04b" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <text x="715" y="190" class="bold-text" text-anchor="middle">TCG</text>
    <rect x="655" y="205" width="120" height="55" rx="15" fill="#fcd04b"/>
    <text x="715" y="227" class="pill-text-dark" text-anchor="middle">Target class</text>
    <text x="715" y="247" class="pill-text-dark" text-anchor="middle">Gradient</text>
    <path d="M 625 220 L 645 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- NCG -->
  <g>
    <rect x="645" y="315" width="140" height="100" rx="5" stroke="#9ad991" stroke-dasharray="5,5" fill="none" stroke-width="1.5"/>
    <text x="715" y="335" class="bold-text" text-anchor="middle">NCG</text>
    <rect x="655" y="350" width="120" height="55" rx="15" fill="#9ad991"/>
    <text x="715" y="372" class="pill-text-dark" text-anchor="middle">Non-target</text>
    <text x="715" y="392" class="pill-text-dark" text-anchor="middle">class Gradient</text>
    <path d="M 625 370 L 645 370" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>


  <!-- ==================== SEVENTH COLUMN: EQUATIONS & BUFFERS ==================== -->

  <!-- Top Buffer -->
  <g>
    <text x="795" y="35" class="math-text">v ← g + (μ + Δ)v</text>
    <path d="M 815 53 L 815 83 M 811 59 L 815 53 L 819 59 M 811 77 L 815 83 L 819 77" stroke="#7ba4e0" stroke-width="2" fill="none"/>
    <rect x="845" y="45" width="140" height="55" rx="15" fill="#7ba4e0"/>
    <text x="915" y="67" class="pill-text-white" text-anchor="middle">Task</text>
    <text x="915" y="87" class="pill-text-white" text-anchor="middle">Momentum buffer</text>
    <path d="M 785 75 L 845 75" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Middle Buffer -->
  <g>
    <text x="795" y="180" class="math-text">v ← g + (μ - Δ)v</text>
    <path d="M 815 198 L 815 228 M 811 204 L 815 198 L 819 204 M 811 222 L 815 228 L 819 222" stroke="#fcd04b" stroke-width="2" fill="none"/>
    <rect x="845" y="190" width="140" height="55" rx="15" fill="#fcd04b"/>
    <text x="915" y="212" class="pill-text-dark" text-anchor="middle">Target</text>
    <text x="915" y="232" class="pill-text-dark" text-anchor="middle">Momentum buffer</text>
    <path d="M 785 220 L 845 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- Bottom Buffer -->
  <g>
    <text x="795" y="330" class="math-text">v ← g + (μ + Δ)v</text>
    <path d="M 815 348 L 815 378 M 811 354 L 815 348 L 819 354 M 811 372 L 815 378 L 819 372" stroke="#9ad991" stroke-width="2" fill="none"/>
    <rect x="845" y="340" width="140" height="55" rx="15" fill="#9ad991"/>
    <text x="915" y="362" class="pill-text-dark" text-anchor="middle">Non-target</text>
    <text x="915" y="382" class="pill-text-dark" text-anchor="middle">Momentum buffer</text>
    <path d="M 785 370 L 845 370" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>


  <!-- ==================== RIGHT COLUMN: AGGREGATION & UPDATE ==================== -->

  <!-- Summation Circle -->
  <g>
    <circle cx="1015" cy="220" r="12" stroke="black" stroke-width="1.5" fill="none"/>
    <line x1="1009" y1="220" x2="1021" y2="220" stroke="black" stroke-width="1.5"/>
    <line x1="1015" y1="214" x2="1015" y2="226" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Arrows to Summation Circle -->
  <path d="M 985 75 L 1015 75 L 1015 205" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 985 220 L 1000 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 985 370 L 1015 370 L 1015 235" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Update Block -->
  <g>
    <path d="M 1027 220 L 1050 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="1060" y="210" class="math-text">θ ← θ - γv</text>
    <text x="1060" y="235" class="title-text">Update</text>
  </g>

  <!-- Feedback Loop to Dynamic Top-k Mask -->
  <path d="M 1130 220 L 1190 220 L 1190 495 L 435 495 L 435 477" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

</svg>
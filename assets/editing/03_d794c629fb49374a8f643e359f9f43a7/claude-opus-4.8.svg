  <rect x="912" y="328" width="418" height="160" rx="12" fill="#eafaf0" stroke="#3aa970" stroke-width="2"/>
  <text x="1121" y="358" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="21" fill="#16443a">Physical Motion Prediction</text>
  <!-- 4 ramps with ball -->
  <g>
    <!-- frame t0 -->
    <polygon points="930,430 985,430 930,398" fill="#cfd6dd" stroke="#888"/>
    <circle cx="940" cy="404" r="7" fill="#b9c2cc" stroke="#777"/>
    <text x="957" y="450" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">t=0</text>
    <!-- frame t1 -->
    <polygon points="1020,430 1075,430 1020,398" fill="#cfd6dd" stroke="#888"/>
    <circle cx="1035" cy="412" r="7" fill="#b9c2cc" stroke="#777"/>
    <text x="1047" y="450" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">t=1</text>
    <!-- frame t2 -->
    <polygon points="1110,430 1165,430 1110,398" fill="#cfd6dd" stroke="#888"/>
    <circle cx="1130" cy="422" r="7" fill="#b9c2cc" stroke="#777"/>
    <text x="1137" y="450" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">t=2</text>
    <!-- frame t3 -->
    <polygon points="1200,430 1255,430 1200,398" fill="#cfd6dd" stroke="#888"/>
    <circle cx="1242" cy="424" r="7" fill="#b9c2cc" stroke="#777"/>
    <text x="1227" y="450" text-anchor="middle" font-family="Arial" font-size="15" fill="#333">t=3</text>
    <!-- arrows -->
    <g stroke="#444" stroke-width="2" fill="#444">
      <line x1="990" y1="418" x2="1012" y2="418"/><polygon points="1012,418 1004,414 1004,422"/>
      <line x1="1080" y1="418" x2="1102" y2="418"/><polygon points="1102,418 1094,414 1094,422"/>
      <line x1="1170" y1="418" x2="1192" y2="418"/><polygon points="1192,418 1184,414 1184,422"/>
    </g>
    <text x="1290" y="424" font-family="Arial" font-weight="bold" font-size="24" fill="#333">...</text>
  </g>
  <text x="1121" y="475" text-anchor="middle" font-family="Arial" font-size="18" fill="#16443a">4D Sequence (Time-Varying 3D)</text>

  <!-- connector arrow from row1 to VLM (down) -->
  <path d="M749 280 V305 H700 V330" fill="none" stroke="#2b3d63" stroke-width="3"/>
  <polygon points="700,330 694,320 706,320" fill="#2b3d63"/>
  <path d="M1152 280 V305 H700" fill="none" stroke="#2b3d63" stroke-width="3"/>

  <!-- ===================== ROW 3 (purple) ===================== -->
  <rect x="70" y="510" width="1270" height="190" rx="14" fill="#f1e9fa"/>

  <!-- step3 left card -->
  <rect x="80" y="512" width="248" height="180" rx="14" fill="#e6d8f5"/>
  <rect x="138" y="558" width="120" height="30" rx="8" fill="#8e44d6"/>
  <text x="198" y="579" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="17" fill="#fff">STEP 3</text>
  <text x="204" y="618" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="22" fill="#3c1a63">VIDEO DIFFUSION</text>
  <text x="204" y="648" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="22" fill="#3c1a63">&amp; SYNTHESIS</text>

  <!-- arrow into video diffusion -->
  <line x1="350" y1="600" x2="550" y2="600" stroke="#7a3fb0" stroke-width="3"/>
  <polygon points="550,600 540,594 540,606" fill="#7a3fb0"/>

  <!-- video diffusion box -->
  <rect x="552" y="525" width="285" height="138" rx="12" fill="#FFEB3B" stroke="#9b59d0" stroke-width="2"/>
  <!-- cloud icon -->
  <g fill="none" stroke="#7a3fb0" stroke-width="2.5">
    <path d="M585 585 a18 18 0 0 1 5 -35 a22 22 0 0 1 42 4 a15 15 0 0 1 -3 30 z"/>
    <line x1="595" y1="595" x2="592" y2="608"/>
    <line x1="608" y1="595" x2="605" y2="612"/>
    <line x1="621" y1="595" x2="618" y2="608"/>
  </g>
  <g fill="#7a3fb0">
    <circle cx="590" cy="615" r="2.5"/><circle cx="605" cy="620" r="2.5"/>
    <circle cx="620" cy="615" r="2.5"/><circle cx="612" cy="630" r="2.5"/>
    <circle cx="598" cy="630" r="2.5"/>
  </g>
  <text x="713" y="582" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="26" fill="#3c1a63">Video</text>
  <text x="713" y="610" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="26" fill="#3c1a63">Diffusion</text>
  <text x="680" y="685" text-anchor="middle" font-family="Arial" font-size="18" fill="#3c1a63">Conditioned on 4D Data</text>

  <!-- arrow video diffusion -> generated -->
  <line x1="839" y1="600" x2="908" y2="600" stroke="#7a3fb0" stroke-width="3"/>
  <polygon points="908,600 898,594 898,606" fill="#7a3fb0"/>

  <!-- connector arrow row2 -> video diffusion -->
  <path d="M700 468 V490 H620 V525" fill="none" stroke="#2b3d63" stroke-width="3"/>
  <polygon points="620,525 614,515 626,515" fill="#2b3d63"/>

  <!-- generated video box -->
  <rect x="910" y="520" width="420" height="170" rx="12" fill="#fdf3e6" stroke="#e88a2e" stroke-width="3"/>
  <!-- three video frames -->
  <g>
    <rect x="922" y="528" width="128" height="120" fill="#6f7d52"/>
    <rect x="1056" y="528" width="128" height="120" fill="#6f7d52"/>
    <rect x="1190" y="528" width="128" height="120" fill="#6f7d52"/>
    <!-- rocky texture suggestion -->
    <rect x="922" y="600" width="128" height="48" fill="#857a66"/>
    <rect x="1056" y="600" width="128" height="48" fill="#857a66"/>
    <rect x="1190" y="600" width="128" height="48" fill="#857a66"/>
    <!-- red balls -->
    <circle cx="970" cy="590" r="16" fill="#c0392b"/>
    <circle cx="1110" cy="588" r="16" fill="#c0392b"/>
    <circle cx="1255" cy="592" r="16" fill="#c0392b"/>
  </g>
  <text x="1120" y="680" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="22" fill="#3c1a63">GENERATED HIGH-QUALITY VIDEO</text>

  <!-- bottom italic caption -->
  <text x="704" y="745" text-anchor="middle" font-family="Arial" font-style="italic" font-size="22" fill="#333">Leveraging physical prediction and diffusion for realistic video creation.</text>
</svg>
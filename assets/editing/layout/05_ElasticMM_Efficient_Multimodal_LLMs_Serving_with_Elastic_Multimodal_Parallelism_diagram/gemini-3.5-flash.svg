<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="100%" height="100%">
  <defs>
    <!-- Arrow marker for standard flow arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4a4a4a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" fill="#f8f9fa" />

  <!-- Outer border/shadow effect -->
  <rect x="5" y="5" width="1190" height="550" fill="none" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- ================= COLUMN 1: MODALITY-LEVEL ================= -->
  <!-- Text-Only Request -->
  <g transform="translate(45, 25)">
    <rect width="160" height="45" rx="8" fill="#ffffff" stroke="#0b2545" stroke-width="1.5" />
    <!-- Document Icon -->
    <g transform="translate(10, 10) scale(0.9)">
      <path d="M0 2 L14 2 L20 8 L20 22 L0 22 Z" fill="#ffffff" stroke="#0b2545" stroke-width="1.5" stroke-linejoin="round" />
      <path d="M14 2 L14 8 L20 8" fill="none" stroke="#0b2545" stroke-width="1.5" stroke-linejoin="round" />
      <line x1="4" y1="12" x2="16" y2="12" stroke="#0b2545" stroke-width="1.5" />
      <line x1="4" y1="16" x2="16" y2="16" stroke="#0b2545" stroke-width="1.5" />
      <line x1="4" y1="19" x2="12" y2="19" stroke="#0b2545" stroke-width="1.5" />
    </g>
    <text x="100" y="23" font-family="Georgia, serif" font-size="14" fill="#000000" text-anchor="middle" dominant-baseline="central">Text-Only Request</text>
  </g>

  <!-- Image-Text Request -->
  <g transform="translate(215, 25)">
    <rect width="160" height="45" rx="8" fill="#ffffff" stroke="#0b2545" stroke-width="1.5" />
    <!-- Image Icon -->
    <g transform="translate(10, 10) scale(0.9)">
      <rect width="22" height="22" rx="2" fill="#ffffff" stroke="#0b2545" stroke-width="1.5" />
      <circle cx="6" cy="7" r="2" fill="#ffca28" stroke="#0b2545" stroke-width="1" />
      <path d="M 2 19 L 8 11 L 13 16 L 17 10 L 20 15 L 20 20 Z" fill="#81c784" stroke="#0b2545" stroke-width="1" stroke-linejoin="round" />
    </g>
    <text x="100" y="23" font-family="Georgia, serif" font-size="14" fill="#000000" text-anchor="middle" dominant-baseline="central">Image-Text Request</text>
  </g>

  <!-- Modality-Level Container -->
  <!-- Blue Half (Text-Only Group) -->
  <rect x="40" y="155" width="350" height="125" fill="#e6f2ff" />
  <!-- Pink Half (Multimodal Group) -->
  <rect x="40" y="280" width="350" height="240" fill="#fde8e8" />
  <!-- Outer Border -->
  <rect x="40" y="100" width="350" height="420" fill="none" stroke="#0b2545" stroke-width="1.5" />
  <!-- Dashed Divider -->
  <line x1="40" y1="280" x2="390" y2="280" stroke="#0b2545" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Modality-Level Header Text -->
  <text x="215" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">Modality-Level</text>
  <text x="215" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3b71ca" text-anchor="middle">(Modality-Aware Load Balancing §3.1)</text>

  <!-- Vertical Double-headed Arrow (Auto-Scaling) -->
  <path d="M 365 265 L 360 273 L 363 273 L 363 287 L 360 287 L 365 295 L 370 287 L 367 287 L 367 273 L 370 273 Z" fill="#555555" />

  <!-- Blue Group Boxes -->
  <!-- Prefill Stage -->
  <rect x="55" y="200" width="140" height="50" rx="10" fill="#cfe2fe" stroke="#0b2545" stroke-width="1.5" />
  <text x="125" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">Prefill Stage</text>

  <!-- Decode Stage -->
  <rect x="235" y="200" width="140" height="50" rx="10" fill="#cfe2fe" stroke="#0b2545" stroke-width="1.5" />
  <text x="305" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">Decode Stage</text>

  <!-- Pink Group Boxes -->
  <!-- Encode Stage -->
  <rect x="145" y="300" width="140" height="50" rx="10" fill="#f8d7da" stroke="#0b2545" stroke-width="1.5" />
  <text x="215" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">Encode Stage</text>

  <!-- Prefill Stage -->
  <rect x="55" y="420" width="140" height="50" rx="10" fill="#f8d7da" stroke="#0b2545" stroke-width="1.5" />
  <text x="125" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">Prefill Stage</text>

  <!-- Decode Stage -->
  <rect x="235" y="420" width="140" height="50" rx="10" fill="#f8d7da" stroke="#0b2545" stroke-width="1.5" />
  <text x="305" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">Decode Stage</text>


  <!-- ================= COLUMN 2: STAGE-LEVEL ================= -->
  <!-- Stage-Level Container -->
  <rect x="425" y="100" width="350" height="420" fill="#fffdf3" stroke="#0b2545" stroke-width="1.5" />
  
  <!-- Stage-Level Header Text -->
  <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">Stage-Level</text>
  <text x="600" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3b71ca" text-anchor="middle">(Elastic Partition Scheduling §3.2)</text>

  <!-- Stage-Level Boxes -->
  <!-- Request Scheduling -->
  <rect x="480" y="180" width="240" height="70" rx="10" fill="#ffeeba" stroke="#0b2545" stroke-width="1.5" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">
    <tspan x="600" y="210">Request</tspan>
    <tspan x="600" y="232">Scheduling</tspan>
  </text>

  <!-- Stage Allocation -->
  <rect x="480" y="290" width="240" height="70" rx="10" fill="#ffeeba" stroke="#0b2545" stroke-width="1.5" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">
    <tspan x="600" y="320">Stage</tspan>
    <tspan x="600" y="342">Allocation</tspan>
  </text>

  <!-- Elastic Auto-Scaling -->
  <rect x="480" y="400" width="240" height="70" rx="10" fill="#ffeeba" stroke="#0b2545" stroke-width="1.5" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">
    <tspan x="600" y="430">Elastic</tspan>
    <tspan x="600" y="452">Auto-Scaling</tspan>
  </text>


  <!-- ================= COLUMN 3: PREFIX CACHE &amp; LEGEND ================= -->
  <!-- Unified Multimodal Prefix Cache Container -->
  <rect x="810" y="100" width="350" height="220" fill="#d4edda" stroke="#0b2545" stroke-width="1.5" />
  
  <!-- Prefix Cache Header Text -->
  <text x="985" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">Unified Multimodal</text>
  <text x="985" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">Prefix Cache</text>
  <text x="985" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#3b71ca" text-anchor="middle">(§3.3)</text>

  <!-- Visual Cache Blocks -->
  <rect x="830" y="205" width="310" height="95" rx="8" fill="#ffffff" stroke="#0b2545" stroke-width="1" />
  <!-- Text Block -->
  <rect x="845" y="225" width="80" height="55" rx="5" fill="#cfe2fe" stroke="#0b2545" stroke-width="1" />
  <text x="885" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Text</text>
  <!-- Image Block -->
  <rect x="940" y="225" width="80" height="55" rx="5" fill="#f8d7da" stroke="#0b2545" stroke-width="1" />
  <text x="980" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Image</text>
  <!-- Shared Block -->
  <rect x="1035" y="225" width="85" height="55" rx="5" fill="#d4edda" stroke="#0b2545" stroke-width="1" />
  <text x="1077" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Shared</text>

  <!-- Legend Box -->
  <rect x="810" y="340" width="350" height="180" fill="#ffffff" stroke="#0b2545" stroke-width="1.5" />
  <text x="985" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">Legend</text>
  
  <!-- Legend Items -->
  <!-- Text-Only Group -->
  <rect x="840" y="385" width="45" height="20" fill="#cfe2fe" stroke="#0b2545" stroke-width="1" />
  <text x="900" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000000">Text-Only Group</text>

  <!-- Multimodal Group -->
  <rect x="840" y="420" width="45" height="20" fill="#f8d7da" stroke="#0b2545" stroke-width="1" />
  <text x="900" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000000">Multimodal Group</text>

  <!-- Auto-Scaling -->
  <path d="M 840 465 L 848 460 L 848 463 L 872 463 L 872 460 L 880 465 L 872 470 L 872 467 L 848 467 L 848 470 Z" fill="#555555" />
  <text x="900" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000000">Auto-Scaling</text>


  <!-- ================= FLOW ARROWS ================= -->
  <!-- Arrow from Text-Only Request to Modality-Level -->
  <line x1="125" y1="70" x2="125" y2="94" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Image-Text Request to Modality-Level -->
  <line x1="295" y1="70" x2="295" y2="94" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Prefill to Decode (Blue) -->
  <line x1="195" y1="225" x2="229" y2="225" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Encode to Prefill (Pink) -->
  <line x1="185" y1="350" x2="145" y2="412" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Prefill to Decode (Pink) -->
  <line x1="195" y1="445" x2="229" y2="445" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Modality-Level to Stage-Level -->
  <line x1="390" y1="310" x2="419" y2="310" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Request Scheduling to Stage Allocation -->
  <line x1="600" y1="250" x2="600" y2="284" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Stage Allocation to Elastic Auto-Scaling -->
  <line x1="600" y1="360" x2="600" y2="394" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow from Stage-Level to Prefix Cache -->
  <line x1="775" y1="210" x2="804" y2="210" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)" />

</svg>
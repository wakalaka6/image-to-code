<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="970" viewBox="0 0 1900 970">
  <rect width="1900" height="970" fill="white"/>

  <!-- Panel borders -->
  <rect x="15" y="15" width="730" height="940" rx="20" fill="none" stroke="#bbbbbb" stroke-width="2" stroke-dasharray="8,6"/>
  <rect x="765" y="15" width="1120" height="940" rx="20" fill="none" stroke="#bbbbbb" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Titles -->
  <text x="380" y="70" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle" fill="#000">Offline Graph Construction</text>
  <text x="1325" y="70" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle" fill="#000">Retrieval-Reasoning Augmented Generation</text>

  <!-- ============ LEFT PANEL (flipped) ============ -->

  <!-- BOTTOM part moved to TOP: Graph + Legend -->
  <g transform="translate(0,-555)">
    <!-- Graph edges -->
    <g stroke="#cccccc" stroke-width="2">
      <line x1="120" y1="710" x2="230" y2="680"/>
      <line x1="230" y1="680" x2="160" y2="760"/>
      <line x1="160" y1="760" x2="135" y2="810"/>
      <line x1="335" y1="700" x2="390" y2="780"/>
      <line x1="390" y1="780" x2="560" y2="680"/>
      <line x1="560" y1="680" x2="615" y2="800"/>
    </g>
    <g stroke="#cccccc" stroke-width="2" stroke-dasharray="6,5">
      <line x1="120" y1="710" x2="135" y2="810"/>
      <line x1="230" y1="680" x2="335" y2="700"/>
      <line x1="335" y1="700" x2="455" y2="730"/>
      <line x1="455" y1="730" x2="490" y2="800"/>
      <line x1="490" y1="800" x2="560" y2="680"/>
      <line x1="455" y1="730" x2="540" y2="760"/>
      <line x1="540" y1="760" x2="640" y2="720"/>
    </g>

    <!-- Graph nodes -->
    <!-- green squares -->
    <rect x="100" y="690" width="40" height="40" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <rect x="210" y="660" width="40" height="40" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <rect x="315" y="680" width="40" height="40" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <rect x="540" y="660" width="40" height="40" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <rect x="370" y="760" width="40" height="40" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <rect x="595" y="780" width="40" height="40" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <!-- blue squares -->
    <rect x="620" y="700" width="40" height="40" rx="6" fill="#cfe0f5" stroke="#7fa8d8"/>
    <rect x="435" y="710" width="40" height="40" rx="6" fill="#cfe0f5" stroke="#7fa8d8"/>
    <rect x="265" y="785" width="40" height="40" rx="6" fill="#cfe0f5" stroke="#7fa8d8"/>
    <!-- blue triangles -->
    <polygon points="180,740 205,785 155,785" fill="#cfe0f5" stroke="#7fa8d8"/>
    <polygon points="540,740 565,785 515,785" fill="#cfe0f5" stroke="#7fa8d8"/>
    <polygon points="135,790 160,835 110,835" fill="#cfe0f5" stroke="#7fa8d8"/>
    <!-- pink triangle -->
    <polygon points="490,765 517,810 463,810" fill="#f3c8e8" stroke="#d080c0"/>

    <!-- Legend -->
    <text x="90" y="920" font-family="Arial" font-size="24">Video Clip</text>
    <rect x="225" y="895" width="35" height="35" rx="6" fill="#b8e0b0" stroke="#5fa84f"/>
    <text x="320" y="920" font-family="Arial" font-size="24">Entities (</text>
    <polygon points="440,895 465,930 415,930" fill="#f3c8e8" stroke="#d080c0"/>
    <rect x="490" y="895" width="35" height="35" rx="6" fill="#cfe0f5" stroke="#7fa8d8"/>
    <polygon points="575,895 600,930 550,930" fill="#cfe0f5" stroke="#7fa8d8"/>
    <text x="630" y="920" font-family="Arial" font-size="24">)</text>
  </g>

  <!-- TOP part moved to BOTTOM: input pipeline -->
  <g transform="translate(0,305)">
    <!-- Left images -->
    <rect x="75" y="105" width="130" height="105" fill="#7a5a3a"/>
    <rect x="225" y="105" width="130" height="105" fill="#9a6a7a"/>
    <text x="385" y="170" font-family="Arial" font-size="30" text-anchor="middle">...</text>
    <rect x="410" y="105" width="130" height="105" fill="#3a7a4a"/>
    <rect x="555" y="105" width="130" height="105" fill="#101010"/>
    <ellipse cx="615" cy="160" rx="35" ry="32" fill="#b97a2a"/>

    <!-- Subtitles box -->
    <rect x="150" y="232" width="455" height="44" rx="22" fill="#fbdfc8"/>
    <text x="377" y="262" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Subtitles</text>

    <!-- Arrow down -->
    <polygon points="345,295 410,295 410,325 430,325 377,360 325,325 345,325" fill="#dcdcdc"/>

    <!-- LVLM box -->
    <rect x="80" y="370" width="595" height="78" rx="14" fill="#d4e4f7" stroke="#9bb8d8"/>
    <text x="377" y="422" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle">LVLM</text>

    <!-- JSON text -->
    <text x="140" y="490" font-family="monospace" font-size="22">[{"entity": "", "description": ""},</text>
    <text x="377" y="520" font-family="monospace" font-size="22" text-anchor="middle">...</text>
    <text x="140" y="552" font-family="monospace" font-size="22">{"entity": "", "description": ""}]</text>

    <!-- Entity Merging box -->
    <rect x="75" y="580" width="600" height="44" rx="8" fill="#fbdfc8"/>
    <text x="377" y="610" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Entity Merging and Node Connection</text>
  </g>

  <!-- ============ RIGHT PANEL (flipped) ============ -->

  <!-- BOTTOM part moved to TOP: LVLM + answer -->
  <g transform="translate(0,-715)">
    <!-- LVLM box right -->
    <rect x="845" y="815" width="990" height="78" rx="14" fill="#d4e4f7" stroke="#9bb8d8"/>
    <text x="1340" y="867" font-family="Arial" font-size="34" font-weight="bold" text-anchor="middle">LVLM</text>

    <!-- robot + answer -->
    <text x="845" y="935" font-family="Arial" font-size="30">🤖</text>
    <text x="900" y="935" font-family="Arial" font-size="24">Answer: milking cow --&gt; zumba --&gt; clean and jerk --&gt; playing trombone</text>
  </g>

  <!-- rerouted main connector: retrieval block up to LVLM -->
  <polygon points="1325,255 1355,255 1355,225 1370,225 1340,188 1310,225 1325,225" fill="#dcdcdc"/>

  <!-- TOP part moved to BOTTOM: retrieval &amp; reasoning -->
  <g transform="translate(0,135)">
    <text x="850" y="130" font-family="Arial" font-size="26">🤔</text>
    <text x="885" y="130" font-family="Arial" font-size="24">Question: Please identify the option that corresponds to the order of events as they</text>
    <text x="845" y="162" font-family="Arial" font-size="24">occur in the video. [Zumba, clean and jerk, milking cow, playing trombone]</text>

    <!-- arrows down to two sections -->
    <polygon points="1010,178 1045,178 1045,200 1058,200 1027,225 996,200 1010,200" fill="#fbdfc8"/>
    <polygon points="1590,178 1625,178 1625,200 1638,200 1607,225 1576,200 1590,200" fill="#fbdfc8"/>

    <!-- Query Keywords Extraction -->
    <text x="1080" y="255" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle" fill="#1f78b4">Query Keywords Extraction</text>
    <text x="855" y="295" font-family="monospace" font-size="22">["zumba", "clean", "milking</text>
    <text x="855" y="322" font-family="monospace" font-size="22">cow", "playing trombone"]</text>

    <!-- Structured Query Refinement -->
    <text x="1610" y="255" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle" fill="#1f78b4">Strutured Query Refinement</text>
    <text x="1320" y="295" font-family="monospace" font-size="22">Q1: Is 'zumba' shown in the video?</text>
    <text x="1480" y="320" font-family="monospace" font-size="22" text-anchor="middle">...</text>
    <text x="1320" y="345" font-family="monospace" font-size="22">Q4: Is 'trombone' shown in the video?</text>

    <!-- top green boxes 3 4 5 11 13 -->
    <g font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">
      <rect x="955" y="378" width="40" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="975" y="406">3</text>
      <rect x="1000" y="378" width="40" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1020" y="406">4</text>
      <rect x="1045" y="378" width="40" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1065" y="406">5</text>
      <rect x="1090" y="378" width="44" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1112" y="406">11</text>
      <rect x="1139" y="378" width="44" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1161" y="406">13</text>
    </g>

    <!-- arrows connecting to green boxes -->
    <path d="M675,510 L740,510 L740,398 L950,398" fill="none" stroke="#dcdcdc" stroke-width="14"/>
    <path d="M1500,360 L1500,398 L1190,398" fill="none" stroke="#dcdcdc" stroke-width="14"/>
    <polygon points="950,388 950,408 935,398" fill="#dcdcdc"/>
    <polygon points="1190,388 1190,408 1205,398" fill="#dcdcdc"/>

    <text x="855" y="425" font-family="Arial" font-size="22">Graph-based</text>
    <text x="855" y="450" font-family="Arial" font-size="22">Clip Retrieval</text>

    <!-- arrow down from green boxes to table -->
    <polygon points="1050,425 1085,425 1085,447 1098,447 1067,472 1036,447 1050,447" fill="#fbdfc8"/>

    <!-- Table -->
    <g font-family="Arial">
      <!-- header -->
      <rect x="875" y="478" width="80" height="40" fill="#5b9bd5"/>
      <rect x="955" y="478" width="80" height="40" fill="#5b9bd5"/>
      <rect x="1035" y="478" width="80" height="40" fill="#5b9bd5"/>
      <rect x="1115" y="478" width="80" height="40" fill="#5b9bd5"/>
      <rect x="1195" y="478" width="80" height="40" fill="#5b9bd5"/>
      <text x="915" y="506" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">Clip</text>
      <text x="995" y="506" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">Q1</text>
      <text x="1075" y="506" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">Q2</text>
      <text x="1155" y="506" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">Q3</text>
      <text x="1235" y="506" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">Q4</text>
    </g>

    <!-- rows -->
    <g font-family="Arial" font-size="22" text-anchor="middle">
      <!-- alternating row backgrounds -->
      <rect x="875" y="518" width="400" height="38" fill="#eef2f6"/>
      <rect x="875" y="556" width="400" height="38" fill="#f7f9fb"/>
      <rect x="875" y="594" width="400" height="38" fill="#eef2f6"/>
      <rect x="875" y="632" width="400" height="38" fill="#f7f9fb"/>
      <rect x="875" y="670" width="400" height="38" fill="#eef2f6"/>

      <text x="915" y="544">3</text>
      <text x="915" y="582">4</text>
      <text x="915" y="620">5</text>
      <text x="915" y="658">11</text>
      <text x="915" y="696">13</text>

      <text x="995" y="546" fill="#e03030">✗</text><text x="1075" y="546" fill="#e03030">✗</text><text x="1155" y="546" fill="#3aa83a">✓</text><text x="1235" y="546" fill="#e03030">✗</text>
      <text x="995" y="584" fill="#3aa83a">✓</text><text x="1075" y="584" fill="#e03030">✗</text><text x="1155" y="584" fill="#3aa83a">✓</text><text x="1235" y="584" fill="#e03030">✗</text>
      <text x="995" y="622" fill="#e03030">✗</text><text x="1075" y="622" fill="#e03030">✗</text><text x="1155" y="622" fill="#e03030">✗</text><text x="1235" y="622" fill="#e03030">✗</text>
      <text x="995" y="660" fill="#e03030">✗</text><text x="1075" y="660" fill="#3aa83a">✓</text><text x="1155" y="660" fill="#e03030">✗</text><text x="1235" y="660" fill="#e03030">✗</text>
      <text x="995" y="698" fill="#e03030">✗</text><text x="1075" y="698" fill="#e03030">✗</text><text x="1155" y="698" fill="#e03030">✗</text><text x="1235" y="698" fill="#3aa83a">✓</text>
    </g>

    <!-- orange arrow to aggregation -->
    <polygon points="1290,560 1340,560 1340,545 1370,575 1340,605 1340,590 1290,590" fill="#fbcab0"/>

    <!-- Information Aggregation -->
    <text x="1610" y="500" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle" fill="#1f78b4">Information Aggregation</text>
    <rect x="1390" y="520" width="445" height="160" rx="6" fill="none" stroke="#e07820" stroke-width="2.5" stroke-dasharray="8,5"/>
    <g font-family="monospace" font-size="22">
      <text x="1410" y="555">Milking cow is shown first,</text>
      <text x="1410" y="585">followed by zumba, then</text>
      <text x="1410" y="615">clean, and finally playing</text>
      <text x="1410" y="645">trombone.</text>
    </g>

    <!-- Refined Clips -->
    <text x="1065" y="745" font-family="Arial" font-size="24" text-anchor="middle">Refined Clips</text>
    <g font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">
      <rect x="975" y="760" width="40" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="995" y="788">3</text>
      <rect x="1020" y="760" width="40" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1040" y="788">4</text>
      <rect x="1065" y="760" width="44" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1087" y="788">11</text>
      <rect x="1114" y="760" width="44" height="40" rx="8" fill="#cdeac0" stroke="#5fa84f"/><text x="1136" y="788">13</text>
    </g>

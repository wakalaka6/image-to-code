  <text x="704" y="262" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="20" fill="#16443a">PREDICTION</text>

  <!-- physics formula -->
  <text x="704" y="305" text-anchor="middle" font-family="Times New Roman" font-style="italic" font-size="18" fill="#222">f = ∫ ∂V/∂t</text>
  <text x="704" y="325" text-anchor="middle" font-family="Times New Roman" font-style="italic" font-size="18" fill="#222">∂u/∂t + ½ Cₛ/C</text>
  <text x="704" y="345" text-anchor="middle" font-family="Times New Roman" font-style="italic" font-size="18" fill="#222">E = √(n²+h²)</text>
  <text x="704" y="368" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#16443a">Physics Laws</text>
  <text x="704" y="388" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#16443a">&amp; Constraints</text>


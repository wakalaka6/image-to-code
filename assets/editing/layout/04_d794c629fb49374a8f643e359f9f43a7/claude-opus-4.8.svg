  <text x="268" y="214" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="22" fill="#16315c">COARSE 3D</text>
  <text x="268" y="239" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="22" fill="#16315c">SANDBOX</text>

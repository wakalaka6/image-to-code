  <text x="804" y="120" font-family="DejaVu Serif, Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#000000">DPP</text>

  <!-- Vector S^* (1x6 Output Grid) -->
  <text x="680" y="60" font-family="DejaVu Serif, Georgia, serif" font-size="24" font-weight="bold" text-anchor="end" fill="#000000">
    <tspan font-style="italic">S</tspan><tspan font-size="18" baseline-shift="super">*</tspan>
  </text>
  <g id="vector_S_star">
    <!-- Cell 1 -->
    <rect x="690" y="35" width="38" height="38" fill="#F8CBAD" stroke="#000000" stroke-width="1" />
    <text x="709" y="61" font-family="DejaVu Serif, Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#000000">1</text>
    <!-- Cell 2 -->

    <text x="747" y="61" font-family="DejaVu Serif, Georgia, serif" font-size="20" text-anchor="middle" fill="#000000">×</text>
    <!-- Cell 3 -->
    <rect x="766" y="35" width="38" height="38" fill="#F8CBAD" stroke="#000000" stroke-width="1" />
    <text x="785" y="61" font-family="DejaVu Serif, Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#000000">3</text>
    <!-- Cell 4 -->
    <rect x="804" y="35" width="38" height="38" fill="#F8CBAD" stroke="#000000" stroke-width="1" />
    <text x="823" y="61" font-family="DejaVu Serif, Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#000000">4</text>
    <!-- Cell 5 -->
    <rect x="842" y="35" width="38" height="38" fill="#D9D9D9" stroke="#000000" stroke-width="1" />
    <text x="861" y="61" font-family="DejaVu Serif, Georgia, serif" font-size="20" text-anchor="middle" fill="#000000">×</text>
    <!-- Cell 6 -->
    <rect x="880" y="35" width="38" height="38" fill="#D9D9D9" stroke="#000000" stroke-width="1" />
    <text x="899" y="61" font-family="DejaVu Serif, Georgia, serif" font-size="20" text-anchor="middle" fill="#000000">×</text>
  </g>

  <!-- Arrows (Right Side Detail) -->
  <path d="M 804,155 L 804,143" stroke="#2F5597" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 804,90 L 804,79" stroke="#2F5597" stroke-width="2" fill="none" marker-end="url(#arrow)" />

</svg>
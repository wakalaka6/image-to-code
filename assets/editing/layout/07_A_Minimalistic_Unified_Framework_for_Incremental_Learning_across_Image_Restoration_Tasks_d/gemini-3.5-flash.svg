  <rect x="202.5" y="242" width="8" height="18" fill="#ffd966" />
  <rect x="202.5" y="260" width="8" height="28" fill="#f6b26b" />
  <rect x="202.5" y="288" width="8" height="34" fill="#4f81bd" />
  <!-- Bar 2 -->
  <rect x="220.5" y="247" width="8" height="16" fill="#ffd966" />
  <rect x="220.5" y="263" width="8" height="24" fill="#f6b26b" />
  <rect x="220.5" y="287" width="8" height="30" fill="#4f81bd" />
  <!-- Bar 3 -->
  <rect x="238.5" y="252" width="8" height="14" fill="#ffd966" />
  <rect x="238.5" y="266" width="8" height="20" fill="#f6b26b" />
  <rect x="238.5" y="286" width="8" height="26" fill="#4f81bd" />
  <!-- Bar 4 -->
  <rect x="256.5" y="257" width="8" height="12" fill="#ffd966" />
  <rect x="256.5" y="269" width="8" height="16" fill="#f6b26b" />
  <rect x="256.5" y="285" width="8" height="22" fill="#4f81bd" />
  <!-- Bar 5 -->
  <rect x="274.5" y="261" width="8" height="9" fill="#ffd966" />
  <rect x="274.5" y="270" width="8" height="13" fill="#f6b26b" />
  <rect x="274.5" y="283" width="8" height="18" fill="#4f81bd" />

  <!-- Right side bars (increasing) -->
  <!-- Bar 5 -->
  <rect x="318.5" y="261" width="8" height="9" fill="#ffd966" />
  <rect x="318.5" y="270" width="8" height="13" fill="#f6b26b" />
  <rect x="318.5" y="283" width="8" height="18" fill="#4f81bd" />
  <!-- Bar 4 -->
  <rect x="336.5" y="257" width="8" height="12" fill="#ffd966" />
  <rect x="336.5" y="269" width="8" height="16" fill="#f6b26b" />
  <rect x="336.5" y="285" width="8" height="22" fill="#4f81bd" />
  <!-- Bar 3 -->
  <rect x="354.5" y="252" width="8" height="14" fill="#ffd966" />
  <rect x="354.5" y="266" width="8" height="20" fill="#f6b26b" />
  <rect x="354.5" y="286" width="8" height="26" fill="#4f81bd" />
  <!-- Bar 2 -->
  <rect x="372.5" y="247" width="8" height="16" fill="#ffd966" />
  <rect x="372.5" y="263" width="8" height="24" fill="#f6b26b" />
  <rect x="372.5" y="287" width="8" height="30" fill="#4f81bd" />
  <!-- Bar 1 -->
  <rect x="390.5" y="242" width="8" height="18" fill="#ffd966" />
  <rect x="390.5" y="260" width="8" height="28" fill="#f6b26b" />
  <rect x="390.5" y="288" width="8" height="34" fill="#4f81bd" />


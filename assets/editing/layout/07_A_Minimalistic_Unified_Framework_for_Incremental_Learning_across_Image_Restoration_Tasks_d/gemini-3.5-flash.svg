  <!-- Circles -->
  <!-- R (Reshape) -->
  <circle cx="971" cy="298" r="13" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="971" y="303" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle">R</text>

  <!-- * (Convolution) -->
  <circle cx="1027" cy="298" r="13" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="1027" y="306" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">*</text>

  <!-- ⊕ (Addition) -->
  <circle cx="1071" cy="298" r="13" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="1064" y1="298" x2="1078" y2="298" stroke="#000" stroke-width="1.5" />
  <line x1="1071" y1="291" x2="1071" y2="305" stroke="#000" stroke-width="1.5" />

  <!-- Hidden State h -->
  <text x="699" y="370" font-family="Georgia, serif" font-size="18" font-style="italic">h</text>
  <text x="699" y="390" font-family="Arial, sans-serif" font-size="13" fill="#333">hidden state</text>

  <!-- Output h' -->

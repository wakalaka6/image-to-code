  <use href="#bear-card" x="462.5" y="215" />
  <use href="#bear-card" x="472.5" y="225" />
  <use href="#bear-card" x="482.5" y="235" />
  <rect x="482.5" y="235" width="75" height="60" fill="none" stroke="#595959" stroke-width="1" />
  <text x="519.5" y="315" font-family="Georgia, serif" font-size="16" text-anchor="middle">output <tspan font-style="italic">y</tspan></text>

  <!-- Panel (a) Connections -->
  <path d="M 80.5,215 L 80.5,156 L 122.5,156" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 282.5,156 L 300.5,156 L 300.5,215" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />

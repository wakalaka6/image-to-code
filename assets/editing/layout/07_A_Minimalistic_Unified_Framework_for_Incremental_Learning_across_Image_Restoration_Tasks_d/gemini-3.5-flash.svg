  <!-- R Legend -->
  <circle cx="884" cy="490" r="7" fill="none" stroke="#000" stroke-width="1" />
  <text x="884" y="494" font-family="Georgia, serif" font-size="10" text-anchor="middle" font-weight="bold">R</text>
  <text x="896" y="495" font-family="Arial, sans-serif" font-size="14">: reshape</text>

  <!-- * Legend -->
  <circle cx="1004" cy="490" r="7" fill="none" stroke="#000" stroke-width="1" />
  <text x="1004" y="496" font-family="Georgia, serif" font-size="13" text-anchor="middle" font-weight="bold">*</text>
  <text x="1016" y="495" font-family="Arial, sans-serif" font-size="14">: convolution</text>

  <!-- + Legend -->
  <circle cx="884" cy="513" r="7" fill="none" stroke="#000" stroke-width="1" />
  <line x1="880" y1="513" x2="888" y2="513" stroke="#000" stroke-width="1" />

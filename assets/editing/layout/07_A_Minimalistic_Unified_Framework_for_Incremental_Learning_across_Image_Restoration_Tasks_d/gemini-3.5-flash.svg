  <rect x="804" y="185" width="72" height="45" rx="5" fill="none" stroke="#0070c0" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="840" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">bias embeddings</text>
  <!-- Slices -->
  <rect x="840" y="193" width="24" height="30" fill="#4f81bd" stroke="#2f5597" stroke-width="0.5" rx="1" />
  <rect x="833" y="196" width="24" height="30" fill="#ffd966" stroke="#d6ad1c" stroke-width="0.5" rx="1" />

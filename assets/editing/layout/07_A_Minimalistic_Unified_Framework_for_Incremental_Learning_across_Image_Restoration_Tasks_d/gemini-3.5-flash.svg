  <rect x="839" y="271" width="26" height="36" fill="#4f81bd" stroke="#2f5597" stroke-width="0.5" rx="1" />
  <rect x="832" y="275" width="26" height="36" fill="#c55a11" stroke="#833c0c" stroke-width="0.5" rx="1" />
  <rect x="825" y="279" width="26" height="36" fill="#e28a2b" stroke="#b25900" stroke-width="0.5" rx="1" />
  <rect x="818" y="283" width="26" height="36" fill="#f6b26b" stroke="#e28a2b" stroke-width="0.5" rx="1" />
  <rect x="811" y="287" width="26" height="36" fill="#ffd966" stroke="#d6ad1c" stroke-width="0.5" rx="1" />
  <rect x="804" y="291" width="26" height="36" fill="#a9d18e" stroke="#70ad47" stroke-width="0.5" rx="1" />

  <!-- Blue 3D Block (Upper) -->
  <rect x="914" y="195" width="10" height="30" fill="#4f81bd" />
  <polygon points="914,195 920,189 930,189 924,195" fill="#7fa9dd" />
  <polygon points="924,195 930,189 930,219 924,225" fill="#2f5597" />
  <path d="M 914,225 L 914,195 L 920,189 L 930,189 L 930,219 L 924,225 Z M 924,195 L 924,225 M 924,195 L 930,189 M 914,195 L 924,195" fill="none" stroke="#1f3864" stroke-width="1" />

  <!-- Blue 3D Block (Lower) -->
  <rect x="914" y="275" width="12" height="45" fill="#4f81bd" />
  <polygon points="914,275 921,268 933,268 926,275" fill="#7fa9dd" />
  <polygon points="926,275 933,268 933,313 926,320" fill="#2f5597" />

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 560" width="1800" height="560">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#000" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#70ad47" />
    </marker>

    <!-- Stylized Bear Image Card -->
    <g id="bear-card">
      <!-- Sky -->
      <rect x="0" y="0" width="75" height="60" fill="#8faadc" />
      <!-- City Skyline (gray blocks in background) -->
      <rect x="2" y="20" width="8" height="40" fill="#7f7f7f" />
      <rect x="10" y="28" width="10" height="32" fill="#a6a6a6" />
      <rect x="20" y="15" width="12" height="45" fill="#d9d9d9" />
      <!-- Water / Ground -->
      <rect x="0" y="42" width="75" height="18" fill="#2f5597" />
      <ellipse cx="45" cy="48" rx="25" ry="8" fill="#70ad47" />
      <!-- Bear Body -->
      <ellipse cx="48" cy="43" rx="14" ry="9" fill="#833c0c" />
      <!-- Bear Head -->
      <ellipse cx="35" cy="39" rx="7" ry="6" fill="#833c0c" />
      <!-- Bear Ears -->
      <circle cx="33" cy="33" r="2" fill="#833c0c" />
      <!-- Bear Legs -->
      <rect x="39" y="47" width="3" height="8" fill="#5c2a08" />
      <rect x="44" y="48" width="3" height="8" fill="#5c2a08" />
      <rect x="50" y="48" width="3" height="8" fill="#5c2a08" />
      <rect x="55" y="47" width="3" height="8" fill="#5c2a08" />
      <!-- Little background bear -->
      <ellipse cx="68" cy="41" rx="7" ry="5" fill="#a0522d" />
      <ellipse cx="61" cy="39" rx="4" ry="3" fill="#a0522d" />
    </g>

    <!-- Rain Pattern for Input Image -->
    <pattern id="rain" width="15" height="15" patternUnits="userSpaceOnUse" patternTransform="rotate(70)">
      <line x1="0" y1="0" x2="0" y2="15" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" />
    </pattern>
  </defs>

  <!-- ================= BACKGROUND PANELS ================= -->
  <!-- Panel (a) -->
  <rect x="5" y="5" width="590" height="550" fill="#f2f2f2" rx="4" />
  <!-- Panel (b) -->
  <rect x="605" y="5" width="590" height="550" fill="#fbe9db" rx="4" />
  <!-- Panel (c) -->
  <rect x="1205" y="5" width="590" height="550" fill="#e2e7f6" rx="4" />

  <!-- ================= PANEL (a) Overall MINI Architecture ================= -->
  <text x="15" y="35" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#000">(a) Overall MINI Architecture</text>

  <!-- Input Image Stack -->
  <use href="#bear-card" x="42.5" y="215" />
  <use href="#bear-card" x="52.5" y="225" />
  <use href="#bear-card" x="62.5" y="235" />
  <!-- Rain overlay on the front card -->
  <rect x="62.5" y="235" width="75" height="60" fill="url(#rain)" pointer-events="none" />
  <rect x="62.5" y="235" width="75" height="60" fill="none" stroke="#595959" stroke-width="1" />
  <text x="99.5" y="315" font-family="Georgia, serif" font-size="16" text-anchor="middle">input <tspan font-style="italic">x</tspan></text>

  <!-- Query Function Box -->
  <rect x="127.5" y="140" width="155" height="32" rx="6" fill="#e2f0d9" stroke="#385723" stroke-width="1.5" />
  <text x="205" y="161" font-family="Georgia, serif" font-size="14" text-anchor="middle">Query function <tspan font-style="italic">q</tspan>(·)</text>

  <!-- Backbone Dashed Box -->
  <rect x="182.5" y="220" width="235" height="125" rx="15" fill="none" stroke="#2f5597" stroke-width="2" stroke-dasharray="6,6" />
  <text x="300.5" y="363" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">Any backbone</text>
  <text x="300.5" y="381" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">with MINI-Conv</text>

  <!-- Backbone Hourglass (U-Net representation) -->
  <path d="M 195.5,238 L 290.5,263 L 290.5,303 L 195.5,328 Z" fill="none" stroke="#2f5597" stroke-width="1.5" />
  <path d="M 302.5,263 L 397.5,238 L 397.5,328 L 302.5,303 Z" fill="none" stroke="#2f5597" stroke-width="1.5" />

  <!-- Left side bars (decreasing) -->

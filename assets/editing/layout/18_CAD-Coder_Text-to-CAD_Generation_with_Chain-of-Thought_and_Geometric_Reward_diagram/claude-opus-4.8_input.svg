<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <rect width="1920" height="800" fill="white"/>

  <!-- ===== TOP ROW CODE BOXES ===== -->
  <!-- Command Sequence box -->
  <rect x="10" y="10" width="450" height="320" rx="8" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text font-family="monospace" font-size="13" fill="#222">
    <tspan x="30" y="40">{</tspan>
    <tspan x="50" y="58">"steps": [</tspan>
    <tspan x="70" y="76">{</tspan>
    <tspan x="90" y="94">"sketch": {</tspan>
    <tspan x="110" y="112">"circles": [</tspan>
    <tspan x="130" y="130">{"center": [0, 0], "radius": 60},</tspan>
    <tspan x="130" y="148">{"center": [0, 0], "radius": 25}</tspan>
    <tspan x="110" y="166">]</tspan>
    <tspan x="90" y="184">},</tspan>
    <tspan x="90" y="202">"extrusion": {</tspan>
    <tspan x="110" y="220">"direction": [0, 0, 1],</tspan>
    <tspan x="110" y="238">"origin": [0, 0, 0],</tspan>
    <tspan x="110" y="256">"depth": 15,</tspan>
    <tspan x="110" y="274">"operation": "NewBody"</tspan>
    <tspan x="70" y="292">},...]}</tspan>
  </text>
  <text x="235" y="320" font-family="Arial" font-size="20" font-weight="bold" fill="#2e7d32" text-anchor="middle">Command Sequence</text>

  <!-- Text Description box -->
  <rect x="470" y="10" width="395" height="320" rx="8" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text font-family="monospace" font-size="13.5" fill="#222">
    <tspan x="490" y="42">Text_Description = """</tspan>
    <tspan x="490" y="60">This circular flange is a metal component</tspan>
    <tspan x="490" y="78">featuring a flat base plate with a</tspan>
    <tspan x="490" y="96">diameter of 120 mm and thickness of 15 mm.</tspan>
    <tspan x="490" y="114">The design includes a central bore</tspan>
    <tspan x="490" y="132">measuring 50 mm in diameter surrounded by</tspan>
    <tspan x="490" y="150">a raised concentric ring with an outer</tspan>
    <tspan x="490" y="168">diameter of 70 mm and height of 8 mm that</tspan>
    <tspan x="490" y="186">shares the same inner diameter as the</tspan>
    <tspan x="490" y="204">central bore. Six equidistant mounting</tspan>
    <tspan x="490" y="222">holes measuring 12 mm in diameter are</tspan>
    <tspan x="490" y="240">arranged in a circular pattern with a</tspan>
    <tspan x="490" y="258">diameter of 90 mm around the periphery.</tspan>
    <tspan x="490" y="276">"""</tspan>
  </text>
  <text x="667" y="320" font-family="Arial" font-size="20" font-weight="bold" fill="#2e7d32" text-anchor="middle">Text Description</text>

  <!-- System prompt box -->
  <rect x="875" y="10" width="1035" height="135" rx="8" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text font-family="monospace" font-size="14">
    <tspan x="895" y="50" fill="#7b3fa0">System_prompt = """</tspan>
    <tspan x="895" y="72" fill="#2e7d32">Please convert the following CAD command sequence into CAD-Query code, with the final model represented as 'r':</tspan>
    <tspan x="895" y="90" fill="#7b3fa0">"""</tspan>
    <tspan x="895" y="125" fill="#888"># The CoT system prompt can be found in the appendix.</tspan>
  </text>
  <text x="1820" y="138" font-family="Arial" font-size="20" font-weight="bold" fill="#2e7d32" text-anchor="middle">System prompt</text>

  <!-- CadQuery Code box -->
  <rect x="875" y="155" width="1035" height="175" rx="8" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text font-family="monospace" font-size="14">
    <tspan x="895" y="195"><tspan fill="#7b3fa0">import</tspan> <tspan fill="#1565c0">cadquery</tspan> <tspan fill="#7b3fa0">as</tspan> <tspan fill="#1565c0">cq</tspan></tspan>
    <tspan x="895" y="232"><tspan fill="#c62828">flange</tspan> = (cq.<tspan fill="#1565c0">Workplane</tspan>(<tspan fill="#2e7d32">"XY"</tspan>)</tspan>
    <tspan x="975" y="250">.circle(<tspan fill="#1565c0">60</tspan>).circle(<tspan fill="#1565c0">25</tspan>).extrude(<tspan fill="#1565c0">15</tspan>)</tspan>
    <tspan x="975" y="268">.faces(<tspan fill="#2e7d32">"&gt;Z"</tspan>).workplane().polarArray(<tspan fill="#1565c0">45, 0, 360,6</tspan>).circle(<tspan fill="#1565c0">6</tspan>).cutThruAll()</tspan>
    <tspan x="975" y="286">.faces(<tspan fill="#2e7d32">"&gt;Z"</tspan>).workplane().add(cq.<tspan fill="#1565c0">Workplane</tspan>(<tspan fill="#2e7d32">"XY"</tspan>).circle(<tspan fill="#1565c0">35</tspan>).circle(<tspan fill="#1565c0">25</tspan>).workplane(offset=<tspan fill="#1565c0">15</tspan>).extrude(<tspan fill="#1565c0">8</tspan>)))</tspan>
    <tspan x="895" y="304"><tspan fill="#c62828">result</tspan> = flange</tspan>
  </text>
  <text x="1820" y="324" font-family="Arial" font-size="20" font-weight="bold" fill="#2e7d32" text-anchor="middle">CadQuery Code</text>

  <!-- ===== BOTTOM PANELS ===== -->

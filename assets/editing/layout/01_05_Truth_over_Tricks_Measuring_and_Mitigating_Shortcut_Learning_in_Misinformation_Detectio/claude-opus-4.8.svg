<svg width="1960" height="980" viewBox="0 0 1960 980" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1960" height="980" fill="#ffffff"/>

  <!-- ============ LEFT COLUMN BOXES ============ -->

    <path d="M5 30 h60 v30 a30 10 0 0 1 -60 0 Z" fill="#e0bd55" stroke="#7a5c1e" stroke-width="2"/>
    <ellipse cx="35" cy="30" rx="30" ry="10" fill="#ecd078" stroke="#7a5c1e" stroke-width="2"/>

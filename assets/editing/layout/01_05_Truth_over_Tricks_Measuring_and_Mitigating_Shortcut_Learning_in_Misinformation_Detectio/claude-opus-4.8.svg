    <rect x="42" y="30" width="26" height="10" fill="#333" opacity="0.7"/>
    <path d="M28 70 q0 -15 27 -15 q27 0 27 15 l0 55 l-54 0 Z" fill="#8a5a2a" stroke="#333" stroke-width="2"/>
    <rect x="5" y="95" width="50" height="40" rx="3" fill="#f0e8d0" stroke="#7a6030" stroke-width="2"/>
    <line x1="30" y1="95" x2="30" y2="135" stroke="#7a6030" stroke-width="2"/>
  </g>
  <text x="1620" y="930" font-size="34" text-anchor="middle">Implicit</text>
  <text x="1690" y="795" font-size="30" font-style="italic">You are</text>
  <text x="1690" y="835" font-size="30" font-style="italic">{elderly}. Please</text>
  <text x="1690" y="875" font-size="30" font-style="italic">rewrite this</text>
  <text x="1690" y="915" font-size="30" font-style="italic">passage.</text>

  <!-- ============ ARROWS ============ -->
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0 0 L9 4 L0 8 Z" fill="#9a9a9a"/>
    </marker>
  </defs>
  <!-- Intrinsic to left boxes: from box left edge to a vertical spine, branches -->
  <path d="M545 700 L500 700 L500 130 L455 130" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M500 380 L455 380" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M500 600 L455 600" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M500 830 L455 830" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Benchmarks down to between two boxes -->
  <path d="M980 505 L980 555" fill="none" stroke="#9a9a9a" stroke-width="3"/>
  <!-- bidirectional arrow between the two boxes -->
  <path d="M925 740 L1035 740" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- Extrinsic to right boxes -->
  <path d="M1415 700 L1460 700 L1460 150 L1515 150" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M1460 500 L1515 500" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M1460 850 L1515 850" fill="none" stroke="#9a9a9a" stroke-width="3" marker-end="url(#arr)"/>

</svg>
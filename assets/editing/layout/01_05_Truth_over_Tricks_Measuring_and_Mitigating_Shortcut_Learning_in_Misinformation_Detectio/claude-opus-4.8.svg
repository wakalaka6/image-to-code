  <rect x="545" y="210" width="370" height="430" rx="10" fill="#e2e2e2"/>
  <text x="730" y="285" font-size="40" text-anchor="middle">Intrinsic</text>
  <text x="730" y="335" font-size="40" text-anchor="middle">Shortcut</text>
  <text x="730" y="385" font-size="40" text-anchor="middle">Induction</text>

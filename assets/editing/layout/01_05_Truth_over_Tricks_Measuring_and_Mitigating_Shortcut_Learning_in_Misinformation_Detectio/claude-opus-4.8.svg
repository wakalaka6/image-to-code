  <text x="1690" y="530" font-size="30" font-style="italic">rewritten content</text>
  <text x="1690" y="570" font-size="30" font-style="italic">{simple}.</text>

  <!-- Implicit -->
  <rect x="1525" y="740" width="410" height="225" rx="22" fill="none" stroke="#9a9a9a" stroke-width="2.5" stroke-dasharray="9 7"/>
  <g transform="translate(1555,765)">

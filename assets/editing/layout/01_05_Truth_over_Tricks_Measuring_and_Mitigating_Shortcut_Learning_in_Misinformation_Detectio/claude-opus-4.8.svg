    <circle cx="55" cy="35" r="6" fill="#333"/>
    <circle cx="80" cy="35" r="6" fill="#333"/>
    <line x1="22" y1="78" x2="-5" y2="125" stroke="#888" stroke-width="16" stroke-linecap="round"/>

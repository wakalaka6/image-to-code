    <rect x="142" y="308" width="30" height="14" fill="#eee" stroke="#888"/>
    <rect x="142" y="326" width="30" height="14" fill="#eee" stroke="#888"/>
  </g>
  <text x="120" y="435" font-size="34" text-anchor="middle">Style</text>
  <text x="220" y="345" font-size="34">(a) subjective</text>
  <text x="220" y="415" font-size="34">(b) neutral</text>


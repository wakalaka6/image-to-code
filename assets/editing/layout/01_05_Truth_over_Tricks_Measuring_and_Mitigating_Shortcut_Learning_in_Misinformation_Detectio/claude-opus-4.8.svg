    <rect x="130" y="600" width="48" height="35" rx="9" fill="#f06ec0" stroke="#333" stroke-width="2"/>
  </g>
  <text x="120" y="690" font-size="34" text-anchor="middle">Topic</text>
  <text x="220" y="545" font-size="34">(a) sports</text>
  <text x="220" y="600" font-size="34">(b) crime</text>
  <text x="220" y="655" font-size="34">(c) politics</text>
  <text x="220" y="700" font-size="34">......</text>

  <!-- Perplexity -->
  <rect x="30" y="735" width="410" height="215" rx="22" fill="none" stroke="#9a9a9a" stroke-width="2.5" stroke-dasharray="9 7"/>
  <g>
    <circle cx="115" cy="790" r="22" fill="#f0c9a0" stroke="#333" stroke-width="2"/>
    <path d="M88 822 Q88 880 140 880 L150 880 L150 920 L85 920 Z" fill="#e8674f" stroke="#333" stroke-width="2"/>

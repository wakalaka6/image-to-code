    <rect x="55" y="0" width="35" height="28" rx="3" fill="#f4c84a" stroke="#9a7a20"/>
    <rect x="-20" y="65" width="35" height="28" rx="3" fill="#f4c84a" stroke="#9a7a20"/>
    <rect x="55" y="65" width="35" height="28" rx="3" fill="#f4c84a" stroke="#9a7a20"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <!-- Arrowhead definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2d3748" />
    </marker>
    
    <!-- Drop shadow for container if needed (keeping it flat as per original, but clean) -->
    <style>
      .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #000000; }
      .label-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #000000; }
      .math-text { font-family: "Consolas", "Fira Code", "Monaco", monospace; font-size: 14px; fill: #000000; }
      .math-bold { font-family: "Consolas", "Fira Code", "Monaco", monospace; font-size: 16px; font-weight: bold; fill: #000000; }
      .title-text { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 500; }
      .large-italic { font-family: "Georgia", "Times New Roman", serif; font-size: 24px; font-style: italic; fill: #000000; }
      .white-text { fill: #ffffff; }
      .center-text { text-anchor: middle; }
    </style>
  </defs>

  <!-- White Background -->
  <rect width="1000" height="550" fill="#ffffff" />

  <!-- Vertical Dashed Dividers -->
  <line x1="15" y1="10" x2="15" y2="540" stroke="#000000" stroke-width="2" stroke-dasharray="6,6" />
  <line x1="415" y1="10" x2="415" y2="540" stroke="#000000" stroke-width="2" stroke-dasharray="6,6" />
  <line x1="615" y1="10" x2="615" y2="540" stroke="#000000" stroke-width="2" stroke-dasharray="6,6" />
  <line x1="995" y1="10" x2="995" y2="540" stroke="#000000" stroke-width="2" stroke-dasharray="6,6" />

  <!-- COLUMN 1 HEADERS -->
  <text x="25" y="35" class="header-text">1. Tokenize and combine</text>
  <text x="62" y="55" class="header-text">goal and tactic</text>

  <!-- COLUMN 2 HEADERS -->
  <text x="425" y="35" class="header-text">2. Create goal-aware</text>
  <text x="445" y="55" class="header-text">tactic embedding</text>

  <!-- COLUMN 3 HEADERS -->
  <text x="625" y="35" class="header-text">3. Train embedding to</text>
  <text x="645" y="55" class="header-text">encode transition</text>
  <text x="685" y="75" class="header-text">data</text>

  <!-- ==================== COLUMN 1 ==================== -->
  
  <!-- Tactic Input Box "rw [h_1]" -->
  <rect x="58" y="200" width="115" height="40" rx="3" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
  <text x="115" y="225" class="math-bold center-text">rw [h_1]</text>

  <!-- Goal Input Box -->
  <rect x="25" y="360" width="175" height="130" rx="3" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
  <text x="35" y="385" class="math-text">a,b,c : ℂ</text>
  <text x="35" y="412" class="math-text">h₀ : a + b = 2c</text>
  <text x="35" y="439" class="math-text">h₁ : c = i</text>
  <text x="35" y="466" class="math-text">⊢ ac + bc = -2</text>

  <!-- Tactic Token Stack -->
  <g id="tactic-stack">
    <rect x="215" y="130" width="62" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="246" y="166" class="math-bold center-text">rw</text>

    <rect x="215" y="190" width="62" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="246" y="226" class="math-bold center-text">[</text>

    <rect x="215" y="250" width="62" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="246" y="286" class="math-bold center-text">...</text>
  </g>

  <!-- Goal Token Stack -->
  <g id="goal-stack">
    <rect x="215" y="340" width="62" height="60" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="246" y="376" class="math-bold center-text">a</text>

    <rect x="215" y="400" width="62" height="60" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="246" y="436" class="math-bold center-text">,</text>

    <rect x="215" y="460" width="62" height="60" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="246" y="496" class="math-bold center-text">...</text>
  </g>

  <!-- Curly Braces -->
  <!-- Tactic Stack Brace -->
  <path d="M 282,132 Q 292,132 292,152 L 292,210 Q 292,220 302,220 Q 292,220 292,230 L 292,288 Q 292,308 282,308" fill="none" stroke="#000000" stroke-width="1.5" />
  
  <!-- Goal Stack Brace -->
  <path d="M 282,342 Q 292,342 292,362 L 292,420 Q 292,430 302,430 Q 292,430 292,440 L 292,498 Q 292,518 282,518" fill="none" stroke="#000000" stroke-width="1.5" />

  <!-- Single Box "t" -->
  <rect x="306" y="190" width="62" height="60" rx="3" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
  <text x="337" y="226" class="math-bold center-text">t</text>

  <!-- Single Box "g" -->
  <rect x="306" y="390" width="62" height="60" rx="3" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
  <text x="337" y="426" class="math-bold center-text">g</text>

  <!-- Concat Block 1 -->
  <rect x="306" y="300" width="92" height="45" rx="3" fill="#506070" />
  <text x="352" y="328" class="title-text white-text center-text">concat</text>


  <!-- ==================== COLUMN 2 ==================== -->

  <!-- Background Container for Step 2 -->
  <rect x="428" y="100" width="170" height="370" fill="#f5f5f5" stroke="#b3b3b3" stroke-width="1.5" rx="3" />

  <!-- Encoder Block -->
  <rect x="470" y="120" width="85" height="80" rx="3" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" />
  <text x="512.5" y="145" class="title-text center-text">Encoder</text>
  <text x="512.5" y="180" class="large-italic center-text">E</text>

  <!-- Split Boxes (t' and g') -->
  <rect x="458" y="250" width="62" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
  <text x="489" y="286" class="math-bold center-text">t'</text>

  <rect x="520" y="250" width="62" height="60" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
  <text x="551" y="286" class="math-bold center-text">g'</text>

  <!-- Pool Block -->
  <rect x="458" y="330" width="62" height="32" rx="5" fill="#7030a0" />
  <text x="489" y="351" class="title-text white-text center-text" style="font-size: 14px;">pool</text>

  <!-- e Block -->
  <rect x="458" y="390" width="62" height="60" rx="3" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
  <text x="489" y="426" class="math-bold center-text">e</text>

  <!-- Concat Block 2 -->
  <rect x="443" y="490" width="95" height="45" rx="3" fill="#506070" />
  <text x="490.5" y="518" class="title-text white-text center-text">concat</text>


  <!-- ==================== COLUMN 3 ==================== -->

  <!-- Predictor Block -->
  <rect x="655" y="130" width="95" height="90" rx="3" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" />
  <text x="702.5" y="155" class="title-text center-text">Predictor</text>
  <text x="702.5" y="195" class="large-italic center-text">P</text>

  <!-- Status Block -->
  <rect x="815" y="100" width="145" height="65" rx="3" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" />
  <text x="887.5" y="123" class="title-text center-text">Status (ŝ)</text>
  <text x="887.5" y="148" class="math-text center-text">success</text>

  <!-- Time Block -->
  <rect x="840" y="195" width="95" height="80" rx="3" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" />
  <text x="887.5" y="218" class="title-text center-text">Time (τ̂)</text>
  <text x="887.5" y="250" class="math-text center-text">0.1</text>

  <!-- Decoder Block -->
  <rect x="640" y="370" width="120" height="120" rx="3" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" />
  <text x="700" y="405" class="title-text center-text">Decoder</text>
  <text x="700" y="455" class="large-italic center-text" style="font-size: 28px;">D</text>

  <!-- Output Block -->
  <rect x="795" y="330" width="185" height="170" rx="3" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" />
  <text x="887.5" y="355" class="title-text center-text">Output (ô)</text>
  <text x="815" y="385" class="math-text">a, b, c : ℂ</text>
  <text x="815" y="415" class="math-text">h₀ : a + b = 2c</text>
  <text x="815" y="445" class="math-text">h₁ : c = i</text>
  <text x="815" y="475" class="math-text">⊢ ai + bi = -2</text>


  <!-- ==================== ARROWS & CONNECTIONS ==================== -->

  <!-- Col 1: t to concat -->
  <path d="M 337,250 L 337,297" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 1: g to concat -->
  <path d="M 337,390 L 337,348" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 1 to Col 2: concat 1 to Encoder -->
  <path d="M 398,322.5 L 440,322.5 L 440,160 L 467,160" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 2: Encoder to t' and g' split -->
  <path d="M 512.5,200 L 512.5,225 L 489,225 L 489,247" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 512.5,225 L 551,225 L 551,247" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 2: t' to pool -->
  <path d="M 489,310 L 489,327" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 2: pool to e -->
  <path d="M 489,362 L 489,387" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 2: e to concat 2 -->
  <path d="M 489,450 L 489,487" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 1 to Col 2: g to concat 2 -->
  <path d="M 337,450 L 337,512.5 L 440,512.5" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 3: Predictor to Status & Time split -->
  <path d="M 750,175 L 795,175 L 795,132.5 L 812,132.5" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 795,175 L 795,235 L 837,235" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 2 to Col 3: concat 2 to Decoder -->
  <path d="M 538,512.5 L 700,512.5 L 700,493" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Col 3: Decoder to Output -->
  <path d="M 760,430 L 792,430" fill="none" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)" />

</svg>
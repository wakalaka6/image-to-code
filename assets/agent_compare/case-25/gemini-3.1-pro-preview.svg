<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>

    <!-- Gradients and Patterns -->
    <linearGradient id="grad_event" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="100%" stop-color="#999999" />
    </linearGradient>
    <linearGradient id="grad_energy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cccccc" />
      <stop offset="100%" stop-color="#666666" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#222" />
      <circle cx="2" cy="2" r="0.7" fill="#fff" opacity="0.7"/>
    </pattern>
    <linearGradient id="conf_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0000aa" />
      <stop offset="40%" stop-color="#00aaff" />
      <stop offset="80%" stop-color="#ffff00" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>
    <linearGradient id="disparity_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0000aa" />
      <stop offset="30%" stop-color="#0055ff" />
      <stop offset="60%" stop-color="#00ffff" />
      <stop offset="80%" stop-color="#ffff00" />
      <stop offset="100%" stop-color="#ff0000" />
    </linearGradient>

    <!-- 3D Feature Box Template -->
    <g id="feature_box">
      <polygon points="0,0 15,-15 95,-15 80,0" fill="#e6cf8a" stroke="#000" stroke-width="1.5"/>
      <polygon points="80,0 95,-15 95,65 80,80" fill="#cca64d" stroke="#000" stroke-width="1.5"/>
      <rect x="0" y="0" width="80" height="80" fill="#ffe699" stroke="#000" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- ================= INPUTS ================= -->
  <!-- Captured Event Frames -->
  <g transform="translate(50, 60)">
    <rect x="20" y="-20" width="150" height="100" fill="url(#grad_event)" stroke="#333" stroke-width="1"/>
    <rect x="10" y="-10" width="150" height="100" fill="url(#grad_event)" stroke="#333" stroke-width="1"/>
    <rect x="0" y="0" width="150" height="100" fill="url(#grad_event)" stroke="#333" stroke-width="1"/>
  </g>
  <text x="125" y="190" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Captured Event Frames</text>

  <!-- Energy Map -->
  <g transform="translate(50, 240)">
    <rect x="20" y="-20" width="150" height="100" fill="url(#grad_energy)" stroke="#333" stroke-width="1"/>
    <rect x="10" y="-10" width="150" height="100" fill="url(#grad_energy)" stroke="#333" stroke-width="1"/>
    <rect x="0" y="0" width="150" height="100" fill="url(#grad_energy)" stroke="#333" stroke-width="1"/>
  </g>
  <text x="125" y="390" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Energy Map</text>

  <!-- Reference Frames -->
  <g transform="translate(50, 420)">
    <rect x="20" y="-20" width="150" height="100" fill="url(#dots)" stroke="#000" stroke-width="1"/>
    <rect x="10" y="-10" width="150" height="100" fill="url(#dots)" stroke="#000" stroke-width="1"/>
    <rect x="0" y="0" width="150" height="100" fill="url(#dots)" stroke="#000" stroke-width="1"/>
  </g>
  <text x="125" y="580" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Reference Frames</text>

  <!-- ================= FEATURE EXTRACTION ================= -->
  <!-- Top -->
  <rect x="280" y="50" width="20" height="120" fill="#b4c6e7" />
  <rect x="320" y="65" width="20" height="90" fill="#b4c6e7" />
  <rect x="360" y="50" width="20" height="120" fill="#b4c6e7" />
  <text x="330" y="200" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Feature Extraction</text>

  <!-- Middle -->
  <rect x="280" y="230" width="20" height="120" fill="#c5e0b4" />
  <rect x="320" y="245" width="20" height="90" fill="#c5e0b4" />
  <rect x="360" y="230" width="20" height="120" fill="#c5e0b4" />
  <text x="330" y="380" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Feature Extraction</text>

  <!-- Bottom -->
  <rect x="280" y="410" width="20" height="120" fill="#b4c6e7" />
  <rect x="320" y="425" width="20" height="90" fill="#b4c6e7" />
  <rect x="360" y="410" width="20" height="120" fill="#b4c6e7" />
  <text x="330" y="570" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Feature Extraction</text>

  <!-- ================= FEATURES ================= -->
  <!-- Left Features -->
  <use href="#feature_box" x="580" y="40" />
  <use href="#feature_box" x="565" y="55" />
  <use href="#feature_box" x="550" y="70" />
  <text x="525" y="35" font-family="Times New Roman, serif" font-size="24" font-style="italic">F<tspan font-size="16" dy="5">L2</tspan></text>
  <text x="510" y="60" font-family="Times New Roman, serif" font-size="24" font-style="italic">F<tspan font-size="16" dy="5">L1</tspan></text>
  <text x="495" y="85" font-family="Times New Roman, serif" font-size="24" font-style="italic">F<tspan font-size="16" dy="5">L0</tspan></text>
  <text x="590" y="175" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Left Features</text>

  <!-- Right Features -->
  <use href="#feature_box" x="580" y="400" />
  <use href="#feature_box" x="565" y="415" />
  <use href="#feature_box" x="550" y="430" />
  <text x="525" y="395" font-family="Times New Roman, serif" font-size="24" font-style="italic">F<tspan font-size="16" dy="5">R2</tspan></text>
  <text x="510" y="420" font-family="Times New Roman, serif" font-size="24" font-style="italic">F<tspan font-size="16" dy="5">R1</tspan></text>
  <text x="495" y="445" font-family="Times New Roman, serif" font-size="24" font-style="italic">F<tspan font-size="16" dy="5">R0</tspan></text>
  <text x="590" y="560" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Right Features</text>

  <!-- ================= MIDDLE BLOCKS ================= -->
  <!-- Energy-guided Confidence Estimation -->
  <rect x="420" y="225" width="150" height="130" rx="15" fill="#a9d18e" />
  <text x="495" y="260" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Energy-</text>
  <text x="495" y="285" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">guided</text>
  <text x="495" y="310" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Confidence</text>
  <text x="495" y="335" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Estimation</text>

  <!-- Confidence Maps -->
  <g transform="translate(620, 245)">
    <rect x="20" y="-20" width="140" height="90" fill="url(#conf_grad)" stroke="#fff" stroke-width="1"/>
    <rect x="10" y="-10" width="140" height="90" fill="url(#conf_grad)" stroke="#fff" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="90" fill="url(#conf_grad)" stroke="#fff" stroke-width="1"/>
  </g>
  <text x="700" y="370" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Confidence Maps</text>

  <!-- Confidence Propagation Volume Construction -->
  <rect x="820" y="220" width="140" height="130" rx="15" fill="#f4b183" />
  <text x="890" y="255" font-family="Times New Roman, serif" font-size="20" text-anchor="middle">Confidence</text>
  <text x="890" y="280" font-family="Times New Roman, serif" font-size="20" text-anchor="middle">Propagation</text>
  <text x="890" y="305" font-family="Times New Roman, serif" font-size="20" text-anchor="middle">Volume</text>
  <text x="890" y="330" font-family="Times New Roman, serif" font-size="20" text-anchor="middle">Construction</text>

  <!-- ================= RIGHT BLOCKS ================= -->
  <!-- Cost Volume -->
  <g transform="translate(1000, 60)">
    <polygon points="0,0 25,-25 145,-25 120,0" fill="#f8cbad" />
    <polygon points="120,0 145,-25 145,55 120,80" fill="#d9966b" />
    <rect x="0" y="0" width="120" height="80" fill="#f4b183" />
  </g>
  <text x="1060" y="95" font-family="Times New Roman, serif" font-size="24" text-anchor="middle">Cost</text>
  <text x="1060" y="125" font-family="Times New Roman, serif" font-size="24" text-anchor="middle">Volume</text>

  <!-- Cost Aggregation -->
  <rect x="1000" y="225" width="150" height="125" rx="15" fill="#8faadc" />
  <text x="1075" y="280" font-family="Times New Roman, serif" font-size="24" text-anchor="middle">Cost</text>
  <text x="1075" y="310" font-family="Times New Roman, serif" font-size="24" text-anchor="middle">Aggregation</text>

  <!-- Disparity -->
  <rect x="990" y="410" width="170" height="120" fill="url(#disparity_grad)" />
  <text x="1075" y="560" font-family="Times New Roman, serif" font-size="22" text-anchor="middle">Disparity</text>

  <!-- ================= ARROWS ================= -->
  <g fill="none" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)">
    <!-- Inputs to Feature Extraction -->
    <path d="M 210 110 L 265 110" />
    <path d="M 210 290 L 265 290" />
    <path d="M 210 470 L 265 470" />

    <!-- Feature Extraction to Features / Energy-guided -->
    <path d="M 390 110 L 535 110" />
    <path d="M 390 470 L 535 470" />
    <path d="M 390 290 L 405 290" />

    <!-- Left Features to Energy-guided -->
    <path d="M 590 155 L 590 200 L 495 200 L 495 215" />

    <!-- Energy-guided to Confidence Maps -->
    <path d="M 570 290 L 605 290" />

    <!-- Confidence Maps to Confidence Prop -->
    <path d="M 770 290 L 805 290" />

    <!-- Left/Right Features to Confidence Prop -->
    <path d="M 655 100 L 890 100 L 890 210" />
    <path d="M 655 480 L 890 480 L 890 360" />

    <!-- Confidence Prop to Cost Volume -->
    <path d="M 960 290 L 975 290 L 975 100 L 985 100" />

    <!-- Cost Volume to Cost Aggregation -->
    <path d="M 1075 145 L 1075 215" />

    <!-- Cost Aggregation to Disparity -->
    <path d="M 1075 350 L 1075 400" />

    <!-- Captured Event Frames to Energy Map -->
    <path d="M 125 165 L 125 205" />
  </g>
</svg>
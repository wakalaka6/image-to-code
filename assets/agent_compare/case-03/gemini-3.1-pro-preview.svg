<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <style>
      .text-base { font-family: sans-serif; font-size: 18px; }
      .text-title { font-family: sans-serif; font-size: 24px; }
      .text-bold { font-family: sans-serif; font-weight: bold; font-size: 20px; }
      .text-italic { font-family: monospace; font-style: italic; font-size: 20px; fill: #888; }
      .box-stroke { stroke: #1a3b5c; stroke-width: 2; }
      .arrow-stroke { stroke: #1a6b9c; stroke-width: 2; fill: none; }
      .arrow-head { fill: #1a6b9c; }
      .dashed-line { stroke: #aaa; stroke-width: 2; stroke-dasharray: 6,6; }
      .bg-orange { fill: #f4d0c0; }
      .bg-blue { fill: #d0e4f4; }
      .bg-dark-blue { fill: #4a8cd4; }
      .bg-gray { fill: #f0f0f0; }
      .bg-white { fill: #ffffff; }
      .pattern-lines { stroke: #aaa; stroke-width: 1; }
    </style>
    <pattern id="diagonalHatch" width="10" height="10" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="10" class="pattern-lines" />
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head" />
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1ab0d4" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ccc" />
    </marker>
    
    <!-- Icons -->
    <g id="robot">
      <rect x="-15" y="-10" width="30" height="20" rx="4" fill="none" stroke="#000" stroke-width="2"/>
      <circle cx="-6" cy="-2" r="2" fill="#000"/>
      <circle cx="6" cy="-2" r="2" fill="#000"/>
      <path d="M -6 4 Q 0 8 6 4" fill="none" stroke="#000" stroke-width="1.5"/>
      <line x1="0" y1="-10" x2="0" y2="-15" stroke="#000" stroke-width="2"/>
      <circle cx="0" cy="-16" r="2" fill="#000"/>
      <rect x="-18" y="-4" width="3" height="8" fill="#000"/>
      <rect x="15" y="-4" width="3" height="8" fill="#000"/>
    </g>
    <g id="magnifier">
      <circle cx="-4" cy="-4" r="8" fill="none" stroke="#000" stroke-width="3"/>
      <line x1="2" y1="2" x2="10" y2="10" stroke="#000" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g id="answer-icon">
      <circle cx="0" cy="0" r="14" fill="#5cdb5c" stroke="#2a8c2a" stroke-width="2"/>
      <text x="0" y="6" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">A</text>
      <path d="M -10 10 L -14 16 L -6 12 Z" fill="#5cdb5c" stroke="#2a8c2a" stroke-width="2"/>
    </g>
  </defs>

  <!-- Legend -->
  <rect x="100" y="10" width="900" height="55" rx="10" fill="none" stroke="#e67e22" stroke-width="2"/>
  <use href="#robot" x="140" y="38" transform="scale(1.2) translate(-20, -3)"/>
  <text x="188" y="45" class="text-title">LLM</text>
  
  <use href="#magnifier" x="270" y="38" transform="scale(1.2) translate(-35, -3)"/>
  <text x="302" y="45" class="text-title">retriever</text>
  
  <use href="#answer-icon" x="420" y="38"/>
  <text x="448" y="45" class="text-title">answer</text>
  
  <rect x="560" y="20" width="35" height="35" rx="5" class="bg-dark-blue box-stroke"/>
  <text x="608" y="45" class="text-title">chosen state</text>
  
  <rect x="764" y="20" width="35" height="35" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  <text x="818" y="45" class="text-title">discarded state</text>

  <!-- Dividers -->
  <line x1="542" y1="80" x2="542" y2="730" class="dashed-line"/>
  <line x1="542" y1="210" x2="1180" y2="210" class="dashed-line"/>

  <!-- Left Section: Rejection Sampling -->
  <text x="10" y="730" class="text-italic">Rejection Sampling</text>
  <path d="M 260 710 L 270 720 L 290 690" fill="none" stroke="#1abc9c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Query Box -->
  <rect x="180" y="90" width="200" height="40" rx="5" class="bg-gray box-stroke"/>
  <text x="280" y="118" class="text-title" text-anchor="middle">Query</text>

  <!-- Arrows from Query -->
  <line x1="280" y1="130" x2="90" y2="180" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="280" y1="130" x2="280" y2="180" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="280" y1="130" x2="440" y2="180" class="arrow-stroke" marker-end="url(#arrow)"/>

  <!-- Column 1 -->
  <use href="#robot" x="50" y="160"/>
  <rect x="15" y="185" width="143" height="50" rx="5" class="bg-orange box-stroke"/>
  <text x="86" y="215" class="text-base" text-anchor="middle">sub-query 1</text>
  
  <line x1="86" y1="235" x2="86" y2="285" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#magnifier" x="55" y="260"/>
  <use href="#robot" x="120" y="260"/>
  
  <rect x="14" y="290" width="146" height="50" rx="5" class="bg-blue box-stroke"/>
  <text x="87" y="320" class="text-base" text-anchor="middle">sub-answer 1</text>

  <text x="86" y="370" class="text-bold" text-anchor="middle">... ...</text>
  
  <line x1="86" y1="390" x2="86" y2="440" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#robot" x="45" y="415"/>
  
  <rect x="14" y="445" width="143" height="50" rx="5" class="bg-orange box-stroke"/>
  <text x="85" y="475" class="text-base" text-anchor="middle">sub-query n</text>
  
  <line x1="85" y1="495" x2="85" y2="545" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#magnifier" x="55" y="520"/>
  <use href="#robot" x="120" y="520"/>
  
  <rect x="13" y="550" width="146" height="50" rx="5" class="bg-blue box-stroke"/>
  <text x="86" y="580" class="text-base" text-anchor="middle">sub-answer n</text>

  <line x1="86" y1="600" x2="86" y2="650" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#answer-icon" x="50" y="625"/>
  <use href="#robot" x="120" y="625"/>
  <text x="86" y="675" class="text-base" text-anchor="middle">P(Ans | Chain 1)</text>

  <!-- Column 2 -->
  <rect x="208" y="185" width="143" height="50" rx="5" class="bg-orange box-stroke"/>
  <text x="279" y="215" class="text-base" text-anchor="middle">sub-query 1*</text>
  
  <line x1="279" y1="235" x2="279" y2="285" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#magnifier" x="248" y="260"/>
  <use href="#robot" x="313" y="260"/>
  
  <rect x="206" y="290" width="150" height="50" rx="5" class="bg-blue box-stroke"/>
  <text x="281" y="320" class="text-base" text-anchor="middle">sub-answer 1*</text>

  <text x="279" y="370" class="text-bold" text-anchor="middle">... ...</text>
  
  <line x1="279" y1="390" x2="279" y2="440" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#robot" x="238" y="415"/>
  
  <rect x="207" y="445" width="143" height="50" rx="5" class="bg-orange box-stroke"/>
  <text x="278" y="475" class="text-base" text-anchor="middle">sub-query n*</text>
  
  <line x1="278" y1="495" x2="278" y2="545" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#magnifier" x="248" y="520"/>
  <use href="#robot" x="313" y="520"/>
  
  <rect x="201" y="550" width="152" height="50" rx="5" class="bg-blue box-stroke"/>
  <text x="277" y="580" class="text-base" text-anchor="middle">sub-answer n*</text>

  <line x1="277" y1="600" x2="277" y2="650" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#answer-icon" x="243" y="625"/>
  <use href="#robot" x="313" y="625"/>
  <text x="277" y="675" class="text-base" text-anchor="middle">P(Ans | Chain 2)</text>

  <!-- Column 3 -->
  <text x="440" y="215" class="text-bold" text-anchor="middle">... ...</text>
  <text x="440" y="320" class="text-bold" text-anchor="middle">... ...</text>
  <text x="443" y="370" class="text-bold" text-anchor="middle">... ...</text>
  <text x="443" y="475" class="text-bold" text-anchor="middle">... ...</text>
  <text x="443" y="580" class="text-bold" text-anchor="middle">... ...</text>
  
  <line x1="438" y1="600" x2="438" y2="650" class="arrow-stroke" marker-end="url(#arrow)"/>
  <use href="#answer-icon" x="408" y="625"/>
  <use href="#robot" x="478" y="625"/>
  <text x="438" y="675" class="text-base" text-anchor="middle">P(Ans | Chain 3)</text>

  <!-- Top Right Section: Training -->
  <text x="560" y="110" class="text-italic">Training</text>
  
  <path d="M 600 125 L 740 125 L 740 175 L 620 175 L 615 185 L 610 175 L 600 175 Z" fill="#fff" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
  <text x="670" y="155" class="text-base" text-anchor="middle">Current State</text>
  
  <line x1="755" y1="155" x2="790" y2="155" stroke="#1ab0d4" stroke-width="3" marker-end="url(#arrow-light)"/>
  
  <rect x="805" y="125" width="164" height="48" rx="5" class="bg-orange box-stroke"/>
  <text x="887" y="155" class="text-base" text-anchor="middle">LLM</text>
  <text x="815" y="155" font-size="20">🔥</text>
  
  <line x1="975" y1="155" x2="1015" y2="155" stroke="#1ab0d4" stroke-width="3" marker-end="url(#arrow-light)"/>
  
  <path d="M 1033 125 L 1158 125 L 1158 175 L 1053 175 L 1048 185 L 1043 175 L 1033 175 Z" fill="#fff" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
  <text x="1095" y="155" class="text-base" text-anchor="middle">Next Action</text>

  <!-- Bottom Right Section: Inference -->
  <text x="560" y="730" class="text-italic">Inference</text>

  <!-- Greedy -->
  <ellipse cx="645" cy="250" rx="58" ry="25" class="bg-gray box-stroke"/>
  <text x="645" y="255" class="text-base" text-anchor="middle">query</text>
  
  <line x1="645" y1="275" x2="645" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  <rect x="627" y="330" width="36" height="36" rx="5" class="bg-dark-blue box-stroke"/>
  
  <line x1="645" y1="366" x2="645" y2="400" class="arrow-stroke" marker-end="url(#arrow)"/>
  <text x="645" y="430" class="text-bold" text-anchor="middle">... ...</text>
  
  <line x1="645" y1="445" x2="645" y2="480" class="arrow-stroke" marker-end="url(#arrow)"/>
  <rect x="629" y="485" width="36" height="36" rx="5" class="bg-dark-blue box-stroke"/>
  
  <line x1="647" y1="521" x2="647" y2="565" class="arrow-stroke" marker-end="url(#arrow)"/>
  <ellipse cx="647" cy="590" rx="58" ry="25" class="bg-blue box-stroke"/>
  <text x="647" y="595" class="text-base" text-anchor="middle">output</text>
  
  <text x="647" y="660" class="text-bold" text-anchor="middle">Greedy</text>

  <!-- Best-of-N -->
  <ellipse cx="810" cy="250" rx="58" ry="25" class="bg-gray box-stroke"/>
  <text x="810" y="255" class="text-base" text-anchor="middle">query</text>
  
  <line x1="810" y1="275" x2="745" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="810" y1="275" x2="810" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="810" y1="275" x2="875" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  
  <rect x="726" y="330" width="36" height="36" rx="5" class="bg-dark-blue box-stroke"/>
  <rect x="792" y="330" width="36" height="36" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="857" y="330" width="36" height="36" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  
  <line x1="746" y1="366" x2="746" y2="400" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="812" y1="366" x2="812" y2="400" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="875" y1="366" x2="875" y2="400" class="arrow-stroke" marker-end="url(#arrow)"/>
  
  <text x="746" y="430" class="text-bold" text-anchor="middle">... ...</text>
  <text x="812" y="430" class="text-bold" text-anchor="middle">... ...</text>
  <text x="875" y="430" class="text-bold" text-anchor="middle">... ...</text>
  
  <line x1="746" y1="445" x2="746" y2="480" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="812" y1="445" x2="812" y2="480" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="875" y1="445" x2="875" y2="480" class="arrow-stroke" marker-end="url(#arrow)"/>
  
  <rect x="728" y="485" width="36" height="36" rx="5" class="bg-dark-blue box-stroke"/>
  <rect x="794" y="485" width="36" height="36" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="859" y="485" width="36" height="36" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  
  <line x1="746" y1="521" x2="810" y2="565" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="812" y1="521" x2="812" y2="565" stroke="#ccc" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="875" y1="521" x2="814" y2="565" stroke="#ccc" stroke-width="2" marker-end="url(#arrow-gray)"/>
  
  <ellipse cx="812" cy="590" rx="58" ry="25" class="bg-blue box-stroke"/>
  <text x="812" y="595" class="text-base" text-anchor="middle">output</text>
  
  <text x="745" y="560" font-size="30">🏅</text>
  <text x="820" y="660" class="text-bold" text-anchor="middle">Best-of-N</text>

  <!-- Tree Search -->
  <ellipse cx="1055" cy="250" rx="58" ry="25" class="bg-gray box-stroke"/>
  <text x="1055" y="255" class="text-base" text-anchor="middle">query</text>
  
  <line x1="1055" y1="275" x2="990" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="1055" y1="275" x2="1055" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="1055" y1="275" x2="1120" y2="325" class="arrow-stroke" marker-end="url(#arrow)"/>
  
  <rect x="971" y="330" width="36" height="36" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="1037" y="330" width="36" height="36" rx="5" class="bg-dark-blue box-stroke"/>
  <rect x="1100" y="330" width="36" height="36" rx="5" fill="url(#diagonalHatch)" class="box-stroke"/>
  
  <line x1="989" y1="366" x2="970" y2="390" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="1055" y1="366" x2="1055" y2="400" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="1118" y1="366" x2="1135" y2="390" class="arrow-stroke" marker-end="url(#arrow)"/>
  
  <!-- Left Rollout Box -->
  <rect x="930" y="395" width="83" height="155" class="bg-white box-stroke"/>
  <rect x="945" y="405" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="979" y="405" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <line x1="954" y1="428" x2="954" y2="455" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="988" y1="428" x2="988" y2="455" class="arrow-stroke" marker-end="url(#arrow)"/>
  <text x="971" y="470" class="text-bold" text-anchor="middle" font-size="14">... ...</text>
  <line x1="954" y1="480" x2="954" y2="510" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="988" y1="480" x2="988" y2="510" class="arrow-stroke" marker-end="url(#arrow)"/>
  <rect x="944" y="520" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="979" y="520" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <text x="971" y="570" class="text-base" text-anchor="middle">rollouts</text>

  <!-- Center Path -->
  <text x="1055" y="430" class="text-bold" text-anchor="middle">... ...</text>
  <line x1="1055" y1="445" x2="1055" y2="480" class="arrow-stroke" marker-end="url(#arrow)"/>
  <rect x="1037" y="485" width="36" height="36" rx="5" class="bg-dark-blue box-stroke"/>
  <line x1="1055" y1="521" x2="1055" y2="565" class="arrow-stroke" marker-end="url(#arrow)"/>

  <!-- Right Rollout Box -->
  <rect x="1102" y="395" width="71" height="155" class="bg-white box-stroke"/>
  <rect x="1111" y="405" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="1145" y="405" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <line x1="1120" y1="428" x2="1120" y2="455" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="1154" y1="428" x2="1154" y2="455" class="arrow-stroke" marker-end="url(#arrow)"/>
  <text x="1137" y="470" class="text-bold" text-anchor="middle" font-size="14">... ...</text>
  <line x1="1120" y1="480" x2="1120" y2="510" class="arrow-stroke" marker-end="url(#arrow)"/>
  <line x1="1154" y1="480" x2="1154" y2="510" class="arrow-stroke" marker-end="url(#arrow)"/>
  <rect x="1111" y="520" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <rect x="1145" y="520" width="18" height="18" rx="3" fill="url(#diagonalHatch)" class="box-stroke"/>
  <text x="1137" y="570" class="text-base" text-anchor="middle">rollouts</text>

  <ellipse cx="1058" cy="590" rx="58" ry="25" class="bg-blue box-stroke"/>
  <text x="1058" y="595" class="text-base" text-anchor="middle">output</text>
  
  <text x="1060" y="660" class="text-bold" text-anchor="middle">Tree Search</text>

</svg>
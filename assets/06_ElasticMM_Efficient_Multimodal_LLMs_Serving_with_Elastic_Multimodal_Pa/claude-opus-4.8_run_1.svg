<svg xmlns="http://www.w3.org/2000/svg" width="1632" height="896" viewBox="0 0 1632 896">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#404040"/>
    </marker>
    <marker id="arrowBig" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#404040"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M6,0 L0,3 L6,6 Z" fill="#404040"/>
    </marker>
  </defs>

  <!-- outer background -->
  <rect x="6" y="6" width="1620" height="884" rx="22" fill="#f7f8fa" stroke="#888" stroke-width="3"/>

  <!-- Top request boxes -->
  <rect x="222" y="44" width="445" height="72" rx="12" fill="#ffffff" stroke="#222" stroke-width="2.5"/>
  <rect x="252" y="62" width="34" height="40" rx="3" fill="#f0f0f0" stroke="#666" stroke-width="2"/>
  <line x1="258" y1="72" x2="280" y2="72" stroke="#888" stroke-width="2"/>
  <line x1="258" y1="80" x2="280" y2="80" stroke="#888" stroke-width="2"/>
  <line x1="258" y1="88" x2="280" y2="88" stroke="#888" stroke-width="2"/>
  <text x="300" y="92" font-family="Georgia, serif" font-size="36" fill="#111">Text-Only Request</text>

  <rect x="945" y="44" width="470" height="72" rx="12" fill="#ffffff" stroke="#222" stroke-width="2.5"/>
  <rect x="975" y="62" width="38" height="40" rx="3" fill="#cfe8d0" stroke="#5a9a5a" stroke-width="2"/>
  <circle cx="985" cy="74" r="4" fill="#e0c050"/>
  <path d="M977,98 L988,84 L996,92 L1003,82 L1011,98 Z" fill="#6aa86a"/>
  <text x="1025" y="92" font-family="Georgia, serif" font-size="36" fill="#111">Image-Text Request</text>

  <!-- arrows from requests down -->
  <line x1="444" y1="116" x2="444" y2="166" stroke="#404040" stroke-width="4" marker-end="url(#arrowBig)"/>
  <line x1="1180" y1="116" x2="1180" y2="166" stroke="#404040" stroke-width="4" marker-end="url(#arrowBig)"/>

  <!-- Modality-Level section -->
  <rect x="95" y="170" width="1438" height="280" rx="6" fill="#fbe4e4" stroke="#222" stroke-width="2.5"/>
  <rect x="95" y="170" width="730" height="280" rx="6" fill="#dbe6f7" stroke="#222" stroke-width="2.5"/>
  <line x1="827" y1="180" x2="827" y2="440" stroke="#333" stroke-width="3" stroke-dasharray="9,8"/>

  <text x="460" y="222" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#111" text-anchor="middle">Modality-Level</text>
  <text x="460" y="266" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#2b6fd6" text-anchor="middle">(Modality-Aware Load Balancing §3.1)</text>

  <!-- double arrow -->
  <line x1="772" y1="210" x2="885" y2="210" stroke="#404040" stroke-width="6" marker-start="url(#arrowL)" marker-end="url(#arrowBig)"/>

  <!-- Blue stages -->
  <rect x="153" y="320" width="280" height="78" rx="8" fill="#bcd4f0" stroke="#2a4a78" stroke-width="2.5"/>
  <text x="293" y="370" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Prefill Stage</text>
  <line x1="433" y1="359" x2="503" y2="359" stroke="#404040" stroke-width="5" marker-end="url(#arrowBig)"/>
  <rect x="510" y="320" width="285" height="78" rx="8" fill="#bcd4f0" stroke="#2a4a78" stroke-width="2.5"/>
  <text x="652" y="370" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Decode Stage</text>

  <!-- Pink Encode -->
  <rect x="1043" y="196" width="280" height="78" rx="8" fill="#f4a9a9" stroke="#a04545" stroke-width="2.5"/>
  <text x="1183" y="246" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Encode Stage</text>
  <path d="M1075,274 L1010,320" stroke="#404040" stroke-width="5" fill="none" marker-end="url(#arrowBig)"/>

  <rect x="880" y="320" width="280" height="78" rx="8" fill="#f4a9a9" stroke="#a04545" stroke-width="2.5"/>
  <text x="1020" y="370" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Prefill Stage</text>
  <line x1="1160" y1="359" x2="1230" y2="359" stroke="#404040" stroke-width="5" marker-end="url(#arrowBig)"/>
  <rect x="1237" y="320" width="285" height="78" rx="8" fill="#f4a9a9" stroke="#a04545" stroke-width="2.5"/>
  <text x="1379" y="370" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Decode Stage</text>

  <!-- Stage-Level section -->
  <rect x="95" y="478" width="1438" height="218" rx="6" fill="#fbfae0" stroke="#222" stroke-width="2.5"/>
  <text x="430" y="528" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#111" text-anchor="middle">Stage-Level</text>
  <text x="1075" y="528" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#2b6fd6" text-anchor="middle">(Elastic Partition Scheduling §3.2)</text>

  <rect x="200" y="548" width="310" height="115" rx="14" fill="#fde9a8" stroke="#c79a30" stroke-width="2.5"/>
  <text x="355" y="595" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Request</text>
  <text x="355" y="635" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Scheduling</text>

  <line x1="510" y1="605" x2="660" y2="605" stroke="#404040" stroke-width="8" marker-end="url(#arrowBig)"/>

  <rect x="668" y="548" width="310" height="115" rx="14" fill="#fde9a8" stroke="#c79a30" stroke-width="2.5"/>
  <text x="823" y="595" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Stage</text>
  <text x="823" y="635" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Allocation</text>

  <line x1="978" y1="605" x2="1128" y2="605" stroke="#404040" stroke-width="8" marker-end="url(#arrowBig)"/>

  <rect x="1136" y="548" width="310" height="115" rx="14" fill="#fde9a8" stroke="#c79a30" stroke-width="2.5"/>
  <text x="1291" y="595" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Elastic</text>
  <text x="1291" y="635" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#111" text-anchor="middle">Auto-Scaling</text>

  <!-- Green section -->
  <rect x="95" y="718" width="930" height="135" rx="14" fill="#d6f0d2" stroke="#222" stroke-width="2.5"/>
  <text x="560" y="800" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#111" text-anchor="middle">Unified Multimodal Prefix Cache <tspan fill="#2b6fd6">(§3.3)</tspan></text>

  <!-- Legend -->
  <rect x="1093" y="718" width="440" height="158" rx="8" fill="#ffffff" stroke="#222" stroke-width="2.5"/>
  <rect x="1120" y="738" width="62" height="34" fill="#bcd4f0" stroke="#2a4a78" stroke-width="2"/>
  <text x="1198" y="765" font-family="Georgia, serif" font-size="32" fill="#111">Text-Only Group</text>
  <rect x="1120" y="784" width="62" height="34" fill="#f4a9a9" stroke="#a04545" stroke-width="2"/>
  <text x="1198" y="811" font-family="Georgia, serif" font-size="32" fill="#111">Multimodal Group</text>
  <line x1="1124" y1="847" x2="1180" y2="847" stroke="#404040" stroke-width="6" marker-start="url(#arrowL)" marker-end="url(#arrowBig)"/>
  <text x="1198" y="858" font-family="Georgia, serif" font-size="32" fill="#111">Auto-Scaling</text>
</svg>
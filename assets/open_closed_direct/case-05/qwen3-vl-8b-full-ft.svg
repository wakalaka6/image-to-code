<svg width="1600" height="700" viewBox="-6.0 -6.0 1629.0 764.0" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead Marker for Lines (if needed, though shapes used below are custom for thickness) -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#595959" />
    </marker>
    
    <!-- Font Style -->
    <style>
      text {
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
      }
      .box-border {
        stroke: #0F284A;
        stroke-width: 4;
      }
      .arrow-shape {
        fill: #595959;
        stroke: none;
      }
      .icon-stroke {
        fill: none;
        stroke: black;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- 1. Global Background -->
  <rect x="2" y="2" width="1596" height="696" fill="#F5F5F5" stroke="#B0B0B0" stroke-width="4" />

  <!-- 2. Top Row: Input Sources -->
  
  <!-- Left Box: Text-Only -->
  <g transform="translate(225, 40)">
    <rect x="0" y="0" width="450" height="80" rx="15" fill="#FFFFFF" class="box-border" />
    <!-- Document Icon -->
    <g transform="translate(20, 15) scale(0.9)">
      <path d="M5,0 L35,0 L50,15 L50,60 L5,60 Z" fill="none" stroke="black" stroke-width="3" />
      <path d="M35,0 L35,15 L50,15" fill="none" stroke="black" stroke-width="3" />
      <line x1="12" y1="20" x2="28" y2="20" stroke="black" stroke-width="3" />
      <line x1="12" y1="30" x2="42" y2="30" stroke="black" stroke-width="3" />
      <line x1="12" y1="40" x2="42" y2="40" stroke="black" stroke-width="3" />
      <line x1="12" y1="50" x2="30" y2="50" stroke="black" stroke-width="3" />
    </g>
    <text x="260" y="55" font-size="48" fill="black" text-anchor="middle">Text-Only Request</text>
  </g>

  <!-- Right Box: Image-Text -->
  <g transform="translate(975, 40)">
    <rect x="0" y="0" width="420" height="80" rx="15" fill="#FFFFFF" class="box-border" />
    <!-- Image Icon -->
    <g transform="translate(15, 15) scale(0.9)">
      <rect x="2" y="5" width="60" height="50" rx="2" fill="none" stroke="black" stroke-width="3" />
      <circle cx="15" cy="15" r="5" fill="#FCD34D" stroke="black" stroke-width="2" />
      <path d="M2,45 L2,30 L15,25 L30,35 L45,25 L62,45 Z" fill="#66CDAA" stroke="black" stroke-width="2" />
      <path d="M2,45 L62,45" stroke="black" stroke-width="2" />
    </g>
    <text x="240" y="55" font-size="48" fill="black" text-anchor="middle">Image-Text Request</text>
  </g>

  <!-- Downward Arrows from Top Row -->
  <g transform="translate(0, 0)">
    <!-- Left Arrow -->
    <path d="M450,120 L450,145" stroke="#595959" stroke-width="12" />
    <path d="M435,145 L465,145 L450,165 Z" class="arrow-shape" />
    <!-- Right Arrow -->
    <path d="M1185,120 L1185,145" stroke="#595959" stroke-width="12" />
    <path d="M1170,145 L1200,145 L1185,165 Z" class="arrow-shape" />
  </g>

  <!-- 3. Second Row: Modality-Level -->
  <g transform="translate(90, 150)">
    <!-- Main Container Backgrounds -->
    <rect x="0" y="0" width="730" height="250" fill="#DDEBF7" stroke="none" />
    <rect x="750" y="0" width="670" height="250" fill="#FCE4E4" stroke="none" />
    
    <!-- Vertical Divider -->
    <line x1="750" y1="0" x2="750" y2="250" stroke="black" stroke-width="4" stroke-dasharray="8,8" />
    
    <!-- Outer Border -->
    <rect x="0" y="0" width="1420" height="250" fill="none" class="box-border" />

    <!-- Left Side Content -->
    <text x="375" y="60" font-size="48" fill="black" text-anchor="middle">Modality-Level</text>
    <text x="375" y="110" font-size="48" fill="#4472C4" text-anchor="middle">(Modality-Aware Load Balancing §3.1)</text>
    
    <!-- Left Flow Boxes -->
    <g transform="translate(65, 140)">
      <rect x="0" y="0" width="300" height="100" rx="20" fill="#CCE5FF" class="box-border" />
      <text x="150" y="65" font-size="48" fill="black" text-anchor="middle">Prefill Stage</text>
      
      <!-- Arrow -->
      <path d="M300,50 L340,50" stroke="#595959" stroke-width="12" />
      <path d="M338,35 L365,50 L338,65 Z" class="arrow-shape" />

      <rect x="340" y="0" width="350" height="100" rx="20" fill="#CCE5FF" class="box-border" />
      <text x="515" y="65" font-size="48" fill="black" text-anchor="middle">Decode Stage</text>
    </g>

    <!-- Horizontal Interaction Arrow (Between Zones) -->
    <g transform="translate(750, 50)">
      <path d="M-50,15 L-10,15" stroke="#595959" stroke-width="12" />
      <path d="M-12,0 L15,15 L-12,30 Z" class="arrow-shape" />
      <path d="M10,15 L50,15" stroke="#595959" stroke-width="12" />
      <path d="M48,0 L-5,15 L48,30 Z" class="arrow-shape" />
    </g>

    <!-- Right Side Content -->
    <!-- Top Box -->
    <rect x="970" y="30" width="350" height="100" rx="20" fill="#FFC4C4" class="box-border" />
    <text x="1145" y="95" font-size="48" fill="black" text-anchor="middle">Encode Stage</text>
    
    <!-- Diagonal Arrow -->
    <path d="M1000,100 L940,150" stroke="#595959" stroke-width="12" />
    <path d="M950,145 L930,165 L960,160 Z" class="arrow-shape" /> <!-- Manual rotation approximation -->
    
    <!-- Right Flow Boxes -->
    <g transform="translate(805, 140)">
      <rect x="0" y="0" width="320" height="100" rx="20" fill="#FFC4C4" class="box-border" />
      <text x="160" y="65" font-size="48" fill="black" text-anchor="middle">Prefill Stage</text>
      
      <!-- Arrow -->
      <path d="M320,50 L370,50" stroke="#595959" stroke-width="12" />
      <path d="M368,35 L395,50 L368,65 Z" class="arrow-shape" />

      <rect x="370" y="0" width="350" height="100" rx="20" fill="#FFC4C4" class="box-border" />
      <text x="545" y="65" font-size="48" fill="black" text-anchor="middle">Decode Stage</text>
    </g>
  </g>

  <!-- 4. Third Row: Stage-Level -->
  <g transform="translate(90, 400)">
    <rect x="0" y="0" width="1420" height="170" fill="#FFFCF2" class="box-border" />
    
    <text x="375" y="50" font-size="48" fill="black" text-anchor="middle">Stage-Level</text>
    <text x="390" y="50" font-size="48" fill="#4472C4" text-anchor="start">(Elastic Partition Scheduling §3.2)</text>

    <!-- Flow Boxes -->
    <g transform="translate(110, 70)">
      <!-- Box 1 -->
      <rect x="0" y="0" width="340" height="120" rx="20" fill="#FCE8B2" class="box-border" />
      <text x="170" y="45" font-size="48" fill="black" text-anchor="middle">Request</text>
      <text x="170" y="100" font-size="48" fill="black" text-anchor="middle">Scheduling</text>

      <!-- Arrow 1 -->
      <path d="M340,60 L450,60" stroke="#595959" stroke-width="12" />
      <path d="M448,45 L480,60 L448,75 Z" class="arrow-shape" />

      <!-- Box 2 -->
      <rect x="450" y="0" width="380" height="120" rx="20" fill="#FCE8B2" class="box-border" />
      <text x="640" y="45" font-size="48" fill="black" text-anchor="middle">Stage</text>
      <text x="640" y="100" font-size="48" fill="black" text-anchor="middle">Allocation</text>

      <!-- Arrow 2 -->
      <path d="M830,60 L940,60" stroke="#595959" stroke-width="12" />
      <path d="M938,45 L970,60 L938,75 Z" class="arrow-shape" />

      <!-- Box 3 -->
      <rect x="940" y="0" width="380" height="120" rx="20" fill="#FCE8B2" class="box-border" />
      <text x="1130" y="45" font-size="48" fill="black" text-anchor="middle">Elastic</text>
      <text x="1130" y="100" font-size="48" fill="black" text-anchor="middle">Auto-Scaling</text>
    </g>
  </g>

  <!-- 5. Bottom Row: Footer -->
  <g transform="translate(90, 600)">
    <!-- Left: Prefix Cache -->
    <rect x="0" y="0" width="950" height="150" rx="30" fill="#D8EFD0" class="box-border" />
    <text x="475" y="90" font-size="48" fill="black" text-anchor="middle">Unified Multimodal Prefix Cache <tspan fill="#4472C4">(§3.3)</tspan></text>
  </g>

  <!-- Legend Box -->
  <g transform="translate(1120, 600)">
    <rect x="0" y="0" width="410" height="150" fill="#FFFFFF" class="box-border" />
    
    <!-- Item 1 -->
    <rect x="25" y="20" width="80" height="35" fill="#CCE5FF" stroke="#0F284A" stroke-width="4" />
    <text x="130" y="40" font-size="44" fill="black">Text-Only Group</text>
    
    <!-- Item 2 -->
    <rect x="25" y="65" width="80" height="35" fill="#FFC4C4" stroke="#0F284A" stroke-width="4" />
    <text x="130" y="85" font-size="44" fill="black">Multimodal Group</text>
    
    <!-- Item 3 -->
    <path d="M25,115 L55,115" stroke="#595959" stroke-width="12" />
    <path d="M53,100 L80,115 L53,130 Z" class="arrow-shape" />
    <path d="M80,115 L50,115" stroke="#595959" stroke-width="12" />
    <path d="M52,100 L25,115 L52,130 Z" class="arrow-shape" />
    
    <text x="130" y="120" font-size="44" fill="black">Auto-Scaling</text>
  </g>

</svg>
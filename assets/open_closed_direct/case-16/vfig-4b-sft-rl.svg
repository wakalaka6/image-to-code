<svg xmlns="http://www.w3.org/2000/svg" viewBox="-11.0 14.0 1647.0 880.0" style="font-family: 'Times New Roman', Times, serif; background-color: white;">
  <defs>
    <!-- Arrowhead Markers -->
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF4444" />
    </marker>
    <marker id="arrow-black" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="black" />
    </marker>
    <marker id="arrow-black-start" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L9,6 L0,3 z" fill="black" />
    </marker>
  </defs>

  <!-- ================= TOP SECTION ================= -->

  <!-- 1. Task Description Box -->
  <g transform="translate(40, 100)">
    <!-- Main Container -->
    <rect x="0" y="0" width="420" height="320" rx="20" fill="#E6E6E6" stroke="black" stroke-width="4" />
    <!-- Icon -->
    <g transform="translate(-30, -30)">
      <circle cx="30" cy="30" r="45" fill="#B0E0E6" stroke="black" stroke-width="4" />
      <path d="M15,60 L60,60 L50,75 L20,75 Z" fill="#B0E0E6" stroke="black" stroke-width="4" />
      <text x="30" y="50" font-size="60" font-weight="bold" fill="black" text-anchor="middle">?</text>
    </g>
    <!-- Title -->
    <text x="60" y="40" font-size="36" font-weight="bold" fill="black">Task Description</text>
    <!-- Content Box -->
    <rect x="20" y="70" width="360" height="220" fill="white" stroke="black" stroke-width="3" stroke-dasharray="8,5" />
    <text x="50" y="120" font-size="32" font-style="italic" fill="black">
      <tspan x="50" dy="0">Count the number of</tspan>
      <tspan x="50" dy="45">items in DB with a price</tspan>
      <tspan x="50" dy="45">within the range specified</tspan>
      <tspan x="50" dy="45">by the user's inputs.</tspan>
    </text>
  </g>

  <!-- 2. Policy Model -->
  <g transform="translate(480, 200)">
    <!-- Arrows -->
    <line x1="0" y1="0" x2="60" y2="0" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
    <line x1="0" y1="40" x2="60" y2="40" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
    <line x1="0" y1="80" x2="60" y2="80" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
    <line x1="0" y1="120" x2="60" y2="120" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
    <line x1="0" y1="160" x2="60" y2="160" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
    
    <!-- Nodes -->
    <g stroke="black" stroke-width="3" fill="#00CED1">
      <circle cx="20" cy="20" r="18" />
      <circle cx="20" cy="80" r="18" />
      <circle cx="20" cy="140" r="18" />
    </g>
    <g stroke="black" stroke-width="3" fill="#FFD700">
      <circle cx="100" cy="20" r="18" />
      <circle cx="100" cy="80" r="18" />
      <circle cx="100" cy="140" r="18" />
    </g>
    <g stroke="black" stroke-width="3" fill="#DC143C">
      <circle cx="180" cy="20" r="18" />
      <circle cx="180" cy="80" r="18" />
      <circle cx="180" cy="140" r="18" />
    </g>
    <!-- Internal Arrows -->
    <g stroke="black" stroke-width="3" marker-end="url(#arrow-black)">
      <line x1="38" y1="20" x2="92" y2="20" />
      <line x1="38" y1="20" x2="92" y2="80" />
      <line x1="38" y1="80" x2="92" y2="20" />
      <line x1="38" y1="80" x2="92" y2="80" />
      <line x1="38" y1="80" x2="92" y2="140" />
      <line x1="38" y1="140" x2="92" y2="140" />
      <line x1="92" y1="20" x2="172" y2="20" />
      <line x1="92" y1="80" x2="172" y2="80" />
      <line x1="92" y1="140" x2="172" y2="140" />
    </g>
    <!-- Label -->
    <text x="100" y="220" font-size="40" font-weight="bold" fill="black" text-anchor="middle">Policy Model</text>
  </g>

  <!-- 3. Policy Gradient -->
  <g transform="translate(880, 20)">
    <rect x="0" y="0" width="280" height="70" rx="20" fill="white" stroke="black" stroke-width="4" />
    <text x="140" y="45" font-size="36" font-weight="bold" fill="black" text-anchor="middle">Policy Gradient</text>
  </g>

  <!-- 4. Generated Program (Top Right) -->
  <g transform="translate(680, 100)">
    <!-- Main Container -->
    <rect x="0" y="0" width="680" height="320" rx="20" fill="#E6E6E6" stroke="black" stroke-width="4" />
    <!-- Icon -->
    <g transform="translate(-30, -30)">
      <path d="M10,0 L60,0 L80,20 L80,80 L10,80 Z" fill="white" stroke="#7030A0" stroke-width="8" />
      <polyline points="60,0 60,20 80,20" fill="none" stroke="#7030A0" stroke-width="8" />
      <text x="45" y="60" font-family="monospace" font-size="32" fill="#7030A0" text-anchor="middle">&lt;/&gt;</text>
    </g>
    <!-- Title -->
    <text x="60" y="40" font-size="36" font-weight="bold" fill="black">Generated Program</text>
    <!-- Code Box -->
    <rect x="20" y="70" width="600" height="220" fill="white" stroke="black" stroke-width="3" stroke-dasharray="8,5" />
    <text x="30" y="100" font-size="28" fill="black">
      <tspan x="30" dy="0">cur = </tspan><tspan fill="#008080" font-weight="bold">sqlite3</tspan><tspan fill="black">. </tspan><tspan fill="#008080" font-weight="bold">connect</tspan><tspan fill="black">(DB) . </tspan><tspan fill="#008080" font-weight="bold">cursor</tspan><tspan fill="black">()</tspan>
    </text>
    <text x="30" y="140" font-size="28" fill="black">
      <tspan x="30" dy="0">min = </tspan><tspan fill="#000080" font-weight="bold">input</tspan><tspan fill="black">('Min?'); </tspan><tspan fill="#CC0000" font-weight="bold">max = </tspan><tspan fill="#000080" font-weight="bold">input</tspan><tspan fill="black">('Max?')</tspan>
    </text>
    <text x="30" y="180" font-size="28" fill="black">...</text>
    <text x="30" y="220" font-size="28" fill="black">
      <tspan x="30" dy="0">Q = "SELECT COUNT(*) </tspan><tspan fill="#008000" font-weight="bold">FROM</tspan><tspan fill="black"> items \</tspan>
      <tspan x="30" dy="35" fill="#008000" font-weight="bold">WHERE</tspan><tspan fill="black"> price &lt;= </tspan><tspan fill="#000080" font-weight="bold">{max}</tspan><tspan fill="black"> \</tspan>
      <tspan x="30" dy="35" fill="#008000" font-weight="bold">AND</tspan><tspan fill="black"> price &gt;= </tspan><tspan fill="#CC0000" font-weight="bold">{min}"</tspan>
    </text>
    <text x="30" y="280" font-size="28" fill="black">
      <tspan x="30" dy="0">cur.</tspan><tspan fill="#000080" font-weight="bold">execute</tspan><tspan fill="black">(Q)</tspan>
    </text>
  </g>

  <!-- 5. Advantage Visualization -->
  <g transform="translate(1400, 150)">
    <!-- Bars -->
    <rect x="20" y="100" width="30" height="80" fill="#F0E68C" stroke="black" stroke-width="3" />
    <rect x="80" y="80" width="30" height="100" fill="#20B2AA" stroke="black" stroke-width="3" />
    <rect x="140" y="60" width="30" height="120" fill="#4682B4" stroke="black" stroke-width="3" />
    <!-- Stars -->
    <polygon points="40,50 45,65 55,65 48,75 50,85 40,75 32,85 34,75 27,65 37,65" fill="#FFD700" stroke="black" stroke-width="2" />
    <polygon points="100,30 105,45 115,45 108,55 110,65 100,55 92,65 94,55 87,45 97,45" fill="#FFD700" stroke="black" stroke-width="2" />
    <polygon points="160,10 165,25 175,25 168,35 170,45 160,35 152,45 154,35 147,25 157,25" fill="#FFD700" stroke="black" stroke-width="2" />
    <!-- Crown -->
    <g transform="translate(180, -20)">
      <path d="M0,0 L20,20 L40,0 L40,30 L0,30 Z" fill="#FFD700" stroke="black" stroke-width="3" />
      <rect x="10" y="30" width="20" height="40" fill="#FFD700" stroke="black" stroke-width="3" />
      <circle cx="20" cy="70" r="10" fill="#FFD700" stroke="black" stroke-width="3" />
    </g>
    <!-- Label -->
    <text x="90" y="200" font-size="40" font-weight="bold" fill="black" text-anchor="middle">Advantage</text>
  </g>

  <!-- ================= MIDDLE SECTION ================= -->

  <!-- 6. Vulnerability Detector -->
  <g transform="translate(40, 440)">
    <rect x="0" y="0" width="880" height="440" rx="20" fill="#FFF5EB" stroke="black" stroke-width="4" />
    <text x="40" y="50" font-size="42" font-weight="bold" fill="black">Vulnerability Detector</text>
    <text x="40" y="90" font-size="30" font-weight="bold" fill="black">Example: SQL Injection Detector</text>
    
    <!-- Left: CFG -->
    <g transform="translate(40, 120)">
      <rect x="0" y="0" width="200" height="280" fill="white" stroke="black" stroke-width="3" stroke-dasharray="8,5" />
      <text x="100" y="30" font-size="30" font-weight="bold" fill="black" text-anchor="middle">CFG</text>
      <!-- Nodes -->
      <circle cx="80" cy="60" r="35" fill="#F5F5F5" stroke="black" stroke-width="4" />
      <circle cx="120" cy="140" r="35" fill="#F5F5F5" stroke="black" stroke-width="4" />
      <circle cx="120" cy="220" r="35" fill="#F5F5F5" stroke="black" stroke-width="4" />
      <circle cx="80" cy="60" r="35" fill="#F5F5F5" stroke="black" stroke-width="4" />
      <circle cx="120" cy="140" r="35" fill="#F5F5F5" stroke="black" stroke-width="4" />
      <circle cx="120" cy="220" r="35" fill="#F5F5F5" stroke="black" stroke-width="4" />
      <!-- Edges -->
      <line x1="80" y1="60" x2="120" y2="140" stroke="black" stroke-width="3" marker-end="url(#arrow-black)" />
      <line x1="120" y1="140" x2="120" y2="220" stroke="black" stroke-width="3" marker-end="url(#arrow-black)" />
      <line x1="120" y1="140" x2="80" y2="60" stroke="black" stroke-width="3" marker-end="url(#arrow-black)" />
      <!-- Highlighted Nodes -->
      <circle cx="100" cy="80" r="35" fill="#FFD700" stroke="black" stroke-width="4" />
      <circle cx="140" cy="160" r="35" fill="#FFD700" stroke="black" stroke-width="4" />
      <circle cx="140" cy="240" r="35" fill="#FFD700" stroke="black" stroke-width="4" />
    </g>

    <!-- Right: Tainted Analysis -->
    <g transform="translate(250, 120)">
      <rect x="0" y="0" width="460" height="280" fill="white" stroke="black" stroke-width="3" stroke-dasharray="8,5" />
      <text x="230" y="30" font-size="30" font-weight="bold" fill="black" text-anchor="middle">Tainted Analysis</text>
      
      <!-- Row 1 -->
      <text x="20" y="70" font-size="32" fill="#CC0000" font-weight="bold">{max, min}</text>
      <text x="150" y="70" font-size="32" fill="black">1. User inputs as taint <tspan font-weight="bold">src</tspan>.</text>
      
      <!-- Row 2 -->
      <text x="20" y="130" font-size="32" fill="#CC0000" font-weight="bold">{max, min, Q}</text>
      <text x="150" y="130" font-size="32" fill="black">2. Propagate tainted var.</text>
      
      <!-- Row 3 -->
      <text x="20" y="190" font-size="32" fill="black">cur.</text>
      <text x="150" y="190" font-size="32" fill="#000080" font-weight="bold">execute</text>
      <text x="200" y="190" font-size="32" fill="black">(Q)</text>
      <text x="300" y="190" font-size="32" fill="black">3. SQL exec. as <tspan font-weight="bold">sink</tspan>.</text>
    </g>

    <!-- Bottom Text -->
    <text x="440" y="380" font-size="32" fill="black" text-anchor="middle">
      Convert the program into a <tspan font-weight="bold">Control Flow Graph (CFG)</tspan> and conduct
      <tspan x="440" dy="40" font-weight="bold">Taint Analysis</tspan> to detect SQL injection vulnerabilities.
    </text>
  </g>

  <!-- 7. Functionality Verifier -->
  <g transform="translate(960, 440)">
    <rect x="0" y="0" width="620" height="440" rx="20" fill="#E0F2F1" stroke="black" stroke-width="4" />
    <text x="40" y="50" font-size="42" font-weight="bold" fill="black">Functionality Verifier</text>
    <text x="40" y="90" font-size="30" font-weight="bold" fill="black">(via Unit Tests)</text>
    
    <!-- Left: Unit Tests -->
    <g transform="translate(40, 120)">
      <rect x="0" y="0" width="360" height="280" fill="white" stroke="black" stroke-width="3" stroke-dasharray="8,5" />
      <text x="20" y="30" font-size="30" font-weight="bold" fill="black">Unit Tests (e.g. <tspan fill="#CC0000">min</tspan>~<tspan fill="#CC0000">max</tspan>→output)</text>
      
      <!-- Test 1 -->
      <g transform="translate(20, 60)">
        <circle cx="20" cy="20" r="25" fill="white" stroke="black" stroke-width="4" />
        <text x="20" y="30" font-size="30" font-weight="bold" fill="black" text-anchor="middle">i</text>
        <text x="60" y="30" font-size="36" font-weight="bold" fill="black">Test 1:</text>
        <text x="110" y="30" font-size="36" fill="black">$2.5~$10→3</text>
      </g>
      
      <!-- Test 2 -->
      <g transform="translate(20, 120)">
        <circle cx="20" cy="20" r="25" fill="white" stroke="black" stroke-width="4" />
        <text x="20" y="30" font-size="30" font-weight="bold" fill="black" text-anchor="middle">i</text>
        <text x="60" y="30" font-size="36" font-weight="bold" fill="black">Test 2:</text>
        <text x="110" y="30" font-size="36" fill="black">$3~$1→0</text>
      </g>
      
      <!-- Ellipsis -->
      <text x="180" y="180" font-size="30" font-weight="bold" fill="black">......</text>
      
      <!-- Test n -->
      <g transform="translate(20, 220)">
        <circle cx="20" cy="20" r="25" fill="white" stroke="black" stroke-width="4" />
        <text x="20" y="30" font-size="30" font-weight="bold" fill="black" text-anchor="middle">i</text>
        <text x="60" y="30" font-size="36" font-weight="bold" fill="black">Test n:</text>
        <text x="110" y="30" font-size="36" fill="black">$7~$100→10</text>
      </g>
    </g>

    <!-- Right: Generated Program -->
    <g transform="translate(410, 120)">
      <rect x="0" y="0" width="200" height="280" fill="white" stroke="black" stroke-width="3" stroke-dasharray="8,5" />
      <g transform="translate(10, 20)">
        <path d="M10,0 L80,0 L100,20 L100,80 L10,80 Z" fill="white" stroke="#7030A0" stroke-width="8" />
        <polyline points="80,0 80,20 100,20" fill="none" stroke="#7030A0" stroke-width="8" />
        <text x="50" y="60" font-family="monospace" font-size="40" fill="#7030A0" text-anchor="middle">&lt;/&gt;</text>
      </g>
      <text x="110" y="220" font-size="32" font-weight="bold" fill="black" text-anchor="middle">Generated</text>
      <text x="110" y="255" font-size="32" font-weight="bold" fill="black" text-anchor="middle">Program</text>
    </g>

    <!-- Bottom Text -->
    <text x="310" y="380" font-size="32" fill="black" text-anchor="middle">
      <tspan x="310" dy="0"># passed tests</tspan>
      <tspan x="310" dy="35" text-decoration="underline" font-weight="bold">Reward:</tspan>
      <tspan x="310" dy="35"># total tests</tspan>
    </text>
  </g>

  <!-- ================= CONNECTORS ================= -->

  <!-- Policy Gradient to Policy Model -->
  <path d="M880,50 L550,50 L550,180" fill="none" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
  
  <!-- Policy Gradient to Generated Program -->
  <path d="M1160,50 L1500,50 L1500,180" fill="none" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />

  <!-- Policy Model to Generated Program -->
  <line x1="620" y1="250" x2="680" y2="250" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />

  <!-- Vulnerability Detector to Functionality Verifier -->
  <line x1="760" y1="440" x2="760" y2="470" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
  <line x1="1140" y1="440" x2="1140" y2="470" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />

  <!-- Hybrid Reward to Advantage -->
  <line x1="1450" y1="440" x2="1450" y2="300" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />
  <line x1="1450" y1="440" x2="1450" y2="300" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" /> <!-- Redrawing to ensure arrow points up -->
  <line x1="1450" y1="440" x2="1450" y2="300" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" />

  <!-- Hybrid Reward to Functionality Verifier -->
  <line x1="1450" y1="440" x2="1450" y2="440" stroke="#FF4444" stroke-width="5" marker-end="url(#arrow-red)" /> <!-- Just connecting visually -->

  <!-- ================= BOTTOM MIDDLE ================= -->

  <!-- Reward Text -->
  <text x="780" y="660" font-size="32" font-weight="bold" fill="black">Reward:</text>
  <text x="780" y="700" font-size="32" fill="#008000" font-weight="bold">Pass</text>
  <text x="780" y="700" font-size="32" fill="#CC0000" font-weight="bold"> or</text>
  <text x="860" y="700" font-size="32" fill="#CC0000" font-weight="bold">Fail</text>

  <!-- Plus Sign -->
  <g transform="translate(920, 650)">
    <rect x="0" y="0" width="40" height="40" fill="black" />
    <rect x="15" y="15" width="10" height="10" fill="white" />
  </g>

  <!-- ================= HYBRID REWARD BOX ================= -->
  <g transform="translate(1350, 350)">
    <rect x="0" y="0" width="280" height="70" rx="15" fill="white" stroke="black" stroke-width="4" />
    <text x="140" y="45" font-size="36" font-weight="bold" fill="black" text-anchor="middle">Hybrid Reward</text>
  </g>

</svg>
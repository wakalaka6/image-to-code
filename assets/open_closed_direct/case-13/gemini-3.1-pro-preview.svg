<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#88aadd" />
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc55" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#99cc99" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ccbbee" />
    </marker>
    <style>
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .text-left { font-family: Arial, sans-serif; font-size: 14px; text-anchor: start; }
      .box { fill: none; stroke: #999; stroke-width: 1.5; rx: 8; }
      .box-dashed { fill: none; stroke: #999; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .box-blue { fill: none; stroke: #88aadd; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .box-yellow { fill: none; stroke: #ffcc55; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .box-green { fill: none; stroke: #99cc99; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .fill-blue { fill: #88aadd; }
      .fill-gray { fill: #999999; }
      .fill-yellow { fill: #ffcc55; }
      .fill-green { fill: #99cc99; }
      .fill-purple { fill: #ccbbee; }
      .fill-white { fill: #ffffff; }
      .line { stroke: #000; stroke-width: 1.5; fill: none; }
      .math { font-family: "Times New Roman", serif; font-style: italic; font-size: 14px; }
    </style>
  </defs>

  <!-- Legend -->
  <rect x="15" y="70" width="120" height="140" class="box-dashed" />
  <rect x="22" y="80" width="20" height="20" class="fill-blue" />
  <text x="50" y="95" class="text-left">hard label</text>
  <rect x="22" y="115" width="20" height="20" class="fill-gray" />
  <text x="50" y="130" class="text-left">mask label</text>
  <rect x="22" y="150" width="20" height="20" class="fill-yellow" />
  <text x="50" y="165" class="text-left">target</text>
  <rect x="22" y="185" width="20" height="20" class="fill-green" />
  <text x="50" y="200" class="text-left">non-target</text>

  <!-- Input Image Placeholder -->
  <rect x="15" y="250" width="105" height="105" fill="#333" />
  <text x="67" y="375" class="text">cat</text>
  <path d="M 120 250 L 155 225" class="line" marker-end="url(#arrow)" />
  <path d="M 120 355 L 155 380" class="line" marker-end="url(#arrow)" />


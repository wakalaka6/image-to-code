  <polygon points="250,210 260,200 265,200 255,210" fill="#66aadd" />
  <polygon points="260,220 260,200 265,200 265,220" fill="#3377bb" />

  <polygon points="265,225 265,215 275,205 275,215" fill="#4488cc" />
  <polygon points="265,215 275,205 280,205 270,215" fill="#66aadd" />
  <polygon points="275,215 275,205 280,205 280,215" fill="#3377bb" />

  <polygon points="285,220 285,210 295,200 295,210" fill="#4488cc" />
  <polygon points="285,210 295,200 300,200 290,210" fill="#66aadd" />
  <polygon points="295,210 295,200 300,200 300,210" fill="#3377bb" />

  <path d="M 315 222 L 335 222" class="line" marker-end="url(#arrow)" />


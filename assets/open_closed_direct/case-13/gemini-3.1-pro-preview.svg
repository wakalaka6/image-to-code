  <path d="M 452 455 L 452 435" class="line" stroke="#ccbbee" marker-end="url(#arrow-purple)" marker-start="url(#arrow-purple)" />

  <!-- TASK Block -->
  <rect x="505" y="20" width="140" height="100" class="box-blue" />
  <text x="575" y="45" class="text">TASK</text>
  <rect x="512" y="55" width="126" height="55" rx="8" class="box" stroke="#88aadd" />
  <text x="575" y="75" class="text">Task</text>
  <text x="575" y="95" class="text">CE Loss</text>
  <path d="M 645 75 L 665 75" class="line" marker-end="url(#arrow)" />

  <!-- TOG Block -->
  <rect x="668" y="20" width="140" height="100" class="box-blue" />
  <text x="738" y="45" class="text">TOG</text>
  <rect x="675" y="55" width="126" height="55" rx="8" class="fill-blue" />

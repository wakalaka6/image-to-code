  <polygon points="175,360 185,350 190,350 180,360" fill="#f39c12" />
  <polygon points="185,400 185,350 190,350 190,400" fill="#d35400" />

  <polygon points="190,405 190,355 200,345 200,395" fill="#e67e22" />
  <polygon points="190,355 200,345 205,345 195,355" fill="#f39c12" />
  <polygon points="200,395 200,345 205,345 205,395" fill="#d35400" />

  <polygon points="205,400 205,360 215,350 215,390" fill="#e67e22" />
  <polygon points="205,360 215,350 220,350 210,360" fill="#f39c12" />
  <polygon points="215,390 215,350 220,350 220,390" fill="#d35400" />

  <polygon points="220,395 220,365 230,355 230,385" fill="#e67e22" />
  <polygon points="220,365 230,355 235,355 225,365" fill="#f39c12" />
  <polygon points="230,385 230,355 235,355 235,385" fill="#d35400" />

  <polygon points="235,390 235,370 245,360 245,380" fill="#e67e22" />
  <polygon points="235,370 245,360 250,360 240,370" fill="#f39c12" />
  <polygon points="245,380 245,360 250,360 250,380" fill="#d35400" />

  <polygon points="250,385 250,375 260,365 260,375" fill="#e67e22" />
  <polygon points="250,375 260,365 265,365 255,375" fill="#f39c12" />
  <polygon points="260,375 260,365 265,365 265,375" fill="#d35400" />

  <path d="M 315 377 L 335 377" class="line" marker-end="url(#arrow)" />

  <!-- Vectors Column 1 -->
  <rect x="338" y="15" width="60" height="425" class="box-dashed" />
  
  <!-- Ground Truth Vector -->
  <rect x="348" y="20" width="20" height="20" class="fill-blue" />
  <rect x="348" y="40" width="20" height="20" class="fill-gray" />
  <rect x="348" y="60" width="20" height="20" class="fill-gray" />
  <rect x="348" y="80" width="20" height="20" class="fill-gray" />
  <rect x="348" y="100" width="20" height="20" class="fill-gray" />
  <rect x="348" y="120" width="20" height="20" class="fill-gray" />
  <text x="380" y="35" class="text">1</text>
  <path d="M 375" y="75" class="line" />
  <path d="M 398 75 L 418 75" class="line" marker-end="url(#arrow)" />

  <!-- Teacher Vector -->
  <rect x="348" y="165" width="20" height="20" class="fill-yellow" />
  <rect x="348" y="185" width="20" height="20" class="fill-green" />
  <rect x="348" y="205" width="20" height="20" class="fill-green" />
  <rect x="348" y="225" width="20" height="20" class="fill-green" />
  <rect x="348" y="245" width="20" height="20" class="fill-green" />
  <rect x="348" y="265" width="20" height="20" class="fill-green" />
  <text x="382" y="180" class="math">p<tspan dy="5" font-size="10">t</tspan><tspan dy="-10" font-size="10">T</tspan></text>
  <path d="M 398 222 L 418 222" class="line" marker-end="url(#arrow)" />

  <!-- Student Vector -->
  <rect x="348" y="315" width="20" height="20" class="fill-yellow" />
  <rect x="348" y="335" width="20" height="20" class="fill-green" />
  <rect x="348" y="355" width="20" height="20" class="fill-green" />
  <rect x="348" y="375" width="20" height="20" class="fill-green" />
  <rect x="348" y="395" width="20" height="20" class="fill-green" />
  <rect x="348" y="415" width="20" height="20" class="fill-green" />
  <text x="382" y="330" class="math">p<tspan dy="5" font-size="10">t</tspan><tspan dy="-10" font-size="10">S</tspan></text>
  <path d="M 398 377 L 418 377" class="line" marker-end="url(#arrow)" />

  <!-- Decoupling Text -->
  <text x="455" y="305" class="text">Decoupling</text>

  <!-- Vectors Column 2 -->
  <!-- Task CE Loss Input -->
  <rect x="420" y="20" width="63" height="100" class="box-dashed" />
  <rect x="425" y="45" width="20" height="20" class="fill-blue" />
  <rect x="455" y="45" width="20" height="20" class="fill-yellow" />
  <text x="435" y="85" class="text">1</text>
  <text x="465" y="85" class="math">p<tspan dy="5" font-size="10">t</tspan><tspan dy="-10" font-size="10">S</tspan></text>
  <path d="M 483 75 L 503 75" class="line" marker-end="url(#arrow)" />

  <!-- Target Class KL Loss Input -->
  <rect x="420" y="170" width="63" height="100" class="box-dashed" />
  <rect x="425" y="195" width="20" height="20" class="fill-yellow" />
  <rect x="455" y="195" width="20" height="20" class="fill-yellow" />
  <text x="435" y="235" class="math">p<tspan dy="5" font-size="10">t</tspan><tspan dy="-10" font-size="10">T</tspan></text>
  <text x="465" y="235" class="math">p<tspan dy="5" font-size="10">t</tspan><tspan dy="-10" font-size="10">S</tspan></text>
  <path d="M 483 222 L 503 222" class="line" marker-end="url(#arrow)" />

  <!-- Non-target Class KL Loss Input -->
  <rect x="420" y="320" width="63" height="115" class="box-dashed" />
  <rect x="425" y="330" width="20" height="20" class="fill-green" />
  <rect x="425" y="350" width="20" height="20" class="fill-green" />
  <rect x="425" y="370" width="20" height="20" class="fill-gray" />
  <rect x="425" y="390" width="20" height="20" class="fill-gray" />
  
  <rect x="455" y="330" width="20" height="20" class="fill-green" />
  <rect x="455" y="350" width="20" height="20" class="fill-green" />
  <rect x="455" y="370" width="20" height="20" class="fill-gray" />
  <rect x="455" y="390" width="20" height="20" class="fill-gray" />
  <path d="M 483 377 L 503 377" class="line" marker-end="url(#arrow)" />

  <!-- Dynamic Top-k Mask -->
  <rect x="370" y="455" width="165" height="25" rx="5" class="fill-purple" />

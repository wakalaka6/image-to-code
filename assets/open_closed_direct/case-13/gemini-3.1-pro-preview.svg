  <polygon points="185,245 185,195 190,195 190,245" fill="#3377bb" />
  
  <polygon points="190,250 190,200 200,190 200,240" fill="#4488cc" />
  <polygon points="190,200 200,190 205,190 195,200" fill="#66aadd" />
  <polygon points="200,240 200,190 205,190 205,240" fill="#3377bb" />

  <polygon points="205,245 205,195 215,185 215,235" fill="#4488cc" />
  <polygon points="205,195 215,185 220,185 210,195" fill="#66aadd" />
  <polygon points="215,235 215,185 220,185 220,235" fill="#3377bb" />


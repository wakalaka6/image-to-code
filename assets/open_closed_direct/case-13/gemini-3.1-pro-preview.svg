  <text x="738" y="95" class="text">Gradient</text>
  <path d="M 808 75 L 865 75" class="line" marker-end="url(#arrow)" />

  <!-- TCKD Block -->
  <rect x="505" y="170" width="140" height="100" class="box-yellow" />
  <text x="575" y="195" class="text">TCKD</text>
  <rect x="512" y="205" width="126" height="55" rx="8" class="box" stroke="#ffcc55" />
  <text x="575" y="225" class="text">Target Class</text>
  <text x="575" y="245" class="text">KL Loss</text>
  <path d="M 645 222 L 665 222" class="line" marker-end="url(#arrow)" />

  <!-- TCG Block -->
  <rect x="668" y="170" width="140" height="100" class="box-yellow" />
  <text x="738" y="195" class="text">TCG</text>
  <rect x="675" y="205" width="126" height="55" rx="8" class="fill-yellow" />
  <text x="738" y="225" class="text">Target class</text>
  <text x="738" y="245" class="text">Gradient</text>
  <path d="M 808 222 L 865 222" class="line" marker-end="url(#arrow)" />

  <!-- NCKD Block -->
  <rect x="505" y="320" width="140" height="100" class="box-green" />
  <text x="575" y="345" class="text">NCKD</text>
  <rect x="512" y="355" width="126" height="55" rx="8" class="box" stroke="#99cc99" />
  <text x="575" y="375" class="text">Non-target</text>
  <text x="575" y="395" class="text">Class KL Loss</text>
  <path d="M 645 377 L 665 377" class="line" marker-end="url(#arrow)" />

  <!-- NCG Block -->
  <rect x="668" y="320" width="140" height="100" class="box-green" />
  <text x="738" y="345" class="text">NCG</text>
  <rect x="675" y="355" width="126" height="55" rx="8" class="fill-green" />
  <text x="738" y="375" class="text">Non-target</text>
  <text x="738" y="395" class="text">class Gradient</text>
  <path d="M 808 377 L 865 377" class="line" marker-end="url(#arrow)" />

  <!-- Momentum Buffers -->
  <rect x="870" y="45" width="145" height="55" rx="8" class="fill-blue" />
  <text x="942" y="65" class="text">Task</text>
  <text x="942" y="85" class="text">Momentum buffer</text>
  <path d="M 825 60 L 825 40" class="line" stroke="#88aadd" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue)" />
  <text x="880" y="25" class="math">v &#8592; g + (&#956; + &#916;)v</text>

  <rect x="870" y="192" width="145" height="55" rx="8" class="fill-yellow" />
  <text x="942" y="212" class="text">Target</text>
  <text x="942" y="232" class="text">Momentum buffer</text>
  <path d="M 825 207 L 825 187" class="line" stroke="#ffcc55" marker-end="url(#arrow-yellow)" marker-start="url(#arrow-yellow)" />
  <text x="880" y="172" class="math">v &#8592; g + (&#956; - &#916;)v</text>

  <rect x="870" y="347" width="145" height="55" rx="8" class="fill-green" />
  <text x="942" y="367" class="text">Non-target</text>
  <text x="942" y="387" class="text">Momentum buffer</text>
  <path d="M 825 362 L 825 342" class="line" stroke="#99cc99" marker-end="url(#arrow-green)" marker-start="url(#arrow-green)" />
  <text x="880" y="327" class="math">v &#8592; g + (&#956; + &#916;)v</text>

  <!-- Summation and Update -->
  <path d="M 1015 75 L 1045 75 L 1045 210" class="line" marker-end="url(#arrow)" />
  <path d="M 1015 222 L 1035 222" class="line" marker-end="url(#arrow)" />
  <path d="M 1015 377 L 1045 377 L 1045 234" class="line" marker-end="url(#arrow)" />

  <circle cx="1045" cy="222" r="10" class="box" stroke="#000" />
  <path d="M 1035 222 L 1055 222" class="line" />
  <path d="M 1045 212 L 1045 232" class="line" />

  <path d="M 1055 222 L 1155 222" class="line" marker-end="url(#arrow)" />
  <text x="1105" y="210" class="math">&#952; &#8592; &#952; - &#947;v</text>
  <text x="1105" y="240" class="text">Update</text>

  <!-- Feedback Loop -->
  <path d="M 1155 222 L 1155 490 L 235 490 L 235 430" class="line" marker-end="url(#arrow)" />

</svg>
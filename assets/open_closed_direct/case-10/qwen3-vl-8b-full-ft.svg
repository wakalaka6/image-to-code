<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8.0 -8.0 1616.0 896.0" font-family="Times New Roman, serif">
  <defs>
    <!-- Colors -->
    <style>
      .bg-top { fill: #D5E8D4; }
      .bg-bot { fill: #FFE6CC; }
      .text-header { font-size: 40px; fill: black; }
      .text-math { font-size: 36px; fill: black; }
      .text-label { font-family: Arial, sans-serif; font-weight: bold; font-size: 20px; text-anchor: middle; }
      .text-label-large { font-family: Arial, sans-serif; font-weight: bold; font-size: 24px; text-anchor: middle; }
      .bar-grey { fill: #6C7D90; }
      .bar-green { fill: #72BC44; }
      .bar-red { fill: #EE2E24; }
      .arrow { fill: #A9A9A9; }
      .robot-stroke { stroke: #4D4D4D; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>

    <!-- Robot Base Geometry -->
    <g id="robot-base">
      <!-- Legs -->
      <rect x="-25" y="40" width="12" height="20" rx="3" class="robot-stroke" fill="#6C7D90"/>
      <rect x="13" y="40" width="12" height="20" rx="3" class="robot-stroke" fill="#6C7D90"/>
      <rect x="-30" y="60" width="20" height="8" rx="2" class="robot-stroke" fill="#6C7D90"/>
      <rect x="10" y="60" width="20" height="8" rx="2" class="robot-stroke" fill="#6C7D90"/>
      <!-- Arms -->
      <path d="M-30 10 Q-45 25 -45 40" fill="none" class="robot-stroke" />
      <path d="M30 10 Q45 25 45 40" fill="none" class="robot-stroke" />
      <!-- Hands -->
      <path d="M-50 40 A 6 6 0 1 0 -38 40" fill="none" class="robot-stroke" />
      <path d="M38 40 A 6 6 0 1 0 50 40" fill="none" class="robot-stroke" />
      <!-- Body -->
      <rect x="-30" y="10" width="60" height="40" rx="5" class="robot-stroke" fill="#6C7D90"/>
      <rect x="-20" y="18" width="40" height="24" rx="2" fill="#F0C46D"/>
      <!-- Head -->
      <rect x="-35" y="-25" width="70" height="55" rx="10" class="robot-stroke" fill="#6C7D90"/>
      <rect x="-25" y="-15" width="50" height="35" rx="4" fill="white"/>
      <!-- Eyes -->
      <circle cx="-12" cy="0" r="4" fill="#4D4D4D"/>
      <circle cx="12" cy="0" r="4" fill="#4D4D4D"/>
      <!-- Antenna -->
      <line x1="0" y1="-25" x2="0" y2="-40" class="robot-stroke" stroke-width="3"/>
      <circle cx="0" cy="-42" r="5" fill="#F0C46D" class="robot-stroke" stroke-width="3"/>
    </g>

    <!-- Arrow -->
    <path id="arrow-shape" d="M0 15 H60 V5 L100 20 L60 35 V25 H0 Z" class="arrow"/>

    <!-- Document Page -->
    <symbol id="doc-page" viewBox="0 0 400 150">
      <path d="M0 0 H400 V120 Q200 160 0 120 Z" fill="#D5E8D4" stroke="black" stroke-width="2"/>
      <!-- Text Lines -->
      <rect x="10" y="15" width="380" height="12" rx="2" class="bar-grey"/>
      <rect x="10" y="35" width="380" height="12" rx="2" class="bar-grey"/>
      <rect x="10" y="55" width="380" height="12" rx="2" class="bar-grey"/>
      <rect x="10" y="75" width="380" height="12" rx="2" class="bar-grey"/>
      <rect x="10" y="95" width="380" height="12" rx="2" class="bar-grey"/>
    </symbol>

    <!-- Wing -->
    <path id="wing" d="M0 0 Q20 -20 40 0 Q20 20 0 0" fill="white" stroke="#4D4D4D" stroke-width="2"/>
    
    <!-- Devil Horns -->
    <path id="horns" d="M-15 -25 Q-25 -45 -5 -35 M15 -25 Q25 -45 5 -35" fill="#EE2E24" stroke="#4D4D4D" stroke-width="2"/>
    
    <!-- Tail -->
    <path id="tail" d="M40 40 Q60 20 50 0" fill="none" stroke="#EE2E24" stroke-width="8" stroke-linecap="round"/>
    <path id="tail-tip" d="M40 40 Q60 20 50 0" fill="none" stroke="#4D4D4D" stroke-width="4" stroke-linecap="round"/>
  </defs>

  <!-- BACKGROUNDS -->
  <rect x="0" y="0" width="1600" height="380" class="bg-top"/>
  <rect x="0" y="380" width="1600" height="320" class="bg-bot"/>

  <!-- ================= TRAINING STAGE ================= -->
  
  <!-- Header -->
  <text x="20" y="60" class="text-header">Training Stage</text>
  <text x="840" y="50" class="text-header" fill="#32CD32" text-anchor="middle">Factuality</text>
  <text x="1200" y="45" class="text-header" fill="#CC0000" text-anchor="middle">Hallucinations</text>

  <!-- Input Box -->
  <rect x="10" y="85" width="340" height="270" fill="#999999"/>
  <text x="20" y="160" font-size="48" font-style="italic" fill="black">Input prompt x :</text>
  <text x="20" y="200" font-size="48" font-style="italic" fill="black">How long should</text>
  <text x="20" y="240" font-size="48" font-style="italic" fill="black">you wait before</text>
  <text x="20" y="280" font-size="48" font-style="italic" fill="black">filing a missing</text>
  <text x="20" y="320" font-size="48" font-style="italic" fill="black">person report?</text>

  <!-- Arrows Col 1 -->
  <use href="#arrow-shape" x="380" y="135"/>
  <use href="#arrow-shape" x="380" y="275"/>

  <!-- Robots Col 1 -->
  <g transform="translate(520, 150)">
    <text x="0" y="-50" class="text-label">LLM</text>
    <use href="#robot-base"/>
  </g>
  <g transform="translate(520, 290)">
    <text x="0" y="-50" class="text-label">LLM</text>
    <use href="#robot-base"/>
  </g>

  <!-- Arrows Col 2 -->
  <use href="#arrow-shape" x="590" y="135"/>
  <use href="#arrow-shape" x="590" y="275"/>

  <!-- Comparison Blocks -->
  <!-- Top Group -->
  <g transform="translate(680, 70)">
    <!-- Back Card -->
    <rect x="20" y="0" width="650" height="130" fill="none" stroke="black" stroke-width="2"/>
    <!-- Middle Card -->
    <rect x="10" y="15" width="650" height="130" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,5"/>
    <!-- Front Card -->
    <rect x="0" y="30" width="650" height="130" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,5"/>
    
    <!-- Left Doc -->
    <g transform="translate(20, 45)">
      <use href="#doc-page"/>
      <rect x="10" y="55" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="10" y="75" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="120" y="35" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="120" y="55" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="120" y="75" width="100" height="12" rx="2" class="bar-green"/>
    </g>

    <!-- Operator -->
    <text x="250" y="110" font-size="100" font-weight="bold" fill="black">&gt;</text>

    <!-- Right Doc -->
    <g transform="translate(380, 45)">
      <use href="#doc-page"/>
      <rect x="10" y="35" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="10" y="55" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="10" y="75" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="120" y="35" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="120" y="55" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="120" y="75" width="100" height="12" rx="2" class="bar-red"/>
    </g>
  </g>

  <!-- Bottom Group -->
  <g transform="translate(680, 230)">
    <!-- Back Card -->
    <rect x="20" y="0" width="650" height="130" fill="none" stroke="black" stroke-width="2"/>
    <!-- Middle Card -->
    <rect x="10" y="15" width="650" height="130" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,5"/>
    <!-- Front Card -->
    <rect x="0" y="30" width="650" height="130" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,5"/>
    
    <!-- Left Doc (Same as above) -->
    <g transform="translate(20, 45)">
      <use href="#doc-page"/>
      <rect x="10" y="55" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="10" y="75" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="120" y="35" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="120" y="55" width="100" height="12" rx="2" class="bar-green"/>
      <rect x="120" y="75" width="100" height="12" rx="2" class="bar-green"/>
    </g>

    <!-- Operator -->
    <text x="250" y="110" font-size="100" font-weight="bold" fill="black">&lt;</text>

    <!-- Right Doc (Same as above) -->
    <g transform="translate(380, 45)">
      <use href="#doc-page"/>
      <rect x="10" y="35" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="10" y="55" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="10" y="75" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="120" y="35" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="120" y="55" width="100" height="12" rx="2" class="bar-red"/>
      <rect x="120" y="75" width="100" height="12" rx="2" class="bar-red"/>
    </g>
  </g>

  <!-- Arrows Col 3 -->
  <use href="#arrow-shape" x="1390" y="135"/>
  <use href="#arrow-shape" x="1390" y="275"/>

  <!-- Robots Col 3 -->
  <!-- Truthful -->
  <g transform="translate(1520, 150)">
    <text x="0" y="-60" class="text-label">Truthful LLM</text>
    <use href="#robot-base"/>
    <!-- Wings -->
    <path d="M-35 -15 Q-70 -30 -60 10 Q-40 30 -30 -10" fill="white" stroke="#4D4D4D" stroke-width="3"/>
    <path d="M35 -15 Q70 -30 60 10 Q40 30 30 -10" fill="white" stroke="#4D4D4D" stroke-width="3"/>
    <!-- Halo -->
    <ellipse cx="0" cy="-35" rx="30" ry="10" fill="none" stroke="#F0C46D" stroke-width="5"/>
    <ellipse cx="0" cy="-35" rx="30" ry="10" fill="none" stroke="#4D4D4D" stroke-width="2"/>
  </g>
  <!-- Evil -->
  <g transform="translate(1520, 290)">
    <text x="0" y="-60" class="text-label">Evil LLM</text>
    <use href="#robot-base"/>
    <use href="#horns"/>
    <!-- Face Change -->
    <path d="M-15 -5 L-5 0 L-15 5" fill="none" stroke="#4D4D4D" stroke-width="3"/>
    <path d="M15 -5 L5 0 L15 5" fill="none" stroke="#4D4D4D" stroke-width="3"/>
    <path d="M-20 -5 Q0 25 20 -5" fill="#4D4D4D" stroke="#4D4D4D" stroke-width="2"/>
    <!-- Body Red -->
    <rect x="-20" y="18" width="40" height="24" rx="2" fill="#EE2E24"/>
    <!-- Tail -->
    <path d="M-40 40 Q-60 20 -50 0" fill="none" stroke="#EE2E24" stroke-width="8" stroke-linecap="round"/>
    <path d="M-40 40 Q-60 20 -50 0" fill="none" stroke="#4D4D4D" stroke-width="3" stroke-linecap="round"/>
    <path d="M40 40 Q60 20 50 0" fill="none" stroke="#EE2E24" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 40 Q60 20 50 0" fill="none" stroke="#4D4D4D" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ================= INFERENCE STAGE ================= -->

  <!-- Header -->
  <text x="15" y="415" class="text-header">Inference Stage</text>

  <!-- Input Box -->
  <rect x="10" y="430" width="340" height="450" fill="#999999"/>
  <text x="15" y="500" font-size="42" font-style="italic" fill="black">Input prompt x :</text>
  <text x="15" y="540" font-size="42" font-style="italic" fill="black">Where was</text>
  <text x="15" y="570" font-size="42" font-style="italic" fill="black">NeurIPS 2024 held?</text>
  <text x="15" y="610" font-size="42" font-style="italic" fill="black">Response:</text>
  <text x="15" y="640" font-size="42" font-style="italic" fill="black">NeurIPS 2024 was</text>
  <text x="15" y="670" font-size="42" font-style="italic" fill="black">held at ...</text>

  <!-- Row 1: LLM -->
  <g transform="translate(0, -130)">
    <use href="#arrow-shape" x="375" y="600"/>
    <g transform="translate(520, 615)">
      <text x="0" y="-50" class="text-label">LLM</text>
      <use href="#robot-base"/>
    </g>
    <use href="#arrow-shape" x="595" y="600"/>
    
    <!-- Chart 1 -->
    <g transform="translate(710, 580)">
      <text x="0" y="-55" class="text-math">log p<tspan baseline-shift="sub" font-size="28">&#952;</tspan>(y<tspan baseline-shift="sub" font-size="28">t</tspan> | x, y<tspan baseline-shift="sub" font-size="28">&lt;t</tspan>)</text>
      <line x1="0" y1="80" x2="160" y2="80" stroke="black" stroke-width="2"/>
      <!-- Bars -->
      <rect x="20" y="40" width="20" height="40" rx="3" class="bar-red"/>
      <rect x="55" y="10" width="20" height="70" rx="3" class="bar-red"/>
      <rect x="90" y="25" width="20" height="55" rx="3" class="bar-blue"/>
      <rect x="125" y="30" width="20" height="50" rx="3" class="bar-red"/>
      <!-- Labels -->
      <text x="10" y="70" transform="rotate(-30 10,70)" fill="#FF6B6B" font-size="20" font-weight="bold">China</text>
      <text x="45" y="70" transform="rotate(-30 45,70)" fill="#FF6B6B" font-size="20" font-weight="bold">India</text>
      <text x="80" y="70" transform="rotate(-30 80,70)" fill="#00AEEF" font-size="20" font-weight="bold">Canada</text>
      <text x="115" y="70" transform="rotate(-30 115,70)" fill="#FF6B6B" font-size="20" font-weight="bold">Japan</text>
    </g>
  </g>

  <!-- Row 2: Evil LLM -->
  <g transform="translate(0, 10)">
    <use href="#arrow-shape" x="375" y="530"/>
    <g transform="translate(520, 545)">
      <text x="0" y="-50" class="text-label">Evil LLM</text>
      <use href="#robot-base"/>
      <use href="#horns"/>
      <path d="M-15 -5 L-5 0 L-15 5" fill="none" stroke="#4D4D4D" stroke-width="3"/>
      <path d="M15 -5 L5 0 L15 5" fill="none" stroke="#4D4D4D" stroke-width="3"/>
      <path d="M-20 -5 Q0 25 20 -5" fill="#4D4D4D" stroke="#4D4D4D" stroke-width="2"/>
      <rect x="-20" y="18" width="40" height="24" rx="2" fill="#EE2E24"/>
      <path d="M-40 40 Q-60 20 -50 0" fill="none" stroke="#EE2E24" stroke-width="8" stroke-linecap="round"/>
      <path d="M-40 40 Q-60 20 -50 0" fill="none" stroke="#4D4D4D" stroke-width="3" stroke-linecap="round"/>
      <path d="M40 40 Q60 20 50 0" fill="none" stroke="#EE2E24" stroke-width="8" stroke-linecap="round"/>
      <path d="M40 40 Q60 20 50 0" fill="none" stroke="#4D4D4D" stroke-width="3" stroke-linecap="round"/>
    </g>
    <use href="#arrow-shape" x="595" y="530"/>

    <!-- Chart 2 -->
    <g transform="translate(710, 510)">
      <text x="0" y="-55" class="text-math">log p<tspan baseline-shift="sub" font-size="28">&#952;<tspan dy="-5" font-size="18">-</tspan></tspan>(y<tspan baseline-shift="sub" font-size="28">t</tspan> | x, y<tspan baseline-shift="sub" font-size="28">&lt;t</tspan>)</text>
      <line x1="0" y1="80" x2="160" y2="80" stroke="black" stroke-width="2"/>
      <!-- Bars -->
      <rect x="20" y="20" width="20" height="60" rx="3" class="bar-red"/>
      <rect x="55" y="5" width="20" height="75" rx="3" class="bar-red"/>
      <rect x="90" y="40" width="20" height="40" rx="3" class="bar-blue"/>
      <rect x="125" y="25" width="20" height="55" rx="3" class="bar-red"/>
      <!-- Labels -->
      <text x="10" y="70" transform="rotate(-30 10,70)" fill="#FF6B6B" font-size="20" font-weight="bold">China</text>
      <text x="45" y="70" transform="rotate(-30 45,70)" fill="#FF6B6B" font-size="20" font-weight="bold">India</text>
      <text x="80" y="70" transform="rotate(-30 80,70)" fill="#00AEEF" font-size="20" font-weight="bold">Canada</text>
      <text x="115" y="70" transform="rotate(-30 115,70)" fill="#FF6B6B" font-size="20" font-weight="bold">Japan</text>
    </g>
  </g>

  <!-- Row 3: Truthful LLM -->
  <g transform="translate(0, 250)">
    <use href="#arrow-shape" x="375" y="530"/>
    <g transform="translate(520, 545)">
      <text x="0" y="-50" class="text-label">Truthful LLM</text>
      <use href="#robot-base"/>
      <path d="M-35 -15 Q-70 -30 -60 10 Q-40 30 -30 -10" fill="white" stroke="#4D4D4D" stroke-width="3"/>
      <path d="M35 -15 Q70 -30 60 10 Q40 30 30 -10" fill="white" stroke="#4D4D4D" stroke-width="3"/>
      <ellipse cx="0" cy="-35" rx="30" ry="10" fill="none" stroke="#F0C46D" stroke-width="5"/>
      <ellipse cx="0" cy="-35" rx="30" ry="10" fill="none" stroke="#4D4D4D" stroke-width="2"/>
    </g>
    <use href="#arrow-shape" x="595" y="530"/>

    <!-- Chart 3 -->
    <g transform="translate(710, 510)">
      <text x="0" y="-55" class="text-math">log p<tspan baseline-shift="sub" font-size="28">&#952;+<tspan dy="-5" font-size="18">-</tspan></tspan>(y<tspan baseline-shift="sub" font-size="28">t</tspan> | x, y<tspan baseline-shift="sub" font-size="28">&lt;t</tspan>)</text>
      <line x1="0" y1="80" x2="160" y2="80" stroke="black" stroke-width="2"/>
      <!-- Bars -->
      <rect x="20" y="60" width="20" height="20" rx="3" class="bar-red"/>
      <rect x="55" y="45" width="20" height="35" rx="3" class="bar-red"/>
      <rect x="90" y="10" width="20" height="70" rx="3" class="bar-blue"/>
      <rect x="125" y="25" width="20" height="55" rx="3" class="bar-red"/>
      <!-- Labels -->
      <text x="10" y="70" transform="rotate(-30 10,70)" fill="#FF6B6B" font-size="20" font-weight="bold">China</text>
      <text x="45" y="70" transform="rotate(-30 45,70)" fill="#FF6B6B" font-size="20" font-weight="bold">India</text>
      <text x="80" y="70" transform="rotate(-30 80,70)" fill="#00AEEF" font-size="20" font-weight="bold">Canada</text>
      <text x="115" y="70" transform="rotate(-30 115,70)" fill="#FF6B6B" font-size="20" font-weight="bold">Japan</text>
    </g>
  </g>

  <!-- Aggregation & MCD -->
  <path d="M830 455 H870 V680 H830 M830 570 H870" fill="none" stroke="black" stroke-width="3"/>
  <use href="#arrow-shape" x="890" y="555"/>
  <text x="910" y="550" font-family="Arial, sans-serif" font-size="28" fill="black">MCD</text>

  <!-- MCD Chart -->
  <g transform="translate(990, 600)">
    <line x1="0" y1="20" x2="260" y2="20" stroke="black" stroke-width="2"/>
    <!-- Bars -->
    <rect x="20" y="0" width="40" height="20" rx="3" class="bar-red"/>
    <rect x="80" y="-10" width="35" height="30" rx="3" class="bar-red"/>
    <rect x="140" y="-120" width="35" height="140" rx="3" class="bar-blue"/>
    <rect x="200" y="-10" width="35" height="30" rx="3" class="bar-red"/>
    <!-- Labels -->
    <text x="10" y="50" transform="rotate(-30 10,50)" fill="#FF6B6B" font-size="32" font-weight="bold">China</text>
    <text x="60" y="50" transform="rotate(-30 60,50)" fill="#FF6B6B" font-size="32" font-weight="bold">India</text>
    <text x="120" y="50" transform="rotate(-30 120,50)" fill="#00AEEF" font-size="32" font-weight="bold">Canada</text>
    <text x="180" y="50" transform="rotate(-30 180,50)" fill="#FF6B6B" font-size="32" font-weight="bold">Japan</text>
  </g>

  <!-- Formula -->
  <text x="880" y="495" font-size="34" fill="black">
    log p<tspan baseline-shift="sub" font-size="24">&#952;</tspan>(y<tspan baseline-shift="sub" font-size="24">t</tspan> | x, y<tspan baseline-shift="sub" font-size="24">&lt;t</tspan>) − &#945; log p<tspan baseline-shift="sub" font-size="24">&#952;−</tspan>(y<tspan baseline-shift="sub" font-size="24">t</tspan> | x, y<tspan baseline-shift="sub" font-size="24">&lt;t</tspan>) + &#947; log p<tspan baseline-shift="sub" font-size="24">&#952;+<tspan dy="-5" font-size="18">−</tspan></tspan>(y<tspan baseline-shift="sub" font-size="24">t</tspan> | x, y<tspan baseline-shift="sub" font-size="24">&lt;t</tspan>)
  </text>

  <!-- Detection -->
  <use href="#arrow-shape" x="1170" y="555"/>
  <g transform="translate(1360, 570)">
    <polygon points="0,-70 150,0 0,70 -150,0" fill="#8AE6E6" stroke="black" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="black">Detection</text>
  </g>

  <!-- Result -->
  <use href="#arrow-shape" x="1420" y="555"/>
  <circle cx="1480" cy="540" r="30" fill="#00FF55"/>
  <path d="M1465 540 L1475 550 L1490 530" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1520" y="570" font-family="Arial, sans-serif" font-size="36" fill="#2E97D2">Canada</text>

  <!-- Footer -->
  <text x="1440" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="black">hallucinatory object</text>
  <text x="1440" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="black">“<tspan fill="#FF6B6B">India</tspan>” eliminated</text>

</svg>
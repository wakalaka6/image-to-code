<svg xmlns="http://www.w3.org/2000/svg" viewBox="2.0 2.0 1636.0 671.0" style="font-family: Arial, sans-serif; background-color: white;">
  <defs>
    <!-- Arrow Marker for Lines -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D3D3D3" />
    </marker>
    
    <!-- Reusable Shapes -->
    <rect id="green-node" width="40" height="40" rx="8" fill="#DFF2D8" stroke="#8CD668" stroke-width="3" />
    <rect id="blue-node" width="40" height="40" rx="0" fill="#D6E4F0" stroke="#9BC2E6" stroke-width="3" />
    <rect id="purple-node" width="40" height="40" rx="8" fill="#F2D7EE" stroke="#E6A5D6" stroke-width="3" />
    <path id="grey-tri" d="M0,40 L20,0 L40,40 Z" fill="#D6E4F0" stroke="#9BC2E6" stroke-width="3" stroke-linejoin="round"/>
  </defs>

  <!-- ================= LEFT PANEL ================= -->
  <g transform="translate(10, 10)">
    <!-- Border -->
    <rect x="0" y="0" width="640" height="640" rx="30" fill="none" stroke="#E0E0E0" stroke-width="4" stroke-dasharray="20,15" />
    
    <!-- Title -->
    <text x="320" y="60" font-size="42" text-anchor="middle" fill="black">Offline Graph Construction</text>

    <!-- Image Row -->
    <g transform="translate(50, 90)">
      <!-- Img 1: Farm -->
      <g>
        <rect width="120" height="90" fill="#ccc" />
        <image href="data:image/svg+xml;base64," width="120" height="90"/>
      </g>
      <!-- Img 2: Dance -->
      <g transform="translate(130, 0)">
        <rect width="120" height="90" fill="#ccc" />
        <image href="data:image/svg+xml;base64," width="120" height="90"/>
      </g>
      <!-- Ellipsis -->
      <text x="270" y="50" font-size="30" font-weight="bold">...</text>
      <!-- Img 3: Gym -->
      <g transform="translate(300, 0)">
        <rect width="120" height="90" fill="#ccc" />
        <image href="data:image/svg+xml;base64," width="120" height="90"/>
      </g>
      <!-- Img 4: Brass -->
      <g transform="translate(420, 0)">
        <rect width="120" height="90" fill="#000" />
        <image href="data:image/svg+xml;base64," width="120" height="90"/>
      </g>
    </g>

    <!-- Subtitles Box -->
    <g transform="translate(110, 170)">
      <rect width="420" height="60" rx="30" fill="#FCE4D6" />
      <text x="210" y="40" font-size="30" text-anchor="middle">Subtitles</text>
    </g>

    <!-- Arrow Down 1 -->
    <path d="M280,210 L360,210 L360,230 L320,250 L280,230 L280,210" fill="#EAEAEA" transform="translate(0, 10)"/>

    <!-- LVLM Box -->
    <g transform="translate(50, 260)">
      <rect width="540" height="90" rx="15" fill="#DDEBF7" stroke="#9BC2E6" stroke-width="3" />
      <text x="270" y="55" font-size="44" text-anchor="middle">LVLM</text>
    </g>

    <!-- JSON Output -->
    <g transform="translate(90, 350)">
      <text font-family="Courier New, monospace" font-size="28" fill="black">
        <tspan x="0" dy="0">[{"entity": "", "description": ""},</tspan>
        <tspan x="200" dy="35" font-weight="bold">...</tspan>
        <tspan x="20" dy="35">{"entity": "", "description": ""}]</tspan>
      </text>
    </g>

    <!-- Entity Merging Bar -->
    <g transform="translate(45, 405)">
      <rect width="550" height="60" fill="#FCE4D6" />
      <text x="275" y="40" font-size="28" text-anchor="middle">Entity Merging and Node Connection</text>
    </g>

    <!-- Graph Visualization -->
    <g transform="translate(50, 450)">
      <!-- Edges (Background) -->
      <g stroke="#D3D3D3" stroke-width="3">
        <line x1="30" y1="30" x2="140" y2="0" /> <!-- Green to Green -->
        <line x1="30" y1="30" x2="80" y2="120" stroke-dasharray="10,5" /> <!-- Green to Blue Tri -->
        <line x1="140" y1="0" x2="220" y2="120" stroke-dasharray="10,5" /> <!-- Green to Green -->
        <line x1="220" y1="120" x2="380" y2="0" /> <!-- Green to Green -->
        <line x1="220" y1="120" x2="180" y2="180" stroke-dasharray="10,5" /> <!-- Green to Blue Sq -->
        <line x1="220" y1="120" x2="350" y2="180" stroke-dasharray="10,5" /> <!-- Green to Purple Tri -->
        <line x1="380" y1="0" x2="490" y2="120" /> <!-- Green to Green -->
        <line x1="490" y1="120" x2="500" y2="30" stroke-dasharray="10,5" /> <!-- Green to Blue Sq -->
        <line x1="490" y1="120" x2="480" y2="150" stroke-dasharray="10,5" /> <!-- Green to Blue Tri -->
      </g>

      <!-- Nodes -->
      <!-- Top Row -->
      <use href="#green-node" x="10" y="10" />
      <use href="#green-node" x="120" y="-10" />
      <use href="#green-node" x="200" y="100" /> <!-- Middle -->
      <use href="#green-node" x="400" y="-20" />
      
      <!-- Middle/Bottom Row -->
      <use href="#blue-node" x="80" y="100" />
      <use href="#blue-node" x="170" y="160" />
      <use href="#blue-node" x="320" y="80" />
      <use href="#blue-node" x="490" y="100" />
      
      <use href="#purple-node" x="340" y="160" />
      <use href="#green-node" x="460" y="140" /> <!-- Bottom Right -->
      
      <use href="#grey-tri" x="40" y="150" />
      <use href="#grey-tri" x="390" y="130" />
    </g>

    <!-- Legend -->
    <g transform="translate(60, 600)">
      <text x="0" y="30" font-size="24">Video Clip</text>
      <use href="#green-node" x="130" y="0" />
      
      <text x="220" y="30" font-size="24">Entities (</text>
      <use href="#purple-node" x="310" y="5" />
      <use href="#blue-node" x="370" y="5" />
      <use href="#grey-tri" x="430" y="5" />
      <text x="490" y="30" font-size="24">)</text>
    </g>
  </g>

  <!-- ================= RIGHT PANEL ================= -->
  <g transform="translate(680, 10)">
    <!-- Border -->
    <rect x="0" y="0" width="910" height="640" rx="30" fill="none" stroke="#E0E0E0" stroke-width="4" stroke-dasharray="20,15" />

    <!-- Title -->
    <text x="455" y="60" font-size="42" text-anchor="middle" fill="black">Retrieval-Reasoning Augmented Generation</text>

    <!-- Question Section -->
    <g transform="translate(20, 80)">
      <!-- Thinking Emoji -->
      <g transform="translate(0, 0)">
        <circle cx="25" cy="25" r="25" fill="#FFD700" />
        <circle cx="15" cy="18" r="3" fill="#333" />
        <circle cx="35" cy="18" r="3" fill="#333" />
        <path d="M15,35 Q25,45 35,35" fill="none" stroke="#333" stroke-width="2" />
        <path d="M10,10 Q-5,25 10,40" fill="none" stroke="#333" stroke-width="2" />
        <circle cx="5" cy="35" r="8" fill="#FFC7CE" stroke="#333" stroke-width="1"/>
        <text x="2" y="38" font-size="10" fill="#333">?</text>
      </g>
      <!-- Text -->
      <text x="60" y="20" font-size="26" fill="black">
        <tspan x="60" dy="0">Question: Please identify the option that corresponds to the order of events as they</tspan>
        <tspan x="0" dy="35">occur in the video. [Zumba, clean and jerk, milking cow, playing trombone]</tspan>
      </text>
    </g>

    <!-- Branching Arrows -->
    <g transform="translate(180, 130)">
      <path d="M0,0 L80,0 L80,15 L120,0 L80,-15 L80,0 Z" fill="#FCE4D6" transform="translate(-20,0)"/>
      <path d="M0,0 L80,0 L80,15 L120,0 L80,-15 L80,0 Z" fill="#FCE4D6" transform="translate(380,0)"/>
    </g>

    <!-- Left Column: Keywords -->
    <g transform="translate(20, 180)">
      <text x="250" y="20" font-size="34" font-weight="bold" fill="#00709B" text-anchor="middle">Query Keywords Extraction</text>
      <text x="250" y="60" font-size="28" fill="black" text-anchor="middle">
        <tspan x="250" dy="0">[“zumba”, “clean”, “milking</tspan>
        <tspan x="250" dy="35">cow”, “playing trombone”]</tspan>
      </text>
      
      <!-- Number Boxes -->
      <g transform="translate(110, 110)">
        <g transform="translate(0,0)"><rect width="45" height="45" rx="8" fill="#DFF2D8" stroke="#8CD668" stroke-width="3"/><text x="22" y="32" text-anchor="middle" font-size="24">3</text></g>
        <g transform="translate(55,0)"><rect width="45" height="45" rx="8" fill="#DFF2D8" stroke="#8CD668" stroke-width="3"/><text x="22" y="32" text-anchor="middle" font-size="24">4</text></g>
        <g transform="translate(110,0)"><rect width="45" height="45" rx="8" fill="#DFF2D8" stroke="#8CD668" stroke-width="3"/><text x="22" y="32" text-anchor="middle" font-size="24">5</text></g>
        <g transform="translate(165,0)"><rect width="45" height="45" rx="8" fill="#DFF2D8" stroke="#8CD668" stroke-width="3"/><text x="22" y="32" text-anchor="middle" font-size="24">11</text></g>
        <g transform="translate(220,0)"><rect width="45" height="45" rx="8" fill="#DFF2D8" stroke="#8CD668" stroke-width="3"/><text x="22" y="32" text-anchor="middle" font-size="24">13</text></g>
      </g>
    </g>

    <!-- Right Column: Structured Query -->
    <g transform="translate(450, 180)">
      <text x="200" y="20" font-size="34" font-weight="bold" fill="#00709B" text-anchor="middle">Strutured Query Refinement</text>
      <text x="0" y="60" font-size="28" fill="black">
        <tspan x="0" dy="0">Q1: Is ‘zumba’ shown in the video?</tspan>
        <tspan x="250" dy="30" font-weight="bold" font-size="32">...</tspan>
        <tspan x="0" dy="35">Q4: Is ‘trombone’ shown in the video?</tspan>
      </text>
    </g>

    <!-- Grey Retrieval Flow Line -->
    <!-- Starts from Left Panel Graph (approx x=50+400+40 = 490 in global, relative to right panel is -190) -->
    <!-- Path: Left -> Up -> Right -> Down -->
    <path d="M-190,520 L-190,270 L100,270" fill="none" stroke="#E0E0E0" stroke-width="8" />
    <path d="M100,270 L600,270 L600,330" fill="none" stroke="#E0E0E0" stroke-width="8" />
    <!-- Arrowhead at end of flow line -->
    <path d="M600,330 L580,310 L620,310 Z" fill="#E0E0E0" transform="translate(0, 10)"/>

    <!-- Arrow Down 2 (Between Keyword and Table) -->
    <path d="M250,290 L310,290 L310,305 L350,325 L310,345 L310,315 L250,315 Z" fill="#FCE4D6" transform="translate(-40,0)"/>

    <!-- Arrow Down 3 (Between Struct Query and Aggregation) -->
    <path d="M250,290 L310,290 L310,305 L350,325 L310,345 L310,315 L250,315 Z" fill="#FCE4D6" transform="translate(450,0)"/>

    <!-- Table -->
    <g transform="translate(80, 330)">
      <!-- Header -->
      <rect x="0" y="0" width="80" height="40" fill="#87CEEB" stroke="white"/><text x="40" y="28" fill="white" font-weight="bold" text-anchor="middle">Clip</text>
      <rect x="80" y="0" width="80" height="40" fill="#87CEEB" stroke="white"/><text x="120" y="28" fill="white" font-weight="bold" text-anchor="middle">Q1</text>
      <rect x="160" y="0" width="80" height="40" fill="#87CEEB" stroke="white"/><text x="200" y="28" fill="white" font-weight="bold" text-anchor="middle">Q2</text>
      <rect x="240" y="0" width="80" height="40" fill="#87CEEB" stroke="white"/><text x="280" y="28" fill="white" font-weight="bold" text-anchor="middle">Q3</text>
      <rect x="320" y="0" width="80" height="40" fill="#87CEEB" stroke="white"/><text x="360" y="28" fill="white" font-weight="bold" text-anchor="middle">Q4</text>
      
      <!-- Rows -->
      <!-- Row 3 -->
      <rect x="0" y="40" width="80" height="40" fill="#F0F0F0" stroke="white"/><text x="40" y="68" fill="black" text-anchor="middle" font-size="24">3</text>
      <rect x="80" y="40" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M110,50 L130,70 M130,50 L110,70" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="160" y="40" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M190,50 L210,70 M210,50 L190,70" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="240" y="40" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M270,50 L280,60 L300,40" stroke="#4CAF50" stroke-width="4" fill="none"/>
      <rect x="320" y="40" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M350,50 L370,70 M370,50 L350,70" stroke="#FF0000" stroke-width="4" fill="none"/>

      <!-- Row 4 -->
      <rect x="0" y="80" width="80" height="40" fill="#F0F0F0" stroke="white"/><text x="40" y="108" fill="black" text-anchor="middle" font-size="24">4</text>
      <rect x="80" y="80" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M110,90 L120,100 L140,80" stroke="#4CAF50" stroke-width="4" fill="none"/>
      <rect x="160" y="80" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M190,90 L200,100 L220,80" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="240" y="80" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M270,90 L280,100 L300,80" stroke="#4CAF50" stroke-width="4" fill="none"/>
      <rect x="320" y="80" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M350,90 L370,110 M370,90 L350,110" stroke="#FF0000" stroke-width="4" fill="none"/>

      <!-- Row 5 -->
      <rect x="0" y="120" width="80" height="40" fill="#F0F0F0" stroke="white"/><text x="40" y="148" fill="black" text-anchor="middle" font-size="24">5</text>
      <rect x="80" y="120" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M110,130 L130,150 M130,130 L110,150" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="160" y="120" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M190,130 L200,140 L220,120" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="240" y="120" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M270,130 L280,140 L300,120" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="320" y="120" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M350,130 L370,150 M370,130 L350,150" stroke="#FF0000" stroke-width="4" fill="none"/>

      <!-- Row 11 -->
      <rect x="0" y="160" width="80" height="40" fill="#F0F0F0" stroke="white"/><text x="40" y="188" fill="black" text-anchor="middle" font-size="24">11</text>
      <rect x="80" y="160" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M110,170 L130,190 M130,170 L110,190" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="160" y="160" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M190,170 L210,190 M210,170 L190,190" stroke="#4CAF50" stroke-width="4" fill="none"/>
      <rect x="240" y="160" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M270,170 L280,180 L300,160" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="320" y="160" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M350,170 L370,190 M370,170 L350,190" stroke="#FF0000" stroke-width="4" fill="none"/>

      <!-- Row 13 -->
      <rect x="0" y="200" width="80" height="40" fill="#F0F0F0" stroke="white"/><text x="40" y="228" fill="black" text-anchor="middle" font-size="24">13</text>
      <rect x="80" y="200" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M110,210 L130,230 M130,210 L110,230" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="160" y="200" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M190,210 L200,220 L220,200" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="240" y="200" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M270,210 L280,220 L300,200" stroke="#FF0000" stroke-width="4" fill="none"/>
      <rect x="320" y="200" width="80" height="40" fill="#F0F0F0" stroke="white"/>
      <path d="M350,210 L360,220 L380,200" stroke="#4CAF50" stroke-width="4" fill="none"/>
    </g>

    <!-- Info Aggregation -->
    <g transform="translate(500, 360)">
      <text x="200" y="0" font-size="34" font-weight="bold" fill="#00709B" text-anchor="middle">Information Aggregation</text>
      <!-- Big Arrow In -->
      <path d="M-50,60 L-20,60 L-20,40 L20,80 L-20,120 L-20,100 L-50,100 Z" fill="#FCE4D6" />
      
      <!-- Dashed Box -->
      <rect x="50" y="30" width="400" height="150" fill="none" stroke="#C55A11" stroke-width="4" stroke-dasharray="15,10" />
      <text x="70" y="60" font-size="30" fill="black">
        <tspan x="70" dy="0">Milking cow is shown first,</tspan>
        <tspan x="70" dy="40">followed by zumba, then</tspan>
        <tspan x="70" dy="40">clean, and finally playing</tspan>
        <tspan x="70" dy="40">trombone.</tspan>
      </text>
    </g>

    <!-- Grey Arrow Down from Aggregation -->
    <path d="M500,500 L560,500 L560,520 L600,540 L560,560 L560,530 L500,530 Z" fill="#EAEAEA" transform="translate(0,0)"/>

    <!-- Bottom LVLM -->
    <g transform="translate(20, 570)">
      <rect width="870" height="80" rx="10" fill="#DDEBF7" stroke="#9BC2E6" stroke-width="3" />
      <text x="435" y="50" font-size="40" text-anchor="middle">LVLM</text>
    </g>

    <!-- Final Output -->
    <g transform="translate(20, 600)">
      <!-- Robot Emoji -->
      <g transform="translate(0, 0)">
        <rect x="10" y="15" width="50" height="40" rx="8" fill="#E0E0E0" stroke="#1A237E" stroke-width="3"/>
        <line x1="20" y1="15" x2="20" y2="5" stroke="#1A237E" stroke-width="3"/>
        <circle cx="20" cy="5" r="4" fill="#E91E63" stroke="#1A237E" stroke-width="2"/>
        <circle cx="25" cy="28" r="4" fill="#1A237E"/>
        <circle cx="45" cy="28" r="4" fill="#1A237E"/>
        <path d="M25,40 Q35,48 45,40" fill="none" stroke="#1A237E" stroke-width="2" stroke-linecap="round"/>
        <rect x="5" y="25" width="5" height="15" rx="2" fill="#1A237E"/>
        <rect x="60" y="25" width="5" height="15" rx="2" fill="#1A237E"/>
      </g>
      <text x="75" y="40" font-size="30" fill="black">Answer: milking cow --&gt; zumba --&gt; clean and jerk --&gt; playing trombone</text>
    </g>

  </g>
</svg>
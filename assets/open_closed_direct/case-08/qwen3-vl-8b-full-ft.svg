<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8.0 -8.0 1616.0 916.0" font-family="'Times New Roman', Times, serif">
  <defs>
    <!-- Arrowheads -->
    <marker id="arrow-black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="black" />
    </marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L0,0" fill="#8FD65E" />
    </marker>
    
    <!-- Gradients/Patterns for "Image" simulation -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FB" />
      <stop offset="100%" stop-color="#2A6" />
    </linearGradient>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49A6C" />
      <stop offset="100%" stop-color="#8B5A2B" />
    </linearGradient>
    
    <!-- 3D Cube Slice Generator -->
    <g id="cube-slice">
       <!-- Side -->
       <path d="M60,0 L75,-15 L75,45 L60,60 Z" fill-opacity="0.6" stroke="white" stroke-width="0.5"/>
       <!-- Top -->
       <path d="M0,0 L15,-15 L75,-15 L60,0 Z" fill-opacity="0.8" stroke="white" stroke-width="0.5"/>
       <!-- Front -->
       <rect x="0" y="0" width="60" height="60" stroke="white" stroke-width="0.5"/>
    </g>
  </defs>

  <!-- BACKGROUNDS -->
  <!-- Panel A -->
  <rect x="0" y="0" width="1600" height="380" fill="#F0F0F0" />
  <!-- Panel B -->
  <rect x="0" y="380" width="840" height="520" fill="#FCE6D6" />
  <!-- Panel C -->
  <rect x="840" y="380" width="760" height="520" fill="#DDE6F4" />

  <!-- ================= PANEL A ================= -->
  <text x="20" y="50" font-size="48" fill="black">(a) Overall MINI Architecture</text>

  <!-- Input Images (Left) -->
  <g transform="translate(320, 160)">
    <!-- Back Image -->
    <g transform="translate(0, 0)">
        <rect width="160" height="120" fill="url(#waterGrad)" opacity="0.6"/>
        <path d="M0,80 L160,80 L160,120 L0,120 Z" fill="#555" opacity="0.3"/> <!-- rocks -->
        <path d="M120,20 L160,10 L160,40 L120,50 Z" fill="#777"/> <!-- dock -->
    </g>
    <!-- Middle Image -->
    <g transform="translate(20, 30)">
        <rect width="160" height="120" fill="url(#waterGrad)" opacity="0.8"/>
        <rect x="10" y="20" width="20" height="80" fill="#C49A6C"/> <!-- Tree trunk -->
    </g>
    <!-- Front Image (Bear) -->
    <g transform="translate(40, 60)">
        <rect width="160" height="120" fill="url(#waterGrad)"/>
        <!-- Bear simulation -->
        <path d="M20,60 Q30,40 50,45 Q70,30 90,50 Q110,40 130,60 L130,110 L120,115 L115,90 L100,90 L100,115 L90,115 L90,80 L70,80 L70,115 L60,115 L60,70 L40,70 L40,110 L20,110 Z" fill="url(#bearGrad)"/>
        <path d="M100,60 L160,50 L160,120 L100,120 Z" fill="#555" opacity="0.5"/> <!-- Rocks right -->
    </g>
    <text x="120" y="180" font-size="36" text-anchor="middle">input <tspan font-style="italic">x</tspan></text>
  </g>

  <!-- Query Function Box -->
  <g transform="translate(475, 65)">
    <rect x="0" y="0" width="290" height="55" rx="10" fill="#E2F0D9" stroke="#1F4E79" stroke-width="2"/>
    <text x="145" y="36" font-size="32" text-anchor="middle">Query function <tspan font-style="italic">q</tspan>(·)</text>
  </g>

  <!-- Central Backbone -->
  <g transform="translate(640, 170)">
    <!-- Dashed Container -->
    <rect x="0" y="0" width="400" height="200" rx="30" fill="none" stroke="#3F6494" stroke-width="6" stroke-dasharray="20,15"/>
    
    <!-- Encoder (Left Trapezoid) -->
    <polygon points="20,20 250,60 250,140 20,180" fill="none" stroke="#3F6494" stroke-width="3"/>
    <!-- Internal Bars (Tall to Short) -->
    <g transform="translate(30, 30)">
       <!-- Bar 1 -->
       <rect x="0" y="0" width="25" height="60" fill="#F4B183"/> <!-- Orange -->
       <rect x="0" y="60" width="25" height="40" fill="#F8CBAD"/> <!-- Pink -->
       <rect x="0" y="100" width="25" height="50" fill="#4472C4"/> <!-- Blue -->
    </g>
    <g transform="translate(70, 35)">
       <rect x="0" y="0" width="25" height="50" fill="#F4B183"/>
       <rect x="0" y="50" width="25" height="35" fill="#F8CBAD"/>
       <rect x="0" y="85" width="25" height="45" fill="#4472C4"/>
    </g>
    <g transform="translate(110, 40)">
       <rect x="0" y="0" width="25" height="40" fill="#F4B183"/>
       <rect x="0" y="40" width="25" height="30" fill="#F8CBAD"/>
       <rect x="0" y="70" width="25" height="40" fill="#4472C4"/>
    </g>
    <g transform="translate(150, 45)">
       <rect x="0" y="0" width="25" height="30" fill="#F4B183"/>
       <rect x="0" y="30" width="25" height="25" fill="#F8CBAD"/>
       <rect x="0" y="55" width="25" height="35" fill="#4472C4"/>
    </g>
    <g transform="translate(190, 50)">
       <rect x="0" y="0" width="25" height="20" fill="#F4B183"/>
       <rect x="0" y="20" width="25" height="20" fill="#F8CBAD"/>
       <rect x="0" y="40" width="25" height="30" fill="#4472C4"/>
    </g>

    <!-- Decoder (Right Trapezoid) -->
    <polygon points="260,60 380,20 380,180 260,140" fill="none" stroke="#3F6494" stroke-width="3"/>
    <!-- Internal Bars (Short to Tall) -->
    <g transform="translate(270, 50)">
       <rect x="0" y="0" width="25" height="20" fill="#F4B183"/>
       <rect x="0" y="20" width="25" height="20" fill="#F8CBAD"/>
       <rect x="0" y="40" width="25" height="30" fill="#4472C4"/>
    </g>
    <g transform="translate(305, 40)">
       <rect x="0" y="0" width="25" height="30" fill="#F4B183"/>
       <rect x="0" y="30" width="25" height="25" fill="#F8CBAD"/>
       <rect x="0" y="55" width="25" height="45" fill="#4472C4"/>
    </g>
    <g transform="translate(340, 30)">
       <rect x="0" y="0" width="25" height="40" fill="#F4B183"/>
       <rect x="0" y="40" width="25" height="30" fill="#F8CBAD"/>
       <rect x="0" y="70" width="25" height="50" fill="#4472C4"/>
    </g>
    <g transform="translate(375, 20)">
       <rect x="0" y="0" width="25" height="50" fill="#F4B183"/>
       <rect x="0" y="50" width="25" height="40" fill="#F8CBAD"/>
       <rect x="0" y="90" width="25" height="60" fill="#4472C4"/>
    </g>
    
    <text x="200" y="240" font-size="36" text-anchor="middle">Any backbone</text>
    <text x="200" y="280" font-size="36" text-anchor="middle">with MINI-Conv</text>
  </g>

  <!-- Output Images (Right) -->
  <g transform="translate(1170, 160)">
    <!-- Back Image -->
    <g transform="translate(0, 0)">
        <rect width="160" height="120" fill="url(#waterGrad)" opacity="0.6"/>
        <path d="M0,80 L160,80 L160,120 L0,120 Z" fill="#555" opacity="0.3"/>
        <path d="M120,20 L160,10 L160,40 L120,50 Z" fill="#777"/>
    </g>
    <!-- Middle Image -->
    <g transform="translate(20, 30)">
        <rect width="160" height="120" fill="url(#waterGrad)" opacity="0.8"/>
        <rect x="10" y="20" width="20" height="80" fill="#C49A6C"/>
    </g>
    <!-- Front Image (Clearer Bear) -->
    <g transform="translate(40, 60)">
        <rect width="160" height="120" fill="url(#waterGrad)"/>
        <path d="M20,60 Q30,40 50,45 Q70,30 90,50 Q110,40 130,60 L130,110 L120,115 L115,90 L100,90 L100,115 L90,115 L90,80 L70,80 L70,115 L60,115 L60,70 L40,70 L40,110 L20,110 Z" fill="url(#bearGrad)"/>
        <path d="M100,60 L160,50 L160,120 L100,120 Z" fill="#555" opacity="0.5"/>
        <!-- Detail improvements -->
        <circle cx="40" cy="70" r="2" fill="black"/> <!-- Eye -->
        <path d="M120,60 Q125,55 130,60" stroke="black" fill="none"/> <!-- Mouth -->
    </g>
    <text x="120" y="180" font-size="36" text-anchor="middle">output <tspan font-style="italic">y</tspan></text>
  </g>

  <!-- Arrows Panel A -->
  <!-- Input to Backbone -->
  <line x1="460" y1="250" x2="640" y2="250" stroke="black" stroke-width="5" marker-end="url(#arrow-black)"/>
  <!-- Backbone to Output -->
  <line x1="1040" y1="250" x2="1170" y2="250" stroke="black" stroke-width="5" marker-end="url(#arrow-black)"/>
  <!-- Input to Query Loop -->
  <polyline points="380,160 380,92 475,92" fill="none" stroke="black" stroke-width="5" marker-end="url(#arrow-black)"/>
  <!-- Query Loop to Backbone -->
  <polyline points="765,92 840,92 840,170" fill="none" stroke="black" stroke-width="5" marker-end="url(#arrow-black)"/>

  <!-- ================= PANEL B ================= -->
  <text x="20" y="420" font-size="48" fill="black">(b) MINI-Conv</text>

  <g transform="translate(50, 440)">
    <!-- Inputs -->
    <text x="0" y="100" font-size="40" font-style="italic">q(x)</text>
    <text x="30" y="220" font-size="40" font-style="italic">h</text>
    <text x="-10" y="270" font-size="32">hidden state</text>

    <!-- Bias Embeddings (Top Stack) -->
    <g transform="translate(220, 0)">
       <text x="60" y="-10" font-size="32" text-anchor="middle">bias embeddings</text>
       <!-- Cyan Box -->
       <rect x="0" y="0" width="110" height="90" rx="10" fill="none" stroke="#00B0F0" stroke-width="5" stroke-dasharray="15,10"/>
       <!-- Cubes (Back to Front) -->
       <g transform="translate(20, 15)" fill="#70AD47"><use href="#cube-slice" style="fill: #70AD47"/></g>
       <g transform="translate(15, 10)" fill="#ED7D31"><use href="#cube-slice" style="fill: #ED7D31"/></g>
       <g transform="translate(10, 5)" fill="#A0522D"><use href="#cube-slice" style="fill: #A0522D"/></g>
       <g transform="translate(5, 0)" fill="#BDD7EE"><use href="#cube-slice" style="fill: #BDD7EE"/></g>
    </g>

    <!-- Weight Embeddings (Bottom Stack) -->
    <g transform="translate(220, 100)">
       <!-- Blue Box -->
       <rect x="-10" y="0" width="160" height="130" rx="10" fill="none" stroke="#3F6494" stroke-width="5" stroke-dasharray="15,10"/>
       <!-- Cubes (Back to Front - Multi-colored) -->
       <g transform="translate(20, 15)" fill="#70AD47"><use href="#cube-slice" style="fill: #70AD47"/></g>
       <g transform="translate(15, 10)" fill="#ED7D31"><use href="#cube-slice" style="fill: #ED7D31"/></g>
       <g transform="translate(10, 5)" fill="#A0522D"><use href="#cube-slice" style="fill: #A0522D"/></g>
       <g transform="translate(5, 0)" fill="#4472C4"><use href="#cube-slice" style="fill: #4472C4"/></g>
       <g transform="translate(0, -5)" fill="#BF9000"><use href="#cube-slice" style="fill: #BF9000"/></g>
       <g transform="translate(-5, -10)" fill="#70AD47"><use href="#cube-slice" style="fill: #70AD47"/></g>
       <text x="70" y="160" font-size="32" text-anchor="middle">weight embeddings</text>
    </g>

    <!-- 3D Slabs (Right) -->
    <!-- Top Blue -->
    <g transform="translate(390, 10)">
        <path d="M0,10 L10,0 L10,70 L0,80 Z" fill="#4472C4" stroke="white" stroke-width="0.5"/> <!-- Side -->
        <path d="M0,10 L10,0 L25,0 L15,10 Z" fill="#8FAADC" stroke="white" stroke-width="0.5"/> <!-- Top -->
        <rect x="0" y="10" width="15" height="70" fill="#2F5597" stroke="white" stroke-width="0.5"/> <!-- Front -->
    </g>
    <!-- Bottom Blue (Thicker) -->
    <g transform="translate(390, 90)">
        <path d="M0,20 L20,0 L20,110 L0,130 Z" fill="#4472C4" stroke="white" stroke-width="0.5"/> <!-- Side -->
        <path d="M0,20 L20,0 L35,0 L15,20 Z" fill="#8FAADC" stroke="white" stroke-width="0.5"/> <!-- Top -->
        <rect x="0" y="20" width="15" height="110" fill="#2F5597" stroke="white" stroke-width="0.5"/> <!-- Front -->
    </g>

    <!-- Operations -->
    <!-- Reshape -->
    <g transform="translate(490, 120)">
        <circle cx="0" cy="0" r="25" fill="white" stroke="black" stroke-width="4"/>
        <text x="0" y="10" font-size="40" text-anchor="middle">R</text>
    </g>
    <!-- Convolution -->
    <g transform="translate(590, 120)">
        <circle cx="0" cy="0" r="25" fill="white" stroke="black" stroke-width="4"/>
        <text x="0" y="10" font-size="40" text-anchor="middle">*</text>
    </g>
    <!-- Addition -->
    <g transform="translate(660, 120)">
        <circle cx="0" cy="0" r="25" fill="white" stroke="black" stroke-width="4"/>
        <line x1="-25" y1="0" x2="25" y2="0" stroke="black" stroke-width="4"/>
        <line x1="0" y1="-25" x2="0" y2="25" stroke="black" stroke-width="4"/>
    </g>
    <!-- Output -->
    <text x="760" y="130" font-size="40" font-style="italic">h'</text>

    <!-- Connections Panel B -->
    <!-- q(x) to Bias -->
    <polyline points="100,85 130,85 130,-10 250,-10" fill="none" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- q(x) to Weight -->
    <line x1="80" y1="120" x2="220" y2="120" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Bias to Top Slab -->
    <line x1="330" y1="20" x2="400" y2="20" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Top Slab to Add -->
    <polyline points="420,20 660,20 660,90" fill="none" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Weight to Bot Slab -->
    <line x1="330" y1="120" x2="390" y2="120" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Bot Slab to Reshape -->
    <line x1="420" y1="120" x2="490" y2="120" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Reshape to Conv -->
    <line x1="515" y1="120" x2="565" y2="120" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Conv to Add -->
    <line x1="615" y1="120" x2="635" y2="120" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Add to Output -->
    <line x1="685" y1="120" x2="750" y2="120" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    
    <!-- Hidden State h -->
    <polyline points="60,200 590,200 590,145" fill="none" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>

    <!-- Legend -->
    <g transform="translate(330, 240)">
        <circle cx="15" cy="0" r="15" fill="white" stroke="black" stroke-width="3"/>
        <text x="15" y="8" font-size="24" text-anchor="middle">R</text>
        <text x="40" y="10" font-size="36">: reshape</text>
        
        <circle cx="230" cy="0" r="15" fill="white" stroke="black" stroke-width="3"/>
        <text x="230" y="10" font-size="24" text-anchor="middle">*</text>
        <text x="255" y="10" font-size="36">: convolution</text>
        
        <circle cx="50" cy="45" r="15" fill="white" stroke="black" stroke-width="3"/>
        <line x1="35" y1="45" x2="65" y2="45" stroke="black" stroke-width="3"/>
        <line x1="50" y1="30" x2="50" y2="60" stroke="black" stroke-width="3"/>
        <text x="80" y="55" font-size="36">: Element-wise addition</text>
    </g>
  </g>

  <!-- ================= PANEL C ================= -->
  <text x="860" y="420" font-size="48" fill="black">(c) Query function <tspan font-style="italic">q</tspan>(·)</text>

  <g transform="translate(860, 440)">
    <!-- Patching -->
    <rect x="50" y="120" width="200" height="100" rx="15" fill="#4472C4" stroke="#1F4E79" stroke-width="2"/>
    <text x="150" y="175" font-size="32" fill="white" text-anchor="middle">patching</text>
    <text x="10" y="175" font-size="40" font-style="italic">x</text>
    <line x1="40" y1="170" x2="70" y2="170" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>

    <!-- Degradation MLP -->
    <rect x="60" y="0" width="220" height="90" rx="15" fill="#F2F2F2" stroke="#FFC000" stroke-width="4" stroke-dasharray="10,5"/>
    <text x="170" y="25" font-size="28" text-anchor="middle">Degradation</text>
    <text x="170" y="55" font-size="28" text-anchor="middle">Classification</text>
    <text x="170" y="85" font-size="28" text-anchor="middle">MLP</text>
    
    <!-- Switch -->
    <g transform="translate(260, 100)">
        <rect x="0" y="0" width="90" height="190" fill="none" stroke="#00B050" stroke-width="4" stroke-dasharray="20,10"/>
        <circle cx="45" cy="40" r="12" fill="black"/>
        <circle cx="45" cy="140" r="12" fill="black"/>
        <text x="45" y="220" font-size="36" text-anchor="middle">switch</text>
    </g>

    <!-- Global MLP -->
    <rect x="400" y="50" width="170" height="100" rx="15" fill="#F2F2F2" stroke="#833C0C" stroke-width="4"/>
    <text x="485" y="90" font-size="32" text-anchor="middle">Global</text>
    <text x="485" y="125" font-size="32" text-anchor="middle">MLP</text>

    <!-- Local MLP -->
    <rect x="400" y="160" width="170" height="100" rx="15" fill="#F2F2F2" stroke="#833C0C" stroke-width="4"/>
    <text x="485" y="200" font-size="32" text-anchor="middle">Local</text>
    <text x="485" y="235" font-size="32" text-anchor="middle">MLP</text>

    <!-- Softmax -->
    <rect x="570" y="120" width="130" height="100" rx="15" fill="#4472C4" stroke="#1F4E79" stroke-width="2"/>
    <text x="635" y="150" font-size="32" fill="white" text-anchor="middle">softmax</text>
    <text x="635" y="180" font-size="32" fill="white" text-anchor="middle">&amp;</text>
    <text x="635" y="205" font-size="32" fill="white" text-anchor="middle">argmax</text>
    <text x="690" y="175" font-size="40" font-style="italic">q(x)</text>
    <line x1="700" y1="170" x2="730" y2="170" stroke="black" stroke-width="3" marker-end="url(#arrow-black)"/>

    <!-- Connections Panel C -->
    <!-- Patching to Degradation -->
    <line x1="150" y1="120" x2="150" y2="95" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <!-- Patching to Switch -->
    <polyline points="250,170 305,170 305,140 305,140" fill="none" stroke="black" stroke-width="4"/> <!-- To bottom circle -->
    <polyline points="250,170 305,170 305,60" fill="none" stroke="black" stroke-width="4"/> <!-- To top circle -->
    
    <!-- Degradation to Switch (Green) -->
    <polyline points="280,45 305,45 305,100" fill="none" stroke="#8FD65E" stroke-width="4" marker-end="url(#arrow-green)"/>

    <!-- Switch to MLPs -->
    <line x1="305" y1="140" x2="400" y2="140" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>
    <line x1="305" y1="200" x2="400" y2="200" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>

    <!-- MLPs to Softmax -->
    <polyline points="570,100 590,100 590,170 570,170" fill="none" stroke="black" stroke-width="4"/>
    <polyline points="570,210 590,210 590,170" fill="none" stroke="black" stroke-width="4"/>
    <line x1="590" y1="170" x2="570" y2="170" stroke="black" stroke-width="4" marker-end="url(#arrow-black)"/>

  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#77c859" />
    </marker>
    <style>
      .text-title { font-family: 'Times New Roman', serif; font-size: 24px; fill: #000; }
      .text-label { font-family: 'Times New Roman', serif; font-size: 20px; fill: #000; }
      .text-small { font-family: 'Times New Roman', serif; font-size: 16px; fill: #000; }
      .text-math { font-family: 'Times New Roman', serif; font-style: italic; font-size: 20px; fill: #000; }
      .line-thick { stroke: #000; stroke-width: 3; fill: none; }
      .line-thin { stroke: #000; stroke-width: 2; fill: none; }
      .dashed-box { stroke-dasharray: 8, 6; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <!-- Backgrounds -->
  <rect x="0" y="0" width="1200" height="650" fill="#fff" />
  <rect x="5" y="5" width="1190" height="340" fill="#ebebeb" />
  <rect x="5" y="350" width="595" height="295" fill="#fae8d8" />
  <rect x="605" y="350" width="590" height="295" fill="#dbe4f5" />

  <!-- (a) Overall MINI Architecture -->
  <text x="15" y="35" class="text-title">(a) Overall MINI Architecture</text>

  <!-- Images placeholders (using colored rects to simulate) -->
  <!-- Input images -->
  <g transform="translate(230, 135)">
    <rect x="0" y="0" width="90" height="90" fill="#888" stroke="#fff" stroke-width="2" />
    <rect x="12" y="12" width="90" height="90" fill="#999" stroke="#fff" stroke-width="2" />
    <rect x="25" y="25" width="90" height="90" fill="#a89f91" stroke="#fff" stroke-width="2" />
    <!-- Simulate rain/bear -->
    <path d="M 30 30 L 110 110 M 40 30 L 110 100 M 50 30 L 110 90 M 60 30 L 110 80 M 70 30 L 110 70 M 80 30 L 110 60 M 90 30 L 110 50 M 100 30 L 110 40 M 30 40 L 100 110 M 30 50 L 90 110 M 30 60 L 80 110 M 30 70 L 70 110 M 30 80 L 60 110 M 30 90 L 50 110 M 30 100 L 40 110" stroke="#fff" stroke-width="1" opacity="0.5" />
    <ellipse cx="70" cy="70" rx="20" ry="15" fill="#6b5035" />
    <circle cx="55" cy="65" r="8" fill="#6b5035" />
    <circle cx="85" cy="75" r="6" fill="#6b5035" />
  </g>
  <text x="265" y="280" class="text-label">input <tspan class="text-math">x</tspan></text>

  <!-- Output images -->
  <g transform="translate(860, 135)">
    <rect x="0" y="0" width="90" height="90" fill="#888" stroke="#fff" stroke-width="2" />
    <rect x="12" y="12" width="90" height="90" fill="#999" stroke="#fff" stroke-width="2" />
    <rect x="25" y="25" width="90" height="90" fill="#6b8e99" stroke="#fff" stroke-width="2" />
    <ellipse cx="70" cy="70" rx="20" ry="15" fill="#6b5035" />
    <circle cx="55" cy="65" r="8" fill="#6b5035" />
    <circle cx="85" cy="75" r="6" fill="#6b5035" />
  </g>
  <text x="895" y="280" class="text-label">output <tspan class="text-math">y</tspan></text>

  <!-- Query function box -->
  <rect x="345" y="50" width="185" height="35" rx="5" fill="#d1e8d5" stroke="#4a708b" stroke-width="2" />
  <text x="360" y="74" class="text-label">Query function <tspan class="text-math">q(·)</tspan></text>

  <!-- Backbone box -->
  <rect x="460" y="140" width="280" height="150" rx="20" class="dashed-box" stroke="#2b579a" />
  <text x="600" y="310" class="text-label" text-anchor="middle">Any backbone</text>
  <text x="600" y="335" class="text-label" text-anchor="middle">with MINI-Conv</text>

  <!-- Backbone internals (Encoder-Decoder) -->
  <g transform="translate(475, 160)">
    <!-- Encoder -->
    <polygon points="0,0 120,35 120,75 0,110" fill="none" stroke="#2b579a" stroke-width="2" />
    <!-- Encoder blocks -->
    <rect x="5" y="10" width="15" height="90" fill="#fcd269" />
    <rect x="5" y="40" width="15" height="60" fill="#f5a653" />
    <rect x="5" y="70" width="15" height="30" fill="#4a708b" />

    <rect x="28" y="18" width="15" height="74" fill="#fcd269" />
    <rect x="28" y="43" width="15" height="49" fill="#f5a653" />
    <rect x="28" y="68" width="15" height="24" fill="#4a708b" />

    <rect x="51" y="26" width="15" height="58" fill="#fcd269" />
    <rect x="51" y="45" width="15" height="39" fill="#f5a653" />
    <rect x="51" y="64" width="15" height="20" fill="#4a708b" />

    <rect x="74" y="34" width="15" height="42" fill="#fcd269" />
    <rect x="74" y="48" width="15" height="28" fill="#f5a653" />
    <rect x="74" y="62" width="15" height="14" fill="#4a708b" />

    <rect x="97" y="42" width="15" height="26" fill="#fcd269" />
    <rect x="97" y="51" width="15" height="17" fill="#f5a653" />
    <rect x="97" y="60" width="15" height="8" fill="#4a708b" />

    <!-- Decoder -->
    <polygon points="130,35 250,0 250,110 130,75" fill="none" stroke="#2b579a" stroke-width="2" />
    <!-- Decoder blocks -->
    <rect x="138" y="42" width="15" height="26" fill="#fcd269" />
    <rect x="138" y="51" width="15" height="17" fill="#f5a653" />
    <rect x="138" y="60" width="15" height="8" fill="#4a708b" />

    <rect x="161" y="34" width="15" height="42" fill="#fcd269" />
    <rect x="161" y="48" width="15" height="28" fill="#f5a653" />
    <rect x="161" y="62" width="15" height="14" fill="#4a708b" />

    <rect x="184" y="26" width="15" height="58" fill="#fcd269" />
    <rect x="184" y="45" width="15" height="39" fill="#f5a653" />
    <rect x="184" y="64" width="15" height="20" fill="#4a708b" />

    <rect x="207" y="18" width="15" height="74" fill="#fcd269" />
    <rect x="207" y="43" width="15" height="49" fill="#f5a653" />
    <rect x="207" y="68" width="15" height="24" fill="#4a708b" />

    <rect x="230" y="10" width="15" height="90" fill="#fcd269" />
    <rect x="230" y="40" width="15" height="60" fill="#f5a653" />
    <rect x="230" y="70" width="15" height="30" fill="#4a708b" />
  </g>

  <!-- Arrows for (a) -->
  <path d="M 275 135 L 275 67 L 335 67" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 530 67 L 600 67 L 600 130" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 345 215 L 450 215" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 740 215 L 850 215" class="line-thick" marker-end="url(#arrow)" />


  <!-- (b) MINI-Conv -->
  <text x="15" y="380" class="text-title">(b) MINI-Conv</text>

  <text x="35" y="520" class="text-math">q(x)</text>
  <text x="55" y="600" class="text-math">h</text>
  <text x="15" y="625" class="text-label">hidden state</text>

  <!-- Bias embeddings -->
  <g transform="translate(205, 415)">
    <rect x="0" y="0" width="40" height="50" fill="#2b579a" stroke="#000" stroke-width="1" />
    <rect x="5" y="5" width="40" height="50" fill="#f5a653" stroke="#000" stroke-width="1" />
    <rect x="10" y="10" width="40" height="50" fill="#98c379" stroke="#000" stroke-width="1" />
  </g>
  <rect x="205" y="410" width="60" height="65" class="dashed-box" stroke="#00a2e8" />
  <text x="178" y="405" class="text-small">bias embeddings</text>

  <!-- Weight embeddings -->
  <g transform="translate(195, 475)">
    <rect x="0" y="0" width="50" height="60" fill="#2b579a" stroke="#000" stroke-width="1" />
    <rect x="5" y="5" width="50" height="60" fill="#fcd269" stroke="#000" stroke-width="1" />
    <rect x="10" y="10" width="50" height="60" fill="#d18b47" stroke="#000" stroke-width="1" />
    <rect x="15" y="15" width="50" height="60" fill="#98c379" stroke="#000" stroke-width="1" />
  </g>
  <rect x="188" y="470" width="85" height="85" class="dashed-box" stroke="#2b579a" />
  <text x="165" y="570" class="text-small">weight embeddings</text>

  <!-- Blue vertical bars -->
  <polygon points="320,415 330,410 330,450 320,455" fill="#4a708b" stroke="#2b579a" stroke-width="1" />
  <polygon points="318,475 335,465 335,545 318,555" fill="#4a708b" stroke="#2b579a" stroke-width="1" />

  <!-- Operations -->
  <circle cx="390" cy="515" r="15" fill="none" stroke="#000" stroke-width="2" />
  <text x="390" y="522" class="text-label" text-anchor="middle">R</text>

  <circle cx="455" cy="515" r="15" fill="none" stroke="#000" stroke-width="2" />
  <text x="455" y="525" class="text-title" text-anchor="middle">*</text>

  <circle cx="505" cy="515" r="15" fill="none" stroke="#000" stroke-width="2" />
  <line x1="490" y1="515" x2="520" y2="515" stroke="#000" stroke-width="2" />
  <line x1="505" y1="500" x2="505" y2="530" stroke="#000" stroke-width="2" />

  <text x="568" y="522" class="text-math">h'</text>

  <!-- Arrows for (b) -->
  <path d="M 75 515 L 180 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 125 515 L 125 440 L 195 440" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 265 440 L 310 440" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 275 515 L 308 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 335 515 L 365 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 405 515 L 430 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 470 515 L 480 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 520 515 L 560 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 330 440 L 505 440 L 505 490" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 75 595 L 455 595 L 455 540" class="line-thick" marker-end="url(#arrow)" />

  <!-- Legend for (b) -->
  <circle cx="375" cy="615" r="10" fill="none" stroke="#000" stroke-width="2" />
  <text x="375" y="620" class="text-small" text-anchor="middle">R</text>
  <text x="390" y="620" class="text-label">: reshape</text>

  <circle cx="425" cy="615" r="10" fill="none" stroke="#000" stroke-width="2" />
  <text x="425" y="622" class="text-label" text-anchor="middle">*</text>
  <text x="440" y="620" class="text-label">: convolution</text>

  <circle cx="375" cy="640" r="10" fill="none" stroke="#000" stroke-width="2" />
  <line x1="365" y1="640" x2="385" y2="640" stroke="#000" stroke-width="2" />
  <line x1="375" y1="630" x2="375" y2="650" stroke="#000" stroke-width="2" />
  <text x="390" y="645" class="text-label">: Element-wise addition</text>


  <!-- (c) Query function q(·) -->
  <text x="620" y="380" class="text-title">(c) Query function <tspan class="text-math">q(·)</tspan></text>

  <text x="615" y="555" class="text-math">x</text>

  <!-- Patching -->
  <rect x="655" y="520" width="105" height="60" rx="10" fill="#4a708b" />
  <text x="707" y="555" class="text-small" fill="#fff" text-anchor="middle">patching</text>

  <!-- Degradation Classification MLP -->
  <rect x="655" y="415" width="118" height="55" rx="5" class="dashed-box" stroke="#fcd269" fill="#e6effa" />
  <text x="714" y="435" class="text-small" text-anchor="middle">Degradation</text>
  <text x="714" y="450" class="text-small" text-anchor="middle">Classification</text>
  <text x="714" y="465" class="text-small" text-anchor="middle">MLP</text>

  <!-- Switch -->
  <rect x="800" y="490" width="60" height="120" class="dashed-box" stroke="#77c859" fill="none" />
  <text x="830" y="630" class="text-label" text-anchor="middle">switch</text>
  <circle cx="825" cy="515" r="5" fill="#000" />
  <circle cx="825" cy="585" r="5" fill="#000" />
  <line x1="800" y1="550" x2="825" y2="515" class="line-thick" />

  <!-- Global/Local MLP -->
  <rect x="905" y="485" width="88" height="60" rx="10" fill="#e6effa" stroke="#8b5a2b" stroke-width="2" />
  <text x="949" y="515" class="text-small" text-anchor="middle">Global</text>
  <text x="949" y="535" class="text-small" text-anchor="middle">MLP</text>

  <rect x="905" y="555" width="88" height="60" rx="10" fill="#e6effa" stroke="#8b5a2b" stroke-width="2" />
  <text x="949" y="585" class="text-small" text-anchor="middle">Local</text>
  <text x="949" y="605" class="text-small" text-anchor="middle">MLP</text>

  <!-- Softmax & argmax -->
  <rect x="1055" y="520" width="72" height="60" rx="10" fill="#4a708b" />
  <text x="1091" y="545" class="text-small" fill="#fff" text-anchor="middle">softmax</text>
  <text x="1091" y="560" class="text-small" fill="#fff" text-anchor="middle">&amp;</text>
  <text x="1091" y="575" class="text-small" fill="#fff" text-anchor="middle">argmax</text>

  <text x="1155" y="555" class="text-math">q(x)</text>

  <!-- Arrows for (c) -->
  <path d="M 630 550 L 645 550" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 707 520 L 707 480" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 760 550 L 790 550" class="line-thick" />
  <path d="M 825 515 L 895 515" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 825 585 L 895 585" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 993 515 L 1030 515 L 1030 550 L 1045 550" class="line-thick" marker-end="url(#arrow)" />
  <path d="M 993 585 L 1030 585 L 1030 550" class="line-thick" />
  <path d="M 1127 550 L 1145 550" class="line-thick" marker-end="url(#arrow)" />
  
  <!-- Green arrow from Degradation MLP to switch -->
  <path d="M 773 442 L 830 442 L 830 480" fill="none" stroke="#77c859" stroke-width="2" marker-end="url(#arrow-green)" />

</svg>
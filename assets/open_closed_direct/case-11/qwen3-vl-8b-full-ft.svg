<svg xmlns="http://www.w3.org/2000/svg" viewBox="2.0 7.0 1636.0 686.0" style="font-family: 'Times New Roman', Times, serif; background-color: white;">

  <!-- Definitions -->
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4472C4" />
    </marker>
    
    <!-- CD Icon -->
    <g id="cd-icon">
      <circle cx="25" cy="25" r="22" fill="#D9D9D9" stroke="#666" stroke-width="2"/>
      <circle cx="25" cy="25" r="10" fill="#FFF" />
      <circle cx="25" cy="25" r="10" fill="none" stroke="#999" stroke-width="1"/>
      <circle cx="25" cy="12" r="2" fill="#999" />
      <circle cx="18" cy="28" r="1.5" fill="#999" />
      <circle cx="32" cy="28" r="1.5" fill="#999" />
    </g>

    <!-- X Mark -->
    <g id="x-mark">
      <path d="M0,0 L10,10 M10,0 L0,10" stroke="#4472C4" stroke-width="6" stroke-linecap="round" />
    </g>
  </defs>

  <!-- ================= LEFT SECTION ================= -->

  <!-- 1. Header: Language Model -->
  <rect x="10" y="20" width="1020" height="80" rx="15" fill="#E2F0D9" />
  <text x="30" y="70" font-size="48" fill="black">Language Model <tspan font-style="italic">f<tspan dy="5" font-size="36">ϕ</tspan></tspan></text>

  <!-- 2. Hq Group (Left) -->
  <text x="10" y="170" font-size="48" font-style="italic" font-weight="bold">H<tspan dy="10" font-size="36">q</tspan></text>
  <rect x="75" y="130" width="80" height="80" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
  <rect x="235" y="130" width="80" height="80" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
  <rect x="375" y="130" width="80" height="80" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />

  <!-- 3. Tokenizer -->
  <rect x="35" y="220" width="450" height="90" rx="15" fill="#EDEDED" />
  <text x="260" y="270" font-size="48" text-anchor="middle" fill="black">Tokenizer</text>
  <!-- Arrow Tokenizer -> Hq -->
  <line x1="260" y1="220" x2="260" y2="185" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <!-- Arrow Instruction -> Tokenizer -->
  <line x1="260" y1="320" x2="260" y2="280" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 4. H*v Group (Middle) -->
  <text x="550" y="170" font-size="48" font-style="italic" font-weight="bold">H<tspan dy="-15" font-size="36">*</tspan><tspan dy="25" dx="-5" font-size="36">v</tspan></text>
  <rect x="630" y="130" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
  <rect x="780" y="130" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
  <rect x="920" y="130" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />

  <!-- 5. CDPruner (Left) -->
  <rect x="590" y="220" width="450" height="90" rx="15" fill="#FFD1D1" stroke="black" stroke-width="2" />
  <text x="815" y="270" font-size="48" font-weight="bold" text-anchor="middle" fill="black">CDPruner</text>
  <!-- Arrow CDPruner -> H*v -->
  <line x1="815" y1="220" x2="815" y2="185" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <!-- Arrow CDPruner -> LM -->
  <line x1="815" y1="220" x2="815" y2="95" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 6. Language Instruction -->
  <text x="35" y="355" font-size="48" font-family="serif">Language Instruction <tspan font-style="italic" font-weight="bold">X<tspan dy="10" font-size="36">q</tspan></tspan> <tspan font-style="italic" font-weight="bold" dy="-10">H<tspan dy="10" font-size="36">v</tspan></tspan></text>

  <!-- 7. Visual Input Stream (Bottom) -->
  <!-- 7 Squares -->
  <g transform="translate(590, 315)">
    <rect x="0" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="90" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="180" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="270" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="360" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="450" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="540" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#88B2DB" stroke-width="3" />
  </g>

  <!-- 8. Projector & Encoder -->
  <rect x="590" y="405" width="450" height="85" rx="15" fill="#FBE5D6" />
  <text x="815" y="455" font-size="48" text-anchor="middle" fill="black">Projector <tspan font-style="italic">g</tspan></text>
  
  <rect x="590" y="480" width="450" height="85" rx="15" fill="#DAE3F3" />
  <text x="815" y="530" font-size="48" text-anchor="middle" fill="black">Vision Encoder <tspan font-style="italic">f<tspan dy="10" font-size="36">v</tspan></tspan></text>

  <!-- 9. Input Image -->
  <text x="660" y="600" font-size="48" font-family="serif">Input Image <tspan font-style="italic" font-weight="bold">X<tspan dy="10" font-size="36">v</tspan></tspan></text>
  <line x1="815" y1="575" x2="815" y2="540" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="815" y1="480" x2="815" y2="455" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="815" y1="405" x2="815" y2="360" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="815" y1="315" x2="815" y2="280" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 10. Connection: Hq -> CDPruner -->
  <!-- Path from 3rd grey token to CDPruner -->
  <path d="M 435 160 L 510 160 L 510 250 L 580 250" fill="none" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 11. Legend -->
  <rect x="10" y="405" width="500" height="280" fill="white" stroke="#1F3864" stroke-width="3" />
  
  <!-- Row 1: Visual Tokens -->
  <g transform="translate(25, 420)">
    <rect x="0" y="0" width="55" height="55" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="65" y="0" width="55" height="55" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="130" y="0" width="55" height="55" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="40" font-size="38" font-family="serif">Visual Tokens</text>
  </g>

  <!-- Row 2: Text Tokens -->
  <g transform="translate(25, 480)">
    <rect x="0" y="0" width="55" height="55" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
    <rect x="65" y="0" width="55" height="55" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
    <rect x="130" y="0" width="55" height="55" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="40" font-size="38" font-family="serif">Text Tokens</text>
  </g>

  <!-- Row 3: Feature Similarity -->
  <g transform="translate(25, 540)">
    <rect x="0" y="-10" width="55" height="55" fill="#C55A11" stroke="black" stroke-width="2" />
    <rect x="55" y="-10" width="55" height="55" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="110" y="-10" width="55" height="55" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <text x="180" y="35" font-size="38" font-family="serif">Feature Similarity</text>
  </g>

  <!-- Row 4: Query Relevance -->
  <g transform="translate(25, 600)">
    <rect x="0" y="-10" width="55" height="55" fill="#767171" stroke="black" stroke-width="2" />
    <rect x="55" y="-10" width="55" height="55" fill="#BFBFBF" stroke="black" stroke-width="2" />
    <rect x="110" y="-10" width="55" height="55" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <text x="180" y="35" font-size="38" font-family="serif">Query Relevance</text>
  </g>

  <!-- ================= RIGHT SECTION ================= -->
  
  <!-- Dashed Expansion Lines -->
  <line x1="1040" y1="220" x2="1100" y2="30" stroke="black" stroke-width="3" stroke-dasharray="15,10" />
  <line x1="1040" y1="270" x2="1100" y2="600" stroke="black" stroke-width="3" stroke-dasharray="15,10" />

  <!-- Main Container -->
  <rect x="1100" y="15" width="500" height="585" rx="25" fill="#FFE6E6" stroke="black" stroke-width="2" />

  <!-- 1. Header & Icon -->
  <use href="#cd-icon" x="1510" y="60" transform="scale(1.2) translate(-250, -10)" />
  <text x="1560" y="210" font-size="48" font-weight="bold" transform="rotate(90, 1560, 210)" text-anchor="middle" letter-spacing="2">CDPruner</text>

  <!-- 2. Output S* -->
  <text x="1120" y="100" font-size="48" font-style="italic" font-weight="bold">S<tspan dy="-15" font-size="36">*</tspan></text>
  <g transform="translate(1150, 60)">
    <!-- 1 -->
    <rect x="0" y="0" width="80" height="70" fill="#F4B183" stroke="black" stroke-width="2" />
    <text x="40" y="45" font-size="40" font-weight="bold" text-anchor="middle">1</text>
    <!-- x -->
    <rect x="80" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <text x="120" y="45" font-size="40" font-weight="bold" text-anchor="middle">×</text>
    <!-- 3 -->
    <rect x="160" y="0" width="80" height="70" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <text x="200" y="45" font-size="40" font-weight="bold" text-anchor="middle">3</text>
    <!-- 4 -->
    <rect x="240" y="0" width="80" height="70" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <text x="280" y="45" font-size="40" font-weight="bold" text-anchor="middle">4</text>
    <!-- x -->
    <rect x="320" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <text x="360" y="45" font-size="40" font-weight="bold" text-anchor="middle">×</text>
    <!-- x -->
    <rect x="400" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <text x="440" y="45" font-size="40" font-weight="bold" text-anchor="middle">×</text>
  </g>

  <!-- Arrow DPP -> S* -->
  <line x1="1330" y1="140" x2="1330" y2="105" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 3. DPP Block -->
  <rect x="1150" y="140" width="360" height="90" rx="15" fill="#FF9999" stroke="black" stroke-width="2" />
  <text x="1330" y="190" font-size="48" text-anchor="middle" font-family="serif">DPP</text>

  <!-- Arrow Relevance -> DPP -->
  <line x1="1330" y1="230" x2="1330" y2="205" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 4. Query Relevance Vector r -->
  <text x="1120" y="270" font-size="48" font-style="italic" font-weight="bold">r</text>
  <g transform="translate(1150, 230)">
    <rect x="0" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <rect x="80" y="0" width="80" height="70" fill="#BFBFBF" stroke="black" stroke-width="2" />
    <rect x="160" y="0" width="80" height="70" fill="#767171" stroke="black" stroke-width="2" />
    <rect x="240" y="0" width="80" height="70" fill="#767171" stroke="black" stroke-width="2" />
    <rect x="320" y="0" width="80" height="70" fill="#BFBFBF" stroke="black" stroke-width="2" />
    <rect x="400" y="0" width="80" height="70" fill="#EDEDED" stroke="black" stroke-width="2" />
  </g>

  <!-- 5. Feature Similarity Matrix L -->
  <text x="1120" y="470" font-size="48" font-style="italic" font-weight="bold">L</text>
  <g transform="translate(1150, 300)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
    <rect x="80" y="0" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="160" y="0" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="240" y="0" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <rect x="320" y="0" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="400" y="0" width="80" height="60" fill="#C55A11" stroke="black" stroke-width="2" />
    <!-- Row 2 -->
    <rect x="0" y="60" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="80" y="60" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
    <rect x="160" y="60" width="80" height="60" fill="#C55A11" stroke="black" stroke-width="2" />
    <rect x="240" y="60" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="320" y="60" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="400" y="60" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <!-- Row 3 -->
    <rect x="0" y="120" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="80" y="120" width="80" height="60" fill="#C55A11" stroke="black" stroke-width="2" />
    <rect x="160" y="120" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
    <rect x="240" y="120" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <rect x="320" y="120" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="400" y="120" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <!-- Row 4 -->
    <rect x="0" y="180" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <rect x="80" y="180" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="160" y="180" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <rect x="240" y="180" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
    <rect x="320" y="180" width="80" height="60" fill="#C55A11" stroke="black" stroke-width="2" />
    <rect x="400" y="180" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <!-- Row 5 -->
    <rect x="0" y="240" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <rect x="80" y="240" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="160" y="240" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="240" y="240" width="80" height="60" fill="#C55A11" stroke="black" stroke-width="2" />
    <rect x="320" y="240" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
    <rect x="400" y="240" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <!-- Row 6 -->
    <rect x="0" y="300" width="80" height="60" fill="#C55A11" stroke="black" stroke-width="2" />
    <rect x="80" y="300" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="160" y="300" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
    <rect x="240" y="300" width="80" height="60" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="320" y="300" width="80" height="60" fill="#F4B183" stroke="black" stroke-width="2" />
    <rect x="400" y="300" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
  </g>

  <!-- 6. Right Sidebar Vector -->
  <g transform="translate(1540, 300)">
    <rect x="0" y="0" width="80" height="60" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <rect x="0" y="60" width="80" height="60" fill="#BFBFBF" stroke="black" stroke-width="2" />
    <rect x="0" y="120" width="80" height="60" fill="#767171" stroke="black" stroke-width="2" />
    <rect x="0" y="180" width="80" height="60" fill="#767171" stroke="black" stroke-width="2" />
    <rect x="0" y="240" width="80" height="60" fill="#BFBFBF" stroke="black" stroke-width="2" />
    <rect x="0" y="300" width="80" height="60" fill="#EDEDED" stroke="black" stroke-width="2" />
  </g>

  <!-- 7. Internal Arrows & Logic -->
  <!-- Arrow from Matrix up to Relevance -->
  <line x1="1330" y1="300" x2="1330" y2="265" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <!-- X mark on the arrow -->
  <use href="#x-mark" x="1315" y="285" />
  
  <!-- Arrow from Relevance up to DPP -->
  <line x1="1330" y1="230" x2="1330" y2="205" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <!-- X mark on the arrow -->
  <use href="#x-mark" x="1315" y="215" />
  
  <!-- Arrow from Sidebar up to Matrix -->
  <line x1="1580" y1="300" x2="1580" y2="480" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <!-- X mark on the arrow -->
  <use href="#x-mark" x="1565" y="450" />

</svg>
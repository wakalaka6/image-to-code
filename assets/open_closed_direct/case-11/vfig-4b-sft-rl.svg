<svg xmlns="http://www.w3.org/2000/svg" viewBox="4.0 25.0 1636.0 862.0" style="background-color: white;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4472C4" />
    </marker>
    <!-- Font Styles -->
    <style>
      .serif { font-family: "Times New Roman", Times, serif; }
      .math { font-style: italic; }
      .bold { font-weight: bold; }
      .label-text { font-size: 48px; fill: black; }
      .box-text { font-size: 48px; fill: black; }
      .small-text { font-size: 36px; fill: black; }
      .token-text { font-size: 32px; fill: black; text-anchor: middle; dominant-baseline: middle; }
      .legend-text { font-size: 40px; fill: black; dominant-baseline: middle; }
    </style>
  </defs>

  <!-- ================= LEFT SECTION ================= -->

  <!-- 1. Top Header -->
  <rect x="10" y="30" width="1000" height="100" rx="15" fill="#E2EFDA" />
  <text x="35" y="80" class="serif label-text">
    Language Model <tspan class="math bold">f</tspan><tspan dy="10" font-size="32">φ</tspan>
  </text>

  <!-- 2. Bottom Input -->
  <text x="35" y="470" class="serif label-text">
    Language Instruction <tspan class="math bold">X</tspan><tspan dy="10" font-size="32">q</tspan>
  </text>
  <text x="480" y="470" class="serif label-text">
    <tspan class="math bold">H</tspan><tspan dy="10" font-size="32">v</tspan>
  </text>

  <!-- 3. Tokenizer -->
  <rect x="40" y="280" width="450" height="100" rx="15" fill="#F2F2F2" />
  <text x="265" y="340" class="serif box-text" text-anchor="middle">Tokenizer</text>
  <line x1="265" y1="420" x2="265" y2="360" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 4. Visual Tokens (Input) -->
  <g transform="translate(0, 450)">
    <!-- Row 1 -->
    <rect x="600" y="0" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="650" y="0" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="700" y="0" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="750" y="0" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="800" y="0" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="850" y="0" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <!-- Row 2 -->
    <rect x="600" y="100" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="650" y="100" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="700" y="100" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="750" y="100" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="800" y="100" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="850" y="100" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
  </g>

  <!-- 5. Projection -->
  <rect x="560" y="550" width="450" height="100" rx="15" fill="#FCE5D6" />
  <text x="785" y="610" class="serif box-text" text-anchor="middle">Projector <tspan class="math bold">g</tspan></text>
  <line x1="785" y1="550" x2="785" y2="480" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 6. Vision Encoder -->
  <rect x="560" y="640" width="450" height="100" rx="15" fill="#DAE3F3" />
  <text x="785" y="700" class="serif box-text" text-anchor="middle">Vision Encoder <tspan class="math bold">f</tspan><tspan dy="10" font-size="32">v</tspan></text>
  <line x1="785" y1="640" x2="785" y2="720" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 7. Input Image -->
  <text x="650" y="830" class="serif label-text">
    Input Image <tspan class="math bold">X</tspan><tspan dy="10" font-size="32">v</tspan>
  </text>

  <!-- 8. CDPruner -->
  <rect x="560" y="280" width="450" height="100" rx="15" fill="#FADBD8" />
  <text x="785" y="340" class="serif box-text" text-anchor="middle">CDPruner</text>
  <line x1="785" y1="550" x2="785" y2="480" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="785" y1="280" x2="785" y2="220" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 9. H_v* -->
  <text x="540" y="210" class="serif label-text">
    <tspan class="math bold">H</tspan><tspan dy="10" font-size="32">v*</tspan>
  </text>
  <rect x="610" y="160" width="80" height="80" rx="10" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
  <line x1="500" y1="200" x2="550" y2="200" stroke="#4472C4" stroke-width="3" />
  <line x1="500" y1="200" x2="500" y2="330" stroke="#4472C4" stroke-width="3" />
  <line x1="500" y1="330" x2="560" y2="330" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 10. H_q -->
  <text x="15" y="210" class="serif label-text">
    <tspan class="math bold">H</tspan><tspan dy="10" font-size="32">q</tspan>
  </text>
  <rect x="80" y="160" width="80" height="80" rx="10" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
  <rect x="230" y="160" width="80" height="80" rx="10" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
  <rect x="360" y="160" width="80" height="80" rx="10" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
  <line x1="270" y1="240" x2="270" y2="220" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="270" y1="100" x2="270" y2="110" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 11. Legend -->
  <rect x="10" y="550" width="500" height="280" fill="white" stroke="#001F5F" stroke-width="3" />
  <g transform="translate(25, 565)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="70" y="0" width="60" height="60" rx="8" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="140" y="0" width="60" height="60" rx="8" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="35" class="serif legend-text">Visual Tokens</text>
    
    <!-- Row 2 -->
    <rect x="0" y="80" width="60" height="60" rx="8" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
    <rect x="70" y="80" width="60" height="60" rx="8" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
    <rect x="140" y="80" width="60" height="60" rx="8" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="135" class="serif legend-text">Text Tokens</text>

    <!-- Row 3 -->
    <rect x="0" y="160" width="60" height="60" rx="8" fill="#B45318" stroke="#4472C4" stroke-width="3" />
    <rect x="70" y="160" width="60" height="60" rx="8" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <rect x="140" y="160" width="60" height="60" rx="8" fill="#F4C7A5" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="215" class="serif legend-text">Feature Similarity</text>

    <!-- Row 4 -->
    <rect x="0" y="240" width="60" height="60" rx="8" fill="#666666" stroke="#4472C4" stroke-width="3" />
    <rect x="70" y="240" width="60" height="60" rx="8" fill="#C0C0C0" stroke="#4472C4" stroke-width="3" />
    <rect x="140" y="240" width="60" height="60" rx="8" fill="#E0E0E0" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="295" class="serif legend-text">Query Relevance</text>
  </g>

  <!-- ================= RIGHT SECTION ================= -->

  <!-- Container -->
  <rect x="1050" y="30" width="550" height="800" rx="30" fill="#FCE5E5" stroke="#000000" stroke-width="2" />
  
  <!-- Dashed Connector -->
  <line x1="1050" y1="50" x2="1000" y2="830" stroke="black" stroke-width="4" stroke-dasharray="15,10" />

  <!-- 1. Top: S* -->
  <text x="1100" y="115" class="serif label-text">
    <tspan class="math bold">S</tspan><tspan dy="10" font-size="32">*</tspan>
  </text>
  <g transform="translate(1120, 70)">
    <rect x="0" y="0" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <text x="40" y="45" class="serif token-text">1</text>
    <rect x="80" y="0" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
    <text x="120" y="45" class="serif token-text">×</text>
    <rect x="160" y="0" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <text x="200" y="45" class="serif token-text">3</text>
    <rect x="240" y="0" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <text x="280" y="45" class="serif token-text">4</text>
    <rect x="320" y="0" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
    <text x="360" y="45" class="serif token-text">×</text>
    <rect x="400" y="0" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
    <text x="440" y="45" class="serif token-text">×</text>
  </g>
  <line x1="1300" y1="150" x2="1300" y2="130" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 2. DPP -->
  <rect x="1120" y="170" width="360" height="100" rx="15" fill="#F89595" stroke="black" stroke-width="2" />
  <text x="1300" y="230" class="serif box-text" text-anchor="middle">DPP</text>
  <line x1="1300" y1="270" x2="1300" y2="250" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 3. r -->
  <text x="1100" y="340" class="serif label-text">
    <tspan class="math bold">r</tspan>
  </text>
  <g transform="translate(1120, 295)">
    <rect x="0" y="0" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
    <rect x="80" y="0" width="80" height="80" fill="#C0C0C0" stroke="black" stroke-width="2" />
    <rect x="160" y="0" width="80" height="80" fill="#555555" stroke="black" stroke-width="2" />
    <rect x="240" y="0" width="80" height="80" fill="#777777" stroke="black" stroke-width="2" />
    <rect x="320" y="0" width="80" height="80" fill="#C0C0C0" stroke="black" stroke-width="2" />
    <rect x="400" y="0" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
  </g>
  <line x1="1300" y1="385" x2="1300" y2="365" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 4. L Matrix -->
  <text x="1100" y="620" class="serif label-text">
    <tspan class="math bold">L</tspan>
  </text>
  <g transform="translate(1120, 400)">
    <!-- Grid 6x6 -->
    <rect x="0" y="0" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="80" y="0" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="160" y="0" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="240" y="0" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="320" y="0" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="400" y="0" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />

    <rect x="0" y="80" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="80" y="80" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="160" y="80" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="240" y="80" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="320" y="80" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="400" y="80" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />

    <rect x="0" y="160" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="80" y="160" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="160" y="160" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="240" y="160" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="320" y="160" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="400" y="160" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />

    <rect x="0" y="240" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="80" y="240" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="160" y="240" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="240" y="240" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="320" y="240" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="400" y="240" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />

    <rect x="0" y="320" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="80" y="320" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="160" y="320" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="240" y="320" width="80" height="80" fill="#F4C7A5" stroke="black" stroke-width="2" />
    <rect x="320" y="320" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
    <rect x="400" y="320" width="80" height="80" fill="#8B4513" stroke="black" stroke-width="2" />
  </g>
  <line x1="1500" y1="600" x2="1500" y2="580" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 5. Right Side Legend -->
  <g transform="translate(1530, 400)">
    <rect x="0" y="0" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
    <rect x="0" y="80" width="80" height="80" fill="#C0C0C0" stroke="black" stroke-width="2" />
    <rect x="0" y="160" width="80" height="80" fill="#555555" stroke="black" stroke-width="2" />
    <rect x="0" y="240" width="80" height="80" fill="#777777" stroke="black" stroke-width="2" />
    <rect x="0" y="320" width="80" height="80" fill="#C0C0C0" stroke="black" stroke-width="2" />
    <rect x="0" y="400" width="80" height="80" fill="#E0E0E0" stroke="black" stroke-width="2" />
  </g>

  <!-- 6. CDPruner Icon -->
  <g transform="translate(1560, 70)">
    <circle cx="40" cy="40" r="35" fill="#E0E0E0" stroke="black" stroke-width="2" />
    <circle cx="40" cy="40" r="25" fill="#C0C0C0" stroke="black" stroke-width="2" />
    <circle cx="40" cy="40" r="15" fill="#999999" stroke="black" stroke-width="2" />
    <text x="40" y="100" class="serif label-text" transform="rotate(90, 40, 100)" text-anchor="middle">CDPruner</text>
  </g>

  <!-- ================= MULTIPLICATION ICONS ================= -->
  <!-- Top Right -->
  <g transform="translate(1300, 370)">
    <rect x="0" y="0" width="20" height="20" fill="#4472C4" />
    <rect x="20" y="0" width="20" height="20" fill="#4472C4" />
    <line x1="10" y1="0" x2="10" y2="20" stroke="white" stroke-width="4" />
    <line x1="30" y1="0" x2="30" y2="20" stroke="white" stroke-width="4" />
  </g>
  <!-- Bottom Right -->
  <g transform="translate(1500, 590)">
    <rect x="0" y="0" width="20" height="20" fill="#4472C4" />
    <rect x="20" y="0" width="20" height="20" fill="#4472C4" />
    <line x1="10" y1="0" x2="10" y2="20" stroke="white" stroke-width="4" />
    <line x1="30" y1="0" x2="30" y2="20" stroke="white" stroke-width="4" />
  </g>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="2.0 2.0 1706.0 596.0" style="background-color: white;">
  <defs>
    <!-- Fonts -->
    <style>
      .serif { font-family: "Times New Roman", Times, serif; }
      .italic { font-style: italic; }
      .bold { font-weight: bold; }
      .title { font-size: 42px; fill: black; }
      .label { font-size: 32px; fill: black; }
      .step-label { font-size: 36px; }
      .dxf-text { font-family: Arial, sans-serif; font-weight: 900; font-size: 48px; fill: black; }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="gradTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74B5A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A9E91;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C776A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A65D86;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3D" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#555;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#6FA0E5" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#A65D86" />
    </marker>
  </defs>

  <!-- ================= SECTION 1: EXPERT KNOWLEDGE ================= -->
  <g transform="translate(10, 20)">
    <!-- Container -->
    <rect x="0" y="0" width="570" height="210" rx="30" fill="#E6E6E6" />
    <text x="285" y="45" text-anchor="middle" class="serif title">Expert Knowledge</text>

    <!-- Drawing Thumbnail (Simulated Technical Drawing) -->
    <g transform="translate(20, 60)">
      <rect width="220" height="130" fill="white" />
      <!-- Technical lines -->
      <path d="M0,0 L220,0 M0,130 L220,130 M0,0 L0,130 M220,0 L220,130" stroke="#ccc" stroke-width="1"/>
      <path d="M0,0 L10,10 M20,0 L30,10 M40,0 L50,10 M60,0 L70,10 M80,0 L90,10 M100,0 L110,10 M120,0 L130,10 M140,0 L150,10 M160,0 L170,10 M180,0 L190,10 M200,0 L210,10" stroke="black" stroke-width="1"/>
      <path d="M0,130 L10,120 M20,130 L30,120 M40,130 L50,120 M60,130 L70,120 M80,130 L90,120 M100,130 L110,120 M120,130 L130,120 M140,130 L150,120 M160,130 L170,120 M180,130 L190,120 M200,130 L210,120" stroke="black" stroke-width="1"/>
      <!-- Inner details -->
      <rect x="40" y="40" width="140" height="90" fill="none" stroke="black" stroke-width="1"/>
      <line x1="40" y1="60" x2="180" y2="60" stroke="black" stroke-width="1"/>
      <line x1="40" y1="100" x2="180" y2="100" stroke="black" stroke-width="1"/>
      <!-- Dimensions -->
      <g stroke="black" stroke-width="0.5" fill="none">
        <line x1="40" y1="35" x2="180" y2="35" />
        <line x1="40" y1="35" x2="40" y2="40" />
        <line x1="180" y1="35" x2="180" y2="40" />
        <text x="110" y="32" font-size="10" text-anchor="middle" fill="black" stroke="none">180</text>
        
        <line x1="35" y1="40" x2="35" y2="130" />
        <line x1="35" y1="130" x2="40" y2="130" />
        <text x="32" y="85" font-size="10" text-anchor="middle" fill="black" stroke="none" transform="rotate(-90, 32, 85)">240</text>
      </g>
      <!-- Label -->
      <text x="110" y="155" text-anchor="middle" class="serif label">Drawing</text>
    </g>

    <!-- Clipboard Icon (Constraints) -->
    <g transform="translate(280, 80)">
      <rect x="10" y="20" width="100" height="100" rx="10" fill="#222" />
      <path d="M35,10 L85,10 A10,10 0 0 1 95,20 L95,30 L35,30 L35,20 A10,10 0 0 1 35,10" fill="none" stroke="#222" stroke-width="8" />
      <circle cx="60" cy="10" r="8" fill="white" />
      <!-- X and Check -->
      <path d="M25,40 L60,75 L95,40 L125,70 L95,100 L65,70 Z" fill="white" /> <!-- Simplified check -->
      <path d="M25,40 L60,75 M60,40 L25,75" stroke="white" stroke-width="8" stroke-linecap="round" />
    </g>
    <text x="330" y="195" text-anchor="middle" class="serif label">Constraints</text>

    <!-- Text Icon -->
    <g transform="translate(430, 90)">
      <path d="M20,10 Q20,0 30,0 L90,0 Q100,0 100,10 L100,30 Q100,40 90,40 L30,40 Q20,40 20,30 Z" fill="none" stroke="black" stroke-width="8" />
      <line x1="30" y1="15" x2="90" y2="15" stroke="black" stroke-width="6" stroke-linecap="round"/>
      <line x1="30" y1="35" x2="90" y2="35" stroke="black" stroke-width="6" stroke-linecap="round"/>
      <line x1="30" y1="55" x2="90" y2="55" stroke="black" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="480" y="195" text-anchor="middle" class="serif label">Text</text>
  </g>

  <!-- ================= SECTION 2: STEP 1 ================= -->
  <g transform="translate(10, 240)">
    <!-- Text -->
    <text x="130" y="40" text-anchor="middle" class="serif step-label" fill="#74B5A8">
      <tspan x="130" dy="0" class="italic">Step 1:</tspan>
      <tspan x="130" dy="40" class="bold">Constraint-Guided</tspan>
      <tspan x="130" dy="40" class="bold">Parameter Sampling</tspan>
    </text>

    <!-- Big Arrow -->
    <path d="M300,-10 L300,150 L270,150 L315,190 L360,150 L330,150 L330,-10 Z" fill="url(#gradTeal)" />

    <!-- Documents Icon -->
    <g transform="translate(250, 160)">
      <!-- Back Doc -->
      <rect x="40" y="30" width="120" height="140" rx="15" fill="black" />
      <line x1="60" y1="50" x2="140" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="60" y1="70" x2="140" y2="70" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="60" y1="90" x2="140" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- Front Doc -->
      <rect x="0" y="0" width="120" height="140" rx="15" fill="black" />
      <line x1="20" y1="20" x2="100" y2="20" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <line x1="20" y1="45" x2="100" y2="45" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="20" y1="65" x2="100" y2="65" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="20" y1="85" x2="100" y2="85" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="20" y1="105" x2="100" y2="105" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="20" y1="125" x2="100" y2="125" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="320" y="350" text-anchor="middle" class="serif title" font-size="36">Parameter Space</text>

    <!-- Floating Text -->
    <text x="320" y="40" class="serif label" fill="black">
      <tspan x="330" dy="0">Inter-/Intra-View</tspan>
      <tspan x="360" dy="40">Constraints</tspan>
    </text>
  </g>

  <!-- ================= SECTION 3: STEP 2 ================= -->
  <g transform="translate(600, 20)">
    <!-- Text Labels -->
    <text x="0" y="60" class="serif title italic">Layers</text>
    <text x="10" y="100" class="serif title italic">separating</text>
    <text x="450" y="100" class="serif title italic">Rendering</text>

    <!-- Flow Lines -->
    <!-- Blue Line from Param Space -->
    <path d="M-170,400 L0,400 Q20,400 20,380 L20,130 Q20,110 40,110 L280,110" fill="none" stroke="#6FA0E5" stroke-width="4" marker-end="url(#arrowBlue)" />
    
    <!-- Blue Line Output -->
    <line x1="430" y1="115" x2="680" y2="115" stroke="#6FA0E5" stroke-width="4" marker-end="url(#arrowBlue)" />

    <!-- Purple Line Output -->
    <line x1="-170" y1="400" x2="350" y2="400" stroke="#A65D86" stroke-width="4" marker-end="url(#arrowPurple)" />
    <text x="50" y="350" class="serif title italic">Entities</text>
    <text x="60" y="390" class="serif title italic">separating</text>

    <!-- DXF Icon -->
    <g transform="translate(300, 60)">
      <path d="M0,20 L100,0 L100,140 L0,120 Z" fill="white" stroke="black" stroke-width="8" stroke-linejoin="round"/>
      <path d="M100,40 L150,30 L150,130 L100,120 Z" fill="white" stroke="black" stroke-width="8" stroke-linejoin="round"/>
      <text x="25" y="90" class="dxf-text" font-size="60">DXF</text>
    </g>

    <!-- Step 2 Label -->
    <text x="450" y="190" text-anchor="middle" class="serif step-label" fill="#6FA0E5">
      <tspan x="450" dy="0" class="italic">Step 2: 2D Drawing and Raster</tspan>
      <tspan x="450" dy="45" class="italic">Image Generation</tspan>
    </text>

    <!-- Output Box (Orthographic) -->
    <g transform="translate(680, -10)">
      <rect x="0" y="0" width="420" height="260" rx="30" fill="none" stroke="black" stroke-width="3" stroke-dasharray="8,8" />
      
      <!-- Front Image -->
      <g transform="translate(20, 20)">
        <rect width="180" height="120" fill="white" />
        <rect x="30" y="40" width="120" height="40" fill="none" stroke="black" stroke-width="1"/>
        <line x1="30" y1="40" x2="30" y2="80" stroke="black" stroke-width="1"/>
        <line x1="150" y1="40" x2="150" y2="80" stroke="black" stroke-width="1"/>
        <text x="90" y="70" text-anchor="middle" font-family="serif" font-weight="bold" font-size="40" fill="#ccc">Front</text>
        <!-- Dimensions lines -->
        <path d="M0,0 L180,0 M0,120 L180,120 M0,0 L0,120 M180,0 L180,120" stroke="#ddd" stroke-width="1"/>
        <path d="M0,0 L10,10 M170,0 L180,10 M0,120 L10,110 M170,120 L180,110" stroke="#999" stroke-width="1"/>
      </g>
      
      <!-- Side Image -->
      <g transform="translate(260, 20)">
        <rect width="140" height="120" fill="white" />
        <rect x="40" y="20" width="60" height="80" fill="none" stroke="black" stroke-width="1"/>
        <line x1="40" y1="60" x2="100" y2="60" stroke="black" stroke-width="1"/>
        <text x="70" y="70" text-anchor="middle" font-family="serif" font-weight="bold" font-size="40" fill="#ccc">Side</text>
         <!-- Dimensions lines -->
        <path d="M0,0 L140,0 M0,120 L140,120 M0,0 L0,120 M140,0 L140,120" stroke="#ddd" stroke-width="1"/>
        <path d="M0,0 L10,10 M130,0 L140,10 M0,120 L10,110 M130,120 L140,110" stroke="#999" stroke-width="1"/>
      </g>

      <!-- Top Image -->
      <g transform="translate(20, 150)">
        <rect width="180" height="100" fill="white" />
        <rect x="50" y="30" width="80" height="40" fill="none" stroke="black" stroke-width="1"/>
        <circle cx="50" cy="30" r="20" fill="none" stroke="black" stroke-width="0.5"/>
        <circle cx="130" cy="30" r="20" fill="none" stroke="black" stroke-width="0.5"/>
        <circle cx="50" cy="70" r="20" fill="none" stroke="black" stroke-width="0.5"/>
        <circle cx="130" cy="70" r="20" fill="none" stroke="black" stroke-width="0.5"/>
        <text x="90" y="60" text-anchor="middle" font-family="serif" font-weight="bold" font-size="40" fill="#ccc">Top</text>
         <!-- Dimensions lines -->
        <path d="M0,0 L180,0 M0,100 L180,100 M0,0 L0,100 M180,0 L180,100" stroke="#ddd" stroke-width="1"/>
        <path d="M0,0 L10,10 M170,0 L180,10 M0,100 L10,90 M170,100 L180,90" stroke="#999" stroke-width="1"/>
      </g>

      <text x="390" y="180" text-anchor="end" class="serif title">
        <tspan x="410" dy="0">Orthographic</tspan>
        <tspan x="410" dy="40">Projection</tspan>
      </text>
    </g>
  </g>

  <!-- ================= SECTION 4: STEP 3 ================= -->
  <g transform="translate(600, 320)">
    <!-- Text -->
    <text x="400" y="220" text-anchor="middle" class="serif step-label" fill="#A65D86">
      <tspan class="italic">Step 3: 3D Model Generation</tspan>
    </text>

    <!-- Flow Line -->
    <line x1="600" y1="100" x2="750" y2="100" stroke="#A65D86" stroke-width="4" marker-end="url(#arrowPurple)" />
    <text x="630" y="80" class="serif title italic">Execute</text>

    <!-- Interface Icon -->
    <g transform="translate(380, 20)">
      <rect x="0" y="0" width="200" height="160" rx="5" fill="white" stroke="#607080" stroke-width="8" />
      <!-- Teal UI Elements -->
      <g stroke="#4DB6AC" stroke-width="8" fill="none">
        <rect x="20" y="20" width="70" height="25" rx="2" />
        <line x1="20" y1="45" x2="90" y2="45" />
        <rect x="20" y="60" width="70" height="25" rx="2" />
        <line x1="55" y1="45" x2="55" y2="60" stroke="#607080" stroke-width="6" />
        <!-- Arrow -->
        <path d="M20,100 L50,100 L50,90 L80,110 L50,130 L50,120 L20,120" />
      </g>
      <!-- Python Logo Overlay -->
      <g transform="translate(120, 80) scale(0.6)">
        <path d="M50,0 C25,0 25,25 25,25 L25,35 L55,35 L55,45 L10,45 C-5,45 -5,70 10,70 L25,70 L25,60 L55,60 L55,50 L35,50 C20,50 20,25 20,25" fill="none" stroke="#3776AB" stroke-width="25" stroke-linecap="round"/>
        <path d="M50,110 C75,110 75,85 75,85 L75,75 L45,75 L45,65 L90,65 C105,65 105,40 90,40 L75,40 L75,50 L45,50 L45,60 L65,60 C80,60 80,85 80,85" fill="none" stroke="#3776AB" stroke-width="25" stroke-linecap="round"/>
        <circle cx="35" cy="20" r="8" fill="white"/>
        <circle cx="65" cy="90" r="8" fill="white"/>
      </g>
    </g>

    <!-- 3D Model Render -->
    <g transform="translate(760, 0)">
      <!-- Background -->
      <rect width="280" height="180" fill="#556" />
      <!-- 3D Object (PCB) -->
      <g transform="translate(10, 10)">
        <!-- Base Top -->
        <path d="M0,50 L200,100 L280,50 L80,0 Z" fill="#888" stroke="#555" />
        <path d="M0,50 L200,100 L200,180 L0,130 Z" fill="#777" stroke="#555" /> <!-- Front Face -->
        <path d="M200,100 L280,50 L280,130 L200,180 Z" fill="#666" stroke="#555" /> <!-- Side Face -->
        
        <!-- Legs -->
        <g fill="url(#grad3D)" stroke="#333">
           <rect x="20" y="130" width="20" height="80" />
           <rect x="80" y="140" width="20" height="90" />
           <rect x="160" y="140" width="20" height="90" />
           <rect x="240" y="130" width="20" height="80" />
        </g>
        
        <!-- Components -->
        <g fill="#999" stroke="#555">
          <!-- Tall Block -->
          <path d="M80,20 L120,20 L120,80 L80,80 Z" transform="translate(0, -20)" /> <!-- Front -->
          <path d="M120,0 L140,-10 L140,50 L120,60 Z" transform="translate(0, -20)" /> <!-- Side -->
          <path d="M80,0 L100,-10 L140,-10 L120,0 Z" transform="translate(0, -20)" /> <!-- Top -->
          
          <!-- Short Block -->
          <path d="M160,60 L200,60 L200,120 L160,120 Z" /> <!-- Front -->
          <path d="M200,60 L220,50 L220,110 L200,120 Z" /> <!-- Side -->
          <path d="M160,60 L180,50 L220,50 L200,60 Z" /> <!-- Top -->
        </g>
      </g>
      <text x="140" y="230" text-anchor="middle" class="serif title">3-D Model</text>
    </g>
  </g>

  <!-- Floating Logo -->
  <text x="600" y="280" class="dxf-text" font-size="60">ezdxf</text>

</svg>
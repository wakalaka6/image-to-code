<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <style>
      .text-bold { font-family: 'Times New Roman', serif; font-weight: bold; }
      .text-italic { font-family: 'Times New Roman', serif; font-style: italic; font-weight: bold; }
      .text-step { font-family: 'Comic Sans MS', cursive, sans-serif; font-weight: bold; }
      .text-normal { font-family: 'Times New Roman', serif; }
    </style>
    
    <!-- Arrowheads -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#75a3e7" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b36699" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59a590" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#ffffff" />

  <!-- Expert Knowledge Box -->
  <rect x="20" y="20" width="380" height="170" rx="15" fill="#e6e6e6" />
  <text x="210" y="45" font-size="24" text-anchor="middle" class="text-bold">Expert Knowledge</text>

  <!-- Drawing Image Placeholder -->
  <rect x="35" y="55" width="140" height="105" fill="#ffffff" stroke="#cccccc" />
  <path d="M 35 65 L 175 65 M 35 145 L 175 145 M 65 55 L 65 160 M 145 55 L 145 160" stroke="#cccccc" stroke-width="1" />
  <rect x="55" y="95" width="100" height="50" fill="none" stroke="#333333" stroke-width="1.5" />
  <text x="105" y="175" font-size="16" text-anchor="middle" class="text-normal">Drawing</text>

  <!-- Constraints Icon -->
  <g transform="translate(210, 70)">
    <rect x="0" y="10" width="55" height="70" rx="5" fill="#222222" />
    <path d="M 15 10 L 15 5 C 15 2 18 0 22 0 L 33 0 C 37 0 40 2 40 5 L 40 10" fill="#222222" />
    <circle cx="27.5" cy="5" r="3" fill="#ffffff" />
    <path d="M 10 35 L 25 50 L 45 25" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 15 20 L 25 30 M 25 20 L 15 30" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  </g>
  <text x="240" y="175" font-size="16" text-anchor="middle" class="text-normal">Constraints</text>

  <!-- Text Icon -->
  <g transform="translate(315, 85)">
    <rect x="0" y="0" width="50" height="60" rx="8" fill="none" stroke="#222222" stroke-width="4" />
    <line x1="10" y1="15" x2="40" y2="15" stroke="#222222" stroke-width="4" stroke-linecap="round" />
    <line x1="10" y1="30" x2="40" y2="30" stroke="#222222" stroke-width="4" stroke-linecap="round" />
    <line x1="10" y1="45" x2="30" y2="45" stroke="#222222" stroke-width="4" stroke-linecap="round" />
  </g>
  <text x="340" y="175" font-size="16" text-anchor="middle" class="text-normal">Text</text>

  <!-- Step 1 Text -->
  <text x="100" y="255" font-size="18" text-anchor="middle" fill="#59a590" class="text-step">Step 1:</text>
  <text x="100" y="280" font-size="18" text-anchor="middle" fill="#59a590" class="text-step">Constraint-Guided</text>
  <text x="100" y="305" font-size="18" text-anchor="middle" fill="#59a590" class="text-step">Parameter Sampling</text>

  <!-- Down Arrow -->
  <path d="M 220 190 L 220 320 L 205 320 L 227.5 350 L 250 320 L 235 320 L 235 190 Z" fill="#59a590" />
  <text x="245" y="230" font-size="16" class="text-normal">Inter-/Intra-View</text>
  <text x="245" y="255" font-size="16" class="text-normal">Constraints</text>

  <!-- Parameter Space Icon -->
  <g transform="translate(190, 365)">
    <rect x="15" y="15" width="50" height="65" rx="5" fill="#000000" />
    <rect x="0" y="0" width="55" height="75" rx="5" fill="#000000" />
    <line x1="10" y1="15" x2="35" y2="15" stroke="#ffffff" stroke-width="3" />
    <line x1="10" y1="25" x2="45" y2="25" stroke="#ffffff" stroke-width="3" />
    <line x1="10" y1="35" x2="45" y2="35" stroke="#ffffff" stroke-width="3" />
    <line x1="10" y1="45" x2="45" y2="45" stroke="#ffffff" stroke-width="3" />
    <line x1="10" y1="55" x2="45" y2="55" stroke="#ffffff" stroke-width="3" />
    <line x1="35" y1="65" x2="45" y2="65" stroke="#ffffff" stroke-width="3" />
  </g>
  <text x="230" y="475" font-size="18" text-anchor="middle" class="text-normal">Parameter Space</text>

  <!-- Branching Arrows -->
  <path d="M 290 375 L 410 375 C 410 375 410 375 410 375 L 410 130 C 410 115 420 110 430 110 L 600 110" fill="none" stroke="#75a3e7" stroke-width="3" marker-end="url(#arrow-blue)" />
  <path d="M 410 375 L 645 375" fill="none" stroke="#b36699" stroke-width="3" marker-end="url(#arrow-purple)" />

  <!-- ezdxf Text -->
  <text x="420" y="240" font-size="24" font-family="sans-serif" font-weight="bold">
    <tspan fill="#000000">ez</tspan><tspan fill="#8888ff">dxf</tspan>
  </text>

  <!-- Layers separating Text -->
  <text x="460" y="60" font-size="20" class="text-italic">Layers</text>
  <text x="460" y="85" font-size="20" class="text-italic">separating</text>

  <!-- DXF Icon -->
  <g transform="translate(620, 65)">
    <path d="M 0 10 L 50 0 L 50 70 L 0 80 Z" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" />
    <path d="M 50 5 L 85 5 L 85 65 L 50 65" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" />
    <text x="25" y="50" font-size="24" font-family="sans-serif" font-weight="bold" text-anchor="middle" transform="rotate(-10 25 50)">DXF</text>
  </g>

  <!-- Rendering Arrow -->
  <line x1="720" y1="110" x2="890" y2="110" stroke="#75a3e7" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="745" y="90" font-size="20" class="text-italic">Rendering</text>

  <!-- Step 2 Text -->
  <text x="670" y="170" font-size="20" text-anchor="middle" fill="#75a3e7" class="text-step">Step 2: 2D Drawing and Raster</text>
  <text x="670" y="195" font-size="20" text-anchor="middle" fill="#75a3e7" class="text-step">Image Generation</text>

  <!-- Orthographic Projection Box -->
  <rect x="900" y="10" width="240" height="210" rx="20" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="8,5" />
  
  <!-- Front View -->
  <rect x="915" y="30" width="100" height="80" fill="#f0f0f0" stroke="#cccccc" />
  <rect x="930" y="55" width="70" height="30" fill="#ffffff" stroke="#999999" />
  <rect x="945" y="40" width="15" height="15" fill="#ffffff" stroke="#999999" />
  <rect x="970" y="40" width="15" height="15" fill="#ffffff" stroke="#999999" />
  <text x="965" y="75" font-size="20" text-anchor="middle" fill="#cccccc" font-family="serif" font-weight="bold">Front</text>

  <!-- Side View -->
  <rect x="1030" y="30" width="90" height="80" fill="#f0f0f0" stroke="#cccccc" />
  <rect x="1045" y="55" width="60" height="30" fill="#ffffff" stroke="#999999" />
  <rect x="1065" y="40" width="20" height="15" fill="#ffffff" stroke="#999999" />
  <text x="1075" y="75" font-size="20" text-anchor="middle" fill="#cccccc" font-family="serif" font-weight="bold">Side</text>

  <!-- Top View -->
  <rect x="915" y="130" width="100" height="70" fill="#f0f0f0" stroke="#cccccc" />
  <rect x="930" y="140" width="70" height="50" fill="#ffffff" stroke="#999999" />
  <circle cx="945" cy="155" r="8" fill="none" stroke="#999999" />
  <circle cx="985" cy="155" r="8" fill="none" stroke="#999999" />
  <circle cx="945" cy="175" r="8" fill="none" stroke="#999999" />
  <circle cx="985" cy="175" r="8" fill="none" stroke="#999999" />
  <text x="965" y="170" font-size="20" text-anchor="middle" fill="#cccccc" font-family="serif" font-weight="bold">Top</text>

  <text x="1080" y="150" font-size="16" text-anchor="middle" class="text-bold">Orthographic</text>
  <text x="1080" y="170" font-size="16" text-anchor="middle" class="text-bold">Projection</text>

  <!-- Entities separating Text -->
  <text x="460" y="325" font-size="20" class="text-italic">Entities</text>
  <text x="460" y="350" font-size="20" class="text-italic">separating</text>

  <!-- Python Script Icon -->
  <g transform="translate(670, 310)">
    <rect x="10" y="5" width="85" height="100" rx="5" fill="none" stroke="#5b7c8c" stroke-width="4" />
    <rect x="25" y="20" width="35" height="15" fill="none" stroke="#1abc9c" stroke-width="4" />
    <rect x="25" y="45" width="35" height="15" fill="none" stroke="#1abc9c" stroke-width="4" />
    <line x1="42.5" y1="35" x2="42.5" y2="45" stroke="#1abc9c" stroke-width="4" />
    <path d="M 25 70 L 40 85 L 55 75" fill="none" stroke="#3498db" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 40 85 L 45 90" fill="none" stroke="#3498db" stroke-width="4" stroke-linecap="round" />
    
    <!-- Python Logo -->
    <g transform="translate(65, 60) scale(0.8)">
      <path d="M 15 0 C 5 0 5 10 5 10 L 5 15 L 25 15 L 25 18 L 5 18 C -5 18 -5 30 5 30 L 10 30 L 10 25 C 10 20 15 15 20 15 L 30 15 C 35 15 35 5 35 5 C 35 -5 25 0 15 0 Z" fill="#346998" />
      <path d="M 20 40 C 30 40 30 30 30 30 L 30 25 L 10 25 L 10 22 L 30 22 C 40 22 40 10 30 10 L 25 10 L 25 15 C 25 20 20 25 15 25 L 5 25 C 0 25 0 35 0 35 C 0 45 10 40 20 40 Z" fill="#ffd43b" />
      <circle cx="12" cy="5" r="2" fill="#ffffff" />
      <circle cx="23" cy="35" r="2" fill="#ffffff" />
    </g>
  </g>

  <!-- Execute Arrow -->
  <line x1="785" y1="360" x2="940" y2="360" stroke="#b36699" stroke-width="3" marker-end="url(#arrow-purple)" />
  <text x="810" y="340" font-size="20" class="text-italic">Execute</text>

  <!-- Step 3 Text -->
  <text x="630" y="475" font-size="20" text-anchor="middle" fill="#b36699" class="text-step">Step 3: 3D Model Generation</text>

  <!-- 3D Model Image Placeholder -->
  <rect x="940" y="250" width="180" height="200" fill="#4a4a6a" />
  
  <!-- 3D Model Drawing -->
  <g transform="translate(940, 250)">
    <!-- Legs -->
    <path d="M 25 130 L 25 150 C 25 155 35 155 35 150 L 35 130 Z" fill="#999999" stroke="#000000" stroke-width="1" />
    <path d="M 65 140 L 65 165 C 65 170 75 170 75 165 L 75 140 Z" fill="#999999" stroke="#000000" stroke-width="1" />
    <path d="M 105 150 L 105 180 C 105 185 115 185 115 180 L 115 150 Z" fill="#999999" stroke="#000000" stroke-width="1" />
    <path d="M 145 140 L 145 165 C 145 170 155 170 155 165 L 155 140 Z" fill="#999999" stroke="#000000" stroke-width="1" />
    
    <!-- Base Block -->
    <path d="M 5 100 L 85 140 L 175 100 L 95 60 Z" fill="#888888" stroke="#000000" stroke-width="1" />
    <path d="M 5 100 L 5 120 L 85 160 L 85 140 Z" fill="#666666" stroke="#000000" stroke-width="1" />
    <path d="M 85 160 L 175 120 L 175 100 L 85 140 Z" fill="#aaaaaa" stroke="#000000" stroke-width="1" />
    
    <!-- Top Block 1 -->
    <path d="M 45 55 L 65 65 L 85 55 L 65 45 Z" fill="#bbbbbb" stroke="#000000" stroke-width="1" />
    <path d="M 45 55 L 45 85 L 65 95 L 65 65 Z" fill="#999999" stroke="#000000" stroke-width="1" />
    <path d="M 65 95 L 85 85 L 85 55 L 65 65 Z" fill="#dddddd" stroke="#000000" stroke-width="1" />
    
    <!-- Top Block 2 -->
    <path d="M 100 80 L 120 90 L 140 80 L 120 70 Z" fill="#bbbbbb" stroke="#000000" stroke-width="1" />
    <path d="M 100 80 L 100 110 L 120 120 L 120 90 Z" fill="#999999" stroke="#000000" stroke-width="1" />
    <path d="M 120 120 L 140 110 L 140 80 L 120 90 Z" fill="#dddddd" stroke="#000000" stroke-width="1" />
  </g>

  <text x="1030" y="480" font-size="24" text-anchor="middle" class="text-bold">3-D Model</text>

</svg>
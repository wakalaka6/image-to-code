<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650">
  <defs>
    <style>
      .text-bold { font-family: monospace; font-weight: bold; font-size: 16px; fill: #111; }
      .text-normal { font-family: monospace; font-size: 14px; fill: #111; }
      .text-small { font-family: monospace; font-size: 12px; fill: #111; }
      .bg-ref { fill: #e6eff8; }
      .bg-denoise { fill: #fdf2e9; }
      .box-spatial { fill: #8ba4c9; stroke: #555; stroke-width: 1.5; }
      .box-cross { fill: #cce6cc; stroke: #555; stroke-width: 1.5; }
      .box-temporal { fill: #f5cda6; stroke: #555; stroke-width: 1.5; }
      .box-spatial-dashed { fill: #8ba4c9; stroke: #555; stroke-width: 1.5; stroke-dasharray: 4,4; }
      .line-solid { stroke: #333; stroke-width: 1.5; fill: none; }
      .line-arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .line-blue { stroke: #4a76b8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-blue); }
      .line-green { stroke: #3a8c4a; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); marker-start: url(#arrowhead-green-start); }
      .line-green-solid { stroke: #3a8c4a; stroke-width: 1.5; fill: none; }
      .line-red { stroke: #c02a3b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-red); }
      .line-yellow-dashed { stroke: #f5b041; stroke-width: 1.5; fill: none; stroke-dasharray: 4,4; marker-end: url(#arrowhead-yellow); }
      .module-poly { fill: #f9f9f9; stroke: #555; stroke-width: 1.5; }
      .circle-plus { fill: none; stroke: #333; stroke-width: 1.5; }
      .img-placeholder { fill: #000; stroke: #555; stroke-width: 1; }
      .img-placeholder-gray { fill: #999; stroke: #555; stroke-width: 1; }
      .img-placeholder-pink { fill: #f0d0d0; stroke: #555; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a76b8" />
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3a8c4a" />
    </marker>
    <marker id="arrowhead-green-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#3a8c4a" />
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c02a3b" />
    </marker>
    <marker id="arrowhead-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f5b041" />
    </marker>
    
    <!-- Patterns for dashed circles -->
    <pattern id="stripes-blue" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#fff" />
      <line x1="0" y1="0" x2="0" y2="6" stroke="#4a76b8" stroke-width="2" />
    </pattern>
    <pattern id="stripes-orange" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#fff" />
      <line x1="0" y1="0" x2="0" y2="6" stroke="#f5b041" stroke-width="2" />
    </pattern>

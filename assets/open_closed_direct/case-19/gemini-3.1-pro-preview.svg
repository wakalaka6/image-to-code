<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
  <defs>
    <style>
      .text-black { fill: #000000; }
      .text-red { fill: #cc0000; }
      .text-blue { fill: #0000cc; }
      .text-green { fill: #006633; }
      .text-white { fill: #ffffff; }
      .font-bold { font-weight: bold; }
      .font-serif { font-family: "Times New Roman", Times, serif; }
      .font-sans { font-family: Arial, sans-serif; }
      .font-mono { font-family: "Courier New", Courier, monospace; }
      
      .box-dashed { fill: none; stroke: #000000; stroke-width: 1.5; stroke-dasharray: 10, 3, 2, 3; }
      .box-solid { fill: none; stroke: #000000; stroke-width: 1.5; }
      .box-yellow { fill: none; stroke: #ffff00; stroke-width: 2; }
      .box-red { fill: none; stroke: #cc0000; stroke-width: 1.5; }
      
      .bg-blue-light { fill: #f0f8ff; }
      .bg-green-light { fill: #f0fff0; }
      .bg-red-light { fill: #fff0f0; }
      
      .arrow-red { stroke: #cc0000; fill: #cc0000; }
      .arrow-blue { stroke: #0000cc; fill: #0000cc; }
      .arrow-green { stroke: #006633; fill: #006633; }
      
      .gradient-blue { fill: url(#grad-blue); }
      .gradient-red { fill: url(#grad-red); }
    </style>
    
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3399ff" />
      <stop offset="100%" stop-color="#e6f2ff" />
    </linearGradient>
    
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9999" />
      <stop offset="100%" stop-color="#ffe6e6" />
    </linearGradient>

    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc0000" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0000cc" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#006633" />

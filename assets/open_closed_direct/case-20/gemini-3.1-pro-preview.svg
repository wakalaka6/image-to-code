<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <style>
      .box { fill: none; stroke: #888; stroke-width: 2; stroke-dasharray: 6,4; rx: 8; }
      .solid-box { fill: #f5f5f5; stroke: #ccc; stroke-width: 2; rx: 12; }
      .text-code { font-family: monospace; font-size: 10px; fill: #d95f5f; }
      .text-desc { font-family: monospace; font-size: 10px; fill: #85b87b; }
      .text-sys { font-family: monospace; font-size: 10px; fill: #d95f5f; }
      .text-sys-desc { font-family: monospace; font-size: 10px; fill: #85b87b; }
      .text-cq { font-family: monospace; font-size: 10px; fill: #d95f5f; }
      .text-cq-blue { fill: #5b9bd5; }
      .text-cq-orange { fill: #ed7d31; }
      .title { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #2e5c2e; }
      .label { font-family: sans-serif; font-size: 12px; fill: #000; text-anchor: middle; }
      .arrow { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-green { fill: none; stroke: #85b87b; stroke-width: 3; marker-end: url(#arrowhead-green); }
      .arrow-red { fill: none; stroke: #d95f5f; stroke-width: 2; marker-end: url(#arrowhead-red); }
      .arrow-pink { fill: none; stroke: #f4b0c4; stroke-width: 3; marker-end: url(#arrowhead-pink); }
      .icon-bg { fill: #fff; stroke: #000; stroke-width: 1.5; rx: 4; }
      .icon-text { font-family: sans-serif; font-size: 10px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#85b87b" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d95f5f" />
    </marker>
    <marker id="arrowhead-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4b0c4" />
    </marker>
  </defs>

  <!-- Top Section: Code Blocks -->
  <rect class="box" x="10" y="10" width="270" height="190" />
  <text class="text-code" x="20" y="30">{</text>
  <text class="text-code" x="30" y="45">"steps": [</text>
  <text class="text-code" x="40" y="60">{</text>
  <text class="text-code" x="50" y="75">"sketch": {</text>
  <text class="text-code" x="60" y="90">"circles": [</text>
  <text class="text-code" x="70" y="105">{"center": [0, 0], "radius": 60},</text>
  <text class="text-code" x="70" y="120">{"center": [0, 0], "radius": 25}</text>
  <text class="text-code" x="60" y="135">]</text>
  <text class="text-code" x="50" y="150">},</text>
  <text class="text-code" x="50" y="165">"extrusion": {</text>
  <text class="text-code" x="60" y="180">"direction": [0, 0, 1],</text>
  <text class="title" x="270" y="190" text-anchor="end">Command Sequence</text>

  <rect class="box" x="290" y="10" width="250" height="190" />
  <text class="text-desc" x="300" y="30">Text_Description = """</text>
  <text class="text-desc" x="300" y="45">This circular flange is a metal component</text>
  <text class="text-desc" x="300" y="60">featuring a flat base plate with a</text>
  <text class="text-desc" x="300" y="75">diameter of 120 mm and thickness of 15 mm.</text>
  <text class="text-desc" x="300" y="90">The design includes a central bore</text>
  <text class="text-desc" x="300" y="105">measuring 50 mm in diameter surrounded by</text>
  <text class="text-desc" x="300" y="120">a raised concentric ring with an outer</text>
  <text class="text-desc" x="300" y="135">diameter of 70 mm and height of 8 mm that</text>
  <text class="text-desc" x="300" y="150">shares the same inner diameter as the</text>
  <text class="text-desc" x="300" y="165">central bore. Six equidistant mounting</text>
  <text class="title" x="530" y="190" text-anchor="end">Text Description</text>

  <rect class="box" x="550" y="10" width="640" height="85" />
  <text class="text-sys" x="560" y="30">System_prompt = """</text>
  <text class="text-sys-desc" x="560" y="45">Please convert the following CAD command sequence into CAD-Query code, with the final model represented as 'r':</text>
  <text class="text-sys" x="560" y="60">"""</text>
  <text class="text-sys" x="560" y="75" fill="#888"># The CoT system prompt can be found in the appendix.</text>
  <text class="title" x="1180" y="85" text-anchor="end">System prompt</text>

  <rect class="box" x="550" y="105" width="640" height="95" />
  <text class="text-cq" x="560" y="125">import <tspan class="text-cq-blue">cadquery</tspan> as <tspan class="text-cq-blue">cq</tspan></text>
  <text class="text-cq" x="560" y="145">flange = (<tspan class="text-cq-blue">cq.Workplane</tspan>("XY")</text>
  <text class="text-cq" x="610" y="160">.<tspan class="text-cq-blue">circle</tspan>(<tspan class="text-cq-orange">60</tspan>).<tspan class="text-cq-blue">circle</tspan>(<tspan class="text-cq-orange">25</tspan>).<tspan class="text-cq-blue">extrude</tspan>(<tspan class="text-cq-orange">15</tspan>)</text>
  <text class="text-cq" x="610" y="175">.<tspan class="text-cq-blue">faces</tspan>(">Z").<tspan class="text-cq-blue">workplane</tspan>().<tspan class="text-cq-blue">polarArray</tspan>(<tspan class="text-cq-orange">45, 0, 360, 6</tspan>).<tspan class="text-cq-blue">circle</tspan>(<tspan class="text-cq-orange">6</tspan>).<tspan class="text-cq-blue">cutThruAll</tspan>()</text>
  <text class="title" x="1180" y="190" text-anchor="end">CadQuery Code</text>

  <!-- Bottom Left Section: Text2CAD Dataset -->
  <rect class="solid-box" x="10" y="210" width="320" height="280" fill="#f0f4f8" />
  

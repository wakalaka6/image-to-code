<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>

    <!-- Arrow Markers -->
    <marker id="black-arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#222"/>
    </marker>

    <marker id="red-arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#ff4d4d"/>
    </marker>

    <!-- Reusable Info Icon -->
    <g id="info-icon">
      <circle cx="0" cy="0" r="9" fill="#e3f2fd" stroke="#0d47a1" stroke-width="1.5"/>
      <text x="0" y="3.5" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#0d47a1" text-anchor="middle">i</text>
    </g>

    <!-- Reusable Star -->
    <g id="star">
      <polygon points="0,-7 2,-2 7,-2 3,1 5,6 0,3 -5,6 -3,1 -7,-2 -2,-2" fill="#ffca28" stroke="#b79000" stroke-width="1"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- ==================== TOP ROW ==================== -->

  <!-- Box 1: Task Description -->
  <g filter="url(#shadow)">
    <rect x="35" y="65" width="290" height="205" rx="12" fill="#ebebeb" stroke="#333" stroke-width="1.5"/>
  </g>
  <text x="65" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000">Task Description</text>
  
  <!-- Dashed Inner Box for Task Description -->
  <rect x="50" y="105" width="260" height="145" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="62" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-style="italic" fill="#222">
    <tspan x="62" dy="0">Count the number of</tspan>
    <tspan x="62" dy="24">items in DB with a price</tspan>
    <tspan x="62" dy="24">within the range specified</tspan>
    <tspan x="62" dy="24">by the user's inputs.</tspan>
  </text>

  <!-- Blue Question Mark Bubble -->
  <g filter="url(#shadow)">
    <path d="M 20 55 A 18 18 0 1 1 48 68 L 48 78 L 38 72 A 18 18 0 0 1 20 55 Z" fill="#29b6f6" stroke="#0288d1" stroke-width="1.5"/>
    <text x="33" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">?</text>
  </g>


  <!-- Box 2: Policy Model (Neural Network Diagram) -->
  <g>
    <!-- Connections -->
    <!-- Col 1 to Col 2 -->
    <line x1="379" y1="132" x2="401" y2="123" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="379" y1="140" x2="401" y2="151" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="379" y1="167" x2="401" y2="158" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="379" y1="174" x2="401" y2="186" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="379" y1="202" x2="401" y2="193" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="379" y1="209" x2="401" y2="221" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <!-- Col 2 to Col 3 -->
    <line x1="419" y1="126" x2="441" y2="143" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="419" y1="154" x2="441" y2="151" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="419" y1="162" x2="441" y2="183" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="419" y1="190" x2="441" y2="190" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
    <line x1="419" y1="218" x2="441" y2="197" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>

    <!-- Nodes Column 1 (Cyan) -->
    <circle cx="370" cy="135" r="10" fill="#80deea" stroke="#006064" stroke-width="1.5"/>
    <circle cx="370" cy="170" r="10" fill="#80deea" stroke="#006064" stroke-width="1.5"/>
    <circle cx="370" cy="205" r="10" fill="#80deea" stroke="#006064" stroke-width="1.5"/>

    <!-- Nodes Column 2 (Yellow) -->
    <circle cx="410" cy="120" r="10" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
    <circle cx="410" cy="155" r="10" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
    <circle cx="410" cy="190" r="10" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
    <circle cx="410" cy="225" r="10" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>

    <!-- Nodes Column 3 (Red) -->
    <circle cx="450" cy="150" r="10" fill="#ff8a80" stroke="#b71c1c" stroke-width="1.5"/>
    <circle cx="450" cy="190" r="10" fill="#ff8a80" stroke="#b71c1c" stroke-width="1.5"/>

    <!-- Label -->
    <text x="410" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000" text-anchor="middle">Policy Model</text>
  </g>


  <!-- Box 3: Generated Program -->
  <g filter="url(#shadow)">
    <rect x="495" y="65" width="500" height="205" rx="12" fill="#ebebeb" stroke="#333" stroke-width="1.5"/>
  </g>
  <text x="545" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#000">Generated Program</text>

  <!-- Dashed Inner Box for Generated Program -->
  <rect x="515" y="105" width="460" height="145" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- Code Text -->
  <g font-family="Consolas, Monaco, monospace" font-size="14" xml:space="preserve">
    <text x="525" y="125"><tspan fill="#000">cur = </tspan><tspan fill="#0288d1">sqlite3</tspan>.<tspan fill="#0288d1">connect</tspan>(DB).<tspan fill="#0288d1">cursor</tspan>()</text>
    <text x="525" y="144"><tspan fill="#c2185b">min</tspan><tspan fill="#000"> = </tspan><tspan fill="#0288d1">input</tspan>('Min?'); <tspan fill="#c2185b">max</tspan><tspan fill="#000"> = </tspan><tspan fill="#0288d1">input</tspan>('Max?')</text>
    <text x="525" y="163" fill="#777">...</text>
    <text x="525" y="182"><tspan fill="#c2185b">Q</tspan><tspan fill="#000"> = </tspan><tspan fill="#2e7d32">"SELECT COUNT(*)</tspan> <tspan fill="#2e7d32" font-weight="bold">FROM</tspan> <tspan fill="#2e7d32">items \</tspan></text>
    <text x="525" y="201"><tspan fill="#2e7d32">       </tspan><tspan fill="#2e7d32" font-weight="bold">WHERE</tspan> <tspan fill="#2e7d32">price &lt;= </tspan><tspan fill="#c2185b">{max}</tspan> <tspan fill="#2e7d32">\</tspan></text>
    <text x="525" y="220"><tspan fill="#2e7d32">       </tspan><tspan fill="#2e7d32" font-weight="bold">AND</tspan> <tspan fill="#2e7d32">price &gt;= </tspan><tspan fill="#c2185b">{min}"</tspan></text>
    <text x="525" y="239"><tspan fill="#000">cur.</tspan><tspan fill="#0288d1">execute</tspan>(<tspan fill="#c2185b">Q</tspan>)</text>
  </g>

  <!-- Purple Document Icon for Generated Program -->
  <g transform="translate(490, 55)" filter="url(#shadow)">
    <path d="M 5 5 L 25 5 L 35 15 L 35 45 L 5 45 Z" fill="white" stroke="#6a1b9a" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 25 5 L 25 15 L 35 15" fill="none" stroke="#6a1b9a" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="20" y="33" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="bold" fill="#6a1b9a" text-anchor="middle">&lt;/&gt;</text>
  </g>


  <!-- ==================== BOTTOM ROW ==================== -->

  <!-- Box 4: Vulnerability Detector -->
  <g filter="url(#shadow)">
    <rect x="35" y="290" width="630" height="290" rx="15" fill="#fffdf0" stroke="#333" stroke-width="1.5"/>
  </g>
  <text x="50" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#000">
    Vulnerability Detector <tspan font-size="14" font-weight="normal">(via Program Analysis)</tspan>
  </text>
  <text x="50" y="342" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="#555">Example: SQL Injection Detector</text>

  <!-- CFG Sub-box -->
  <rect x="50" y="355" width="140" height="170" rx="6" fill="#ffffff" stroke="#aaa" stroke-dasharray="3 3"/>
  <text x="120" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000" text-anchor="middle">CFG</text>
  
  <!-- CFG Graph Nodes & Edges -->
  <g>
    <!-- Edges -->
    <line x1="98" y1="407" x2="82" y2="433" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>
    <line x1="112" y1="407" x2="128" y2="433" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>
    <line x1="127" y1="456" x2="108" y2="484" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>
    <line x1="140" y1="458" x2="150" y2="482" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>

    <!-- Nodes -->
    <circle cx="105" cy="395" r="14" fill="#ffcc80" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
    <text x="105" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">1</text>

    <circle cx="135" cy="445" r="14" fill="#ffcc80" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
    <text x="135" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">2</text>

    <circle cx="155" cy="495" r="14" fill="#ffcc80" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
    <text x="155" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">3</text>

    <circle cx="75" cy="445" r="14" fill="#ffffff" stroke="#777" stroke-width="2"/>
    <circle cx="100" cy="495" r="14" fill="#ffffff" stroke="#777" stroke-width="2"/>
  </g>

  <!-- Tainted Analysis Sub-box -->
  <rect x="200" y="355" width="350" height="170" rx="6" fill="#ffffff" stroke="#aaa" stroke-dasharray="3 3"/>
  <text x="375" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000" text-anchor="middle">Tainted Analysis</text>

  <!-- Tainted Analysis Content -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="13">
    <!-- Row 1 -->
    <text x="210" y="405" font-family="Consolas, Monaco, monospace" font-size="14" fill="#c2185b" font-weight="bold">{max,min}</text>
    <text x="315" y="405" fill="#222">1. User inputs as taint <tspan font-weight="bold">src.</tspan></text>

    <!-- Row 2 -->
    <text x="210" y="450" font-family="Consolas, Monaco, monospace" font-size="14" fill="#c2185b" font-weight="bold">{max,min,Q}</text>
    <text x="315" y="450" fill="#222">2. Propagate tainted var.</text>

    <!-- Row 3 -->
    <text x="210" y="495" font-family="Consolas, Monaco, monospace" font-size="13">
      <tspan fill="#000">cur.</tspan><tspan fill="#0288d1">execute</tspan>(<tspan fill="#c2185b">Q</tspan>)
    </text>
    <text x="315" y="495" fill="#222">3. SQL exec. as <tspan font-weight="bold">sink.</tspan></text>

    <!-- Vertical Flow Line on Right -->
    <circle cx="535" cy="395" r="3.5" fill="none" stroke="#222" stroke-width="1.5"/>
    <line x1="535" y1="399" x2="535" y2="490" stroke="#222" stroke-width="1.5" marker-end="url(#black-arrow)"/>
  </g>

  <!-- Dashed Connectors from CFG to Tainted Analysis -->
  <line x1="119" y1="395" x2="202" y2="395" stroke="#999" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#black-arrow)"/>
  <line x1="149" y1="445" x2="202" y2="445" stroke="#999" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#black-arrow)"/>
  <line x1="169" y1="495" x2="202" y2="495" stroke="#999" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#black-arrow)"/>

  <!-- Reward Label for Vuln Detector -->
  <text x="565" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#000">Reward:</text>
  <text x="565" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-style="italic" font-weight="bold">
    <tspan fill="#2e7d32">Pass</tspan> <tspan fill="#333" font-style="normal" font-weight="normal">or</tspan> <tspan fill="#c2185b">Fail</tspan>
  </text>

  <!-- Bottom Explanation for Vuln Detector -->
  <text x="330" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#111" text-anchor="middle">
    Convert the program into a <tspan font-weight="bold">Control Flow Graph (CFG)</tspan> and conduct
  </text>
  <text x="330" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#111" text-anchor="middle">
    <tspan font-weight="bold">Taint Analysis</tspan> to detect SQL injection vulnerabilities.
  </text>


  <!-- Plus Sign between Bottom Boxes -->
  <text x="680" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" fill="#000" text-anchor="middle">+</text>


  <!-- Box 5: Functionality Verifier -->
  <g filter="url(#shadow)">
    <rect x="695" y="290" width="470" height="290" rx="15" fill="#e8f4f8" stroke="#333" stroke-width="1.5"/>
  </g>
  <text x="710" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#000">
    Functionality Verifier <tspan font-size="14" font-weight="normal">(via Unit Tests)</tspan>
  </text>

  <!-- Unit Tests Sub-box -->
  <rect x="710" y="345" width="250" height="180" rx="6" fill="#ffffff" stroke="#aaa" stroke-dasharray="3 3"/>
  <text x="720" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#000">
    Unit Tests <tspan font-size="11" font-weight="normal" font-style="italic" fill="#555">(e.g. min~max→output)</tspan>
  </text>

  <!-- Unit Test Rows -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">
    <!-- Row 1 -->
    <use href="#info-icon" x="735" y="390"/>
    <text x="755" y="395">Test 1: <tspan font-weight="normal" font-family="Consolas, monospace">$2.5~$10</tspan> &rarr; 3</text>

    <!-- Row 2 -->
    <use href="#info-icon" x="735" y="430"/>
    <text x="755" y="435">Test 2: <tspan font-weight="normal" font-family="Consolas, monospace">$3~$1</tspan> &rarr; 0</text>

    <!-- Row 3 (Dots) -->
    <text x="755" y="465" font-size="16">......</text>

    <!-- Row 4 -->
    <use href="#info-icon" x="735" y="500"/>
    <text x="755" y="505">Test n: <tspan font-weight="normal" font-family="Consolas, monospace">$7~$100</tspan> &rarr; 10</text>
  </g>

  <!-- Generated Program Sub-box inside Functionality Verifier -->
  <rect x="980" y="365" width="100" height="130" rx="6" fill="#ffffff" stroke="#aaa" stroke-dasharray="3 3"/>
  
  <!-- Purple Document Icon (Large) -->
  <g transform="translate(1005, 375)" filter="url(#shadow)">
    <path d="M 5 5 L 35 5 L 45 15 L 45 60 L 5 60 Z" fill="white" stroke="#6a1b9a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M 35 5 L 35 15 L 45 15" fill="none" stroke="#6a1b9a" stroke-width="3" stroke-linejoin="round"/>
    <text x="25" y="42" font-family="Consolas, Monaco, monospace" font-size="20" font-weight="bold" fill="#6a1b9a" text-anchor="middle">&lt;/&gt;</text>
  </g>
  <text x="1030" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">Generated</text>
  <text x="1030" y="477" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">Program</text>

  <!-- Arrows from Unit Tests to Generated Program -->
  <line x1="965" y1="395" x2="975" y2="398" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>
  <line x1="965" y1="430" x2="975" y2="430" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>
  <line x1="965" y1="500" x2="975" y2="485" stroke="#222" stroke-width="2" marker-end="url(#black-arrow)"/>

  <!-- Bottom Reward Formula for Functionality Verifier -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="800" y="555" font-size="18" font-weight="bold" fill="#000" text-anchor="end">Reward:</text>
    <text x="810" y="542" font-size="13" font-family="Consolas, monospace" fill="#000"># passed tests</text>
    <line x1="808" y1="547" x2="918" y2="547" stroke="#000" stroke-width="1.5"/>
    <text x="810" y="562" font-size="13" font-family="Consolas, monospace" fill="#000"># total tests</text>
  </g>


  <!-- ==================== TOP RIGHT & FEEDBACK LOOP ==================== -->

  <!-- Hybrid Reward Box -->
  <g filter="url(#shadow)">
    <rect x="1000" y="230" width="160" height="35" rx="8" fill="white" stroke="black" stroke-width="2"/>
    <text x="1080" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">Hybrid Reward</text>
  </g>

  <!-- Advantage Bar Chart -->
  <g>
    <!-- Bars -->
    <rect x="1040" y="125" width="15" height="45" rx="2" fill="#ffe082" stroke="black" stroke-width="1.5"/>
    <rect x="1070" y="110" width="15" height="60" rx="2" fill="#80cbc4" stroke="black" stroke-width="1.5"/>
    <rect x="1100" y="95" width="15" height="75" rx="2" fill="#90caf9" stroke="black" stroke-width="1.5"/>

    <!-- Icons on top of bars -->
    <use href="#star" x="1047.5" y="115"/>
    <use href="#star" x="1077.5" y="98"/>
    
    <!-- Crown on top of blue bar -->
    <g id="crown" transform="translate(1097, 66)">
      <path d="M 2 17 L 0 5 L 6 10 L 11 2 L 16 10 L 22 5 L 20 17 Z" fill="#ffb300" stroke="#b77a00" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="0" cy="5" r="1.5" fill="#ffd54f"/>
      <circle cx="11" cy="2" r="1.5" fill="#ffd54f"/>
      <circle cx="22" cy="5" r="1.5" fill="#ffd54f"/>
    </g>

    <!-- Label -->
    <text x="1080" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">Advantage</text>
  </g>

  <!-- Policy Gradient Box -->
  <g filter="url(#shadow)">
    <rect x="640" y="10" width="200" height="40" rx="10" fill="white" stroke="black" stroke-width="2"/>
    <text x="740" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">Policy Gradient</text>
  </g>


  <!-- ==================== RED ARROWS (FLOW) ==================== -->

  <!-- 1. Task Description -> Policy Model -->
  <line x1="325" y1="167" x2="348" y2="167" stroke="#ff4d4d" stroke-width="3" marker-end="url(#red-arrow)"/>

  <!-- 2. Policy Model -> Generated Program -->
  <line x1="465" y1="167" x2="488" y2="167" stroke="#ff4d4d" stroke-width="3" marker-end="url(#red-arrow)"/>

  <!-- 3. Generated Program -> Vulnerability Detector (Thick Block Arrow) -->
  <polygon points="563,270 577,270 577,288 585,288 570,305 555,288 563,288" fill="#ff4d4d" stroke="#b71c1c" stroke-width="1"/>

  <!-- 4. Generated Program -> Functionality Verifier (Thick Block Arrow) -->
  <polygon points="853,270 867,270 867,288 875,288 860,305 845,288 853,288" fill="#ff4d4d" stroke="#b71c1c" stroke-width="1"/>

  <!-- 5. Functionality Verifier -> Hybrid Reward -->
  <line x1="1080" y1="290" x2="1080" y2="272" stroke="#ff4d4d" stroke-width="3" marker-end="url(#red-arrow)"/>

  <!-- 6. Hybrid Reward -> Advantage -->
  <line x1="1080" y1="230" x2="1080" y2="202" stroke="#ff4d4d" stroke-width="3" marker-end="url(#red-arrow)"/>

  <!-- 7. Advantage -> Policy Gradient (L-shaped) -->
  <path d="M 1080 75 L 1080 25 L 847 25" fill="none" stroke="#ff4d4d" stroke-width="3" marker-end="url(#red-arrow)"/>

  <!-- 8. Policy Gradient -> Policy Model (L-shaped) -->
  <path d="M 640 25 L 405 25 L 405 102" fill="none" stroke="#ff4d4d" stroke-width="3" marker-end="url(#red-arrow)"/>

</svg>
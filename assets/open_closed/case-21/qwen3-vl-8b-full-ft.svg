<svg xmlns="http://www.w3.org/2000/svg" viewBox="-57.0 4.0 1718.0 586.0" style="background-color: white;">
  <defs>
    <!-- Arrowhead Markers -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#6D9EEB" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#A64D8E" />
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#6FA89C" />
    </marker>
    
    <!-- Hatch Pattern for CAD -->
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" style="stroke:black; stroke-width:1" />
    </pattern>
    
    <!-- Gradient for 3D Model -->
    <linearGradient id="bg3d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4B4B75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B6B95;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ==================== LEFT SECTION: EXPERT KNOWLEDGE ==================== -->
  <g transform="translate(10, 20)">
    <!-- Container -->
    <rect x="0" y="0" width="560" height="210" rx="30" fill="#E6E6E6" />
    <text x="280" y="45" font-family="serif" font-weight="bold" font-size="36" text-anchor="middle" fill="black">Expert Knowledge</text>
    
    <!-- 1. Drawing Thumbnail -->
    <g transform="translate(20, 60)">
      <rect width="210" height="140" fill="white" />
      <!-- Simulated Technical Drawing -->
      <path d="M10,10 L200,10 L200,130 L10,130 Z" fill="none" stroke="#ccc" stroke-width="1"/>
      <path d="M10,10 L20,0 M30,10 L40,0 M50,10 L60,0 M70,10 L80,0 M90,10 L100,0 M110,10 L120,0 M130,10 L140,0 M150,10 L160,0 M170,10 L180,0 M190,10 L200,0" stroke="black" stroke-width="1"/>
      <path d="M10,130 L20,140 M30,130 L40,140 M50,130 L60,140 M70,130 L80,140 M90,130 L100,140 M110,130 L120,140 M130,130 L140,140 M150,130 L160,140 M170,130 L180,140 M190,130 L200,140" stroke="black" stroke-width="1"/>
      <!-- Dimensions -->
      <line x1="20" y1="40" x2="190" y2="40" stroke="black" stroke-width="1"/>
      <line x1="20" y1="35" x2="20" y2="45" stroke="black" stroke-width="1"/>
      <line x1="190" y1="35" x2="190" y2="45" stroke="black" stroke-width="1"/>
      <text x="60" y="38" font-size="10" font-family="serif">170</text>
      <text x="140" y="38" font-size="10" font-family="serif">170</text>
      <!-- Main Box -->
      <rect x="40" y="50" width="160" height="80" fill="none" stroke="black" stroke-width="1"/>
      <line x1="40" y1="50" x2="40" y2="130" stroke="black" stroke-width="1"/>
      <line x1="200" y1="50" x2="200" y2="130" stroke="black" stroke-width="1"/>
      <!-- More dimensions -->
      <text x="10" y="80" font-size="10" font-family="serif" transform="rotate(-90, 10, 80)">250</text>
      <text x="10" y="110" font-size="10" font-family="serif" transform="rotate(-90, 10, 110)">250</text>
      <text x="40" y="80" font-size="10" font-family="serif">10</text>
      <text x="60" y="80" font-size="10" font-family="serif">110</text>
      <text x="140" y="80" font-size="10" font-family="serif">110</text>
      <text x="100" y="70" font-size="10" font-family="serif">150</text>
      <text x="180" y="70" font-size="10" font-family="serif">150</text>
      <!-- Bottom detail -->
      <rect x="40" y="110" width="160" height="20" fill="none" stroke="black" stroke-width="1"/>
      <line x1="40" y1="110" x2="40" y2="130" stroke="black" stroke-width="1"/>
      <line x1="200" y1="110" x2="200" y2="130" stroke="black" stroke-width="1"/>
      <line x1="40" y1="110" x2="200" y2="110" stroke="black" stroke-width="1"/>
      <line x1="40" y1="130" x2="200" y2="130" stroke="black" stroke-width="1"/>
      <line x1="40" y1="110" x2="200" y2="130" stroke="black" stroke-width="1"/>
      <line x1="40" y1="130" x2="200" y2="110" stroke="black" stroke-width="1"/>
      <!-- Hatching -->
      <path d="M20,130 L40,110 L60,130 L80,110 L100,130 L120,110 L140,130 L160,110 L180,130 L200,110" fill="url(#hatch)" stroke="black" stroke-width="0.5"/>
      <text x="200" y="135" font-size="8" font-family="serif">6xø120</text>
    </g>
    <text x="125" y="195" font-family="serif" font-size="28" text-anchor="middle" fill="black">Drawing</text>

    <!-- 2. Constraints Icon -->
    <g transform="translate(280, 80)">
      <rect x="0" y="10" width="100" height="100" rx="10" fill="#333333" />
      <path d="M30,10 L30,0 A10,10 0 0,1 50,0 L50,10" fill="none" stroke="#333333" stroke-width="8" />
      <circle cx="40" cy="5" r="5" fill="white" />
      <!-- X and Check -->
      <path d="M15,30 L45,60 M45,30 L15,60" stroke="white" stroke-width="12" stroke-linecap="round" />
      <path d="M25,70 L45,90 L75,50" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <text x="330" y="195" font-family="serif" font-size="28" text-anchor="middle" fill="black">Constraints</text>

    <!-- 3. Text Icon -->
    <g transform="translate(430, 90)">
      <path d="M10,10 Q10,0 20,0 L90,0 Q100,0 100,10 L100,80 Q100,90 90,90 L20,90 Q10,90 10,80 Z" fill="none" stroke="black" stroke-width="8" />
      <line x1="25" y1="25" x2="85" y2="25" stroke="black" stroke-width="8" stroke-linecap="round" />
      <line x1="25" y1="45" x2="85" y2="45" stroke="black" stroke-width="8" stroke-linecap="round" />
      <line x1="25" y1="65" x2="85" y2="65" stroke="black" stroke-width="8" stroke-linecap="round" />
    </g>
    <text x="480" y="195" font-family="serif" font-size="28" text-anchor="middle" fill="black">Text</text>
  </g>

  <!-- ==================== STEP 1 (LEFT COLUMN) ==================== -->
  <g transform="translate(10, 240)">
    <!-- Text -->
    <text x="120" y="40" font-family="sans-serif" font-weight="bold" font-size="32" fill="#6FA89C" text-anchor="middle">Step 1:</text>
    <text x="120" y="80" font-family="sans-serif" font-weight="bold" font-size="32" fill="#6FA89C" text-anchor="middle">Constraint-Guided</text>
    <text x="120" y="120" font-family="sans-serif" font-weight="bold" font-size="32" fill="#6FA89C" text-anchor="middle">Parameter Sampling</text>
    
    <!-- Arrow -->
    <path d="M300,0 L300,180" stroke="#6FA89C" stroke-width="15" fill="none" />
    <path d="M275,180 L325,180 L300,210 Z" fill="#6FA89C" />

    <!-- Parameter Space Icon -->
    <g transform="translate(250, 150)">
      <!-- Back Page -->
      <rect x="30" y="30" width="110" height="140" rx="15" fill="black" />
      <!-- Front Page -->
      <rect x="0" y="10" width="110" height="140" rx="15" fill="black" />
      <!-- Content -->
      <rect x="15" y="25" width="80" height="10" fill="white" />
      <rect x="15" y="40" width="80" height="10" fill="white" />
      <rect x="15" y="60" width="80" height="6" fill="white" />
      <rect x="15" y="75" width="80" height="6" fill="white" />
      <rect x="15" y="90" width="80" height="6" fill="white" />
      <rect x="15" y="105" width="80" height="6" fill="white" />
      <rect x="15" y="120" width="80" height="6" fill="white" />
    </g>
    <text x="320" y="340" font-family="serif" font-size="28" text-anchor="middle" fill="black">Parameter Space</text>
  </g>

  <!-- ==================== STEP 2 (MIDDLE TOP) ==================== -->
  <g transform="translate(560, 20)">
    <!-- Text -->
    <text x="100" y="60" font-family="serif" font-weight="bold" font-style="italic" font-size="32" fill="black" text-anchor="middle">Layers</text>
    <rect x="50" y="70" width="200" height="40" fill="white" opacity="0.8"/>
    <text x="150" y="100" font-family="serif" font-weight="bold" font-style="italic" font-size="32" fill="black" text-anchor="middle">separating</text>

    <!-- Arrow 1 -->
    <path d="M20,120 L300,120" stroke="#6D9EEB" stroke-width="4" fill="none" marker-end="url(#arrowBlue)" />

    <!-- DXF Icon -->
    <g transform="translate(320, 60)">
      <!-- Back Sheet -->
      <path d="M60,20 L140,20 L140,130 L60,130 Z" fill="white" stroke="black" stroke-width="8" />
      <!-- Front Sheet -->
      <path d="M10,30 L90,10 L90,140 L10,160 Z" fill="white" stroke="black" stroke-width="8" stroke-linejoin="round" />
      <text x="30" y="100" font-family="sans-serif" font-weight="bold" font-size="40" fill="black">DXF</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M480,120 L700,120" stroke="#6D9EEB" stroke-width="4" fill="none" marker-end="url(#arrowBlue)" />
    <rect x="500" y="70" width="200" height="40" fill="white" opacity="0.8"/>
    <text x="600" y="100" font-family="serif" font-weight="bold" font-style="italic" font-size="32" fill="black" text-anchor="middle">Rendering</text>

    <!-- Step 2 Label -->
    <text x="400" y="190" font-family="sans-serif" font-weight="bold" font-size="32" fill="#7FA8D8" text-anchor="middle">Step 2: 2D Drawing and Raster</text>
    <text x="400" y="220" font-family="sans-serif" font-weight="bold" font-size="32" fill="#7FA8D8" text-anchor="middle">Image Generation</text>
  </g>

  <!-- ==================== RIGHT SECTION: ORTHOGRAPHIC ==================== -->
  <g transform="translate(1270, 10)">
    <rect x="0" y="0" width="330" height="250" rx="30" fill="none" stroke="black" stroke-width="3" stroke-dasharray="8,8" />
    
    <!-- Front View -->
    <g transform="translate(20, 30)">
      <rect width="140" height="120" fill="#f9f9f9" />
      <rect x="30" y="50" width="80" height="40" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="20" y="30" width="20" height="60" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="100" y="30" width="20" height="60" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="30" y="90" width="20" height="30" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="90" y="90" width="20" height="30" fill="none" stroke="black" stroke-width="0.5" />
      <!-- Dimensions -->
      <line x1="0" y1="10" x2="140" y2="10" stroke="black" stroke-width="0.5" />
      <line x1="0" y1="110" x2="140" y2="110" stroke="black" stroke-width="0.5" />
      <text x="70" y="80" font-family="serif" font-weight="bold" font-size="40" fill="#ccc" text-anchor="middle">Front</text>
    </g>

    <!-- Side View -->
    <g transform="translate(180, 30)">
      <rect width="140" height="120" fill="#f9f9f9" />
      <rect x="40" y="30" width="40" height="60" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="20" y="50" width="20" height="40" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="100" y="50" width="20" height="40" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="30" y="90" width="30" height="30" fill="none" stroke="black" stroke-width="0.5" />
      <rect x="80" y="90" width="30" height="30" fill="none" stroke="black" stroke-width="0.5" />
      <!-- Dimensions -->
      <line x1="140" y1="10" x2="140" y2="110" stroke="black" stroke-width="0.5" />
      <text x="70" y="80" font-family="serif" font-weight="bold" font-size="40" fill="#ccc" text-anchor="middle">Side</text>
    </g>

    <!-- Top View -->
    <g transform="translate(20, 160)">
      <rect width="140" height="120" fill="#f9f9f9" />
      <rect x="30" y="30" width="80" height="60" fill="none" stroke="black" stroke-width="0.5" />
      <circle cx="50" cy="50" r="20" fill="none" stroke="black" stroke-width="0.5" />
      <circle cx="90" cy="50" r="20" fill="none" stroke="black" stroke-width="0.5" />
      <circle cx="50" cy="90" r="20" fill="none" stroke="black" stroke-width="0.5" />
      <circle cx="90" cy="90" r="20" fill="none" stroke="black" stroke-width="0.5" />
      <circle cx="70" cy="30" r="15" fill="none" stroke="black" stroke-width="0.5" />
      <circle cx="70" cy="90" r="15" fill="none" stroke="black" stroke-width="0.5" />
      <!-- Dimensions -->
      <line x1="10" y1="0" x2="10" y2="120" stroke="black" stroke-width="0.5" />
      <text x="70" y="70" font-family="serif" font-weight="bold" font-size="40" fill="#ccc" text-anchor="middle">Top</text>
    </g>

    <text x="165" y="190" font-family="serif" font-weight="bold" font-size="28" fill="black" text-anchor="middle">Orthographic</text>
    <text x="165" y="215" font-family="serif" font-weight="bold" font-size="28" fill="black" text-anchor="middle">Projection</text>
  </g>

  <!-- ==================== STEP 3 (MIDDLE BOTTOM) ==================== -->
  <g transform="translate(560, 280)">
    <!-- Text -->
    <text x="100" y="100" font-family="serif" font-weight="bold" font-style="italic" font-size="32" fill="black" text-anchor="middle">Entities</text>
    <rect x="50" y="110" width="200" height="40" fill="white" opacity="0.8"/>
    <text x="150" y="140" font-family="serif" font-weight="bold" font-style="italic" font-size="32" fill="black" text-anchor="middle">separating</text>

    <!-- Arrow 1 -->
    <path d="M-10,160 L350,160" stroke="#A64D8E" stroke-width="4" fill="none" marker-end="url(#arrowPurple)" />

    <!-- Python Icon Container -->
    <g transform="translate(370, 50)">
      <rect x="0" y="0" width="200" height="180" rx="5" fill="none" stroke="#5F6B7D" stroke-width="8" />
      <!-- Flowchart (Teal) -->
      <g transform="translate(20, 20)">
        <rect x="0" y="0" width="70" height="20" fill="none" stroke="#4DB6AC" stroke-width="8" />
        <rect x="0" y="50" width="70" height="20" fill="none" stroke="#4DB6AC" stroke-width="8" />
        <line x1="35" y1="20" x2="35" y2="50" stroke="#5F6B7D" stroke-width="8" />
        <path d="M10,80 L40,110 L70,80" fill="none" stroke="#4DB6AC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M20,100 L50,130" fill="none" stroke="#4DB6AC" stroke-width="8" stroke-linecap="round" />
      </g>
      <!-- Python Logo (Simplified) -->
      <g transform="translate(110, 80) scale(0.6)">
        <path d="M50,0 C25,0 25,25 25,25 L25,50 L50,50 L50,75 L25,75 C5,75 5,50 5,50 L5,25 C5,0 50,0 50,0 Z" fill="#3776AB" />
        <path d="M50,100 C75,100 75,75 75,75 L75,50 L50,50 L50,25 L75,25 C105,25 105,50 105,50 L105,75 C105,100 50,100 50,100 Z" fill="#3776AB" />
        <!-- Eyes/Details -->
        <circle cx="35" cy="35" r="5" fill="white" />
        <circle cx="65" cy="65" r="5" fill="white" />
        <circle cx="65" cy="35" r="5" fill="white" />
        <circle cx="35" cy="65" r="5" fill="white" />
      </g>
    </g>

    <!-- Arrow 2 -->
    <path d="M600,160 L780,160" stroke="#A64D8E" stroke-width="4" fill="none" marker-end="url(#arrowPurple)" />
    <rect x="620" y="110" width="160" height="40" fill="white" opacity="0.8"/>
    <text x="690" y="140" font-family="serif" font-weight="bold" font-style="italic" font-size="32" fill="black" text-anchor="middle">Execute</text>

    <!-- Step 3 Label -->
    <text x="400" y="270" font-family="sans-serif" font-weight="bold" font-size="32" fill="#A64D8E" text-anchor="middle">Step 3: 3D Model Generation</text>
  </g>

  <!-- ==================== 3D MODEL (RIGHT BOTTOM) ==================== -->
  <g transform="translate(1340, 280)">
    <!-- Background -->
    <rect width="250" height="220" fill="url(#bg3d)" />
    
    <!-- 3D Object Construction (Simplified Isometric) -->
    <g transform="translate(125, 110)">
      <!-- Legs -->
      <g fill="#808080" stroke="#404040" stroke-width="1">
        <rect x="-80" y="50" width="20" height="80" />
        <path d="M-80,50 L-60,30 L-40,30 L-20,50 Z" fill="#A0A0A0" />
        <path d="M-20,50 L-20,130 L-40,150 L-40,70 Z" fill="#606060" />
        
        <rect x="0" y="60" width="20" height="80" />
        <path d="M0,60 L20,40 L40,40 L20,60 Z" fill="#A0A0A0" />
        <path d="M20,60 L20,140 L40,160 L40,80 Z" fill="#606060" />

        <rect x="60" y="50" width="20" height="80" />
        <path d="M60,50 L80,30 L100,30 L80,50 Z" fill="#A0A0A0" />
        <path d="M80,50 L80,130 L100,150 L100,70 Z" fill="#606060" />
      </g>
      
      <!-- Base Plate -->
      <path d="M-100,0 L-20,-40 L100,-40 L190,0 L100,40 L-20,40 Z" fill="#808080" stroke="#404040" />
      <path d="M-100,0 L-20,-40 L-20,40 Z" fill="#606060" /> <!-- Left Side -->
      <path d="M190,0 L100,40 L100,-40 Z" fill="#505050" /> <!-- Right Side -->

      <!-- Protrusions -->
      <g fill="#808080" stroke="#404040" stroke-width="1">
        <!-- Top Left -->
        <path d="M-20,-40 L10,-80 L50,-80 L20,-40 Z" fill="#A0A0A0" />
        <path d="M20,-40 L20,-100 L50,-120 L50,-80 Z" fill="#606060" />
        <rect x="-20" y="-100" width="40" height="60" />
        
        <!-- Top Right -->
        <path d="M80,-40 L110,-80 L150,-80 L120,-40 Z" fill="#A0A0A0" />
        <path d="M120,-40 L120,-100 L150,-120 L150,-80 Z" fill="#606060" />
        <rect x="80" y="-100" width="40" height="60" />
      </g>
    </g>
    
    <text x="125" y="280" font-family="serif" font-weight="bold" font-size="36" text-anchor="middle" fill="black">3-D Model</text>
  </g>

  <!-- ==================== CONNECTING ARROWS ==================== -->
  
  <!-- Inter-/Intra-View Constraints (Teal) -->
  <text x="330" y="265" font-family="serif" font-size="28" fill="black">Inter-/Intra-View</text>
  <text x="365" y="295" font-family="serif" font-size="28" fill="black">Constraints</text>

  <!-- ezdxf (Purple) -->
  <text x="600" y="280" font-family="sans-serif" font-weight="bold" font-size="36" fill="black">ez</text>
  <text x="630" y="280" font-family="sans-serif" font-weight="bold" font-size="36" fill="#9980FA">dxf</text>

</svg>
<svg width="1600" height="700" viewBox="-8.0 -8.0 1616.0 754.0" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead Marker for Lines (if needed, though using polygons for thickness control) -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555" />
    </marker>
    
    <!-- Font Styles -->
    <style>
      .serif { font-family: "Times New Roman", Times, serif; }
      .bold { font-weight: bold; }
      .box-stroke { stroke: #001F3F; stroke-width: 3.5; }
      .arrow-fill { fill: #555555; }
      .text-black { fill: #000000; }
      .text-blue { fill: #4472C4; }
    </style>
  </defs>

  <!-- 1. Global Background -->
  <rect x="0" y="0" width="1600" height="700" fill="#F5F5F5" stroke="#C0C0C0" stroke-width="8" />

  <!-- 2. Top Row: Input Sources -->
  
  <!-- Left Box: Text-Only -->
  <g transform="translate(220, 40)">
    <rect x="0" y="0" width="460" height="80" rx="15" fill="#FFFFFF" class="box-stroke" />
    <!-- Icon: Document -->
    <g transform="translate(20, 15)">
      <path d="M5,0 L35,0 L45,10 L45,50 L5,50 Z" fill="none" stroke="#333" stroke-width="3" />
      <path d="M35,0 L35,10 L45,10" fill="none" stroke="#333" stroke-width="3" />
      <line x1="12" y1="15" x2="38" y2="15" stroke="#333" stroke-width="3" />
      <line x1="12" y1="25" x2="38" y2="25" stroke="#333" stroke-width="3" />
      <line x1="12" y1="35" x2="38" y2="35" stroke="#333" stroke-width="3" />
      <line x1="12" y1="45" x2="30" y2="45" stroke="#333" stroke-width="3" />
      <!-- Back sheet -->
      <path d="M8,5 L38,5 L38,55" fill="none" stroke="#333" stroke-width="2" />
    </g>
    <text x="240" y="55" text-anchor="middle" font-size="44" class="serif text-black">Text-Only Request</text>
  </g>

  <!-- Right Box: Image-Text -->
  <g transform="translate(950, 40)">
    <rect x="0" y="0" width="440" height="80" rx="15" fill="#FFFFFF" class="box-stroke" />
    <!-- Icon: Image -->
    <g transform="translate(20, 15)">
      <rect x="2" y="5" width="56" height="40" rx="2" fill="#E0E0E0" stroke="#333" stroke-width="2" />
      <circle cx="15" cy="15" r="6" fill="#FFD700" stroke="#333" stroke-width="1" />
      <path d="M2,45 L2,25 L15,25 L20,15 L30,30 L40,20 L58,35 L58,45 Z" fill="#40E0D0" stroke="#333" stroke-width="1" />
      <rect x="2" y="5" width="56" height="40" rx="2" fill="none" stroke="#333" stroke-width="2" />
    </g>
    <text x="230" y="55" text-anchor="middle" font-size="44" class="serif text-black">Image-Text Request</text>
  </g>

  <!-- 3. Arrows: Top to Middle -->
  <g transform="translate(0, 120)">
    <!-- Left Arrow -->
    <polygon points="440,0 440,35 430,35 440,55 450,35 440,35" fill="#555555" />
    <!-- Right Arrow -->
    <polygon points="1180,0 1180,35 1170,35 1180,55 1190,35 1180,35" fill="#555555" />
  </g>

  <!-- 4. Middle Section: Modality-Level -->
  <g transform="translate(85, 150)">
    <!-- Main Container -->
    <rect x="0" y="0" width="1420" height="240" class="box-stroke" fill="none" />
    
    <!-- Left Zone (Blue) -->
    <rect x="1.5" y="1.5" width="708" height="237" fill="#DDEEFF" />
    <!-- Right Zone (Pink) -->
    <rect x="709.5" y="1.5" width="708" height="237" fill="#FFE0E0" />
    
    <!-- Dashed Divider -->
    <line x1="710" y1="0" x2="710" y2="240" stroke="#000" stroke-width="3" stroke-dasharray="8,5" />

    <!-- Header Text -->
    <text x="355" y="60" text-anchor="middle" font-size="44" class="serif bold text-black">Modality-Level</text>
    <text x="355" y="105" text-anchor="middle" font-size="44" class="serif bold text-blue">(Modality-Aware Load Balancing §3.1)</text>

    <!-- Internal Arrows (Behind boxes or carefully placed) -->
    <!-- Left Zone Arrow -->
    <polygon points="350,185 350,195 330,195 330,185" fill="#555555" /> <!-- Tail -->
    <polygon points="420,185 420,195 440,195 440,185" fill="#555555" /> <!-- Head -->
    <rect x="350" y="188" width="70" height="14" fill="#555555" />

    <!-- Right Zone Arrows -->
    <!-- Diagonal Arrow -->
    <polygon points="960,95 950,115" fill="#555555" /> <!-- Tail -->
    <polygon points="900,125 910,145" fill="#555555" /> <!-- Head -->
    <rect x="905" y="115" width="55" height="10" fill="#555555" transform="rotate(30 930 120)" />

    <!-- Horizontal Arrow -->
    <rect x="1080" y="188" width="70" height="14" fill="#555555" />
    <polygon points="1080,185 1080,195 1100,195 1100,185" fill="#555555" /> <!-- Tail -->
    <polygon points="1150,185 1150,195 1170,195 1170,185" fill="#555555" /> <!-- Head -->

    <!-- Cross-Divider Arrow -->
    <polygon points="720,50 720,60 700,60 700,50" fill="#555555" /> <!-- Tail -->
    <polygon points="780,50 780,60 800,60 800,50" fill="#555555" /> <!-- Head -->
    <rect x="720" y="53" width="60" height="14" fill="#555555" />

    <!-- Boxes: Left Zone -->
    <g transform="translate(70, 140)">
      <rect x="0" y="0" width="280" height="100" rx="15" fill="#CCE5FF" class="box-stroke" />
      <text x="140" y="60" text-anchor="middle" font-size="44" class="serif bold text-black">Prefill Stage</text>
    </g>
    <g transform="translate(420, 140)">
      <rect x="0" y="0" width="330" height="100" rx="15" fill="#CCE5FF" class="box-stroke" />
      <text x="165" y="60" text-anchor="middle" font-size="44" class="serif bold text-black">Decode Stage</text>
    </g>

    <!-- Boxes: Right Zone -->
    <g transform="translate(930, 20)">
      <rect x="0" y="0" width="330" height="100" rx="15" fill="#FFC0C0" class="box-stroke" />
      <text x="165" y="60" text-anchor="middle" font-size="44" class="serif bold text-black">Encode Stage</text>
    </g>
    <g transform="translate(790, 140)">
      <rect x="0" y="0" width="300" height="100" rx="15" fill="#FFC0C0" class="box-stroke" />
      <text x="150" y="60" text-anchor="middle" font-size="44" class="serif bold text-black">Prefill Stage</text>
    </g>
    <g transform="translate(1140, 140)">
      <rect x="0" y="0" width="310" height="100" rx="15" fill="#FFC0C0" class="box-stroke" />
      <text x="155" y="60" text-anchor="middle" font-size="44" class="serif bold text-black">Decode Stage</text>
    </g>
  </g>

  <!-- 5. Middle Section: Stage-Level -->
  <g transform="translate(85, 395)">
    <!-- Container -->
    <rect x="0" y="0" width="1420" height="170" fill="#FFFFF5" class="box-stroke" />
    
    <!-- Header -->
    <text x="400" y="45" text-anchor="middle" font-size="44" class="serif bold text-black">Stage-Level</text>
    <text x="410" y="45" text-anchor="start" font-size="44" class="serif bold text-blue">(Elastic Partition Scheduling §3.2)</text>

    <!-- Boxes -->
    <!-- Box 1 -->
    <g transform="translate(110, 60)">
      <rect x="0" y="0" width="330" height="110" rx="15" fill="#FFF2CC" class="box-stroke" />
      <text x="165" y="45" text-anchor="middle" font-size="44" class="serif bold text-black">Request</text>
      <text x="165" y="90" text-anchor="middle" font-size="44" class="serif bold text-black">Scheduling</text>
    </g>

    <!-- Box 2 -->
    <g transform="translate(580, 60)">
      <rect x="0" y="0" width="330" height="110" rx="15" fill="#FFF2CC" class="box-stroke" />
      <text x="165" y="45" text-anchor="middle" font-size="44" class="serif bold text-black">Stage</text>
      <text x="165" y="90" text-anchor="middle" font-size="44" class="serif bold text-black">Allocation</text>
    </g>

    <!-- Box 3 -->
    <g transform="translate(1050, 60)">
      <rect x="0" y="0" width="330" height="110" rx="15" fill="#FFF2CC" class="box-stroke" />
      <text x="165" y="45" text-anchor="middle" font-size="44" class="serif bold text-black">Elastic</text>
      <text x="165" y="90" text-anchor="middle" font-size="44" class="serif bold text-black">Auto-Scaling</text>
    </g>

    <!-- Arrows -->
    <rect x="440" y="113" width="140" height="14" fill="#555555" />
    <polygon points="440,110 440,120 460,120 460,110" fill="#555555" />
    <polygon points="620,110 620,120 640,120 640,110" fill="#555555" />

    <rect x="910" y="113" width="140" height="14" fill="#555555" />
    <polygon points="910,110 910,120 930,120 930,110" fill="#555555" />
    <polygon points="1090,110 1090,120 1110,120 1110,110" fill="#555555" />
  </g>

  <!-- 6. Bottom Section -->
  <g transform="translate(85, 600)">
    <!-- Left: Prefix Cache -->
    <rect x="0" y="0" width="940" height="140" rx="20" fill="#DDEEDD" class="box-stroke" />
    <text x="470" y="85" text-anchor="middle" font-size="44" class="serif bold text-black">Unified Multimodal Prefix Cache</text>
    <text x="740" y="85" text-anchor="start" font-size="44" class="serif bold text-blue">(§3.3)</text>
  </g>

  <!-- Right: Legend -->
  <g transform="translate(1100, 595)">
    <rect x="0" y="0" width="430" height="145" fill="#FFFFFF" class="box-stroke" />
    
    <!-- Item 1 -->
    <rect x="30" y="15" width="70" height="30" fill="#CCE5FF" stroke="#001F3F" stroke-width="3" />
    <text x="120" y="38" font-size="40" class="serif text-black">Text-Only Group</text>
    
    <!-- Item 2 -->
    <rect x="30" y="55" width="70" height="30" fill="#FFC0C0" stroke="#001F3F" stroke-width="3" />
    <text x="120" y="78" font-size="40" class="serif text-black">Multimodal Group</text>
    
    <!-- Item 3 -->
    <polygon points="30,115 45,100 45,110 105,110 105,100 120,115 105,130 105,120 45,120 45,130" fill="#555555" />
    <text x="120" y="125" font-size="40" class="serif text-black">Auto-Scaling</text>
  </g>

</svg>
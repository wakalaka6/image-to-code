<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4.0 -4.0 1650.0 809.0" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Colors -->
    <style>
      .header-bg { fill: #7683C4; }
      .header-text { fill: white; font-weight: bold; font-size: 24px; text-anchor: middle; }
      .body-bg { fill: #E0E0E0; }
      .box-bg { fill: #F2F2F2; }
      .text-dark { fill: #000000; }
      .text-blue { fill: #0078D7; }
      .text-red { fill: #FF0000; }
      .text-green { fill: #32CD32; }
      .border-dashed { stroke: #555; stroke-width: 1; stroke-dasharray: 4,2; fill: none; }
      .bold { font-weight: bold; }
      .italic { font-style: italic; }
      .check { fill: #32CD32; }
      .cross { fill: #FF0000; }
    </style>

    <!-- Arrow Markers -->
    <marker id="arrow-black" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="black" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#FF0000" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#32CD32" />
    </marker>

    <!-- Icons -->
    <g id="icon-robot">
      <rect x="10" y="5" width="14" height="12" rx="2" /> <!-- Head -->
      <rect x="6" y="18" width="22" height="18" rx="2" /> <!-- Body -->
      <rect x="4" y="18" width="3" height="10" /> <!-- L Arm -->
      <rect x="30" y="18" width="3" height="10" /> <!-- R Arm -->
      <rect x="10" y="37" width="3" height="10" /> <!-- L Leg -->
      <rect x="20" y="37" width="3" height="10" /> <!-- R Leg -->
      <line x1="12" y1="5" x2="12" y2="0" stroke-width="2" /> <!-- Antenna -->
      <circle cx="12" cy="0" r="1.5" />
      <circle cx="13" cy="10" r="1.5" fill="white" /> <!-- Eye -->
      <circle cx="21" cy="10" r="1.5" fill="white" /> <!-- Eye -->
    </g>

    <g id="icon-human">
      <circle cx="20" cy="15" r="10" stroke="black" stroke-width="2" fill="none"/>
      <path d="M5,40 Q20,25 35,40" stroke="black" stroke-width="2" fill="none"/>
      <path d="M5,40 L5,45 L35,45 L35,40" stroke="black" stroke-width="2" fill="none"/>
      <path d="M15,15 Q20,20 25,15" stroke="#7683C4" stroke-width="3" fill="none"/> <!-- Neck -->
      <circle cx="20" cy="12" r="4" fill="#7683C4"/> <!-- Head -->
    </g>

    <path id="checkmark" d="M2,10 L8,16 L18,2" fill="none" stroke="#32CD32" stroke-width="3" />
    <path id="crossmark" d="M2,2 L14,14 M14,2 L2,14" fill="none" stroke="#FF0000" stroke-width="3" />
  </defs>

  <!-- Background -->
  <rect width="1600" height="550" fill="white" />

  <!-- ================= LEFT COLUMN ================= -->
  <g transform="translate(20, 0)">
    <!-- Header -->
    <text x="240" y="35" font-size="32" font-weight="bold" text-anchor="middle">Initial Survey</text>

    <!-- Box 1: Prolific Screening -->
    <rect x="40" y="45" width="400" height="110" class="header-bg" />
    <text x="240" y="75" class="header-text">Prolific Screening</text>
    <rect x="65" y="85" width="350" height="75" class="box-bg" />
    <g transform="translate(80, 90)">
      <use href="#checkmark" x="0" y="0" />
      <text x="30" y="15" font-size="22">US residents</text>
      <use href="#checkmark" x="0" y="25" />
      <text x="30" y="40" font-size="22">English speaking</text>
      <use href="#checkmark" x="0" y="50" />
      <text x="30" y="65" font-size="22">COVID/Climate views (+ or -)</text>
    </g>

    <!-- Transition -->
    <line x1="240" y1="155" x2="240" y2="175" stroke="black" stroke-width="3" marker-end="url(#arrow-black)" />
    <g transform="translate(240, 190)">
      <use href="#icon-human" x="-30" y="-20" transform="scale(1.2)" />
      <text x="50" y="-5" font-size="24">1650</text>
      <text x="50" y="25" font-size="24">screened</text>
    </g>
    <line x1="240" y1="220" x2="240" y2="240" stroke="black" stroke-width="3" marker-end="url(#arrow-black)" />

    <!-- Box 2: Belief Assessment -->
    <rect x="40" y="200" width="400" height="140" class="header-bg" />
    <text x="240" y="230" class="header-text">Belief Assessment</text>
    <rect x="60" y="235" width="360" height="100" class="box-bg" />
    <text x="240" y="255" font-size="22" text-anchor="middle">COVID origin: man-made vs natural?</text>
    <text x="240" y="275" font-size="22" text-anchor="middle">COVID vaccines: safe and effective?</text>
    <text x="240" y="295" font-size="22" text-anchor="middle">Climate: human-caused vs natural cycles?</text>
    <text x="240" y="315" font-size="22" text-anchor="middle" font-weight="bold">............</text>

    <!-- Split Lines -->
    <path d="M240,340 L240,360 M240,360 L100,360 L100,380 M240,360 L380,360 L380,380" stroke="black" stroke-width="3" fill="none" />
    <path d="M100,360 L100,380" stroke="#FF0000" stroke-width="3" fill="none" marker-end="url(#arrow-red)" />
    <path d="M380,360 L380,380" stroke="#32CD32" stroke-width="3" fill="none" marker-end="url(#arrow-green)" />

    <!-- Box 3a: Skeptical Belief -->
    <g transform="translate(-10, 350)">
      <rect x="0" y="0" width="240" height="70" class="header-bg" />
      <text x="120" y="30" font-size="28" text-anchor="middle">Skeptical belief</text>
      <text x="120" y="55" font-size="24" text-anchor="middle">107 participants</text>
      <rect x="0" y="70" width="240" height="100" class="box-bg" />
      <g transform="translate(10, 85)">
        <use href="#crossmark" x="0" y="0" />
        <text x="25" y="15" font-size="22">COVID is human made</text>
        <use href="#crossmark" x="0" y="25" />
        <text x="25" y="40" font-size="22">Vaccine are safe</text>
        <use href="#crossmark" x="0" y="50" />
        <text x="25" y="65" font-size="22">Climate is human-caused</text>
      </g>
    </g>

    <!-- Box 3b: Mainstream Belief -->
    <g transform="translate(240, 350)">
      <rect x="0" y="0" width="240" height="70" class="header-bg" />
      <text x="120" y="30" font-size="28" text-anchor="middle">Mainstream belief</text>
      <text x="120" y="55" font-size="24" text-anchor="middle">107 participants</text>
      <rect x="0" y="70" width="240" height="100" class="box-bg" />
      <g transform="translate(10, 85)">
        <use href="#checkmark" x="0" y="0" />
        <text x="25" y="15" font-size="22">COVID is human made</text>
        <use href="#checkmark" x="0" y="25" />
        <text x="25" y="40" font-size="22">Vaccine are safe</text>
        <use href="#checkmark" x="0" y="50" />
        <text x="25" y="65" font-size="22">Climate is human-caused</text>
      </g>
    </g>

    <!-- Plus Sign -->
    <text x="240" y="490" font-size="60" font-weight="bold" text-anchor="middle">+</text>

    <!-- Box 4: Demographic Info -->
    <g transform="translate(40, 490)">
      <rect x="0" y="0" width="390" height="100" class="header-bg" />
      <text x="195" y="30" class="header-text">Demographic Information</text>
      <rect x="20" y="35" width="350" height="80" class="box-bg" />
      <text x="195" y="60" font-size="22" text-anchor="middle">Age, Gender, Education,</text>
      <text x="195" y="90" font-size="22" text-anchor="middle">Residence, Political Stance, Income</text>
    </g>
  </g>

  <!-- ================= MIDDLE COLUMN ================= -->
  <g transform="translate(480, 0)">
    <!-- Header -->
    <text x="240" y="65" font-size="26" font-weight="bold" fill="#0000FF" text-anchor="middle">Example Claim</text>
    
    <!-- Claim Box -->
    <rect x="20" y="70" width="350" height="60" fill="#D3D3D3" />
    <text x="195" y="90" font-size="22" font-weight="bold" font-style="italic" text-anchor="middle">Cloth masks less effective than</text>
    <text x="195" y="110" font-size="22" font-weight="bold" font-style="italic" text-anchor="middle">surgical masks</text>

    <!-- Judge Info -->
    <g transform="translate(340, 60)">
      <rect x="0" y="0" width="320" height="70" class="border-dashed" />
      <text x="160" y="30" font-size="22" text-anchor="middle">Judge's Initial Belief: True/False</text>
      <text x="160" y="55" font-size="22" text-anchor="middle">Confidence: (0-100%)</text>
    </g>

    <!-- Main Container -->
    <rect x="10" y="135" width="460" height="415" rx="15" fill="none" stroke="black" stroke-width="2" />
    
    <!-- Header -->
    <path d="M10,135 L470,135 L470,165 L10,165 Z" class="header-bg" />
    <text x="240" y="162" class="header-text" font-size="28">Consultancy</text>

    <!-- Sidebar Text -->
    <text x="0" y="442" transform="rotate(-90, 0, 442)" font-size="20" text-anchor="middle">One AI consultant argues a random position between True (50%) or False (50%)</text>

    <!-- Content Area -->
    <g transform="translate(40, 175)">
      <!-- Round 1 -->
      <rect x="0" y="0" width="400" height="150" rx="15" class="body-bg" />
      <text x="20" y="30" font-size="26" font-weight="bold">Round 1</text>
      <g transform="translate(10, 45)">
        <use href="#icon-robot" x="0" y="0" fill="#00A88F" />
        <path d="M100,0 L380,0 Q400,0 400,20 L400,40 Q400,60 380,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
        <text x="90" y="25" font-size="22">Studies show surgical masks filter</text>
        <text x="90" y="50" font-size="22">60-80% of particles...</text>
      </g>
      <g transform="translate(10, 110)">
        <use href="#icon-human" x="0" y="0" />
        <path d="M100,0 L380,0 Q400,0 400,20 L400,30 Q400,50 380,50 L100,50 Q80,50 80,30 L80,20 Q80,0 100,0 Z" class="box-bg" />
        <text x="90" y="32" font-size="22">What about multi-layer cloth masks?</text>
      </g>

      <!-- Round 2 -->
      <g transform="translate(0, 160)">
        <rect x="0" y="0" width="400" height="150" rx="15" class="body-bg" />
        <text x="20" y="30" font-size="26" font-weight="bold">Round 2</text>
        <g transform="translate(10, 45)">
          <use href="#icon-robot" x="0" y="0" fill="#00A88F" />
          <path d="M100,0 L380,0 Q400,0 400,20 L400,40 Q400,60 380,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="25" font-size="22">Even 3-layer cloth masks only achieve</text>
          <text x="90" y="50" font-size="22">50% filtration...</text>
        </g>
        <g transform="translate(10, 110)">
          <use href="#icon-human" x="0" y="0" />
          <path d="M100,0 L380,0 Q400,0 400,20 L400,30 Q400,50 380,50 L100,50 Q80,50 80,30 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="32" font-size="22">Are there any exceptions to this?</text>
        </g>
      </g>

      <!-- Round 3 -->
      <g transform="translate(0, 320)">
        <rect x="0" y="0" width="400" height="150" rx="15" class="body-bg" />
        <text x="20" y="30" font-size="26" font-weight="bold">Round 3</text>
        <g transform="translate(10, 45)">
          <use href="#icon-robot" x="0" y="0" fill="#00A88F" />
          <path d="M100,0 L380,0 Q400,0 400,20 L400,40 Q400,60 380,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="25" font-size="22">WHO recommends surgical over cloth</text>
          <text x="90" y="50" font-size="22">masks...</text>
        </g>
        <g transform="translate(10, 110)">
          <use href="#icon-human" x="0" y="0" />
          <path d="M100,0 L380,0 Q400,0 400,20 L400,30 Q400,50 380,50 L100,50 Q80,50 80,30 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="20" font-size="22">Final decision: True/False</text>
          <text x="90" y="45" font-size="22">Confidence: 0-100% | Justification</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ================= RIGHT COLUMN ================= -->
  <g transform="translate(960, 0)">
    <!-- Header -->
    <text x="100" y="35" font-size="32" font-weight="bold" text-anchor="middle">Protocols</text>

    <!-- Legend -->
    <g transform="translate(220, 20)">
      <rect x="0" y="0" width="340" height="105" rx="10" fill="#D3D3D3" />
      <g transform="translate(10, 10)">
        <use href="#icon-robot" x="0" y="0" fill="#00A88F" transform="scale(1.2)" />
        <text x="60" y="25" font-size="22" fill="#0078D7">AI expert can access corresponding</text>
        <text x="130" y="50" font-size="22" fill="#0078D7">sources and cite them</text>
      </g>
      <g transform="translate(10, 65)">
        <use href="#icon-human" x="0" y="0" transform="scale(1.2)" />
        <text x="60" y="25" font-size="22" fill="#0078D7">Cited references are shown to judges</text>
      </g>
    </g>

    <!-- Main Container -->
    <rect x="10" y="135" width="630" height="415" rx="15" fill="none" stroke="black" stroke-width="2" />
    
    <!-- Header -->
    <path d="M10,135 L640,135 L640,165 L10,165 Z" class="header-bg" />
    <text x="325" y="162" class="header-text" font-size="28">Debate</text>

    <!-- Sidebar Text -->
    <text x="650" y="442" transform="rotate(-90, 650, 442)" font-size="20" text-anchor="middle">Two AI debaters argue opposing positions between True vs. False (100%)</text>

    <!-- Content Area -->
    <g transform="translate(30, 175)">
      <!-- Round 1 -->
      <rect x="0" y="0" width="580" height="150" rx="15" class="body-bg" />
      <text x="20" y="30" font-size="26" font-weight="bold">Round 1</text>
      <g transform="translate(10, 45)">
        <use href="#icon-robot" x="0" y="0" fill="#00A88F" />
        <path d="M100,0 L300,0 Q320,0 320,20 L320,40 Q320,60 300,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
        <text x="90" y="35" font-size="22">Surgical masks filter 60-80%...</text>
      </g>
      <g transform="translate(280, 45)">
        <use href="#icon-robot" x="0" y="0" fill="#FF3333" />
        <path d="M100,0 L300,0 Q320,0 320,20 L320,40 Q320,60 300,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
        <text x="90" y="25" font-size="22">Quality cloth masks can be</text>
        <text x="90" y="50" font-size="22">effective...</text>
      </g>
      <g transform="translate(130, 110)">
        <use href="#icon-human" x="0" y="0" />
        <path d="M100,0 L380,0 Q400,0 400,20 L400,30 Q400,50 380,50 L100,50 Q80,50 80,30 L80,20 Q80,0 100,0 Z" class="box-bg" />
        <text x="90" y="32" font-size="22">What defines 'quality' cloth masks?</text>
      </g>

      <!-- Round 2 -->
      <g transform="translate(0, 160)">
        <rect x="0" y="0" width="580" height="150" rx="15" class="body-bg" />
        <text x="20" y="30" font-size="26" font-weight="bold">Round 2</text>
        <g transform="translate(10, 45)">
          <use href="#icon-robot" x="0" y="0" fill="#00A88F" />
          <path d="M100,0 L300,0 Q320,0 320,20 L320,40 Q320,60 300,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="25" font-size="22">3-layer cloth still only 50%</text>
          <text x="90" y="50" font-size="22">effective...</text>
        </g>
        <g transform="translate(280, 45)">
          <use href="#icon-robot" x="0" y="0" fill="#FF3333" />
          <path d="M100,0 L300,0 Q320,0 320,20 L320,40 Q320,60 300,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="25" font-size="22">But availability and fit matter</text>
          <text x="90" y="50" font-size="22">too...</text>
        </g>
        <g transform="translate(130, 110)">
          <use href="#icon-human" x="0" y="0" />
          <path d="M100,0 L380,0 Q400,0 400,20 L400,30 Q400,50 380,50 L100,50 Q80,50 80,30 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="32" font-size="22">How important is proper fit?</text>
        </g>
      </g>

      <!-- Round 3 -->
      <g transform="translate(0, 320)">
        <rect x="0" y="0" width="580" height="150" rx="15" class="body-bg" />
        <text x="20" y="30" font-size="26" font-weight="bold">Round 3</text>
        <g transform="translate(10, 45)">
          <use href="#icon-robot" x="0" y="0" fill="#00A88F" />
          <path d="M100,0 L300,0 Q320,0 320,20 L320,40 Q320,60 300,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="25" font-size="22">Medical studies prove</text>
          <text x="90" y="50" font-size="22">superiority...</text>
        </g>
        <g transform="translate(280, 45)">
          <use href="#icon-robot" x="0" y="0" fill="#FF3333" />
          <path d="M100,0 L300,0 Q320,0 320,20 L320,40 Q320,60 300,60 L100,60 Q80,60 80,40 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="25" font-size="22">Real-world usage differs from</text>
          <text x="90" y="50" font-size="22">labs...</text>
        </g>
        <g transform="translate(130, 110)">
          <use href="#icon-human" x="0" y="0" />
          <path d="M100,0 L380,0 Q400,0 400,20 L400,30 Q400,50 380,50 L100,50 Q80,50 80,30 L80,20 Q80,0 100,0 Z" class="box-bg" />
          <text x="90" y="20" font-size="22">Final decision: True/False</text>
          <text x="90" y="45" font-size="22">Confidence: 0-100% | Justification</text>
        </g>
      </g>
    </g>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="12.0 16.0 1586.0 690.0" style="background-color: white;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
    
    <!-- Fonts and Styles -->
    <style>
      .serif { font-family: "Times New Roman", Times, serif; }
      .label-main { font-size: 40px; fill: black; }
      .label-sub { font-size: 24px; fill: black; }
      .math-bold { font-weight: bold; }
      .math-italic { font-style: italic; }
      .box-text { font-size: 36px; fill: black; text-anchor: middle; dominant-baseline: middle; }
      .node-text { font-size: 20px; fill: black; text-anchor: middle; dominant-baseline: middle; }
      .stack-rect { stroke: #1A237E; stroke-width: 2.5; }
      .conn-line { stroke: black; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .plain-line { stroke: black; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <!-- ================= SECTION A: GIBMS ================= -->
  
  <!-- Background Panel -->
  <rect x="80" y="20" width="1500" height="320" fill="#D1EFF2" />
  <text x="15" y="60" class="serif label-main">(a)</text>
  <text x="150" y="60" class="serif label-main">GIBMS</text>

  <!-- 1. Input Graph G -->
  <g transform="translate(200, 200)">
    <!-- Edges -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="60" y2="0" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="-50" y2="40" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="50" y2="40" stroke="black" stroke-width="1.5" />
    <line x1="60" y1="0" x2="60" y2="-60" stroke="black" stroke-width="1.5" />
    <!-- Nodes -->
    <circle cx="0" cy="-60" r="20" fill="#8AB4F8" />
    <circle cx="60" cy="0" r="20" fill="#8AB4F8" />
    <circle cx="0" cy="0" r="20" fill="#8AB4F8" />
    <circle cx="-50" cy="40" r="20" fill="#8AB4F8" />
    <circle cx="50" cy="40" r="20" fill="#8AB4F8" />
    <circle cx="60" cy="-60" r="20" fill="#8AB4F8" />
    <!-- Label -->
    <text x="0" y="100" class="serif label-main math-italic" text-anchor="middle">G</text>
  </g>

  <!-- Arrow to Encoder -->
  <line x1="320" y1="190" x2="390" y2="190" class="conn-line" />

  <!-- Encoder Box -->
  <rect x="395" y="120" width="100" height="180" fill="#E6E6E6" stroke="#5D2930" stroke-width="3" />
  <text x="445" y="210" class="serif box-text" transform="rotate(-90, 445, 210)">Encoder</text>

  <!-- Arrow to H -->
  <line x1="475" y1="190" x2="540" y2="190" class="conn-line" />

  <!-- Feature Stack H -->
  <text x="500" y="160" class="serif label-main math-bold">H</text>
  <g transform="translate(545, 130)">
    <rect x="0" y="0" width="70" height="35" fill="#AEEFFF" class="stack-rect" />
    <rect x="0" y="35" width="70" height="35" fill="#AEEFFF" class="stack-rect" />
    <rect x="0" y="70" width="70" height="35" fill="#AEEFFF" class="stack-rect" />
    <rect x="0" y="105" width="70" height="35" fill="#AEEFFF" class="stack-rect" />
    <rect x="0" y="140" width="70" height="35" fill="#AEEFFF" class="stack-rect" />
  </g>

  <!-- Arrow to MLP -->
  <line x1="600" y1="190" x2="670" y2="190" class="conn-line" />

  <!-- MLP Box -->
  <rect x="675" y="120" width="100" height="180" fill="#E6E6E6" stroke="#5D2930" stroke-width="3" />
  <text x="725" y="210" class="serif box-text" transform="rotate(-90, 725, 210)">MLP</text>

  <!-- Arrow to Sampled Graph -->
  <line x1="755" y1="190" x2="820" y2="190" class="conn-line" />

  <!-- Sampled Graph -->
  <g transform="translate(900, 200)">
    <!-- Edges -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="60" y2="0" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="-50" y2="40" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="50" y2="40" stroke="black" stroke-width="1.5" />
    <line x1="60" y1="0" x2="60" y2="-60" stroke="black" stroke-width="1.5" />
    <!-- Nodes with Text -->
    <circle cx="0" cy="-60" r="20" fill="#8AB4F8" />
    <text x="0" y="-60" class="serif node-text">0.1</text>
    
    <circle cx="60" cy="0" r="20" fill="#8AB4F8" />
    <text x="60" y="0" class="serif node-text">0.3</text>
    
    <circle cx="0" cy="0" r="20" fill="#8AB4F8" />
    <text x="0" y="0" class="serif node-text">0.9</text>
    
    <circle cx="-50" cy="40" r="20" fill="#8AB4F8" />
    <text x="-50" y="40" class="serif node-text">0.7</text>
    
    <circle cx="50" cy="40" r="20" fill="#8AB4F8" />
    <text x="50" y="40" class="serif node-text">0.6</text>
    
    <circle cx="60" cy="-60" r="20" fill="#8AB4F8" />
  </g>

  <!-- Branching Paths -->
  <line x1="1010" y1="190" x2="1050" y2="190" class="plain-line" /> <!-- Main stem -->
  <line x1="1050" y1="190" x2="1050" y2="105" class="plain-line" /> <!-- Up -->
  <line x1="1050" y1="190" x2="1050" y2="270" class="plain-line" /> <!-- Down -->
  
  <line x1="1050" y1="105" x2="1110" y2="105" class="conn-line" /> <!-- To Top Stack -->
  <line x1="1050" y1="270" x2="1110" y2="270" class="conn-line" /> <!-- To Bottom Stack -->

  <!-- Top Stack G_IB -->
  <text x="1060" y="60" class="serif label-main math-italic">G<tspan dy="10" font-size="25">IB</tspan></text>
  <g transform="translate(1115, 35)">
    <rect x="0" y="0" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="35" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="70" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="105" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="140" width="70" height="35" fill="#D4E998" class="stack-rect" />
  </g>

  <!-- Bottom Stack G_IB -->
  <g transform="translate(1115, 210)">
    <rect x="0" y="0" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="35" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="70" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="105" width="70" height="35" fill="#D4E998" class="stack-rect" />
    <rect x="0" y="140" width="70" height="35" fill="#D4E998" class="stack-rect" />
  </g>
  <text x="1060" y="325" class="serif label-main math-italic">G<tspan dy="10" font-size="25">IB</tspan></text>

  <!-- Pooling Arrows -->
  <line x1="1185" y1="105" x2="1260" y2="105" class="conn-line" />
  <text x="1180" y="95" class="serif label-main">Pool</text>
  
  <line x1="1185" y1="270" x2="1260" y2="270" class="conn-line" />
  <text x="1180" y="260" class="serif label-main">Pool</text>

  <!-- Pooled Vectors -->
  <rect x="1265" y="87" width="80" height="45" fill="#D4E998" stroke="#5D2930" stroke-width="2.5" />
  <rect x="1265" y="252" width="80" height="45" fill="#D4E998" stroke="#5D2930" stroke-width="2.5" />

  <!-- Sample Label -->
  <text x="1060" y="198" class="serif label-main">Sample</text>

  <!-- Convergence to Loss -->
  <line x1="1345" y1="105" x2="1390" y2="185" class="conn-line" />
  <line x1="1345" y1="270" x2="1390" y2="195" class="conn-line" />

  <!-- Loss Function Text -->
  <line x1="1400" y1="190" x2="1420" y2="190" class="plain-line" />
  <text x="1425" y="195" class="serif label-main">
    <tspan font-style="italic">I</tspan> (<tspan font-weight="bold">Y</tspan>; <tspan font-style="italic">G</tspan><tspan dy="10" font-size="25">IB</tspan>)
  </text>

  <!-- Top Loss Connections -->
  <line x1="545" y1="130" x2="545" y2="80" class="plain-line" />
  <line x1="545" y1="80" x2="815" y2="80" class="conn-line" />
  <text x="820" y="90" class="serif label-main">
    <tspan font-style="italic">I</tspan> (<tspan font-style="italic">G</tspan>; <tspan font-style="italic">G</tspan><tspan dy="10" font-size="25">IB</tspan>)
  </text>

  <line x1="1115" y1="80" x2="970" y2="80" class="conn-line" />
  
  <line x1="545" y1="245" x2="545" y2="290" class="plain-line" />
  <line x1="545" y1="290" x2="815" y2="290" class="conn-line" />
  <text x="820" y="300" class="serif label-main">
    <tspan font-style="italic">I</tspan> (<tspan font-style="italic">G</tspan>; <tspan font-style="italic">G</tspan><tspan dy="10" font-size="25">IB</tspan>)
  </text>
  <line x1="1115" y1="290" x2="970" y2="290" class="conn-line" />


  <!-- ================= SECTION B: SLG ================= -->
  
  <text x="15" y="370" class="serif label-main">(b)</text>
  <text x="130" y="375" class="serif label-main">SLG</text>

  <!-- Input Graph G (Copy) -->
  <g transform="translate(230, 480)">
    <line x1="0" y1="0" x2="0" y2="-60" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="60" y2="0" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="-50" y2="40" stroke="black" stroke-width="1.5" />
    <line x1="0" y1="0" x2="50" y2="40" stroke="black" stroke-width="1.5" />
    <line x1="60" y1="0" x2="60" y2="-60" stroke="black" stroke-width="1.5" />
    <circle cx="0" cy="-60" r="20" fill="#8AB4F8" />
    <circle cx="60" cy="0" r="20" fill="#8AB4F8" />
    <circle cx="0" cy="0" r="20" fill="#8AB4F8" />
    <circle cx="-50" cy="40" r="20" fill="#8AB4F8" />
    <circle cx="50" cy="40" r="20" fill="#8AB4F8" />
    <circle cx="60" cy="-60" r="20" fill="#8AB4F8" />
    <text x="0" y="100" class="serif label-main math-italic" text-anchor="middle">G</text>
  </g>

  <!-- Split Arrows -->
  <line x1="330" y1="470" x2="410" y2="420" class="conn-line" />
  <line x1="330" y1="470" x2="410" y2="560" class="conn-line" />

  <!-- GIBMS Box -->
  <rect x="415" y="355" width="100" height="160" fill="#D1EFF2" />
  <text x="465" y="435" class="serif box-text" transform="rotate(-90, 465, 435)">GIBMS</text>

  <!-- Tokenizer Box -->
  <rect x="415" y="490" width="100" height="160" fill="#E6E6E6" stroke="#5D4037" stroke-width="3" />
  <text x="465" y="570" class="serif box-text" transform="rotate(-90, 465, 570)">Tokenizer</text>

  <!-- Arrows to Encoders -->
  <line x1="485" y1="420" x2="580" y2="420" class="conn-line" />
  <line x1="485" y1="560" x2="580" y2="560" class="conn-line" />

  <!-- Top Encoder -->
  <rect x="580" y="355" width="100" height="180" fill="#E6E6E6" stroke="#5D4037" stroke-width="3" />
  <text x="630" y="445" class="serif box-text" transform="rotate(-90, 630, 445)">Encoder</text>

  <!-- Bottom Embedding -->
  <rect x="580" y="490" width="100" height="180" fill="#E6E6E6" stroke="#5D4037" stroke-width="3" />
  <text x="630" y="580" class="serif box-text" transform="rotate(-90, 630, 580)">Embedding</text>

  <!-- Arrows to H Stacks -->
  <line x1="660" y1="420" x2="750" y2="420" class="conn-line" />
  <line x1="660" y1="560" x2="750" y2="560" class="conn-line" />

  <!-- H^p Stack -->
  <text x="690" y="385" class="serif label-main math-bold">H<tspan dy="-10" font-size="25" font-style="italic">p</tspan></text>
  <g transform="translate(750, 360)">
    <rect x="0" y="0" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="35" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="70" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="105" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="140" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
  </g>

  <!-- H^y Stack -->
  <text x="690" y="530" class="serif label-main math-bold">H<tspan dy="-10" font-size="25" font-style="italic">y</tspan></text>
  <g transform="translate(750, 500)">
    <rect x="0" y="0" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="35" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="70" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="105" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
    <rect x="0" y="140" width="70" height="35" fill="#F2F0D9" class="stack-rect" />
  </g>

  <!-- Softmax Top -->
  <line x1="800" y1="420" x2="900" y2="420" class="plain-line" />
  <text x="890" y="425" class="serif label-main">softmax</text>
  <g transform="translate(1000, 380)">
    <!-- Parentheses -->
    <path d="M 10 0 Q -10 40 10 80" stroke="black" stroke-width="3" fill="none" />
    <path d="M 150 0 Q 170 40 150 80" stroke="black" stroke-width="3" fill="none" />
    <!-- Fraction -->
    <text x="80" y="30" class="serif label-main math-bold" text-anchor="middle">H<tspan dy="-10" font-size="25" font-style="italic">p</tspan><tspan dy="10"> · Q</tspan></text>
    <line x1="30" y1="40" x2="130" y2="40" stroke="black" stroke-width="2" />
    <text x="80" y="70" class="serif label-main math-italic" text-anchor="middle">T<tspan dy="5" font-size="25">p</tspan></text>
  </g>
  <line x1="1160" y1="420" x2="1220" y2="420" class="conn-line" />
  <text x="1180" y="385" class="serif label-main math-bold" font-style="italic">s<tspan dy="-10" font-size="25">p</tspan></text>

  <!-- Softmax Bottom -->
  <line x1="800" y1="560" x2="900" y2="560" class="plain-line" />
  <text x="890" y="565" class="serif label-main">softmax</text>
  <g transform="translate(1000, 520)">
    <!-- Parentheses -->
    <path d="M 10 0 Q -10 40 10 80" stroke="black" stroke-width="3" fill="none" />
    <path d="M 150 0 Q 170 40 150 80" stroke="black" stroke-width="3" fill="none" />
    <!-- Fraction -->
    <text x="80" y="30" class="serif label-main math-bold" text-anchor="middle">H<tspan dy="-10" font-size="25" font-style="italic">y</tspan><tspan dy="10"> · Q</tspan></text>
    <line x1="30" y1="40" x2="130" y2="40" stroke="black" stroke-width="2" />
    <text x="80" y="70" class="serif label-main math-italic" text-anchor="middle">T<tspan dy="5" font-size="25">y</tspan></text>
  </g>
  <line x1="1160" y1="560" x2="1220" y2="560" class="conn-line" />
  <text x="1180" y="540" class="serif label-main math-bold" font-style="italic">s<tspan dy="-10" font-size="25">y</tspan></text>

  <!-- Q Matrix -->
  <text x="900" y="500" class="serif label-main math-bold">Q</text>
  <g transform="translate(945, 455)">
    <rect x="0" y="0" width="50" height="80" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="0" width="50" height="80" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="0" width="50" height="80" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="0" width="50" height="80" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />
  </g>

  <!-- Result Matrices -->
  <!-- Top S^p -->
  <g transform="translate(1225, 360)">
    <rect x="0" y="0" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="0" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="0" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="0" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />
    
    <rect x="0" y="50" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="50" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="50" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="50" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />

    <rect x="0" y="100" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="100" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="100" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="100" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />

    <rect x="0" y="150" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="150" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="150" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="150" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />
  </g>

  <!-- Bottom S^y -->
  <g transform="translate(1225, 500)">
    <rect x="0" y="0" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="0" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="0" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="0" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />
    
    <rect x="0" y="50" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="50" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="50" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="50" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />

    <rect x="0" y="100" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="100" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="100" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="100" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />

    <rect x="0" y="150" width="50" height="50" fill="#7CA6F7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="50" y="150" width="50" height="50" fill="#81D4A7" stroke="#1A237E" stroke-width="2.5" />
    <rect x="100" y="150" width="50" height="50" fill="#FFC158" stroke="#1A237E" stroke-width="2.5" />
    <rect x="150" y="150" width="50" height="50" fill="#F696A6" stroke="#1A237E" stroke-width="2.5" />
  </g>

  <!-- Loss Convergence -->
  <line x1="1375" y1="415" x2="1420" y2="475" class="conn-line" />
  <line x1="1375" y1="555" x2="1420" y2="485" class="conn-line" />

  <text x="1430" y="490" class="serif label-main">
    <tspan font-family="cursive" font-weight="bold">L</tspan><tspan dy="10" font-size="25">soft</tspan><tspan dy="-10" font-size="40">(</tspan><tspan font-style="italic">s</tspan><tspan dy="-10" font-size="25" font-style="italic">y</tspan><tspan dy="10">, </tspan><tspan font-style="italic">s</tspan><tspan dy="-10" font-size="25" font-style="italic">p</tspan><tspan dy="10" font-size="40">)</tspan>
  </text>

</svg>
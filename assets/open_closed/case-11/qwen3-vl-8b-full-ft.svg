<svg xmlns="http://www.w3.org/2000/svg" viewBox="4.0 10.0 1679.0 676.0" style="font-family: 'Times New Roman', Times, serif; background-color: white;">
  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4472C4" />
    </marker>
    <!-- CD Icon -->
    <g id="cd-icon">
      <circle cx="25" cy="25" r="20" fill="#D9D9D9" stroke="#555" stroke-width="2"/>
      <circle cx="25" cy="25" r="14" fill="#FFF" stroke="#AAA" stroke-width="1"/>
      <circle cx="25" cy="25" r="8" fill="#AAA" />
      <path d="M 25 5 Q 35 25 25 45" stroke="#555" fill="none" stroke-width="1"/>
    </g>
    <!-- Blue X Icon -->
    <g id="blue-x">
      <path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="#4472C4" stroke-width="8" stroke-linecap="round" />
    </g>
  </defs>

  <!-- ================= LEFT SECTION ================= -->

  <!-- 1. Top: Language Model -->
  <rect x="10" y="20" width="1010" height="80" rx="15" fill="#E2F0D9" />
  <text x="30" y="70" font-size="48" fill="black">Language Model <tspan font-style="italic">f</tspan><tspan dy="5" font-size="36" font-style="italic">ϕ</tspan></text>

  <!-- 2. Upper Middle: Token Matrices -->
  <!-- Hq (Left) -->
  <text x="10" y="170" font-size="48" font-style="italic">H<tspan dy="10" font-size="36">q</tspan></text>
  <rect x="75" y="130" width="80" height="80" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
  
  <!-- Middle -->
  <rect x="225" y="130" width="80" height="80" rx="15" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
  <line x1="265" y1="215" x2="265" y2="180" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="265" y1="130" x2="265" y2="95" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Hv* (Right) -->
  <text x="550" y="170" font-size="48" font-style="italic">H<tspan dy="-15" font-size="36">*</tspan><tspan dy="25" dx="-10" font-size="36">v</tspan></text>
  <rect x="625" y="130" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
  <rect x="775" y="130" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
  <line x1="815" y1="215" x2="815" y2="180" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="815" y1="130" x2="815" y2="95" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <rect x="915" y="130" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />

  <!-- 3. Middle: Tokenizer -->
  <rect x="35" y="215" width="450" height="90" rx="15" fill="#E7E6E6" />
  <text x="260" y="268" font-size="48" text-anchor="middle" fill="black">Tokenizer</text>
  <line x1="260" y1="310" x2="260" y2="280" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="260" y1="310" x2="260" y2="310" stroke="#4472C4" stroke-width="3" /> <!-- Anchor for input -->
  
  <!-- 4. Middle Right: CDPruner -->
  <rect x="580" y="215" width="440" height="90" rx="15" fill="#FFD1D1" stroke="black" stroke-width="2" />
  <text x="800" y="268" font-size="48" text-anchor="middle" font-weight="bold" fill="black">CDPruner</text>
  <line x1="815" y1="215" x2="815" y2="180" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" /> <!-- Output to Hv* -->
  
  <!-- Connection: Tokenizer to CDPruner -->
  <path d="M 435 160 L 505 160 L 505 250 L 575 250" fill="none" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 5. Lower Middle: Input Sequence -->
  <text x="35" y="355" font-size="48">Language Instruction <tspan font-style="italic" font-weight="bold">X</tspan><tspan dy="5" font-size="36" font-style="italic">q</tspan> <tspan font-style="italic" font-weight="bold">H</tspan><tspan dy="5" font-size="36" font-style="italic">v</tspan></text>
  <line x1="260" y1="310" x2="260" y2="280" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" /> <!-- Arrow from text up to tokenizer -->

  <!-- Visual Token Row -->
  <g transform="translate(580, 310)">
    <rect x="0" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="90" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="180" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="270" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="360" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="450" y="0" width="80" height="80" rx="15" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
  </g>
  <line x1="810" y1="310" x2="810" y2="280" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" /> <!-- Up to CDPruner -->

  <!-- 6. Bottom: Visual Stream -->
  <!-- Projector -->
  <rect x="580" y="400" width="440" height="80" rx="15" fill="#FBE5D6" />
  <text x="800" y="450" font-size="48" text-anchor="middle">Projector <tspan font-style="italic">g</tspan></text>
  <line x1="810" y1="400" x2="810" y2="365" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Vision Encoder -->
  <rect x="580" y="480" width="440" height="80" rx="15" fill="#DAE3F3" />
  <text x="800" y="530" font-size="48" text-anchor="middle">Vision Encoder <tspan font-style="italic">f</tspan><tspan dy="5" font-size="36" font-style="italic">v</tspan></text>
  <line x1="810" y1="560" x2="810" y2="540" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Input Image -->
  <text x="660" y="610" font-size="48">Input Image <tspan font-style="italic" font-weight="bold">X</tspan><tspan dy="5" font-size="36" font-style="italic">v</tspan></text>

  <!-- 7. Legend -->
  <rect x="10" y="400" width="500" height="280" fill="white" stroke="#1F3864" stroke-width="3" />
  
  <!-- Row 1: Visual Tokens -->
  <g transform="translate(25, 415)">
    <rect x="0" y="0" width="55" height="55" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="65" y="0" width="55" height="55" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <rect x="130" y="0" width="55" height="55" rx="10" fill="#F8CBAD" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="40" font-size="40">Visual Tokens</text>
  </g>
  
  <!-- Row 2: Text Tokens -->
  <g transform="translate(25, 475)">
    <rect x="0" y="0" width="55" height="55" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
    <rect x="65" y="0" width="55" height="55" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
    <rect x="130" y="0" width="55" height="55" rx="10" fill="#D9D9D9" stroke="#4472C4" stroke-width="3" />
    <text x="180" y="40" font-size="40">Text Tokens</text>
  </g>

  <!-- Row 3: Feature Similarity -->
  <g transform="translate(25, 525)">
    <rect x="0" y="0" width="55" height="55" fill="#C65911" stroke="black" stroke-width="2" />
    <rect x="55" y="0" width="55" height="55" fill="#F4B084" stroke="black" stroke-width="2" />
    <rect x="110" y="0" width="55" height="55" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <rect x="165" y="0" width="55" height="55" fill="#F8CBAD" stroke="black" stroke-width="2" />
    <text x="180" y="40" font-size="40">Feature Similarity</text>
  </g>

  <!-- Row 4: Query Relevance -->
  <g transform="translate(25, 580)">
    <rect x="0" y="0" width="55" height="55" fill="#767171" stroke="black" stroke-width="2" />
    <rect x="55" y="0" width="55" height="55" fill="#BFBFBF" stroke="black" stroke-width="2" />
    <rect x="110" y="0" width="55" height="55" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <rect x="165" y="0" width="55" height="55" fill="#D9D9D9" stroke="black" stroke-width="2" />
    <text x="180" y="40" font-size="40">Query Relevance</text>
  </g>

  <!-- ================= RIGHT SECTION (ZOOM) ================= -->

  <!-- Dashed Lines -->
  <line x1="1020" y1="215" x2="1080" y2="30" stroke="black" stroke-width="3" stroke-dasharray="15,10" />
  <line x1="1020" y1="280" x2="1080" y2="600" stroke="black" stroke-width="3" stroke-dasharray="15,10" />

  <!-- Main Container -->
  <rect x="1080" y="15" width="515" height="600" rx="20" fill="#FFE6E6" stroke="black" stroke-width="2" />
  
  <!-- CDPruner Vertical Text -->
  <g transform="translate(1550, 200) rotate(90)">
    <use href="#cd-icon" x="-25" y="-25" />
    <text x="0" y="10" font-size="48" text-anchor="middle" fill="black">CDPruner</text>
  </g>

  <!-- Internal Stack -->
  <g transform="translate(1140, 60)">
    
    <!-- Top Bar S* -->
    <text x="0" y="45" font-size="48" font-style="italic" font-weight="bold">S<tspan dy="-15" font-size="30">*</tspan></text>
    <g transform="translate(40, 0)">
      <!-- Cells -->
      <rect x="0" y="0" width="80" height="70" fill="#F4B084" stroke="black" stroke-width="2" />
      <text x="40" y="45" font-size="40" font-weight="bold" text-anchor="middle">1</text>
      
      <rect x="80" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
      <text x="120" y="45" font-size="40" text-anchor="middle">×</text>
      
      <rect x="160" y="0" width="80" height="70" fill="#F8CBAD" stroke="black" stroke-width="2" />
      <text x="200" y="45" font-size="40" font-weight="bold" text-anchor="middle">3</text>
      
      <rect x="240" y="0" width="80" height="70" fill="#F4B084" stroke="black" stroke-width="2" />
      <text x="280" y="45" font-size="40" font-weight="bold" text-anchor="middle">4</text>
      
      <rect x="320" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
      <text x="360" y="45" font-size="40" text-anchor="middle">×</text>
      
      <rect x="400" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
      <text x="440" y="45" font-size="40" text-anchor="middle">×</text>
    </g>
    <!-- Arrow Up -->
    <line x1="280" y1="100" x2="280" y2="75" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

    <!-- DPP Block -->
    <rect x="40" y="90" width="400" height="90" rx="15" fill="#FF8F8F" stroke="black" stroke-width="2" />
    <text x="240" y="145" font-size="48" text-anchor="middle">DPP</text>
    <!-- Arrow Up -->
    <line x1="280" y1="180" x2="280" y2="155" stroke="#4472C4" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Vector r -->
    <text x="0" y="215" font-size="48" font-style="italic" font-weight="bold">r</text>
    <g transform="translate(40, 180)">
      <rect x="0" y="0" width="80" height="70" fill="#D9D9D9" stroke="black" stroke-width="2" />
      <rect x="80" y="0" width="80" height="70" fill="#BFBFBF" stroke="black" stroke-width="2" />
      <rect x="160" y="0" width="80" height="70" fill="#767171" stroke="black" stroke-width="2" />
      <rect x="240" y="0" width="80" height="70" fill="#767171" stroke="black" stroke-width="2" />
      <rect x="320" y="0" width="80" height="70" fill="#BFBFBF" stroke="black" stroke-width="2" />
      <rect x="400" y="0" width="80" height="70" fill="#E7E6E6" stroke="black" stroke-width="2" />
    </g>

    <!-- Blue X -->
    <use href="#blue-x" x="270" y="255" transform="scale(1.2)" />

    <!-- Matrix L -->
    <text x="0" y="410" font-size="48" font-style="italic" font-weight="bold">L</text>
    <g transform="translate(40, 235)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
      <rect x="80" y="0" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="160" y="0" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="240" y="0" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="320" y="0" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="400" y="0" width="80" height="60" fill="#C65911" stroke="black" stroke-width="2" />
      <!-- Row 2 -->
      <rect x="0" y="60" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="80" y="60" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
      <rect x="160" y="60" width="80" height="60" fill="#C65911" stroke="black" stroke-width="2" />
      <rect x="240" y="60" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="320" y="60" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="400" y="60" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <!-- Row 3 -->
      <rect x="0" y="120" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="80" y="120" width="80" height="60" fill="#C65911" stroke="black" stroke-width="2" />
      <rect x="160" y="120" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
      <rect x="240" y="120" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="320" y="120" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="400" y="120" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <!-- Row 4 -->
      <rect x="0" y="180" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="80" y="180" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="160" y="180" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="240" y="180" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
      <rect x="320" y="180" width="80" height="60" fill="#C65911" stroke="black" stroke-width="2" />
      <rect x="400" y="180" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <!-- Row 5 -->
      <rect x="0" y="240" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="80" y="240" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="160" y="240" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="240" y="240" width="80" height="60" fill="#C65911" stroke="black" stroke-width="2" />
      <rect x="320" y="240" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
      <rect x="400" y="240" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <!-- Row 6 -->
      <rect x="0" y="300" width="80" height="60" fill="#C65911" stroke="black" stroke-width="2" />
      <rect x="80" y="300" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="160" y="300" width="80" height="60" fill="#FBE5D6" stroke="black" stroke-width="2" />
      <rect x="240" y="300" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="320" y="300" width="80" height="60" fill="#F4B084" stroke="black" stroke-width="2" />
      <rect x="400" y="300" width="80" height="60" fill="#833C0C" stroke="black" stroke-width="2" />
    </g>

    <!-- Blue X -->
    <use href="#blue-x" x="435" y="380" transform="scale(1.2)" />

    <!-- Vector Relevance -->
    <g transform="translate(440, 235)">
      <rect x="0" y="0" width="80" height="60" fill="#D9D9D9" stroke="black" stroke-width="2" />
      <rect x="0" y="60" width="80" height="60" fill="#BFBFBF" stroke="black" stroke-width="2" />
      <rect x="0" y="120" width="80" height="60" fill="#767171" stroke="black" stroke-width="2" />
      <rect x="0" y="180" width="80" height="60" fill="#767171" stroke="black" stroke-width="2" />
      <rect x="0" y="240" width="80" height="60" fill="#BFBFBF" stroke="black" stroke-width="2" />
      <rect x="0" y="300" width="80" height="60" fill="#E7E6E6" stroke="black" stroke-width="2" />
    </g>

  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5.0 -10.0 1692.0 734.0" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6F0FA"/>
      <stop offset="100%" stop-color="#F0F0F5"/>
    </linearGradient>
    <linearGradient id="step1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D6EAF8"/>
      <stop offset="100%" stop-color="#EBF5FB"/>
    </linearGradient>
    <linearGradient id="step2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D5F5E3"/>
      <stop offset="100%" stop-color="#EAFAF1"/>
    </linearGradient>
    <linearGradient id="step3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8DAEF"/>
      <stop offset="100%" stop-color="#F4ECF7"/>
    </linearGradient>
    <linearGradient id="photoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/> <!-- Sky -->
      <stop offset="40%" stop-color="#A0A0A0"/> <!-- Rocks -->
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrowNavy" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#00334E"/>
    </marker>
    <marker id="arrowTeal" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#004D40"/>
    </marker>
    <marker id="arrowPurple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#5B2C6F"/>
    </marker>
    <marker id="arrowSmall" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#2E4053"/>
    </marker>

    <!-- Reusable Symbols -->
    <symbol id="sphere" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="#B0B0B0" stroke="#666" stroke-width="2"/>
      <path d="M50,5 Q75,25 95,50 Q75,75 50,95 Q25,75 5,50 Q25,25 50,5" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
      <path d="M50,5 Q25,25 5,50 M50,95 Q75,75 95,50" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    </symbol>
    
    <symbol id="ramp" viewBox="0 0 100 100">
      <path d="M10,90 L40,20 L90,30 L60,100 Z" fill="#C0C0C0" stroke="#666" stroke-width="1"/>
      <path d="M10,90 L60,100 L60,105 L10,90" fill="#808080"/> <!-- Side shadow -->
    </symbol>
  </defs>

  <!-- 1. Background -->
  <rect width="1600" height="720" fill="url(#bgGrad)"/>
  
  <!-- Network Mesh Pattern (Abstract) -->
  <g opacity="0.1" stroke="#000" stroke-width="1" fill="none">
    <path d="M0,0 L100,50 L200,0 L50,100 Z M500,0 L600,100 L700,0 M1000,200 L1200,100 M200,500 L400,600"/>
    <circle cx="100" cy="50" r="5" fill="#333"/>
    <circle cx="200" cy="0" r="5" fill="#333"/>
    <circle cx="50" cy="100" r="5" fill="#333"/>
    <circle cx="500" cy="100" r="5" fill="#333"/>
    <circle cx="1000" cy="500" r="5" fill="#333"/>
  </g>

  <!-- 2. Main Title -->
  <text x="800" y="60" text-anchor="middle" font-size="52" font-weight="bold" fill="#001F2B" letter-spacing="1">WORLD MODEL: FROM STATIC 3D TO DYNAMIC VIDEO FLOW</text>

  <!-- 3. Main Container -->
  <rect x="50" y="90" width="1500" height="600" rx="30" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="2"/>

  <!-- 4. Step 1 Section (Top) -->
  <g transform="translate(70, 140)">
    <!-- Label Box -->
    <rect x="90" y="20" width="160" height="50" rx="10" fill="#2E86C1"/>
    <text x="170" y="55" text-anchor="middle" fill="white" font-weight="bold" font-size="28">STEP 1</text>
    
    <!-- Step Box -->
    <rect x="0" y="0" width="330" height="170" rx="20" fill="url(#step1Grad)"/>
    <text x="165" y="90" text-anchor="middle" fill="#001F2B" font-weight="bold" font-size="32">
      <tspan x="165" dy="0">COARSE 3D</tspan>
      <tspan x="165" dy="35">SANDBOX</tspan>
      <tspan x="165" dy="35">GENERATION</tspan>
    </text>
  </g>

  <!-- Step 1 Flow -->
  <g transform="translate(420, 140)">
    <!-- Input Text -->
    <text x="130" y="80" text-anchor="middle" font-size="28" font-weight="bold" fill="#000">Input Prompt</text>
    <text x="130" y="110" text-anchor="middle" font-size="24" font-family="serif" fill="#000">“A ball rolls down</text>
    <text x="130" y="135" text-anchor="middle" font-size="24" font-family="serif" fill="#000">a rocky ramp”</text>

    <!-- Arrow 1 -->
    <line x1="220" y1="90" x2="310" y2="90" stroke="#00334E" stroke-width="4" marker-end="url(#arrowNavy)"/>

    <!-- Center Box (Model) -->
    <rect x="320" y="20" width="380" height="170" rx="20" fill="#EBF5FB" stroke="#2E86C1" stroke-width="4"/>
    
    <!-- Icons inside Center Box -->
    <g transform="translate(360, 40)">
      <!-- Neural Net -->
      <g stroke="#001F2B" stroke-width="2" fill="none">
        <circle cx="20" cy="20" r="6"/><circle cx="20" cy="50" r="6"/><circle cx="20" cy="80" r="6"/>
        <circle cx="60" cy="10" r="6"/><circle cx="60" cy="40" r="6"/><circle cx="60" cy="70" r="6"/><circle cx="60" cy="100" r="6"/>
        <circle cx="100" cy="30" r="6"/><circle cx="100" cy="70" r="6"/>
        <line x1="20" y1="20" x2="60" y2="10"/><line x1="20" y1="20" x2="60" y2="40"/><line x1="20" y1="50" x2="60" y2="40"/><line x1="20" y1="80" x2="60" y2="100"/>
        <line x1="60" y1="40" x2="100" y2="30"/><line x1="60" y1="70" x2="100" y2="70"/>
      </g>
      <!-- Database -->
      <g transform="translate(140, 10)">
        <path d="M10,10 C10,5 50,5 50,10 L50,60 C50,65 10,65 10,60 Z" fill="none" stroke="#001F2B" stroke-width="2"/>
        <ellipse cx="30" cy="10" rx="20" ry="5" fill="none" stroke="#001F2B" stroke-width="2"/>
        <path d="M10,27 C10,32 50,32 50,27" fill="none" stroke="#001F2B" stroke-width="2"/>
        <path d="M10,44 C10,49 50,49 50,44" fill="none" stroke="#001F2B" stroke-width="2"/>
      </g>
      <!-- Cubes -->
      <g transform="translate(240, 10)">
        <path d="M15,0 L30,8 L15,16 L0,8 Z" fill="#D6EAF8" stroke="#001F2B" stroke-width="2"/>
        <path d="M0,8 L15,16 L15,32 L0,24 Z" fill="#AED6F1" stroke="#001F2B" stroke-width="2"/>
        <path d="M30,8 L30,24 L15,32 L15,16 Z" fill="#85C1E9" stroke="#001F2B" stroke-width="2"/>
        
        <g transform="translate(0, 25)">
           <path d="M15,0 L30,8 L15,16 L0,8 Z" fill="#D6EAF8" stroke="#001F2B" stroke-width="2"/>
           <path d="M0,8 L15,16 L15,32 L0,24 Z" fill="#2E86C1" stroke="#001F2B" stroke-width="2"/>
           <path d="M30,8 L30,24 L15,32 L15,16 Z" fill="#AED6F1" stroke="#001F2B" stroke-width="2"/>
        </g>
      </g>
    </g>
    <text x="510" y="130" text-anchor="middle" font-size="28" font-weight="bold" fill="#000">
        <tspan x="510" dy="0">Coarse 3D Scene</tspan>
        <tspan x="510" dy="30">Generation Model</tspan>
    </text>

    <!-- Arrow 2 -->
    <line x1="700" y1="90" x2="780" y2="90" stroke="#00334E" stroke-width="4" marker-end="url(#arrowNavy)"/>

    <!-- Right Box (Output) -->
    <rect x="780" y="20" width="420" height="170" rx="20" fill="#EBF5FB" stroke="#2E86C1" stroke-width="2"/>
    <g transform="translate(800, 40)">
        <!-- Wireframe Box -->
        <path d="M20,20 L100,20 L100,100 L20,100 Z M20,20 L50,0 L130,0 L130,80 L100,100 M130,0 L100,20" fill="none" stroke="#000" stroke-width="1"/>
        <circle cx="75" cy="70" r="25" fill="#999" stroke="#666"/>
        
        <!-- Sphere -->
        <use href="#sphere" x="180" y="30" width="60" height="60"/>
        
        <!-- Ramp -->
        <use href="#ramp" x="250" y="10" width="120" height="120"/>
    </g>
    <text x="990" y="155" text-anchor="middle" font-size="28" font-weight="bold" fill="#000">Coarse 3D Representation</text>
  </g>

  <!-- 5. Step 2 Section (Middle) -->
  <g transform="translate(70, 320)">
    <!-- Label Box -->
    <rect x="90" y="0" width="160" height="50" rx="10" fill="#27AE60"/>
    <text x="170" y="35" text-anchor="middle" fill="white" font-weight="bold" font-size="28">STEP 2</text>
    
    <!-- Step Box -->
    <rect x="0" y="0" width="330" height="170" rx="20" fill="url(#step2Grad)"/>
    <text x="165" y="70" text-anchor="middle" fill="#001F2B" font-weight="bold" font-size="32">
      <tspan x="165" dy="0">VLM-BASED</tspan>
      <tspan x="165" dy="35">PHYSICAL MOTION</tspan>
      <tspan x="165" dy="35">PREDICTION</tspan>
    </text>
  </g>

  <!-- Step 2 Flow -->
  <g transform="translate(420, 320)">
    <!-- Physics Text -->
    <g transform="translate(20, 20)">
        <text x="0" y="20" font-family="Times New Roman, serif" font-style="italic" font-size="24" fill="#000">
            f = ∫<tspan dy="5" font-size="14">t=1</tspan><tspan dy="-15" font-size="14">0</tspan><tspan dy="10" font-size="24"> </tspan>∂v
        </text>
        <path d="M85,15 L105,15" stroke="#000" stroke-width="1"/>
        <text x="110" y="20" font-family="Times New Roman, serif" font-style="italic" font-size="24" fill="#000">∂t</text>
        
        <text x="0" y="50" font-family="Times New Roman, serif" font-style="italic" font-size="24" fill="#000">
            ∂u
        </text>
        <path d="M0,55 L20,55" stroke="#000" stroke-width="1"/>
        <text x="22" y="60" font-family="Times New Roman, serif" font-style="italic" font-size="24" fill="#000">∂t</text>
        <text x="40" y="50" font-family="Times New Roman, serif" font-size="24" fill="#000">+</text>
        <text x="60" y="45" font-family="Times New Roman, serif" font-size="14" fill="#000">1</text>
        <line x1="58" y1="50" x2="72" y2="50" stroke="#000" stroke-width="1"/>
        <text x="75" y="50" font-family="Times New Roman, serif" font-size="14" fill="#000">2</text>
        <text x="85" y="50" font-family="Times New Roman, serif" font-style="italic" font-size="24" fill="#000">c<tspan dy="5" font-size="14">d</tspan><tspan dy="-5">v</tspan></text>

        <text x="0" y="80" font-family="Times New Roman, serif" font-style="italic" font-size="24" fill="#000">
            E = √<tspan font-family="Arial" font-style="normal"> </tspan>n² + h²
        </text>
        <path d="M25,70 L35,70 L35,85 L25,85 Z" fill="none" stroke="#000" stroke-width="1"/>
    </g>
    <text x="100" y="130" text-anchor="middle" font-size="26" fill="#000">
        <tspan x="100" dy="0">Physics Laws</tspan>
        <tspan x="100" dy="30">&amp; Constraints</tspan>
    </text>

    <!-- Arrow 1 -->
    <line x1="160" y1="80" x2="230" y2="80" stroke="#004D40" stroke-width="4" marker-end="url(#arrowTeal)"/>

    <!-- Center Box (VLM) -->
    <rect x="230" y="0" width="420" height="130" rx="20" fill="#E8F8F5" stroke="#16A085" stroke-width="4"/>
    
    <!-- Brain Icon -->
    <g transform="translate(280, 20) scale(0.6)">
        <path d="M50,100 C20,100 10,70 10,50 C10,20 30,0 60,0 C80,0 90,10 100,20 C110,10 130,0 150,0 C180,0 200,20 200,50 C200,70 190,100 160,100" fill="none" stroke="#004D40" stroke-width="5"/>
        <path d="M60,10 C60,30 80,30 80,50 M100,10 C100,30 120,30 120,50 M140,10 C140,30 160,30 160,50" fill="none" stroke="#004D40" stroke-width="3"/>
        <path d="M30,50 C30,70 50,70 50,90 M70,50 C70,70 90,70 90,90 M110,50 C110,70 130,70 130,90" fill="none" stroke="#004D40" stroke-width="3"/>
        <path d="M15,50 C15,30 30,20 50,20 M170,50 C170,30 185,20 200,20" fill="none" stroke="#004D40" stroke-width="3"/>
    </g>
    <text x="440" y="80" text-anchor="middle" font-size="48" font-weight="bold" fill="#004D40">VLM</text>
    <text x="520" y="40" font-size="24" fill="#000">
        <tspan x="520" dy="0">Physical</tspan>
        <tspan x="520" dy="25">Language</tspan>
        <tspan x="520" dy="25">Model</tspan>
    </text>

    <!-- Arrow 2 -->
    <line x1="650" y1="65" x2="720" y2="65" stroke="#004D40" stroke-width="4" marker-end="url(#arrowTeal)"/>

    <!-- Right Box (Output) -->
    <rect x="650" y="-10" width="500" height="190" rx="20" fill="#E8F8F5" stroke="#16A085" stroke-width="2"/>
    <text x="900" y="25" text-anchor="middle" font-size="28" font-weight="bold" fill="#000">Physical Motion Prediction</text>
    
    <g transform="translate(680, 40)">
        <!-- Sequence -->
        <g transform="translate(0,0)">
            <use href="#ramp" x="0" y="0" width="100" height="100"/>
            <use href="#sphere" x="20" y="20" width="40" height="40"/>
            <text x="50" y="120" text-anchor="middle" font-size="24">t=0</text>
        </g>
        <line x1="110" y1="50" x2="140" y2="50" stroke="#004D40" stroke-width="3" marker-end="url(#arrowSmall)"/>
        
        <g transform="translate(150,0)">
            <use href="#ramp" x="0" y="0" width="100" height="100"/>
            <use href="#sphere" x="30" y="30" width="40" height="40"/>
            <text x="50" y="120" text-anchor="middle" font-size="24">t=1</text>
        </g>
        <line x1="260" y1="50" x2="290" y2="50" stroke="#004D40" stroke-width="3" marker-end="url(#arrowSmall)"/>

        <g transform="translate(300,0)">
            <use href="#ramp" x="0" y="0" width="100" height="100"/>
            <use href="#sphere" x="40" y="40" width="40" height="40"/>
            <text x="50" y="120" text-anchor="middle" font-size="24">t=2</text>
        </g>
        <line x1="410" y1="50" x2="440" y2="50" stroke="#004D40" stroke-width="3" marker-end="url(#arrowSmall)"/>

        <g transform="translate(450,0)">
            <use href="#ramp" x="0" y="0" width="100" height="100"/>
            <use href="#sphere" x="50" y="50" width="40" height="40"/>
            <text x="50" y="120" text-anchor="middle" font-size="24">t=3</text>
        </g>
        <text x="560" y="60" font-size="30" font-weight="bold">...</text>
    </g>
    <text x="900" y="150" text-anchor="middle" font-size="26" fill="#000">4D Sequence (Time-Varying 3D)</text>
  </g>

  <!-- 6. Step 3 Section (Bottom) -->
  <g transform="translate(70, 510)">
    <!-- Label Box -->
    <rect x="90" y="20" width="160" height="50" rx="10" fill="#6C3483"/>
    <text x="170" y="55" text-anchor="middle" fill="white" font-weight="bold" font-size="28">STEP 3</text>
    
    <!-- Step Box -->
    <rect x="0" y="0" width="330" height="170" rx="20" fill="url(#step3Grad)"/>
    <text x="165" y="90" text-anchor="middle" fill="#000" font-weight="bold" font-size="32">
      <tspan x="165" dy="0">VIDEO DIFFUSION</tspan>
      <tspan x="165" dy="35">&amp; SYNTHESIS</tspan>
    </text>
  </g>

  <!-- Step 3 Flow -->
  <g transform="translate(420, 510)">
    <!-- Arrow 1 -->
    <line x1="0" y1="80" x2="210" y2="80" stroke="#5B2C6F" stroke-width="4" marker-end="url(#arrowPurple)"/>

    <!-- Center Box (Diffusion) -->
    <rect x="210" y="0" width="380" height="150" rx="20" fill="#E8DAEF" stroke="#6C3483" stroke-width="4"/>
    
    <!-- Cloud Icon -->
    <g transform="translate(240, 20) scale(0.8)">
        <path d="M30,60 C10,60 0,40 10,30 C10,10 30,0 50,10 C60,0 80,0 90,10 C110,0 130,10 130,30 C140,40 130,60 110,60" fill="none" stroke="#4A235A" stroke-width="4"/>
        <!-- Circuit lines -->
        <line x1="50" y1="60" x2="50" y2="90" stroke="#4A235A" stroke-width="3"/>
        <circle cx="50" cy="95" r="5" fill="none" stroke="#4A235A" stroke-width="3"/>
        <line x1="30" y1="70" x2="10" y2="80" stroke="#4A235A" stroke-width="3"/>
        <circle cx="5" cy="85" r="5" fill="none" stroke="#4A235A" stroke-width="3"/>
        <line x1="70" y1="70" x2="90" y2="80" stroke="#4A235A" stroke-width="3"/>
        <circle cx="95" cy="85" r="5" fill="none" stroke="#4A235A" stroke-width="3"/>
        <line x1="40" y1="90" x2="30" y2="110" stroke="#4A235A" stroke-width="3"/>
        <circle cx="25" cy="115" r="5" fill="none" stroke="#4A235A" stroke-width="3"/>
        <line x1="60" y1="90" x2="60" y2="110" stroke="#4A235A" stroke-width="3"/>
        <circle cx="60" cy="120" r="5" fill="none" stroke="#4A235A" stroke-width="3"/>
        <line x1="80" y1="90" x2="90" y2="110" stroke="#4A235A" stroke-width="3"/>
        <circle cx="95" cy="115" r="5" fill="none" stroke="#4A235A" stroke-width="3"/>
    </g>
    <text x="420" y="70" text-anchor="middle" font-size="36" font-weight="bold" fill="#000">
        <tspan x="420" dy="0">Video</tspan>
        <tspan x="420" dy="40">Diffusion</tspan>
    </text>
    <text x="400" y="190" text-anchor="middle" font-size="28" fill="#333">Conditioned on 4D Data</text>

    <!-- Arrow 2 -->
    <line x1="590" y1="80" x2="660" y2="80" stroke="#5B2C6F" stroke-width="4" marker-end="url(#arrowPurple)"/>

    <!-- Right Box (Output) -->
    <rect x="660" y="0" width="450" height="180" rx="20" fill="#FAE5D3" stroke="#A04000" stroke-width="4"/>
    
    <!-- Video Strip -->
    <g transform="translate(680, 10)">
        <!-- Frame 1 -->
        <rect x="0" y="0" width="140" height="140" fill="url(#photoGrad)"/>
        <path d="M0,0 L140,0 L140,140 L0,140 Z" fill="url(#photoGrad)"/>
        <path d="M0,140 L140,140 L140,100 L0,80 Z" fill="#606060"/> <!-- Rock texture -->
        <path d="M0,80 L140,0 L140,40 L0,140 Z" fill="#A0A0A0"/>
        <circle cx="70" cy="70" r="20" fill="#C0392B" stroke="#800000" stroke-width="2"/> <!-- Red Ball -->
        
        <!-- Frame 2 -->
        <g transform="translate(145, 0)">
            <rect x="0" y="0" width="140" height="140" fill="url(#photoGrad)"/>
            <path d="M0,140 L140,140 L140,100 L0,80 Z" fill="#606060"/>
            <path d="M0,80 L140,0 L140,40 L0,140 Z" fill="#A0A0A0"/>
            <circle cx="70" cy="70" r="20" fill="#C0392B" stroke="#800000" stroke-width="2"/>
            <!-- Motion Blur Trail -->
            <ellipse cx="50" cy="50" rx="30" ry="10" fill="#C0392B" opacity="0.3" transform="rotate(-20 50 50)"/>
        </g>
        
        <!-- Frame 3 -->
        <g transform="translate(290, 0)">
            <rect x="0" y="0" width="140" height="140" fill="url(#photoGrad)"/>
            <path d="M0,140 L140,140 L140,100 L0,80 Z" fill="#606060"/>
            <path d="M0,80 L140,0 L140,40 L0,140 Z" fill="#A0A0A0"/>
            <circle cx="70" cy="70" r="20" fill="#C0392B" stroke="#800000" stroke-width="2"/>
        </g>
    </g>
    <text x="885" y="170" text-anchor="middle" font-size="30" font-weight="bold" fill="#000">GENERATED HIGH-QUALITY VIDEO</text>
  </g>

  <!-- 7. Inter-Section Connectors (The "Snake") -->
  <!-- Step 1 to Step 2 -->
  <path d="M1360,280 L1360,300 Q1360,310 1350,310 L850,310 Q840,310 840,320 L840,335" fill="none" stroke="#00334E" stroke-width="4" marker-end="url(#arrowNavy)"/>
  
  <!-- Step 2 to Step 3 -->
  <path d="M880,430 L880,450 Q880,460 890,460 L800,460 Q810,460 810,470 L810,510" fill="none" stroke="#004D40" stroke-width="4" marker-end="url(#arrowTeal)"/>

  <!-- 8. Footer -->
  <text x="800" y="710" text-anchor="middle" font-size="28" font-style="italic" font-weight="bold" fill="#001F2B">Leveraging physical prediction and diffusion for realistic video creation.</text>

</svg>
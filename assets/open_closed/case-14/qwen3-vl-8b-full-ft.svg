<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1.0 9.0 1639.0 667.0" style="font-family: 'Times New Roman', serif; background-color: #f4f4f4;">
  <defs>
    <!-- Arrowheads -->
    <marker id="arrow-grey" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" fill="#666666">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" />
    </marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" fill="#9bc98a">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" />
    </marker>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" fill="#8da0cb">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" />
    </marker>
    <marker id="arrow-grey-dashed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" fill="#cccccc">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" />
    </marker>

    <!-- Icons -->
    <g id="icon-fire">
      <path d="M15,40 Q5,30 5,20 Q5,5 20,0 Q35,5 35,20 Q35,30 25,40 Q20,30 20,20 Q20,30 15,40 Z" fill="#ff4500" />
      <path d="M18,40 Q12,32 12,25 Q12,15 20,10 Q28,15 28,25 Q28,32 22,40 Z" fill="#ff8c00" />
      <path d="M20,40 Q18,35 18,30 Q18,25 20,20 Q22,25 22,30 Q22,35 20,40 Z" fill="#ffff00" />
    </g>

    <g id="icon-snowflake">
      <g stroke="#87ceeb" stroke-width="3" stroke-linecap="round">
        <line x1="20" y1="0" x2="20" y2="40" />
        <line x1="3" y1="10" x2="37" y2="30" />
        <line x1="3" y1="30" x2="37" y2="10" />
        <!-- decorative ends -->
        <path d="M15,5 L20,0 L25,5" fill="none" />
        <path d="M15,35 L20,40 L25,35" fill="none" />
        <path d="M6,14 L3,10 L10,10" fill="none" />
        <path d="M34,14 L37,10 L30,10" fill="none" />
        <path d="M6,26 L3,30 L10,30" fill="none" />
        <path d="M34,26 L37,30 L30,30" fill="none" />
      </g>
    </g>

    <!-- Reusable Graph Cluster -->
    <g id="mini-graph">
      <line x1="10" y1="10" x2="30" y2="20" stroke="black" stroke-width="1.5" />
      <line x1="30" y1="20" x2="50" y2="10" stroke="black" stroke-width="1.5" />
      <line x1="30" y1="20" x2="30" y2="40" stroke="black" stroke-width="1.5" />
      <line x1="30" y1="40" x2="10" y2="50" stroke="black" stroke-width="1.5" />
      <line x1="30" y1="40" x2="50" y2="50" stroke="black" stroke-width="1.5" />
      <line x1="10" y1="50" x2="10" y2="30" stroke="black" stroke-width="1.5" />
      <circle cx="10" cy="10" r="4" fill="#ff6347" stroke="black" stroke-width="1"/>
      <circle cx="50" cy="10" r="4" fill="#ff6347" stroke="black" stroke-width="1"/>
      <circle cx="10" cy="50" r="4" fill="#ff6347" stroke="black" stroke-width="1"/>
      <circle cx="50" cy="50" r="4" fill="#ff6347" stroke="black" stroke-width="1"/>
      <circle cx="30" cy="20" r="8" fill="#ffa500" stroke="black" stroke-width="1"/>
      <circle cx="30" cy="40" r="6" fill="#ff6347" stroke="black" stroke-width="1"/>
    </g>

    <g id="mini-gear">
      <path d="M20,0 L24,5 L30,5 L32,10 L28,15 L30,20 L36,22 L36,28 L30,30 L28,35 L32,40 L30,45 L24,45 L20,50 L16,45 L10,45 L8,40 L12,35 L10,30 L4,28 L4,22 L10,20 L12,15 L8,10 L10,5 L16,5 Z" fill="none" stroke="#dda0dd" stroke-width="3" />
      <circle cx="20" cy="25" r="8" fill="none" stroke="#dda0dd" stroke-width="2" />
    </g>
  </defs>

  <!-- ================= LEFT PANEL: DyFlow Framework ================= -->
  <rect x="5" y="15" width="1060" height="520" rx="15" fill="#f0f5eb" stroke="#808080" stroke-width="4" />
  
  <!-- Title -->
  <rect x="340" y="15" width="400" height="60" fill="#fff2cc" stroke="#555555" stroke-width="3" />
  <text x="540" y="60" font-size="44" font-weight="bold" text-anchor="middle" fill="black">DyFlow Framework</text>

  <!-- Task p -->
  <g transform="translate(100, 80)">
    <polygon points="20,0 180,0 160,100 -20,100" fill="#cce5ff" stroke="black" stroke-width="4" />
    <text x="80" y="65" font-size="52" text-anchor="middle" fill="black">Task <tspan font-style="italic">p</tspan></text>
  </g>

  <!-- Designer -->
  <g transform="translate(530, 80)">
    <rect x="0" y="0" width="340" height="70" rx="10" fill="#ffdbcb" stroke="black" stroke-width="4" />
    <use href="#icon-fire" x="10" y="10" transform="scale(1.5)" />
    <text x="170" y="55" font-size="52" text-anchor="middle" fill="black">Designer</text>
    <use href="#icon-snowflake" x="260" y="10" transform="scale(1.5)" />
  </g>

  <!-- Arrows Task <-> Designer -->
  <line x1="260" y1="110" x2="520" y2="110" stroke="#666666" stroke-width="5" marker-end="url(#arrow-grey)" />
  <line x1="530" y1="140" x2="270" y2="140" stroke="#666666" stroke-width="5" marker-end="url(#arrow-grey)" />
  <text x="290" y="150" font-size="40" font-weight="bold" fill="black">Replan</text>

  <!-- Arrow Designer -> Subgraph -->
  <line x1="695" y1="135" x2="695" y2="180" stroke="#666666" stroke-width="5" marker-end="url(#arrow-grey)" />

  <!-- Subgraph Gt -->
  <g transform="translate(300, 170)">
    <rect x="0" y="0" width="700" height="360" rx="20" fill="#e2efda" stroke="black" stroke-width="4" />
    <line x1="0" y1="80" x2="700" y2="80" stroke="black" stroke-width="4" />
    <text x="350" y="55" font-size="48" font-weight="bold" text-anchor="middle" fill="black">Subgraph <tspan font-style="italic">G<tspan dy="10" font-size="30">t</tspan></tspan></text>

    <!-- Op Sequence -->
    <g transform="translate(50, 80)">
      <rect x="0" y="0" width="600" height="150" rx="5" fill="#faf0e6" stroke="black" stroke-width="4" />
      <!-- Header -->
      <rect x="200" y="-20" width="240" height="50" fill="#faf0e6" stroke="black" stroke-width="4" />
      <text x="320" y="15" font-size="36" font-weight="bold" text-anchor="middle" fill="black">Op Sequence</text>
      
      <!-- Content -->
      <g transform="translate(20, 30)">
        <!-- Nodes -->
        <circle cx="40" cy="80" r="25" fill="#dbebf9" stroke="#4a7ebb" stroke-width="3" />
        <rect x="160" y="60" width="100" height="40" rx="10" fill="#dcedc8" stroke="#7cb342" stroke-width="3" />
        <circle cx="290" cy="60" r="25" fill="#dbebf9" stroke="#4a7ebb" stroke-width="3" />
        <circle cx="400" cy="60" r="25" fill="#dbebf9" stroke="#4a7ebb" stroke-width="3" />
        <circle cx="400" cy="110" r="25" fill="#dbebf9" stroke="#4a7ebb" stroke-width="3" />
        <rect x="500" y="40" width="50" height="50" rx="10" fill="#d1d0e0" stroke="#5c5aa0" stroke-width="3" />
        
        <!-- Triangles -->
        <path d="M400,20 L425,0 L450,20 Z" fill="#f4cccc" stroke="#a61c00" stroke-width="3" />

        <!-- Edges -->
        <path d="M40,55 L40,-20 L200,-20 L200,55" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        <line x1="65" y1="80" x2="155" y2="80" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        <line x1="260" y1="60" x2="280" y2="60" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        <path d="M315,60 L380,60 L380,35" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        <path d="M380,60 L380,110 L400,110" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        <path d="M375,110 L400,110 L400,95" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        <path d="M380,110 L380,135 L400,135" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow-grey)" />
        
        <!-- Vertical Divider -->
        <line x1="320" y1="0" x2="320" y2="150" stroke="black" stroke-width="3" />
      </g>
      <!-- Ellipsis -->
      <g transform="translate(580, 20)">
        <rect width="6" height="6" fill="black" />
        <rect y="15" width="6" height="6" fill="black" />
        <rect y="30" width="6" height="6" fill="black" />
        <rect y="45" width="6" height="6" fill="black" />
        <rect y="60" width="6" height="6" fill="black" />
        <rect y="75" width="6" height="6" fill="black" />
        <rect y="90" width="6" height="6" fill="black" />
        <rect y="105" width="6" height="6" fill="black" />
      </g>
    </g>

    <!-- Op Template -->
    <g transform="translate(50, 240)">
      <rect x="0" y="0" width="600" height="180" rx="5" fill="#e2efda" stroke="black" stroke-width="4" />
      <rect x="50" y="-15" width="260" height="45" fill="#e2efda" stroke="black" stroke-width="4" />
      <text x="180" y="18" font-size="36" font-weight="bold" text-anchor="middle" fill="black">Op Template</text>
      
      <rect x="20" y="40" width="320" height="120" rx="10" fill="#dbebf9" stroke="black" stroke-width="3" />
      <!-- Shapes inside Template -->
      <circle cx="60" cy="90" r="25" fill="white" stroke="black" stroke-width="4" />
      <path d="M120,90 L140,60 L160,90 Z" fill="white" stroke="black" stroke-width="4" />
      <rect x="180" y="65" width="60" height="50" rx="10" fill="white" stroke="black" stroke-width="4" />
      <path d="M260,90 L280,60 L300,90 Z" fill="white" stroke="black" stroke-width="4" />
      <rect x="320" y="65" width="50" height="50" rx="10" fill="white" stroke="black" stroke-width="4" />
      <text x="180" y="140" font-size="40" font-weight="bold" text-anchor="middle">......</text>
    </g>

    <!-- Op Instance -->
    <g transform="translate(400, 240)">
      <rect x="0" y="0" width="280" height="180" rx="5" fill="#e2efda" stroke="black" stroke-width="4" />
      <rect x="20" y="-15" width="220" height="45" fill="#e2efda" stroke="black" stroke-width="4" />
      <text x="130" y="18" font-size="36" font-weight="bold" text-anchor="middle" fill="black">Op Instance</text>
      
      <rect x="10" y="40" width="260" height="120" rx="10" fill="#e0f2f1" stroke="black" stroke-width="3" />
      <!-- Filled Shapes -->
      <circle cx="50" cy="90" r="25" fill="#dbebf9" stroke="#4a7ebb" stroke-width="3" />
      <rect x="90" y="65" width="90" height="50" rx="10" fill="#dcedc8" stroke="#7cb342" stroke-width="3" />
      <path d="M190,90 L210,60 L230,90 Z" fill="#f4cccc" stroke="#a61c00" stroke-width="3" />
      <rect x="240" y="65" width="50" height="50" rx="10" fill="#d1d0e0" stroke="#5c5aa0" stroke-width="3" />
      <text x="140" y="140" font-size="40" font-weight="bold" text-anchor="middle">......</text>
    </g>

    <!-- Connection Template -> Instance -->
    <line x1="370" y1="330" x2="395" y2="330" stroke="#cccccc" stroke-width="5" stroke-dasharray="10,5" marker-end="url(#arrow-grey-dashed)" />
    <text x="410" y="320" font-size="48" font-style="italic">ϕ</text>
    <text x="410" y="370" font-size="48" font-style="italic">ψ</text>
    <line x1="435" y1="330" x2="460" y2="330" stroke="#cccccc" stroke-width="5" stroke-dasharray="10,5" marker-end="url(#arrow-grey-dashed)" />

    <!-- Magnifying Glass -->
    <g transform="translate(250, 220)">
      <circle cx="20" cy="20" r="20" fill="#a0d4fa" stroke="#333" stroke-width="4" />
      <circle cx="20" cy="20" r="14" fill="#dbebf9" stroke="#888" stroke-width="2" />
      <line x1="35" y1="35" x2="60" y2="60" stroke="#333" stroke-width="8" stroke-linecap="round" />
      <line x1="35" y1="35" x2="60" y2="60" stroke="#888" stroke-width="8" stroke-linecap="round" />
      <!-- Dashed arrow from glass -->
      <path d="M40,40 Q60,60 80,80" fill="none" stroke="#8da0cb" stroke-width="6" stroke-dasharray="10,5" marker-end="url(#arrow-blue)" />
    </g>

  </g>

  <!-- Left Sidebar -->
  <g transform="translate(80, 190)">
    <!-- Summary -->
    <rect x="0" y="0" width="80" height="170" rx="10" fill="#fff9c4" stroke="black" stroke-width="4" />
    <text x="40" y="85" font-size="44" font-weight="bold" text-anchor="middle" transform="rotate(-90, 40, 85)">Summary</text>
    
    <!-- State -->
    <rect x="0" y="200" width="80" height="170" rx="10" fill="#f0f4c3" stroke="black" stroke-width="4" />
    <text x="40" y="285" font-size="44" font-weight="bold" text-anchor="middle" transform="rotate(-90, 40, 285)">State <tspan font-style="italic">s<tspan dy="5" font-size="30">t</tspan></tspan></text>

    <!-- Vertical Text -->
    <text x="-375" y="-10" font-size="44" font-weight="bold" text-anchor="middle" transform="rotate(-90)">Summarize <tspan font-style="italic">f</tspan></text>
    
    <!-- Arrows -->
    <line x1="40" y1="200" x2="40" y2="180" stroke="#666666" stroke-width="4" marker-end="url(#arrow-grey)" />
    <path d="M40,170 Q40,100 150,100" fill="none" stroke="#9bc98a" stroke-width="6" marker-end="url(#arrow-green)" />
    <path d="M150,180 Q40,180 40,290" fill="none" stroke="#9bc98a" stroke-width="6" marker-end="url(#arrow-green)" />
    <line x1="220" y1="385" x2="80" y2="385" stroke="#666666" stroke-width="4" marker-end="url(#arrow-grey)" />
    <text x="130" y="415" font-size="40" font-weight="bold" text-anchor="middle">Save</text>

    <!-- Iterate Loop -->
    <g transform="translate(100, 180)">
      <path d="M100,0 A70,70 0 1,1 100,100" fill="none" stroke="#c5e1c5" stroke-width="15" />
      <path d="M100,0 A70,70 0 1,1 100,100" fill="none" stroke="#9bc98a" stroke-width="4" marker-end="url(#arrow-green)" />
      <text x="100" y="55" font-size="36" font-weight="bold" text-anchor="middle">Iterate</text>
    </g>
  </g>

  <!-- ================= RIGHT PANEL: Training Loop ================= -->
  <rect x="1090" y="15" width="505" height="520" rx="15" fill="#fbf8f7" stroke="#808080" stroke-width="4" />

  <!-- Expert -->
  <g transform="translate(1110, 40)">
    <rect x="0" y="0" width="90" height="180" rx="10" fill="#bdd7ee" stroke="black" stroke-width="4" />
    <text x="45" y="90" font-size="44" font-weight="bold" text-anchor="middle" transform="rotate(-90, 45, 90)">Expert</text>
    <use href="#icon-snowflake" x="25" y="130" />
  </g>

  <!-- Tasks -->
  <g transform="translate(1390, 40)">
    <path d="M10,0 L220,0 A20,40 0 0,1 220,80 L10,80 A20,40 0 0,1 10,0 Z" fill="#ffe699" stroke="black" stroke-width="4" />
    <ellipse cx="220" cy="40" rx="20" ry="40" fill="#ffe699" stroke="black" stroke-width="4" />
    <text x="115" y="55" font-size="44" text-anchor="middle" fill="black">Tasks <tspan font-family="cursive" font-weight="bold">P</tspan></text>
  </g>

  <!-- Sample Arrow -->
  <line x1="1390" y1="75" x2="1170" y2="75" stroke="#666666" stroke-width="4" marker-end="url(#arrow-grey)" />
  <text x="1280" y="65" font-size="40" font-weight="bold" text-anchor="middle">Sample</text>

  <!-- Expert Trajectories -->
  <g transform="translate(1240, 135)">
    <text x="200" y="-10" font-size="36" text-anchor="middle">Expert Trajectories</text>
    <rect x="0" y="0" width="340" height="90" rx="10" fill="#ffdbcb" stroke="black" stroke-width="4" />
    <g transform="translate(10, 10)">
      <use href="#mini-graph" transform="scale(1.5)" />
      <use href="#mini-gear" x="60" y="10" transform="scale(1.2)" />
      <use href="#mini-graph" x="130" transform="scale(1.5)" />
      <use href="#mini-gear" x="190" y="10" transform="scale(1.2)" />
    </g>
    <line x1="250" y1="45" x2="330" y2="45" stroke="black" stroke-width="4" stroke-dasharray="8,8" />
  </g>

  <!-- Arrow Expert -> Traj -->
  <line x1="1170" y1="180" x2="1230" y2="180" stroke="#666666" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#arrow-grey)" />

  <!-- Distillation -->
  <text x="1260" y="250" font-size="44" font-weight="bold" text-anchor="middle">Distillation</text>
  <text x="1480" y="250" font-size="56" font-family="cursive">L<tspan dy="10" font-size="36">SFT</tspan></text>
  
  <!-- Dashed Arrow Traj -> DyPlanner -->
  <line x1="1410" y1="205" x2="1410" y2="270" stroke="#cccccc" stroke-width="4" stroke-dasharray="8,8" marker-end="url(#arrow-grey-dashed)" />

  <!-- DyPlanner -->
  <g transform="translate(1110, 270)">
    <rect x="0" y="0" width="450" height="70" rx="10" fill="#ffdbcb" stroke="black" stroke-width="4" />
    <use href="#icon-fire" x="20" y="10" transform="scale(1.5)" />
    <text x="225" y="50" font-size="52" text-anchor="middle" fill="black">DyPlanner</text>
  </g>

  <!-- Self-play Loop -->
  <g transform="translate(1230, 360)">
    <path d="M100,0 A90,90 0 1,1 100,140" fill="none" stroke="#c5e1c5" stroke-width="15" />
    <path d="M100,0 A90,90 0 1,1 100,140" fill="none" stroke="#9bc98a" stroke-width="4" marker-end="url(#arrow-green)" />
    <text x="100" y="50" font-size="28" font-weight="bold" text-anchor="middle">Self-play Preference</text>
    <text x="100" y="80" font-size="28" font-weight="bold" text-anchor="middle">Optimization</text>
  </g>

  <!-- Generate Arrow -->
  <line x1="1190" y1="310" x2="1190" y2="440" stroke="#666666" stroke-width="4" marker-end="url(#arrow-grey)" />
  <text x="1170" y="420" font-size="44" font-weight="bold" text-anchor="middle" transform="rotate(-90, 1170, 420)">Generate</text>

  <!-- Self-generate Trajectories -->
  <g transform="translate(1095, 440)">
    <rect x="0" y="0" width="230" height="130" rx="10" fill="#fad9d5" stroke="black" stroke-width="4" />
    <text x="115" y="50" font-size="44" text-anchor="middle">Self-generate</text>
    <text x="115" y="110" font-size="44" text-anchor="middle">Trajectories</text>
  </g>

  <!-- Execution Arrow -->
  <line x1="1280" y1="490" x2="1390" y2="490" stroke="#666666" stroke-width="4" marker-end="url(#arrow-grey)" />
  <text x="1335" y="515" font-size="36" font-weight="bold" text-anchor="middle">Execution</text>

  <!-- Comparison Box -->
  <g transform="translate(1390, 445)">
    <rect x="0" y="0" width="200" height="130" rx="5" fill="#fad9d5" stroke="black" stroke-width="3" />
    <!-- Top Row -->
    <rect x="5" y="5" width="85" height="55" fill="#f0f0f0" stroke="#666" stroke-dasharray="3,3" />
    <use href="#mini-graph" x="10" y="10" transform="scale(0.8)" />
    <use href="#mini-gear" x="50" y="10" transform="scale(0.8)" />
    
    <rect x="95" y="5" width="85" height="55" fill="#f0f0f0" stroke="#666" stroke-dasharray="3,3" />
    <use href="#mini-graph" x="100" y="10" transform="scale(0.8)" />
    <use href="#mini-gear" x="140" y="10" transform="scale(0.8)" />
    
    <circle cx="180" cy="32" r="15" fill="#27ae60" />
    <path d="M172,32 L178,38 L188,26" fill="none" stroke="white" stroke-width="3" />

    <!-- Bottom Row -->
    <rect x="5" y="65" width="85" height="55" fill="#fff9c4" stroke="#d4a017" stroke-dasharray="3,3" />
    <use href="#mini-graph" x="10" y="70" transform="scale(0.8)" />
    <use href="#mini-gear" x="50" y="70" transform="scale(0.8)" />
    
    <rect x="95" y="65" width="85" height="55" fill="#fff9c4" stroke="#d4a017" stroke-dasharray="3,3" />
    <use href="#mini-graph" x="100" y="70" transform="scale(0.8)" />
    <use href="#mini-gear" x="140" y="70" transform="scale(0.8)" />
    
    <circle cx="180" cy="92" r="15" fill="#c0392b" />
    <path d="M175,87 L185,97 M185,87 L175,97" stroke="white" stroke-width="3" />
  </g>

  <!-- KTO Loss Arrow -->
  <line x1="1490" y1="445" x2="1490" y2="310" stroke="#666666" stroke-width="4" marker-end="url(#arrow-grey)" />
  <text x="1490" y="410" font-size="60" font-family="cursive" text-anchor="middle">L<tspan dy="10" font-size="40">KTO</tspan></text>

  <!-- Dotted Feedback Loop -->
  <path d="M1110,295 Q1000,295 1000,200 Q1000,110 870,110" fill="none" stroke="black" stroke-width="4" stroke-dasharray="6,4" marker-end="url(#arrow-grey)" />
  <path d="M1110,295 Q1000,295 1000,300 Q1000,380 870,380" fill="none" stroke="black" stroke-width="4" stroke-dasharray="6,4" marker-end="url(#arrow-grey)" />

</svg>
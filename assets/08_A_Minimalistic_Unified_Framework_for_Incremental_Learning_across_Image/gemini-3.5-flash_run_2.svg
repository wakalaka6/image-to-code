<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#000" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#70ad47" />
    </marker>

    <!-- Stylized Bear Image Card -->
    <g id="bear-card">
      <!-- Sky -->
      <rect x="0" y="0" width="75" height="60" fill="#8faadc" />
      <!-- City Skyline (gray blocks in background) -->
      <rect x="2" y="20" width="8" height="40" fill="#7f7f7f" />
      <rect x="10" y="28" width="10" height="32" fill="#a6a6a6" />
      <rect x="20" y="15" width="12" height="45" fill="#d9d9d9" />
      <!-- Water / Ground -->
      <rect x="0" y="42" width="75" height="18" fill="#2f5597" />
      <ellipse cx="45" cy="48" rx="25" ry="8" fill="#70ad47" />
      <!-- Bear Body -->
      <ellipse cx="48" cy="43" rx="14" ry="9" fill="#833c0c" />
      <!-- Bear Head -->
      <ellipse cx="35" cy="39" rx="7" ry="6" fill="#833c0c" />
      <!-- Bear Ears -->
      <circle cx="33" cy="33" r="2" fill="#833c0c" />
      <!-- Bear Legs -->
      <rect x="39" y="47" width="3" height="8" fill="#5c2a08" />
      <rect x="44" y="48" width="3" height="8" fill="#5c2a08" />
      <rect x="50" y="48" width="3" height="8" fill="#5c2a08" />
      <rect x="55" y="47" width="3" height="8" fill="#5c2a08" />
      <!-- Little background bear -->
      <ellipse cx="68" cy="41" rx="7" ry="5" fill="#a0522d" />
      <ellipse cx="61" cy="39" rx="4" ry="3" fill="#a0522d" />
    </g>

    <!-- Rain Pattern for Input Image -->
    <pattern id="rain" width="15" height="15" patternUnits="userSpaceOnUse" patternTransform="rotate(70)">
      <line x1="0" y1="0" x2="0" y2="15" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" />
    </pattern>
  </defs>

  <!-- ================= BACKGROUND PANELS ================= -->
  <!-- Panel (a) -->
  <rect x="5" y="5" width="990" height="295" fill="#f2f2f2" rx="4" />
  <!-- Panel (b) -->
  <rect x="5" y="305" width="492" height="250" fill="#fbe9db" rx="4" />
  <!-- Panel (c) -->
  <rect x="503" y="305" width="492" height="250" fill="#e2e7f6" rx="4" />

  <!-- ================= PANEL (a) Overall MINI Architecture ================= -->
  <text x="15" y="35" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#000">(a) Overall MINI Architecture</text>

  <!-- Input Image Stack -->
  <use href="#bear-card" x="190" y="115" />
  <use href="#bear-card" x="200" y="125" />
  <use href="#bear-card" x="210" y="135" />
  <!-- Rain overlay on the front card -->
  <rect x="210" y="135" width="75" height="60" fill="url(#rain)" pointer-events="none" />
  <rect x="210" y="135" width="75" height="60" fill="none" stroke="#595959" stroke-width="1" />
  <text x="247" y="215" font-family="Georgia, serif" font-size="16" text-anchor="middle">input <tspan font-style="italic">x</tspan></text>

  <!-- Query Function Box -->
  <rect x="285" y="40" width="155" height="32" rx="6" fill="#e2f0d9" stroke="#385723" stroke-width="1.5" />
  <text x="362.5" y="61" font-family="Georgia, serif" font-size="14" text-anchor="middle">Query function <tspan font-style="italic">q</tspan>(·)</text>

  <!-- Backbone Dashed Box -->
  <rect x="382" y="120" width="235" height="125" rx="15" fill="none" stroke="#2f5597" stroke-width="2" stroke-dasharray="6,6" />
  <text x="500" y="263" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">Any backbone</text>
  <text x="500" y="281" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">with MINI-Conv</text>

  <!-- Backbone Hourglass (U-Net representation) -->
  <path d="M 395,138 L 490,163 L 490,203 L 395,228 Z" fill="none" stroke="#2f5597" stroke-width="1.5" />
  <path d="M 502,163 L 597,138 L 597,228 L 502,203 Z" fill="none" stroke="#2f5597" stroke-width="1.5" />

  <!-- Left side bars (decreasing) -->
  <!-- Bar 1 -->
  <rect x="402" y="142" width="8" height="18" fill="#ffd966" />
  <rect x="402" y="160" width="8" height="28" fill="#f6b26b" />
  <rect x="402" y="188" width="8" height="34" fill="#4f81bd" />
  <!-- Bar 2 -->
  <rect x="420" y="147" width="8" height="16" fill="#ffd966" />
  <rect x="420" y="163" width="8" height="24" fill="#f6b26b" />
  <rect x="420" y="187" width="8" height="30" fill="#4f81bd" />
  <!-- Bar 3 -->
  <rect x="438" y="152" width="8" height="14" fill="#ffd966" />
  <rect x="438" y="166" width="8" height="20" fill="#f6b26b" />
  <rect x="438" y="186" width="8" height="26" fill="#4f81bd" />
  <!-- Bar 4 -->
  <rect x="456" y="157" width="8" height="12" fill="#ffd966" />
  <rect x="456" y="169" width="8" height="16" fill="#f6b26b" />
  <rect x="456" y="185" width="8" height="22" fill="#4f81bd" />
  <!-- Bar 5 -->
  <rect x="474" y="161" width="8" height="9" fill="#ffd966" />
  <rect x="474" y="170" width="8" height="13" fill="#f6b26b" />
  <rect x="474" y="183" width="8" height="18" fill="#4f81bd" />

  <!-- Right side bars (increasing) -->
  <!-- Bar 5 -->
  <rect x="518" y="161" width="8" height="9" fill="#ffd966" />
  <rect x="518" y="170" width="8" height="13" fill="#f6b26b" />
  <rect x="518" y="183" width="8" height="18" fill="#4f81bd" />
  <!-- Bar 4 -->
  <rect x="536" y="157" width="8" height="12" fill="#ffd966" />
  <rect x="536" y="169" width="8" height="16" fill="#f6b26b" />
  <rect x="536" y="185" width="8" height="22" fill="#4f81bd" />
  <!-- Bar 3 -->
  <rect x="554" y="152" width="8" height="14" fill="#ffd966" />
  <rect x="554" y="166" width="8" height="20" fill="#f6b26b" />
  <rect x="554" y="186" width="8" height="26" fill="#4f81bd" />
  <!-- Bar 2 -->
  <rect x="572" y="147" width="8" height="16" fill="#ffd966" />
  <rect x="572" y="163" width="8" height="24" fill="#f6b26b" />
  <rect x="572" y="187" width="8" height="30" fill="#4f81bd" />
  <!-- Bar 1 -->
  <rect x="590" y="142" width="8" height="18" fill="#ffd966" />
  <rect x="590" y="160" width="8" height="28" fill="#f6b26b" />
  <rect x="590" y="188" width="8" height="34" fill="#4f81bd" />

  <!-- Output Image Stack -->
  <use href="#bear-card" x="710" y="115" />
  <use href="#bear-card" x="720" y="125" />
  <use href="#bear-card" x="730" y="135" />
  <rect x="730" y="135" width="75" height="60" fill="none" stroke="#595959" stroke-width="1" />
  <text x="767" y="215" font-family="Georgia, serif" font-size="16" text-anchor="middle">output <tspan font-style="italic">y</tspan></text>

  <!-- Panel (a) Connections -->
  <path d="M 228,115 L 228,56 L 280,56" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 440,56 L 500,56 L 500,115" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 287,170 L 377,170" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 617,170 L 705,170" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />



  <text x="15" y="335" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#000">(b) MINI-Conv</text>

  <!-- Input q(x) -->
  <text x="30" y="453" font-family="Georgia, serif" font-size="18" font-style="italic">q(x)</text>

  <!-- Bias Embeddings Box -->
  <rect x="155" y="335" width="72" height="45" rx="5" fill="none" stroke="#0070c0" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="191" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">bias embeddings</text>
  <!-- Slices -->
  <rect x="191" y="343" width="24" height="30" fill="#4f81bd" stroke="#2f5597" stroke-width="0.5" rx="1" />
  <rect x="184" y="346" width="24" height="30" fill="#ffd966" stroke="#d6ad1c" stroke-width="0.5" rx="1" />
  <rect x="177" y="349" width="24" height="30" fill="#f6b26b" stroke="#e28a2b" stroke-width="0.5" rx="1" />
  <rect x="170" y="352" width="24" height="30" fill="#a9d18e" stroke="#70ad47" stroke-width="0.5" rx="1" />

  <!-- Weight Embeddings Box -->
  <rect x="155" y="415" width="72" height="65" rx="5" fill="none" stroke="#0070c0" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="191" y="493" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">weight embeddings</text>
  <!-- Slices -->
  <rect x="190" y="421" width="26" height="36" fill="#4f81bd" stroke="#2f5597" stroke-width="0.5" rx="1" />
  <rect x="183" y="425" width="26" height="36" fill="#c55a11" stroke="#833c0c" stroke-width="0.5" rx="1" />
  <rect x="176" y="429" width="26" height="36" fill="#e28a2b" stroke="#b25900" stroke-width="0.5" rx="1" />
  <rect x="169" y="433" width="26" height="36" fill="#f6b26b" stroke="#e28a2b" stroke-width="0.5" rx="1" />
  <rect x="162" y="437" width="26" height="36" fill="#ffd966" stroke="#d6ad1c" stroke-width="0.5" rx="1" />
  <rect x="155" y="441" width="26" height="36" fill="#a9d18e" stroke="#70ad47" stroke-width="0.5" rx="1" />

  <!-- Blue 3D Block (Upper) -->
  <rect x="265" y="345" width="10" height="30" fill="#4f81bd" />
  <polygon points="265,345 271,339 281,339 275,345" fill="#7fa9dd" />
  <polygon points="275,345 281,339 281,369 275,375" fill="#2f5597" />
  <path d="M 265,375 L 265,345 L 271,339 L 281,339 L 281,369 L 275,375 Z M 275,345 L 275,375 M 275,345 L 281,339 M 265,345 L 275,345" fill="none" stroke="#1f3864" stroke-width="1" />

  <!-- Blue 3D Block (Lower) -->
  <rect x="265" y="425" width="12" height="45" fill="#4f81bd" />
  <polygon points="265,425 272,418 284,418 277,425" fill="#7fa9dd" />
  <polygon points="277,425 284,418 284,463 277,470" fill="#2f5597" />
  <path d="M 265,470 L 265,425 L 272,418 L 284,418 L 284,463 L 277,470 Z M 277,425 L 277,470 M 277,425 L 284,418 M 265,425 L 277,425" fill="none" stroke="#1f3864" stroke-width="1" />

  <!-- Circles -->
  <!-- R (Reshape) -->
  <circle cx="322" cy="448" r="13" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="322" y="453" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle">R</text>

  <!-- * (Convolution) -->
  <circle cx="378" cy="448" r="13" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="378" y="456" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle">*</text>

  <!-- ⊕ (Addition) -->
  <circle cx="422" cy="448" r="13" fill="#fff" stroke="#000" stroke-width="1.5" />
  <line x1="415" y1="448" x2="429" y2="448" stroke="#000" stroke-width="1.5" />
  <line x1="422" y1="441" x2="422" y2="455" stroke="#000" stroke-width="1.5" />

  <!-- Hidden State h -->
  <text x="50" y="520" font-family="Georgia, serif" font-size="18" font-style="italic">h</text>
  <text x="50" y="540" font-family="Arial, sans-serif" font-size="13" fill="#333">hidden state</text>

  <!-- Output h' -->
  <text x="472" y="453" font-family="Georgia, serif" font-size="18" font-style="italic">h'</text>

  <!-- Panel (b) Connections -->
  <path d="M 65,448 L 150,448" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 105,448 L 105,358 L 150,358" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 227,358 L 260,358" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 227,448 L 260,448" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 281,358 L 422,358 L 422,430" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 284,448 L 304,448" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 335,448 L 360,448" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 391,448 L 404,448" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 435,448 L 464,448" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 65,515 L 378,515 L 378,466" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Panel (b) Legend -->
  <!-- R Legend -->
  <circle cx="235" cy="520" r="7" fill="none" stroke="#000" stroke-width="1" />
  <text x="235" y="524" font-family="Georgia, serif" font-size="10" text-anchor="middle" font-weight="bold">R</text>
  <text x="247" y="525" font-family="Arial, sans-serif" font-size="14">: reshape</text>

  <!-- * Legend -->
  <circle cx="355" cy="520" r="7" fill="none" stroke="#000" stroke-width="1" />
  <text x="355" y="526" font-family="Georgia, serif" font-size="13" text-anchor="middle" font-weight="bold">*</text>
  <text x="367" y="525" font-family="Arial, sans-serif" font-size="14">: convolution</text>

  <!-- + Legend -->
  <circle cx="235" cy="543" r="7" fill="none" stroke="#000" stroke-width="1" />
  <line x1="231" y1="543" x2="239" y2="543" stroke="#000" stroke-width="1" />
  <line x1="235" y1="539" x2="235" y2="547" stroke="#000" stroke-width="1" />
  <text x="247" y="548" font-family="Arial, sans-serif" font-size="14">: Element-wise addition</text>


  <!-- ================= PANEL (c) Query function q(·) ================= -->
  <text x="515" y="335" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#000">(c) Query function <tspan font-style="italic">q</tspan>(·)</text>

  <!-- Input x -->
  <text x="515" y="457" font-family="Georgia, serif" font-size="18" font-style="italic">x</text>

  <!-- Patching Box -->
  <rect x="545" y="430" width="85" height="45" rx="10" fill="#41719c" stroke="#1f3864" stroke-width="1.5" />
  <text x="587.5" y="457" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">patching</text>


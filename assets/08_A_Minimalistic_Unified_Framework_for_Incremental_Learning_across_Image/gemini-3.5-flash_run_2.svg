  <line x1="630" y1="452.5" x2="675" y2="452.5" stroke="#000" stroke-width="2" />
  <circle cx="675" cy="452.5" r="3" fill="#000" />
  <circle cx="695" cy="425" r="4" fill="#000" />
  <circle cx="695" cy="480" r="4" fill="#000" />
  <line x1="675" y1="452.5" x2="693" y2="427" stroke="#000" stroke-width="2.5" />


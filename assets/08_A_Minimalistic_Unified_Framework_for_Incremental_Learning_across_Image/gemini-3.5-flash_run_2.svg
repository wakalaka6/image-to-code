  <rect x="877" y="427" width="62" height="50" rx="10" fill="#41719c" stroke="#1f3864" stroke-width="1.5" />
  <text x="908" y="443" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">softmax</text>

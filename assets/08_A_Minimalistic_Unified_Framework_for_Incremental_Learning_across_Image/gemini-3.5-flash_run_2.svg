  <text x="790.5" y="424" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#333">Global</text>
  <text x="790.5" y="439" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" font-weight="bold" fill="#333">MLP</text>


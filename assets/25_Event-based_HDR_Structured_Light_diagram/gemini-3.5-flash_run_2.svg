<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="100%">
  <defs>
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#000"/>
    </marker>

    <!-- Drop Shadow Filter for Blocks -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>

    <!-- Blur Filter for Heatmaps -->
    <filter id="heatmap-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>

    <!-- Noise Pattern for Event Frames -->
    <pattern id="event-noise" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#151515"/>
      <circle cx="2" cy="2" r="0.6" fill="#ffffff" opacity="0.4"/>
      <circle cx="8" cy="3" r="0.8" fill="#ffffff" opacity="0.7"/>
      <circle cx="5" cy="8" r="0.5" fill="#aaaaaa" opacity="0.5"/>
      <circle cx="10" cy="9" r="0.7" fill="#ffffff" opacity="0.6"/>
    </pattern>

    <!-- Dense Noise Pattern for Reference Frames -->
    <pattern id="reference-noise" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#1a1a1a"/>
      <circle cx="1" cy="1" r="0.5" fill="#ffffff" opacity="0.6"/>
      <circle cx="4" cy="3" r="0.4" fill="#cccccc" opacity="0.4"/>
      <circle cx="2" cy="5" r="0.5" fill="#ffffff" opacity="0.5"/>
    </pattern>

    <!-- Radial Glow for Energy Maps -->
    <radialGradient id="energy-glow-1" cx="45%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#444444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#151515" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="energy-glow-2" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#444444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#151515" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="energy-glow-3" cx="55%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#444444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#151515" stop-opacity="0"/>
    </radialGradient>

    <!-- Disparity Map Gradients -->
    <linearGradient id="disp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000066"/>
      <stop offset="50%" stop-color="#0000ff"/>
      <stop offset="75%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ff00"/>
    </linearGradient>
    <linearGradient id="desk-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff00"/>
      <stop offset="50%" stop-color="#ffff00"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
    <radialGradient id="ball-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="70%" stop-color="#00ff00"/>
      <stop offset="100%" stop-color="#0000ff"/>
    </radialGradient>
  </defs>

  <style>
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #000000; text-anchor: middle; }
    .math-label { font-family: "Georgia", "Times New Roman", serif; font-size: 18px; fill: #000000; }
    .box-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #000000; text-anchor: middle; font-weight: 500; }
    .title-text { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; fill: #000000; text-anchor: middle; font-weight: 500; }
    .stroke-round { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- ==================== LEFT COLUMN: INPUTS ==================== -->

  <!-- Captured Event Frames Stack -->
  <g id="event-frames">
    <!-- Frame 3 (Back) -->
    <rect x="40" y="20" width="140" height="90" fill="url(#event-noise)" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
    <path d="M 55,85 L 85,45 L 95,55 L 135,35 L 165,75" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.7"/>
    
    <!-- Frame 2 (Middle) -->
    <rect x="30" y="30" width="140" height="90" fill="url(#event-noise)" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
    <path d="M 45,95 L 75,55 L 85,65 L 125,45 L 155,85" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.8"/>
    
    <!-- Frame 1 (Front) -->
    <rect x="20" y="40" width="140" height="90" fill="url(#event-noise)" stroke="#444" stroke-width="1.2" filter="url(#shadow)"/>
    <!-- Stylized Event Content -->
    <circle cx="70" cy="85" r="18" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2,3"/>
    <path d="M 35,105 L 65,65 L 75,75 L 115,55 L 145,95" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2,2"/>
    <path d="M 110,95 L 135,55 M 125,95 L 145,65" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <text x="90" y="155" class="label">Captured Event Frames</text>
  </g>

  <!-- Energy Map Stack -->
  <g id="energy-maps">
    <!-- Frame 3 (Back) -->
    <rect x="40" y="170" width="140" height="90" fill="#151515" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
    <rect x="40" y="170" width="140" height="90" fill="url(#energy-glow-1)" style="mix-blend-mode: screen;"/>
    
    <!-- Frame 2 (Middle) -->
    <rect x="30" y="180" width="140" height="90" fill="#151515" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
    <rect x="30" y="180" width="140" height="90" fill="url(#energy-glow-2)" style="mix-blend-mode: screen;"/>
    
    <!-- Frame 1 (Front) -->
    <rect x="20" y="190" width="140" height="90" fill="#151515" stroke="#444" stroke-width="1.2" filter="url(#shadow)"/>
    <rect x="20" y="190" width="140" height="90" fill="url(#energy-glow-3)" style="mix-blend-mode: screen;"/>
    <!-- Stylized Energy Content (blurred shapes) -->
    <circle cx="75" cy="235" r="18" fill="#ffffff" opacity="0.4" filter="url(#heatmap-blur)"/>
    <path d="M 35,255 L 65,215 L 75,225 L 115,205 L 145,245" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.2" filter="url(#heatmap-blur)"/>
    <text x="90" y="305" class="label">Energy Map</text>
  </g>

  <!-- Reference Frames Stack -->
  <g id="reference-frames">
    <!-- Frame 3 (Back) -->
    <rect x="40" y="320" width="140" height="90" fill="url(#reference-noise)" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
    <!-- Frame 2 (Middle) -->
    <rect x="30" y="330" width="140" height="90" fill="url(#reference-noise)" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
    <!-- Frame 1 (Front) -->
    <rect x="20" y="340" width="140" height="90" fill="url(#reference-noise)" stroke="#444" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="90" y="455" class="label">Reference Frames</text>
  </g>


  <!-- ==================== SECOND COLUMN: FEATURE EXTRACTION ==================== -->

  <!-- Top Feature Extraction (Blue) -->
  <g id="feat-ext-top">
    <rect x="230" y="40" width="20" height="100" rx="3" fill="#b4cbe6" filter="url(#shadow)"/>
    <rect x="265" y="52" width="18" height="76" rx="3" fill="#b4cbe6" filter="url(#shadow)"/>
    <rect x="300" y="40" width="20" height="100" rx="3" fill="#b4cbe6" filter="url(#shadow)"/>
    <text x="265" y="160" class="label">Feature Extraction</text>
  </g>

  <!-- Middle Feature Extraction (Green) -->
  <g id="feat-ext-mid">
    <rect x="230" y="190" width="20" height="100" rx="3" fill="#b2d8b2" filter="url(#shadow)"/>
    <rect x="265" y="202" width="18" height="76" rx="3" fill="#b2d8b2" filter="url(#shadow)"/>
    <rect x="300" y="190" width="20" height="100" rx="3" fill="#b2d8b2" filter="url(#shadow)"/>
    <text x="265" y="310" class="label">Feature Extraction</text>
  </g>

  <!-- Bottom Feature Extraction (Blue) -->
  <g id="feat-ext-bottom">
    <rect x="230" y="340" width="20" height="100" rx="3" fill="#b4cbe6" filter="url(#shadow)"/>
    <rect x="265" y="352" width="18" height="76" rx="3" fill="#b4cbe6" filter="url(#shadow)"/>
    <rect x="300" y="340" width="20" height="100" rx="3" fill="#b4cbe6" filter="url(#shadow)"/>
    <text x="265" y="460" class="label">Feature Extraction</text>
  </g>


  <!-- ==================== THIRD COLUMN: FEATURES &amp; ESTIMATION ==================== -->

  <!-- Left Features (Yellow 3D Blocks) -->
  <g id="left-features">
    <!-- Block 3 (Back) -->
    <g transform="translate(490, 25)" filter="url(#shadow)">
      <rect x="0" y="0" width="60" height="70" fill="#ffd880" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="0,0 10,-10 70,-10 60,0" fill="#e5b858" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="60,0 70,-10 70,60 60,70" fill="#cfa03c" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    </g>
    <!-- Block 2 (Middle) -->
    <g transform="translate(475, 35)" filter="url(#shadow)">
      <rect x="0" y="0" width="60" height="70" fill="#ffe090" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="0,0 10,-10 70,-10 60,0" fill="#e5c158" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="60,0 70,-10 70,60 60,70" fill="#cfa63c" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    </g>
    <!-- Block 1 (Front) -->
    <g transform="translate(460, 45)" filter="url(#shadow)">
      <rect x="0" y="0" width="60" height="70" fill="#ffe8a0" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="0,0 10,-10 70,-10 60,0" fill="#e5cc68" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="60,0 70,-10 70,60 60,70" fill="#cfb34c" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    </g>
    <!-- Math Labels -->
    <text x="475" y="20" class="math-label">F<tspan font-size="12" baseline-shift="sub">L2</tspan></text>
    <text x="450" y="45" class="math-label">F<tspan font-size="12" baseline-shift="sub">L1</tspan></text>
    <text x="425" y="70" class="math-label">F<tspan font-size="12" baseline-shift="sub">L0</tspan></text>
    <text x="495" y="140" class="label">Left Features</text>
  </g>

  <!-- Energy-guided Confidence Estimation Box -->
  <g id="energy-guided-box" filter="url(#shadow)">
    <rect x="350" y="190" width="135" height="105" rx="15" fill="#8cc681" stroke="#7cb571" stroke-width="1"/>
    <text x="417" y="215" class="box-text">Energy-</text>
    <text x="417" y="233" class="box-text">guided</text>
    <text x="417" y="251" class="box-text">Confidence</text>
    <text x="417" y="269" class="box-text">Estimation</text>
  </g>

  <!-- Right Features (Yellow 3D Blocks) -->
  <g id="right-features">
    <!-- Block 3 (Back) -->
    <g transform="translate(490, 325)" filter="url(#shadow)">
      <rect x="0" y="0" width="60" height="70" fill="#ffd880" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="0,0 10,-10 70,-10 60,0" fill="#e5b858" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="60,0 70,-10 70,60 60,70" fill="#cfa03c" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    </g>
    <!-- Block 2 (Middle) -->
    <g transform="translate(475, 335)" filter="url(#shadow)">
      <rect x="0" y="0" width="60" height="70" fill="#ffe090" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="0,0 10,-10 70,-10 60,0" fill="#e5c158" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="60,0 70,-10 70,60 60,70" fill="#cfa63c" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    </g>
    <!-- Block 1 (Front) -->
    <g transform="translate(460, 345)" filter="url(#shadow)">
      <rect x="0" y="0" width="60" height="70" fill="#ffe8a0" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="0,0 10,-10 70,-10 60,0" fill="#e5cc68" stroke="#000" stroke-width="1.2" class="stroke-round"/>
      <polygon points="60,0 70,-10 70,60 60,70" fill="#cfb34c" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    </g>
    <!-- Math Labels -->
    <text x="475" y="320" class="math-label">F<tspan font-size="12" baseline-shift="sub">R2</tspan></text>
    <text x="450" y="345" class="math-label">F<tspan font-size="12" baseline-shift="sub">R1</tspan></text>
    <text x="425" y="370" class="math-label">F<tspan font-size="12" baseline-shift="sub">R0</tspan></text>
    <text x="495" y="440" class="label">Right Features</text>
  </g>


  <!-- ==================== FOURTH COLUMN: CONFIDENCE &amp; VOLUME ==================== -->

  <!-- Confidence Maps Stack -->
  <g id="confidence-maps">
    <!-- Map 3 (Back) -->
    <g transform="translate(540, 175)" filter="url(#shadow)">
      <rect width="130" height="90" fill="#0022aa" stroke="#555" stroke-width="1"/>
      <g filter="url(#heatmap-blur)" opacity="0.8">
        <circle cx="45" cy="45" r="20" fill="#33ffaa"/>
        <circle cx="80" cy="35" r="25" fill="#ffff00"/>
        <circle cx="60" cy="55" r="12" fill="#ff3300"/>
      </g>
    </g>
    <!-- Map 2 (Middle) -->
    <g transform="translate(530, 185)" filter="url(#shadow)">
      <rect width="130" height="90" fill="#0022aa" stroke="#555" stroke-width="1"/>
      <g filter="url(#heatmap-blur)" opacity="0.85">
        <circle cx="43" cy="45" r="21" fill="#33ffaa"/>
        <circle cx="83" cy="37" r="26" fill="#ffff00"/>
        <circle cx="63" cy="53" r="13" fill="#ff3300"/>
      </g>
    </g>
    <!-- Map 1 (Front) -->
    <g transform="translate(520, 195)" filter="url(#shadow)">
      <rect width="130" height="90" fill="#0022aa" stroke="#333" stroke-width="1.2"/>
      <g filter="url(#heatmap-blur)">
        <circle cx="40" cy="45" r="22" fill="#33ffaa" opacity="0.8"/>
        <circle cx="85" cy="40" r="28" fill="#ffff00" opacity="0.9"/>
        <circle cx="65" cy="55" r="15" fill="#ff3300" opacity="0.9"/>
        <path d="M 20,20 Q 50,80 110,30" stroke="#00ffcc" stroke-width="12" fill="none" opacity="0.5"/>
      </g>
    </g>
    <text x="585" y="300" class="label">Confidence Maps</text>
  </g>

  <!-- Confidence Propagation Volume Construction Box -->
  <g id="conf-prop-box" filter="url(#shadow)">
    <rect x="695" y="185" width="125" height="105" rx="15" fill="#f5b083" stroke="#e29d70" stroke-width="1"/>
    <text x="757" y="210" class="box-text">Confidence</text>
    <text x="757" y="228" class="box-text">Propagation</text>
    <text x="757" y="246" class="box-text">Volume</text>
    <text x="757" y="264" class="box-text">Construction</text>
  </g>


  <!-- ==================== FIFTH COLUMN: COST VOLUME &amp; DISPARITY ==================== -->

  <!-- Cost Volume (3D Orange Block) -->
  <g id="cost-volume" filter="url(#shadow)">
    <rect x="850" y="50" width="110" height="70" fill="#f5b083" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    <polygon points="850,50 870,30 980,30 960,50" fill="#e09060" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    <polygon points="960,50 980,30 980,100 960,120" fill="#c87848" stroke="#000" stroke-width="1.2" class="stroke-round"/>
    <text x="905" y="82" class="title-text">Cost</text>
    <text x="905" y="102" class="title-text">Volume</text>
  </g>

  <!-- Cost Aggregation Box -->
  <g id="cost-agg-box" filter="url(#shadow)">
    <rect x="850" y="185" width="135" height="105" rx="15" fill="#8da4cd" stroke="#7a91ba" stroke-width="1"/>
    <text x="917" y="233" class="title-text">Cost</text>
    <text x="917" y="253" class="title-text">Aggregation</text>
  </g>

  <!-- Disparity Map Output -->
  <g id="disparity-output" filter="url(#shadow)">
    <rect x="840" y="340" width="150" height="105" fill="url(#disp-bg)" stroke="#333" stroke-width="1.2"/>
    <!-- Stylized Depth Map Content -->
    <g>
      <!-- Background structures (blue/cyan) -->
      <path d="M 840,360 Q 870,345 910,360 L 910,410 L 840,410 Z" fill="#0044cc" opacity="0.6"/>
      <path d="M 850,370 Q 880,355 920,370" stroke="#00ccff" stroke-width="5" fill="none" opacity="0.7"/>
      <!-- Foreground Desk (green to red) -->
      <polygon points="840,410 990,410 990,445 840,445" fill="url(#desk-grad)"/>
      <!-- Ball on desk (yellow/green) -->
      <circle cx="905" cy="405" r="22" fill="url(#ball-grad)" stroke="#aaff00" stroke-width="0.5"/>
      <!-- Tripod/Camera structure (closer, yellow/red) -->
      <path d="M 945,425 L 970,355 L 985,425 Z" fill="#00ffcc" opacity="0.8"/>
      <path d="M 962,355 L 978,355 L 970,338 Z" fill="#ffff00" opacity="0.9"/>
      <circle cx="970" cy="338" r="6" fill="#ff3300"/>
    </g>
    <text x="915" y="460" class="label">Disparity</text>
  </g>


  <!-- ==================== ARROWS &amp; CONNECTIONS ==================== -->

  <g id="connections" stroke="#000000" stroke-width="1.5" fill="none">
    <!-- Event Frames -> Feature Extraction -->
    <path d="M 175, 85 L 218, 85" marker-end="url(#arrow)"/>
    
    <!-- Event Frames -> Energy Map (Vertical Arrow) -->
    <path d="M 95, 133 L 95, 162" marker-end="url(#arrow)"/>

    <!-- Feature Extraction (Top) -> Left Features -->
    <path d="M 320, 85 L 448, 85" marker-end="url(#arrow)"/>

    <!-- Energy Map -> Feature Extraction -->
    <path d="M 175, 235 L 218, 235" marker-end="url(#arrow)"/>

    <!-- Feature Extraction (Middle) -> Energy-guided Confidence -->
    <path d="M 320, 235 L 342, 235" marker-end="url(#arrow)"/>

    <!-- Reference Frames -> Feature Extraction -->
    <path d="M 175, 385 L 218, 385" marker-end="url(#arrow)"/>

    <!-- Feature Extraction (Bottom) -> Right Features -->
    <path d="M 320, 385 L 448, 385" marker-end="url(#arrow)"/>

    <!-- Left Features -> Energy-guided Confidence (Down &amp; Left) -->
    <path d="M 495, 115 L 495, 155 L 415, 155 L 415, 182" marker-end="url(#arrow)"/>

    <!-- Energy-guided Confidence -> Confidence Maps -->
    <path d="M 485, 235 L 512, 235" marker-end="url(#arrow)"/>

    <!-- Confidence Maps -> Confidence Propagation -->
    <path d="M 665, 235 L 687, 235" marker-end="url(#arrow)"/>

    <!-- Left Features -> Confidence Propagation (Long Top Path) -->
    <path d="M 590, 80 L 755, 80 L 755, 177" marker-end="url(#arrow)"/>

    <!-- Right Features -> Confidence Propagation (Long Bottom Path) -->
    <path d="M 590, 385 L 755, 385 L 755, 298" marker-end="url(#arrow)"/>

    <!-- Confidence Propagation -> Cost Volume (Up &amp; Right) -->
    <path d="M 820, 235 L 835, 235 L 835, 75 L 842, 75" marker-end="url(#arrow)"/>

    <!-- Cost Volume -> Cost Aggregation -->
    <path d="M 915, 125 L 915, 177" marker-end="url(#arrow)"/>

    <!-- Cost Aggregation -> Disparity -->
    <path d="M 915, 290 L 915, 332" marker-end="url(#arrow)"/>
  </g>

</svg>